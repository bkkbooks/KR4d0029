body:
  text: 端明集卷二十四宋蔡襄撰表謝知制誥表潤色帝王之言大為清閒之路推恩下中之品深負冒榮之憂上當絲綸俯墜淵谷臣某誠惶誠感頓首頓首伏念臣起寒鄉而甚賤逢聖時而自呈粗業文章而得游書林嘗好議論而又塵諫署主知難遇不敢愛身衆怒雖多未始回慮唯進用諍臣之速實招徠妄者之端願還左右史之官出領二千石之任八年江海之外私幸安全萬里宸極之高敢期還侍伏蒙尊號皇帝陛下收自外補復於記言再趨禁闥而若驚每仰天顔而伊邇未逾歲律擢與詞垣竊以代為訓詞必嘗力學能視藁草要須美才在臣空疏承命戰栗量天地之施論報無階戴君父之仁捐生有所代賀老人星表金德治時玉衡揆度仰星文之發耀麗霄極以凝祥符聖厯之永昌舉人區而胥悅中謝恭以尊號皇帝陛下至誠育物中道納民仁如天之廣生化與神而無迹諸福竝效成功罕名幽感察於上靈經次示乎休應秋琯方仲宵籌向晨直景位以垂光映社躔而昭慶考厥候臺之驗資夫睿算之延臣等叨列宰司悚窺乾象罄一心而有祝期萬壽以無垠代謝御殿復膳表臣某等言前貢封章請御殿復膳蒙降批答俞允者側躬修德祗畏天明籲帝造辭恭回宸慮正路朝之法坐復內饔之燕羞溫詔下臨輿情胥悅臣某誠歡誠感頓首頓首竊以天子之尊至重唯上靈是欽人君之德莫偕惟大明可況考陽精之闕壤榖梁傳曰有內壤外壤抑厯象之常經然春秋書之於經漢唐載之於志作善者有消伏之感失政者有修舉之勞苟立志以通幽必轉災而為福恭惟尊號皇帝陛下仁涵萬物誠貫三靈動法祖宗之規言合天人之應屬史官之建白驗日象以虧明陛下順稽眚異之來䖍承警告之厚貶太官之常舉即便坐以周詢發廩蓄以恤窮啓狴岸而釋罪晦朔之際變旱暵以為霖未申之交減食分而復景有來列辟咸肅外庭願端黼扆之居仍環珍膳之奉下情兢惕越至再三之勤睿意寬冲俯從衆庶之請臣等預參宰輔無裨聖神仰休應之同臻等歡心而稱頌謹奉表詣東上閣門稱謝以聞臣等誠歡誠感頓首頓首泉州謝上表臣某言臣奉勑知泉州軍州事已於今月初七日到官管勾訖朝綸至渥俯從臣子之心海域雖遙實便庭闈之養臣某中謝伏念臣生身遐遠逢辰休明獨持愚直之心蚤委聖神之照自參文館旋列諫垣無嘉謀以奏上古之珍無敏智以論當世之務浸叨詞掖時邇威顔被天語之丁寧涖京都之繁浩初無才略動忤貴權事必處於公平要惟歸於勤瘁每緣睿奬僅免人言念慈親之高年乞故鄉而便養曲承厚澤出守清源間關山川歷涉歲月近臨居署寅布寬條信問私門不移於夕宿甘鮮庶品足奉於晨羞如臣僥榮實少倫比此蓋伏遇尊號皇帝陛下大仁覆物廣孝及民致兹犬馬之誠上獲雲天之施敢不勵精邦治單盡夙夜之勞宣諭帝慈周通愛育之惠臣無任瞻天望聖激切屏營之至謹奉表陳謝以聞臣某誠歡誠感頓首頓首謹言福州謝上表臣某言伏奉勑命就差知福州已於八月初四日赴任訖竊以一扎細文肅領於宸詔七條丕式謹守於官針內循無似之才再沗惟良之寄負乘增愧殞越在躬中謝伏念臣仰遘盛時寖陶醲化久服勤於經藝早幸竊於王塗狥公滅私雖恪修於職業勵精從治卒亡補於風猷矧事任以薦更顧涓埃而絶效出分郡寄已特荷於恩俞再易藩維遽曲頒於詔命涓辰署政拊已增榮此蓋伏遇皇帝陛下洪覆廣生大明委照推自天之渙渥委守土之重權謹當寅布朝經精求民瘼盡瘁事國憂公如家思誓竭於臣誠少上酬於天造臣無任謝轉禮部郎中表臣某言今月十五日遞到勑誥伏蒙聖恩授臣禮部郎中者函封芝檢特霈於殊私位列春官驟加於寵命揣材甚薄荷澤誠優沗冒逾涯兢惶罔措臣某中謝伏念臣機露素淺器術非深丁辰過時歷王途而寖久承流宣教著民政以無聞方懷惟谷之憂積有瘝官之慮何霈恩而特厚復增秩以敷榮兹蓋伏遇皇帝陛下禹律均和堯仁錫庇誕推渙渥施及蒙愚敢不寅奉政條恪圗治績竭盡涓埃之力仰酬覆育之私臣無任移泉州謝上表臣某言昨奉勑移知泉州軍州事已於初一日赴任訖祗承溫詔已布寬條置身便安蒙上軫恤臣某誠感誠懼頓首頓首伏念臣自解京邑出臨清源違天日之清光歸江海之遐裔過家上冡在古之甚榮守郡養親為子之至幸曾未洊月改付全閩臣向緣愛苦之憂遽致朘痟之病州稱都會居有版籍之繁俗不尚醫難求藥石之助氣力羸虛不可以治穰劇智識頑鈍不可以應急難輒露微誠覬得便地軍壁雖小曾是故鄉獄訟差閒足寬外慮敢期朝渥更與泉麾再見吏民仰宣威惠因其無事得以養和此蓋伏遇體天法道欽文聰武聖神孝德皇帝陛下曲念孤貧俯矜衰悴不窮駑力而使之自適仍有官俸而代其為生況臣年齒方中干祈之切者蓋由疾故儻臣筋骸復壯報效之際者敢以家為上銜仁施之深若負丘山之重辭翰林學士知開封府表臣某言今月初二日准中書劄子指揮勑命除授依前禮部郎中知制誥充翰林學士權知開封府者大明臨下無遠裔而不均零露墜霄雖微物而必施俯承錫命彌用震驚臣某誠惶誠恐頓首頓首伏念臣向自掖垣擢司京邑上賴清光之燭終依全庇之仁屬私便於庭闈遂求補於閩粵尋膺朝綍出守泉山首尾五年更移兩郡親戚歲時之樂足慰母心阡塋展省之勤屢躬先祀非繇孝治之廣曷為天幸之多雖臣賤微感疾滋久藥石攻治之愈至根本堅牢而未除日月因循筋骸憔悴深畏曠官之責方濳退處之圖敢謂伏蒙尊號皇帝陛下曲貸素餐復加恩數禁林近職儒者最榮都輦要權吏之高選併疏寵渥猥逮孱庸揣材幹之非優顧福基之甚薄苟貽過溢之咎實虧分量之知重念臣仰違法座之嚴薦易周星之次思出入於省闥意每在于本朝今此召還適當趨進然而慈親垂老於義不可以遠行病體至羸於力不堪其劇任願特收於成命俾再典於舊封準是微誠終期得請干冒聖慈臣無任激切屏營之至詔答勑蔡某省所上表蒙恩授臣翰林學士知開封府臣為母老難以遠行兼臣久縈疾病不堪劇任辭免其依舊知泉州事具悉卿學通古今足以備獻納政適寬猛足以臨劇煩而人材之難固嘗勞於選任矧居外滋久寧自逸於便安是宜勉旃來服新命綽有餘力夫何微疾之辭居然寵名固為榮養之樂其毋必讓當體至懷所乞辭免宜不允故兹詔示想宜知悉辭權三司使表臣某言四月二十八日蒙恩授臣翰林學士權三司使者地親任重寵數殊優資薄才微公議非允臣某誠惶誠恐頓首頓首伏念向繇樞職出治泉山奉高年之慈親還就養於舊里昨承詔㫖召還京師屢降德音不容讓免驅馳百舍之遠趨伏九閽之嚴曾未逹於近畿復遷處於大計天下通流之術非小智可以營為禁中命令之詞非究言可以潤飾加以支離之悴久辭浩劇之權今所領者益煩顧於力而不逮苟失量度是謂暗愚伏望尊號皇帝陛下特收渙汗之恩更擇長材而用俾違要重庶得安全有祿庇身固能自足懷忠效國誓竭素心謹具表辭免以聞詔答勑蔡某省所上表蒙恩授臣翰林學士權三司使者地親任重寵數殊優資博才微公議非允伏望特收渙汗之恩更擇長材而用俾違要重庶得全安辭免事具悉翰林儒者之極選三司天下之大計朕之任人於此尤重卿有博通之學足以謀王體而兼濟之道足以濟邦財斷於朕心則用而已晚稽于物論則資適其宜當體眷懷無或牢讓所乞宜不允故兹詔示想宜知悉杭州謝上表臣某言伏奉勑差知杭州軍州事已於五月二十六日到任訖國家委之大計材非所宜朝廷與其便藩恩為至幸俯循孤遠之闕二字驚涯分之逾臣某中謝伏念臣儒學未優闕四字謂忠義可以立身而一於事上謂强明可以為吏而果於奉公於時益疏闕二字自信乃者偶承大農之乏輒當會府之繁徒歷歲年蔑修官政伏蒙皇帝陛下大明垂照洪覆均仁察孤臣之盡心知小人之興謗特推恩數之厚俾就思養之榮已涓吉辰祗臨治所敢不詢求民隱閲練師鈐人情莫不樂於便安任之寬簡兵法所謂先於節制示以莊嚴誓竭駑材上酬鴻造賀冬至表臣某言伏以七日來復上應天心之和一陽始生密符君道之長邇遐所底動植均休臣某誠歡誠忭頓首頓首恭惟皇帝陛下惠迪先猷靈承駿命斡璇璣而觀象順玉燭以調元茂對慶辰誕膺景福臣限臨藩屛阻遠闕庭不獲進厠朝班忭舞文陛臣無任瞻天望聖激切屏營之至賀正表臣某言伏以具物於春聖人所以撫節有為於正王者所以求端臣某中謝恭惟皇帝陛下臨教保民晉明燭蔀會年位之始浹天人之歡異俗來威百昌薦貺臣守郡于外不獲進慶闕庭臣無任瞻天祝聖激切屏營之至賀赦表臣某言今月二十三日馬遞到赦書一道以南郊禮畢大赦天下者臣當時集本州官吏及僧民軍道等宣布并行下管屬十縣訖圜丘致饗講修對越之儀大宥推仁覃霈汪洋之澤含生致衆仰秣同歸臣某中謝竊以因吉土曰郊稱大事者祀粵自虞夏迄于漢唐有質有文或㳂或革諸儒參議致謂六天而異名歷代所行止以三年而定禮必於至者取物成之大僃就乎陽者法天道之資生然而千官備儀百靈走職發揮往制必屬於昌辰憲法後王允歸於元聖恭惟皇帝陛下順考古道丕闡大猷懷翼翼之心昭事上帝秉蒸蒸之孝祗見祖宗宿于清淨之宫致此精明之意人神降格海宇歡呼回六玉之珍虬御雙雲之華闕與民更始大覃雷雨之恩置國無窮永享華夷之樂臣親逢盛際向忝近司方領寄於藩垣但騖精於宸極謝加勳表臣某言今月二十六日進奏院遞到勑牒各一道以南郊禮畢加臣護軍食邑五百户者大饗舉修方畢肇禋之禮徽章稠沓均加在位之臣俯僂承榮震惶知愧臣某中謝伏念臣器質甚淺學術非優徒遘休辰遂躋清貫內歷禁林之邃外專方面之雄非矯矯以出人但渠渠而飭巳當堯舜之在上何以為功使龔黃之復生僅能自守況臣衰拙安在擬倫護侍慈親幸叨便郡此蓋伏遇皇帝陛下講明大典備錫慶私念持槖之舊臣進寵勳之異數雖葵藿之心盡吐仰對大明然蓼蕭之澤溥覃豈遺一物誓捐頂踵以答乾坤臣伏限守任在遠不獲奔詣闕庭臣無任謝賜歷日表臣某言今月二十六日進奏院遞到詔書一道賜臣治平三年厯日一道者聖言溫潤榮甚袞褒舜厯昭明寵於圖瑞臣某中謝竊以惟王建國頒朔治民奉時先一歲之端藏廟謹諸侯之政治古所載熙朝益恭伏惟皇帝陛下勤念人時允符乾造坐明堂而聽政命太史以謹元特重王春首頒歲律度量寒暑蓍龜咎祥致隂陽之不愆宜疾癘之毋作臣遠分藩寄祗奉詔恩拜舞於庭雖竊九天之賜卷舒在手獲知四序之遷冊皇太后稱賀表臣某言得進奏院狀報十一月十六日皇太后受寶冊者竭天下之養雖恭報於厚慈盡朝廷之儀在極崇於徽號神祗協應夷夏同歡臣某中謝臣聞夏商以前六宫之制邈焉而無紀姫劉以降五翟之法粲然而備存姜嫄太姒之流音明德和思之繼盛載華禮典允屬昌辰恭惟皇帝陛下純被九乾紹恢四聖成社稷之大計母道有光酬天地之至仁隂靈克順爰歸功於慈訓遂推美於瓊章家國慶安孝恭交至臣沗塵法從恪守藩封無任瞻望抃蹈激切屏營之至冊皇后稱賀表臣某言得進奏院狀報十一月十六日皇后受冊者儷尊皇極宅正位於天閨配德紫宸膺鴻名於寶冊海內臣妾抃蹈以之臣某中謝臣聞文命造邦塗山所以宣內助重華嗣帝皇英所以輔聖明宗廟歆其薦羞穹壤因而垂祉載光懿範永屬熙朝恭惟皇帝陛下纘服睿圖席休寶緒兩儀均大含生荷亭育之恩二曜高臨品物仰照臨之惠是以淑譽流於區域隂教序於宫闈用贊王猷必崇位號加麗褘衣之貴增光彤管之華臣沗寄藩方限遙天陛無任瞻望欣躍激切屏營之至賀潁王過禮表臣某言得進奏院狀報三月初十日潁王過禮者講名典禮納配儲闈奠笄之儀告成守土之臣交抃中謝恭惟皇帝陛下倣天合德與日齊明思隆長世之基豫正少陽之位爰崇淑媛以儷元良龜筮襲從輝青宫之徽冊本支增茂扶炎運於無窮臣幸豫通班沗臨遠郡無任瞻天荷聖激切屏營之至謝恤刑表臣某言五月二十九日進奏院遞到詔書一道賜臣欽恤刑獄者臣已施行訖寬詔發中至仁逮下當赫隆於盛暑俾明慎於常經正寧推恩普天同抃臣某誠惶誠恐頓首頓首伏惟皇帝陛下文明御宇法則在躬親攬萬幾休有一德化鴻鈞而被物道皇極以愛民畫象衣冠思循於往制省罪囹圄曲暢於至慈特布訓辭用清科禁臣叨臨藩服絶遠朝廷臣無任瞻天荷恩激切屏營之至端明集卷二十四
