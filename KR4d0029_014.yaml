body:
  text: 端明集卷十四宋蔡襄撰制誥皇后曾祖芸制勑朕以純孝事親至誠饗帝躬執牲玉造於郊廟均畀嘉福敷於四海眷坤儀之重實相祠事追賁曽世厥惟舊典皇后曽祖芸材武沈雄志尚超邁風稱馳於藩屏勲業著於戎韜儲積善謀延施來裔嚮以椒闈之貴襲疏圭壌之封屬此明禋易居全魏克章告䇿英魄其承皇后曾祖母魯國太夫人制勑朕祼於太室奠於崇丘非惟薦馨徳於神天亦以興民孝行矧予宫壼助有齊明申用愍章以慰誠篤之至皇后曾祖母某氏志尚惇淑令則柔嘉蚤專德慶裕延遠妣后德之大前啟國垂統徐方以均禧奄魯邦而賜履靈其未昧歆是典常皇后祖曹彬制勑王者嚴於祀事而齊明之志必有申朕肅於郊廟均福天下眷惟后徳每懐恭止闕首及焉皇后祖彬材畧絶世資性本仁佐我祖宗戡定海㝢功烈明於日月慶賞延於帶礪然兵戎之舉專尚寛平而隂施之隆乃生嘉懿唯俔天之正儷實本祖以開祥屬牲玉之熈成荷龍光而賜慶惟王英哲尚或欽承皇后祖母制勑朕祠郊丘登侑三聖既伸孝於祖考唯我儷德潔神助相申賁先烈用慰誠心皇后祖母挺生慶門嬪偶華族柔明之懿動鑒圖則世有陰施挺生令孫正位椒塗景象軒緯追榮祖室前襚翟章屬禋燎之上闕封之大宇有光泉穸尚克歆承劉叅政曾祖景洪贈太子少保再贈太子太保制勑饗親於廟饗帝於郊德誠忝香並獲嘉貺實於弼輔贊相熈事追恤曽廟所以廣施慶之澤具官某曽祖某稔善在躬儲慶自逺丘園肥遯行義著聞祐啟胄孫與謀幾政屬竣精祀申用愍章加保䕶於儲宫極光華於壤樹營䰟如在尚或承之劉㕘政曽祖母追封清河郡太夫人曽氏冄追封榮國太夫人制勑徳厚者其流逺位崇者其數異朝家典故二府柄臣凡更郊祠重褒家廟上延曽世兹惟舊矣具官某曽祖母某氏靖嘉厥徳淑慎其儀嬪偶時髦儲載陰慶貽孫之訓逢辰乃享孚佑哲人協調宰路嚮因巖廟之任前啓郡田之封逮此精禋特申愍典胙休城國光耀幽途尚爾淑靈時克歆鑒劉㕘政祖煦贈太子少傅再贈太子太傅制勅朕休于太室禋于中壇祖考格臨神天歆顧乃惟臣鄰莫不追慕先烈不有褒禭曷以慰其孝心具官某祖某世美敦於儒雅徳名被於鄉邦善慶之蓄而載於當年隂施之厚而貽于後嗣萃厥孫謀之令階夫柄用之能屬奠玉之精禋申納書之愍典惟榮私廟侈命大門進春坊輔導之聮為祖服光華之寵式將孝告尙或歆承劉㕘政祖母追封安定郡太夫人張氏再追封康國太夫人制勅朕薦瓚先廟則慈顔升配焫蕭陽位則厚祗合侑故於台輔均禭王妣則孝行於上下而恩覃于幽顯矣具官某祖母某氏嬪儀表世婦則承家助施厚徳之祥終啓孝孫之慶六珈之飾前被于愍章千乗之封進荒於大國推榮私閥永賁幽扄劉㕘政父素贈太子少師再贈太子太師制勑郊以事天配侑祖考唯朕誠心罔有不肅推是感思及于大臣追揚前人之烈則孝治興矣具官某父某徳尙高舉行美純茂樂於名敎訓以清白慶靈之績似續其昌挺生畯良㕘論幾務寵推先正師表東朝顯耀家閲幽通隧路噫一禮之舉褒渥上延朕於丞疑眷意良厚劉㕘政母追封瑯琊郡太夫人顔氏再追封沛國太夫人制勑人子飭躬盡節以位於朝者莫不欲顯榮其親以示于世故郊澤之行首被台路申於愍典所以盡人子之志也具官某母某氏鑒訓圖史躬勤組紃蚤儷宗儒回滀隂慶誕生哲嗣㕘輔宰庭嚮登郡賦之隆未極國田之峻屬備儀於吉土爰徹壤於大邦併疏慶渥之華庸為徳施之厚孫副樞曽祖鶚贈太子少保再贈太子太保制勑朕薦黄流之瓚内以宗世室之嚴升紫燎之煙上以旅泰元之重蔚精誠之升聞沛神靈之來格倚頼鄰臣協申顯相延愍思於曽廟表厚慶于高閎具官某曽祖某躬善鴻猷代嚴清訓膺材智之美而闕四字用行義之譽而隆為素封介爾孫謀參予幄闕三字欽柴之典用推飭壤之恩進元良保䕶之聮闕三字光華之寵孫副樞曽祖母追封太山郡太夫人闕氏再追封太原郡太夫人制勑登吉土之壇展精禋于上帝御中天之闕敷徳施于多方乃眷輔臣追榮先廟具官某曽祖母嘉柔成徳淑恵有儀作合高閥克供時祀慶源来而自逺根本固而必蕃惟顯孫之賢㕘右府之命助相精享格擁鴻禧首推錫類之仁進列啓邦之寵篆章告䇿識爽其歆孫副樞祖植贈太子少傅再贈太子太傅制勑朕託王公之上懼徳不逮祗享天明風示海㝢惟我輔弼贊祠郊丘霈恩大門用均福貺具官某祖某學術名家材資命世恵澤施于邑治隂慶萃于孫謀進與斗樞之庭實相泰元之畤甫成熈事首及褒先即朝宁之孤卿列元良之上傅愍章申告幽隧載華孫副樞祖母追封汝南郡太夫人周氏冄追封河間郡太夫人制勑朕入清廟陟圓丘奉三后之侑則念及人之親享百福之貺則思逮下之恵矧我樞庭之哲有懷王妣之慈申此愍章以飭幽穸具官某祖母某氏性範雍莊閨儀嚴勑嬪令人於冠族儲善徳於後昆冄世寖昌四鄰登用嚮有納書之禭已躋徹郡之榮逮竣事於大神復徙封於名壤倂疏異典用慰營魂孫副樞父丕贈太子少師再贈太子太師制勑國家之重者無大郊廟之祭偹物盡志咸適於度非唯臣工克有顯徳以贊陟降抑亦先正之有善訓俾爾習蹈于禮故舉褒典追揚風劭具官某履道冲粹懐材浚明世美寖延徳施憑厚若稼而必穡若構之有堂嗣子惟良筦予機柄屬周毖祀孚用恤章儲宮師訓之嚴家廟寵靈之渥推本昭孝斯朕意焉孫副樞母追封河南郡太夫人周氏再追封江陵郡太夫人制勑予既念臣工之先正能訓其子以相予祀稽合禮舊用東朝公袞之命以禭之又念其配必有令美助成徳慶敷錫恩典用均嘉貺具官某母某氏世族高華天資淵靜柔儀循於家節慤行服於諸宗有子之賢為國之棟向殄平於嶺服旋登仕於樞庭會陽畤之畢儀究幽阡而漏澤疏常安之名壤慰聖善之淑靈朝渥甚隆尚或歆荷孫副樞母追封清河郡太夫人張氏再追封京兆郡太夫人制勑尊榮其親所以勸人子之孝敦厚其行所以勵臣下之忠朕祠郊丘推澤台輔追褒禰室顯大慶門具官某母性照賢明躬循法度蘩爼以奉先祭璜珮以謹閫儀積施慶靈誕生材哲方贊幾㣲之務適陪毖契之禋恤及慈闈相攸樂壤更賦上田之數霈疏幽隧之榮程相公曽祖新贈太師制勑立人之道各親其族故廟焉以祀其先馭臣之儀必有等威故貴者特異其數朕景至嚮天澤延四外唯是相臣禭之曽父於禮不亦重乎具官某曽祖某濳徳内充英稱遐騖垂清白之訓奕世其承涵積累之祥哲孫斯復方一相以處外舉三事以褒先會郊畤之上儀進師垣之峻秩阡塗雖閟尚鑒恩靈程相公曽祖母制勅朕吉旦執牲幣以饗帝列侑祖考所以敎諸侯之孝矧惟元老實在陪輔握施之大宜及曽世具官某曽祖母某氏賢和循度淑恵有儀早儷宗儒勤宣婦順深覃福施之美佑迪胄孫之良列于公台撫是蕃服向啟大邦之賦已崇象服之榮會畢明禋冄荒全晉漏恩阡樹靈懿其膺程相公祖贊明贈中書令制勑朕有耆哲之老總將相之權以綏近輔方予饗帝而不得與於籩爼其心豈不在予左右故追褒慶典無間宰庭抑明注意之重具官某祖某奕世隆禮秉躬尚儒儲慶淵回啓福緜逺若墉之高其址必大若木之遂其本必固發於再葉登為上公眷祖服之迪祥極帝師而舉禭屬中壇之峻事陟右相以推榮亶然松阡之華歆兹秬卣之告程相公祖母制勑朕臨崇丘闕薦吉玉帝監芳潔神格熈富嘉應雜遝羣靈歡欣思與宗正共承其慶具官某祖母某氏柔範表于姻族逺鑒燭于箴圖来嬪哲人協布隂徳有孫賢令列于台儀追嚴王妣之封更陪輿地之數大邦其徹幽穸惟歆程相公父制勑自天子下達至行之美莫先乎孝朕祼七室於廟侑三后于郊思予舊相之重極爾昊天之感追榮禰世以慰其心具官某父某材智出人而甚逺徳業在躬而至優隂施積於高閲福祉萃于喆嗣登㕘鈞軸列于宰司禋祀甫成神富均被按輿圖之美號占書社之上游禭有上公之圭告用文人之䇿恩榮叢至魂爽尚知程相公母制勑有國之慶不及于家孰謂之澤有子之榮不貴其母孰謂之孝朕薦享上帝均覃釐貺首念良弼追褒慈妣所以示等數而推恩禮也某母某氏賢徳本於天資儀度隆於壼範挺生喆子登列上台往臨申伯之藩外處邵公之相會休成於熈等特申用於禭章再開國田大隆廟服歆兹愍冊用慰柔靈張宣徽曽祖厚贈太子少保制勅國家禮成郊丘澤被㝢縣而於臣鄰之先咸有典數其褒及曽世者非二府近列不與於斯所以重其事也具官某曽祖某蚤仕華途交辟幕府猷為之美屈於當世徳芘之慶發於來嗣祐孚孫胄登與哲科陟元戎之壇提四貴之印頃陪禋薦實罄齊明舉家廟之禭章踐儲宫之保䕶納書告策榮耀無窮張宣徽曽祖母制勅具有邇臣以郊燔之慶用東宫保䕶之秩褒其曽前並乃眷其配宜崇小君之號于其私廟榮名稱焉具官某曽祖母某氏性由禮檢得劭嬪風鑒于圖史之良躬夫蘩藻之祀慶儲當世利澤後人爰啓令孫實登近輔適中壇之紀事念曽世以推恩徹名壤之風峻副笄之秩九原而在其慰爾心張宣徽父固特贈太子少師制勑水積者其流無窮徳厚者其施必逺有能儲慶顯右其嗣是必推恩以及其先朕迺以祗見泰元敷澤海㝢唯予近輔舉禭先正以慰孝心具官某父某文業敦美材資浚明風稱著於朝閨慶利覃於嗣續有象賢之哲登近貴之途相我上儀成夫毖祀顧禰宮之清履升儲保之榮名天日光華下燭幽穸張宣徽母制勑朕薦七室於廟侑三聖於郊祖考降臨孝誠昭格眷予近輔莫不有蓼莪之感昊天之嘆近褒慈妣昭顯令徳具官某母某氏早繇榮閥来嬪徳人儀度肅於閨闈教箴刑于婣族助儲隂施孚哲慶基頃縁子姓之榮前徹郡田之號禋柴甫畢恩露載敷特崇象服之華并胙名邦之履寵榮之渥世嗣其昌樞密使王徳用曽祖方贈尚書令兼中書追封許國公特贈太師晉國公制勑大臣家廟通於三世所以異禮等而示天下故下之著明冄筦機政申禭其先以慰其志具官某曽祖某立誠介特懐道寛冲爵命嗇于當年慶祉遺于來嗣惟乃孝孫之令入居右弼之崇追顯曽門爰圖成國允矣帝師之重炳然祖服之華流裕無疆啓祐爾後王徳用曽祖母畢氏追封韓國太夫人特追封魯國太夫人制勑山嶽之所以施利澤而不竭者以其涵蓄之深厚理勢然也故盛大之室原其慶祉有自來矣具官某曽祖母某氏有雍洽之慈儀具方柔之靜徳内修壼敎逺祐孫謀兼將相之榮實邦家之頼眷夫曽妣嘗治大封逮冠斗樞之崇彌加象服之貴脂田益衍幽禭永承恩數斯隆尚克歆荷王徳用祖𤣥贈尚書令兼中書令追封曹國公宜特贈太師齊國公制勅朕涓吉旦告廣庭以登元老冠于宥宻又稽典舊追榮祖服大其私門所以視特絶于臣鄰也具官某祖某徳載當年慶流来裔有孫之令為邦之光出奠藩服則當注意之隆入輔帷幄則有伐謀之勝惟其大父之廟錫乃上公之珪兼令紱以居崇陟師垣而益重徹治四履覆冒全齊阡塗之幽無昧欽享王徳用祖母路氏追封陳國太夫人宜特追封某國太夫人制勑君子修身無忝其祖固為孝徳之美而况登冠弼輔追榮上及豈不為存殁之光乎具官某祖母某氏華望葢世美行在躬合嫓辰髦積埤善慶再世彌大兼相是崇眷惟王妣之慈向啓國田之賦相攸越重顯命惟承王徳用父超贈開府儀同三司太師尚書令兼中書令封魯國公宜特追封燕國公餘如故制勅予有耆徳之臣越自外相入冠宥宻方將倚辦謀明協濟幾務是用追榮先廟以重寵數具官某父某材略沈雄志氣忠厚昔事先帝實董元戎風美悚天下之聞徳施存後世之大惟乃令嗣蚤與樞庭忠勤一心出入二紀近繇陪輔専在老成宜申禭於禰宫特進荒于大國上公之袞實琢其章載煥幽阡莫大斯祉王徳用母朱氏追封榮國太夫人宜特追封吳國太夫人制勑弼臣之重等數之大固絶于衆登拜伊始追禭其先所以明朕眷倚之厚具官某母某氏挺生令族來嬪畯賢蘋蘩以觀法度之成圖史以規徳訓之美裕然基慶紹厥世勳有子之英乆相于外比因節召爰冠樞謀申愍冊於慈闈畫鉅封於樂國全吳之壤斯以詔榮山南東道節度使同中書門下平章事賈昌朝曽祖母栗氏可封韓國太夫人制勑朕薦瓚先廟則慈顔升配􅌊蕭陽位則厚祗合侑故於台輔均禭曽妣則孝行於上下而恩覃於幽顯矣具官某曽祖母某氏嬪儀表位婦則承家助施厚徳之祥終啓孝孫之慶六珈之飾前被于愍章千乗之封冄荒於大國推崇私閥永賁幽扄端明集巻十四
