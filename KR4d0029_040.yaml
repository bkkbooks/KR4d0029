body:
  text: 端明集巻四十宋蔡襄撰墓誌銘尚書職方員外郎吕君墓誌銘吕君諱士昌字子弼天聖八年舉進士及第調吉州永新尉婺州司法參軍用舉者改大理寺丞監常之商税務移知益州靈泉縣以太夫人高年願監舒州皖口倉未行服喪外除知江之徳安罷歸三司使田公况辟君編三司例策書成二百巻權知功州五遷為尚書職方員外郎知潤州以代期未至寓居江隂軍嘉祐五年七月十九日終年六十二七年正月十三日遂𦵏之江隂之江隂縣化龍鄉曾祖諱裕東平夀張人祖諱某贈大理評事父諱延之終湖州節度判官因家眞州之楊子縣贈屯田郎中母趙氏贈永寧縣太君繼母孫氏仙遊縣太君娶葛氏封夀昌縣君男三人曰袤許州臨穎尉裘褒皆進士女二人長適楊濰次未筓范文正公薦君舘閣之職田公又薦為㸃刑獄皆未及用而卒子弼寛恕渾厚與之言初若可見其際及游泳益乆即不知其所之視世俗窮通夀夭榮悴憂喜無一事可係其志居閒讀書為文優游終歲其與人處若槩取之從容而論當世士盖所與者無幾矣嘗得偽造印文者其法應免逺官及移蜀或謂用此可免君曰幸人之死以逭移蜀吾不忍為其所以為人大率如此此前世所書有徳義量度君子不能過也銘曰内全於徳不與世異官無顕功進不近利古有君子其道斯類嶷然高風薄夫之媿贈光禄少卿沈君墓誌銘府君諱平字遵道曾祖曰籍衢州常山令祖曰徳饒越州剡縣丞父曰仁諒海州朐山令其先呉人剡縣丞卒𦵏㑹稽後朐山退老於和州因而家焉君少與伯兄曰及舉進士為文章通書史既而伯兄景徳及第以仕而朐山致政事還歸君曰吾其養親乎歴陽闢田疇因物適變遂以富饒計鄉黨親戚厚而周施之逮親終伯兄服喪乃籍所有以奉之伯兄曰吾利汝財乎於是悉力以治喪事乆之族子欲異産與之利田宅而自取其中下者衆益義之君曰吾有五子教以儒術清白足矣其不富之患乎以天聖二年四月二十二日終是月二十八日𦵏於龍陽岡之原夫人胡氏男五人曰立齊京言充女三人君早殁夫人賢而有禮訓育諸孤立以進士中科為尚書兵部郎中兩浙轉運使迎養三十餘年累贈君光禄少卿叙封夫人夀昌縣太君嘉祐六年夫人卒明年舉祔舊塋兵部博學有文藏書二萬巻又所至稱職將以材能進於時宦仕顯榮其可量哉所以知君識慮之逺也銘曰不仕而耕以養其親而終其身於嗟君兮力而豐有施及州里推其族子如其義兮守法儒學教厲子孫實大其門不亦智兮龍場之下卜吉而藏勒文前岡孰與夀兮尹夫人墓誌銘夫人姓尹氏父尚書職方郎中直昭文館諱少連郎中有數子而女獨夫人又少聰警識圖書辨音律故加愛焉及長以歸國子監丞葛君寔丞晚得官當未仕與夫人治家事夫人事姑勤謹不懈而於夫人之族親撫接皆有禮意母楊氏諸子隨官逺方夫人念母之老迎歸以養年八十餘終於夫人之家即𦵏近墅其於孝愛深矣丞以文進而乆不第夫人未嘗戚戚歲時奉祀與娣姒族親宴飲列女僮鳴管絃以相和樂觀世之休悴初不經慮益喜浮屠書頗知其指歸有男令彦汝竒皆舉進士女適眞定元氏主簿施硯其季幼也内外孫八人享年六十以嘉祐六年八月初九日卒八年八月十五日甲申𦵏江隂軍江隂縣化龍鄉丞曰吾妻之賢君不可以不誌間千里之逺以來請銘某銘曰詩稱公侯首考其家均一之徳法度是循唯彼婦道於斯則難嗚呼夫人兹其尚焉光禄卿致仕張公墓誌銘公諱昷之字景山其先黄帝之孫始作弓矢主祀弧星以官受氏周衰六國爭雄而張氏五世相韓良佐漢有功侯於畱畱侯之後丞相禹司徒歆子孫益多散居四方其居東南繼為大姓曰簡者廣陵人生昇仕唐為滁州清流令昇生約金吾衛長史約生訓公之曾祖也以勇謀事楊行密為黄州刺史祖諱璆仕偽唐校書郎後典親兵贈尚書屯田郎中祖妣顔氏考諱佖右内史學士太祖平金陵從後主歸京師授贊善大夫在太宗朝建言時務評讞法令多所施用終給事中累贈太尉妣馬氏贈清河郡太君公少孤知力學問有名於時大中祥符八年擢進士第授温州樂清尉再調潤州觀察推官召還校館閣書遷殿中丞集賢校理通判常州常饑發運使急於官糴榖益貴公奏罷糴而民不流亡蔡文忠公薦其材可任監司之職時輔臣不公悦者出知温州文忠公又薦之徙淮南提㸃刑獄楊崇勲以恩倖横恣護吏漁民縣令有不已從者崇勲怒下令獄公徃察問而出之流所䕶吏數十人崇勲怗怗顧首尾於是部郡相視以法移廣南東路轉運使廣之夷落有罪任其酋以夷刑夷刑慘酷公請以律令論海外舶􅔓歲至犀珠瑇瑁諸香竒物官取十一城中濠與海通惡少年暮夜乗潮汐苞藏竒貨重物不肯輸官前有欲為水栅以制之者卒中毒死事遂寢公治材他所一日移置濠上水柵立成貨利稍稍入官海有羣盜聲指廣城民相傳動驚走郡為偹具公料賊來不先聲徹偹張飲人得以安賊亦果不來代歸權三司度支判官未幾除户部踰月出為京西轉運使且行加直史館改授河北賜三品服是時契丹頻年遣使道路交衽供具百名取辦於民邊郡益戍兵調用滋廣公計其所必用取之擇其所不急去之不以名使人要必功實雖米鹽下吏莫不延問稱薦禁束侵牟故吏畏而為用民以是便之轉工部郎中召還為三司鹽鐡副使其職文書繁夥公一省不忘條理出入下不敢欺三司使奏他事上見公姓名獨語曰必須再去又首肯之明日除天章閣待制河北都轉運使入辭上曰卿之行出朕意既至璽書委以密察邊事軍馬重輕與兵官材否公感激天子所以推信勵力以安百姓實邊塞選兵擇吏為國乆計未幾保州兵叛州兵幾萬人號都廵檢司先嘗從太祖北伐有功敇其軍每出廵别給金粟兵分三部州將領其一裨將領其二其後州將典城兵不出廵亦不復給禆將皆中貴人月必出廵出則給之或言其不均者朝廷委公其事即允以武臣代中貴人總三部之兵更其出入而廩給均焉中貴人罷去悒悒懷恨未有以危公者㑹監郡與主兵官不相能辱之兵怒殺監郡閉城叛而以公罷其金粟之給為名公馳至城下迺即以兵環之朝廷累下敇牓招降而門其東西至堅且懐疑太子少傳田公况時總其事遣部將郭逵入城曉諭門開諸將入其唱為亂者千餘人衆恐其為變公謂田公曰保界虜壤兵驕叛亂如此反覆未可知今不芟除所謂養虎自遺患也於是悉坑之保州平奪職知虢州居三年貝州軍亂先其所欲危公者謂公前使河北有妖人李教坐法公寛之貝卒得李教為師以亂冀人段得政將詣登聞自陳常為李教獄詞逮連教父曇轉以私書屬公同職者得詞絶至澶州監河橋索其藁以聞事下御史府貝之亂實無李教而得政所訟無根猶追三官監鄂州商税復工部知漢陽軍祀明堂恩遷刑部復待制知湖州又移揚州公自以直亷遇天子任使欲以所有唯上所用不幸一跌摧落不復自振年且至矣遂上書乞還官職之事徙潤州申請益堅除光禄卿致仕還老常州以嘉祐七年十一月二十九日終年七十八遺命𦵏滁州清流縣昌城鄉杜沛村從先人之域諸孤以治平元年五月二十六日克塟先夫人任氏後夫人魯氏參知政事肅簡公宗道之女封闕夀郡君男曰次卿試將作監主簿早亡曰次山次元竝大理評事有材能名女六人長適京西提㸃刑獄宋任次適廣東路轉運使祕閣校理蔡抗次祕書郎田沇次著作佐郎蔡天球次新鄉令石約次大理評事吕希哲公忠亷鯁直以節義自尚愛友親族甚厚謀於國不以其身之安危篤於親不以其人之厚薄吏治精明施設若煩密難通而公持之簡易所至民懷其惠而不觸其令尤於本朝故事詳悉自建隆以來史所不紀每指一事即疏其人姓名年月最為審據家居或客使造門語及天下利病慷慨議論憂發顔色忘其身之老也夫士之處世立一節一行巳能自見於後况其多者然必有誌録乃可傳信銘曰礪世之速先於飭身防吏之嚴本乎愛民資國以富其要曰仁佑武以制其威曰神力志於斯庻用自伸矯矯在公卒要於人顧言返𦵏杜沛之原寘文坎中名與石存工部尚書集賢院學士贈刑部尚書謚曰襄余公墓誌銘治平元年六月癸亥工部尚書集賢院學士前知廣州軍州事余公薨于江寧府之行舎以聞天子為之不視垂拱朝一日賵賻有加贈刑部尚書謚曰襄其孤奉公明年七月二十七日𦵏以訃來且求誌其壙某為次哭之巳謹序之曰余氏自閩徙於韶之曲江曾大父從大父營父慶累贈太常少卿母黃氏追封吳郡太夫人公諱靖字安道天聖二年中進士第尉䖍州之贑縣又中書判拔萃科改將作監丞知洪州新建縣再遷秘書丞入崇文館校三史謬誤景裕三年充集賢校理范文正公知開封府屢言丞相過失貶饒州言事者畏縮不敢論列公即上疏曰古之帝王逐諫臣終為盛徳之累仲淹宜在朝不宜逺謫坐是落職監筠州税尹公師魯歐陽公永叔繼之皆以朋黨斥去某官㣲不得自達作詩四篇以直之一日傳於京師故天下目為四賢移監泰州稅又徙知英州丁太夫人憂還朝復集賢校理同判太常禮院慶厯三年上念西夏亂邊官軍屢敗四方困于供億特增置諫官四員以補聰明向之觸丞相而得罪者頗引用除公右正言於是朝廷之大議政事之得失權臣材徳之是否士大夫之賢不肖莫不盡心而舉正也元昊為患日乆時議有金繒之賜輒首罪稱藩將從其請而契丹聚兵燕朔曰我為南朝皇帝討夏人勿宥其罪朝廷謂借契丹之兵以討賊則彼自矜功拒元昊之請絶其向順之路必也却契丹而納元昊當得使者以成其事公亦屢言二鄙利害乃遣公使契丹既至辨其曲直以理奪之北還契丹収兵元昊稱臣四年知制誥史館脩撰其年再使坐習虜語出知吉州數十年間天下風俗以謹黙自守掩覆瑕垢為長者一日刺舉彈繩多或罷免又嘗所言者進持國柄仇人乗勢中以事授將作少監分司南京乆之改光禄少卿天子且欲復用權臣以諸衛將軍夀州鈐轄處州服父喪儂智高陷邕州循流東下破九郡次廣州以祕書監起公喪廬知潭州金革之事義不得辭改知桂州經制廣南東西路賊盜事廣城堅不下賊大掠西歸所向無前趨邕州欲倚峒穴為乆居計公先移檄交趾及諸峒使之捍賊智高至外無助援㑹朝廷命狄宣徽青將兵至公與孫公元硯寔共其事智髙敗走復邕州乞解官追終喪制誥不允除給事中仍治舊府御史梁倩言賞不當功又遷工部侍郎選死士入特磨道生擒智髙母與弟送闕下戮之充集賢院學士尋遷户部自言乆官嶺外瘴毒所侵惟陛下哀憐乂移潭州青州遷吏部嘉祐五年交趾入邕界殺廵檢五人驛召公於青州上諭之曰卿熟南方事巳授卿廣西體量安撫使其勿辭公至邕召交趾用事者費嘉祐詰之曰汝主世為藩臣何敢爾耶邊民私忿相酬不知官軍誤犯之幸得自新當送首惡者歸命既而械致五人􅊩刑于欽州歸奏所以治蠻之狀授尚書左丞知廣州今天子即位遷工部尚書廣多竒貨南官者蓄以為利公戒其北歸勿得持南物其俗輕揚教之禮法簡而不苛去之日百姓懷之公薨年六十五娶林氏贈尚書工部侍郎從周之女封魯郡夫人男三人伯莊殿中丞早亡仲荀太常博士叔英太常寺太祝女六人長適尚書屯田員外郎郭師愈次祕書丞孫邵次建州司法參軍周熊次祕書省校書郎章惇裕二尚幼男孫四人嗣恭嗣昌皆太常寺奉禮郎嗣隆嗣徽未仕女孫五人文集二十巻奏議五巻三史刋誤四十巻公之在館閣居諫院某嘗同職事其斥筠州使北庭經制二廣賊盜平定交趾知廣州皆見其行也故其學術文章忠義謀畫知之最深居常謙畏寡言不敢少忤於人及論事上前分解落落詆刺大臣易於褐夫出入兵戎危難之地若在宴處何其壯哉巳之無悶用之有為斯其蹈夫道者也銘曰公進於朝卓爾辭藝任之諫諍直言警世西夏亂常冦攘洊歲翻然向内願輸信誓契丹横議集兵幽薊單車出使安危是繫胡騎引歸羌酋受制風雲指麾天日清霽峒獠猖狂自西而東起于喪廬經制元兇賊竄窮荒生致其母戮之馬市腰領殊處交趾來擾再徃南土呼其種豪屈之一語二廣十年恩威是宣公薨民啼其何使然返于故闕二字終斯全我銘公墓唯信之傳司農少卿致仕王君墓誌銘達夫諱益恭姓王氏其先居太原徙潞州曾祖諱崇贈太師曾祖妣周氏齊國太夫人祖諱景純贈太師中書令祖妣祁氏魯國太夫人父諱愼樞密使吏部侍郎同中書門下平章事贈太師中書令兼尚書令魏國公妣石氏追封永嘉郡太君宼氏華原郡太君自魏公始家河南今為河南人君於大中祥符間以䕃補右侍禁天禧三年奏換衛尉寺丞自衛尉六遷為尚書司封員外郎康定二年以司門致仕皇祐三年大饗明堂除庫部以大祀恩用子升朝例叙封改水部又改倉部考功二郎中嘉祐八年上即位授司農少卿治平二年三月十二日終於西省思順里第年七十四以其年十一月二十八日𦵏河南縣魏封原先公之域娶李氏封金城縣君子二人謹言尚書駕部郎中謹行殿中丞女三人君所歴官監昭應宫法從庫開封府襄邑縣税西京麫院磨勘司簽書河南河陽府節度判官公事最後知河南縣凡九任行三十年清修無過必稱其職嘗慕唐王龜之為人務逺權利魏公之治雍孟襄汝也皆去官侍養逮參知政事於洛陽治新第成君致書於魏公陳老耼止足之戒願引年謝政還居於家輔藥石導和氣以延夀命言詞懇懇公以詩答之曰疏家子歎揮金後禦冦妻悲遺粟囬爭似吾兒知止足陶廬容膝早歸來公以朝廷恩數倚任之大至於將相終闕二字薨服除君授河南自伸夙志遂還官事日與髙隠者遊晚年喜釋氏篤好華嚴經日繙一帙深通體用止觀之趣家所藏書雖子弟求閲必手自檢授出入甚謹而於田産資利隨所厚薄視親疎急難賑濟之不復㑹校洛下多名園時與其弟觴詠終日陶然自娛居閒古書眞畫間或展閲其外紛綸過前不吾接也嗚呼當少時父為大官乘勢可進輒以書規切冀其引罷仕及中年後有顯位可指而待輒棄爵禄人情莫不好榮觀而厭卑處君豈異於人哉顧其中所存者勝所為故能安於所尚非天機淡泊動與道合者惡能至是邪某與君昆仲游最乆於𦵏之先君之弟兩浙轉運使尚書刑部郎中集賢校理益柔狀君之行以銘見託銘曰大道之行人隠于天其徳純明不居物先薄夫懐貪生死利勢扳躋勇前罔或畏耻嗟嗟夫君中年退休超離造化蕭散林邱高尚之節可監於後聲名日逺於君何有尚書屯田員外郎郭公墓誌銘郭君諱之美字君錫世居廬陵自其考始以文詞舉進士君錫少聰敏加人從其父學景祐元年年十八與其父同日登第仁宗皇帝臨軒賞其爽異為改今名初調蘄州蘄春再授楚州淮隂皆為主簿以吏事不中法去官慶厯三年為梧州司户參軍闕四字年復注惠州轉運使聞其名用之權韶州闕四字州有鑄錢監監卒怨其監官是時儂智髙叛輒請於監軍韋貴曰願徃邕州擒峒賊貴叱去之君策其必變曰叱之所以激之也隂為州偹其夕監卒殺監官趨州門斬關且進門有偹兵出其不意格鬭誅斬略盡儂智髙入廣州肆兵外掠又移權知南海番禺二縣募敢勇亡命之徒遇賊必戰殺獲甚多所至賊為之縮斂蔣偕被命専討軍無法律遣使召君計事辭不往後數日偕為賊擒皇祐五年以功除大理寺丞簽書南雄州判官公事以父喪不行又丁母憂服除以大理丞知兖州萊蕪監嘉祐五年遷丞殿中監在京豐濟倉賜緋魚天子即位恩遷太常博士初作永昭陵河南府素號窮空所費仰給三司時余為三司使薦君於永安入中錢糧善計纎悉終以辦事時議稱之改尚書屯田員外郎治平元年知開封府中牟縣縣居京西一舎仍歲水災多盜賊賦斂頻數民益貧君視其部中溝洫不治因上書乞治水嚴盜禁均賦役朞月之間使客稱其畢給百姓頌其均平而不擾未幾以命免仍坐舉故人之為長吏者入官長吏有罪追君一官罪去百姓條君善狀訴於京尹願留不得即遮丞相馬首叩頭嘘唏幸少賜我既又不得泣涕而去明年歸蘄州未至終于舒州桐城之傳舎其孥以喪歸十二月二十一日𦵏於蘄水龍潭山先人之塋享年三十曾祖諱諫祖玠考諱佺闕四字事推官累贈太常博士妣施氏封安福縣君闕三字娶程氏再娶王氏男曰大時大明為進士大昕大闕與三女皆幼君好學多通理勢重輕之術每官必有記述皆世之要用有文數十百篇尤善論兵數上書言慷慨病且革歎曰丈夫固當以病死耶君之弟之翰以書自蘄至杭告余曰兄辱知於公今失官而死且塟矣公其哀憫其孤而銘其壙以慰存殁余為之銘曰事而不試惠而不施古人有言世莫我知進馬而躓夀止於斯匪世之疾又將咎誰尚書禮部侍郎鄭君墓誌銘鄭君諱紓字武仲先世居秦曾祖諱保雍始居安陸客有寓錢數百萬而死他日得其子還之客子莫知所由辭不受遂施之浮屠氏於是湖湘之人稱其長者祖諱嶼東頭供奉官嘗總兵秦隴間以數十騎入乘虜鄣虜畏其名考建中舉進士積學而多材能悉産以濟人急難故與游者多名人君承數世累義之美資性明敏所習過人初應明經以為不足以自立曰吾豈誦數者又舉進士天聖八年登第主安州之應城簿越州司法參軍改大理寺丞遷殿中丞歴知婺之蘭溪越之餘姚徙知益之新都貧不能行監楚之北神稅湖南安撫使王絲薦君為簽書桂陽監判官㕔公事權潭之長沙其縣喜訟難治君視其繁闕簡其術如無一事劉丞相號為明果時知闕四字所為大喜稱歎轉運使時其事叢臨縣觀闕四字狀非其要不問問即自服雖得罪者亦喜躍而去郴州宜章民持偽劵奪人之田屢獄不直委君決之君攬案曰義章以太宗舊名而更之市田之歲在義章其劵乃今宜章印也獄遂決三遷為尚書都官員外郎審刑院詳議官峒蠻儂智高寇邕州詔龍圖閣直學士孫公沔往經制之辟君與行從招討使狄青破智髙於邕州界是夜軍輒驚擾孫公謂君曰行者數人多以事避去今獨君在此眞義士也以勞授職方權大理少卿君通春秋及為法官多引律傅經酌理參讞有可矜者必為之言殿直曹且監主自盜應死君曰其父偀嘗戰歿仁宗聞之惻然為减一等仁宗恕寛哀矜令天下大辟有疑或情可憫者得以上聞四方體朝廷好生之意率以情法遷就求為末减君曰法正情直州郡當自决之今乃諉上以苟僥倖類是者請致之法於是朝廷著令以班天下遷祠部郎中嘉祐元年五月甲子卒于官夀五十有六累贈尚書禮部侍郎喜讀書記其大㫖以資職業比為審刑大理以中道論法不為守文吏故所濟活甚衆為詩有精思入唐人風格清峭可尚尤善章奏書牘諸公或請之皆了其意而文彩蔚然祖妣傅氏妣楊氏天水縣太君劉氏河間縣太君娶李氏汝南縣太君駕部郎中文蔚之女今夫人鮑氏樂安郡太君其父闕職方郎中男五人獮著作佐郎知潭州攸縣闕三字諫知制誥知荆南府猗將作監主簿猛未闕四字士張䝉山以治平三年月日葬于安州安陵縣某鄉余與君為同年進士少甞仕官往來數相遇於淮浙間每見飲酒笑謔不休皇祐中司諫以文中科為天下第一余嘗慶君曰子為狀元而其父固可知巳用是為適今援毫襞紙遂銘君壙遽至於是乎銘曰材力之次要必有成文詞之敏煒昱敷榮傳經裁讞區處和平世資以義用永厥聲屯于其躬來者其亨坎中之紀後世之評端明集巻四十
