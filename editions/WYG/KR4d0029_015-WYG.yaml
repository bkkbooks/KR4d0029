body:
  text: 端明集巻十五宋蔡襄撰制誥新除宰臣梁適祖文度皇任齊州禹城縣令累贈太師中書令可贈兼尚書令餘如故制勅易稱積善之家必有餘慶聖人之論豈苟而巳朕每延登宰輔財成教化者必褒顯前人追用愍冊既榮其家然後可以倚辦國事具官某祖某徳望粹羙行實惇深竦拔之才蟠錯而不掄觱沸之泉淵渟而必決回擁隂施啓佑令孫諮以謨猷寘于鈞軸逮兹登用之始旌夫奕世之勤即内史之崇階陟中臺之總録漏恩幽壤光顯慶門營魂有知其享予之休命梁適祖母追封榮國太夫人衛氏可追封闕國太夫人制勑人臣所以貴於當世者惟爵命之差故居宰府于其始也追榮三世之命示特絶于官師而表輔相之重也具官某祖母惟爾孝孫嘗貳機政固已啓大國之封而列小君之號今正鼎席助成萬務稽尋禮舊申叙封壤疏恩至厚以光華於阡表而發揚於裔嗣靈其鑒兹梁適父顥皇任翰林學士右諫議大夫累贈太師中書令可贈兼尚書令餘如故制勑近以宰輔虚席擢任㕘貳以政其位朕念被命之際入陟帝庭則陳道注委之大退款家廟罔不興劬勞之感非有愍章追冊何以發揚其先烈而慰安其孝心乎具官某父某以文業之茂中乎選首以才徳之劭登于禁塗藴澤利之資而屈於當時積隂施之厚而施于後世厥有嗣續弼于政機甫兹調燮之初眷夫詒燕之逺稽考典故申命褒榮陞冠文昌顯賁幽穸嗟爾九原之魄歆予三事之崇梁適母追封安國太夫人閻氏可追封闕國太夫人制勅進登宰路者所以共治天下而於其家必極褒崇者非特慰夫幽塗亦以伸人子之榮遇也具官某母天性靖嘉禮度雍穆挻生華閥嬪儷哲夫以淑慎之美而表於壼儀以敦嚴之訓而勵于子姓肆爾令嗣陟于台司誦勤劬而發詠蓼莪申恩賁而益陪湯賦進徹大國舉成愍章壤樹之華斯其至矣宋觀文祖制勑朕於羣公褒其先廟所以勉子姓之勤大其私門所以切邦朝之助爰諏吉旦對越上靈竣事均釐莫如舊弼申褒祖服用慰孝心具官某祖某道充於中材浮於仕善政之澤遺思在人隂徳之流餘慶及後啟孫謀之方重登宰路之猷為往于藩宣適此禋祀追榮王考舉錫公圭爰徹樂國之封永賁幽阡之寵宋觀文父玘制勅天子祀七世而祭上帝其禮莫與為大公卿乃有家廟以伸時享朕祼清明之宫奠泰元之坐升侑三后丕薦孝誠念予大臣罔不懐其先正肆于慶澤均被褒禭具官某父某性尚冲粹識照高邁材美不曜磐于幕府徳回復貤于子舎厥有令嗣登予上袞均逸陪京之奥述職大神之祀冄荒名國申賁禰宫兼隆特引之儀併為追逺之數英魂不冺歆是愍章宋觀文妻制勑朕禮成帝畤澤通海宇念予股肱元老往服藩政既榮其躬又推而及其室所以表恩章之良厚具官某妻某氏服儀徳閥嬪儷宗工隆為世範而有家節之嚴助成賢業而有邦光之美向繇台席之命前治國田之封逮已上儀復申異數按於輿地錫以名疆恩渥之蕃勿忘祗荷富觀文母韓氏封蕐原郡太夫人制勅朕嚮清廟登泰畤雖祖考歆侑孝誠上達然念劬勞之徳欲極天下之養莫可得已故於近輔有承顔朝夕者首敷慶澤非特循典故異恩禮之然抑予心之思推而下及也具官某母賢恵本于天資儀度隆于閫範誕生喆嗣嘗貳樞庭惟是忠誠率繇善訓逮兹禋鬯之舉申錫慈闈之封徹祝輿圖畫治名壤於為人母而觀厥子之有立於為人子而及其親之恩年又兹寵渥之蕃疇及私門之慶張端明父制勑具官某父某朕饗清廟登泰畤雖祖考歆侑孝誠上達然念劬勞之徳欲極天下之養莫可得已故於近侍首敷渥澤其有承顔慈闈者優異恩數非特典故之然抑予心之思推而下及以爾涵徳靖温不攖俗累長厚之行率于鄉國清白之敎嚴于家庭有子材賢服于禁近願回禋嘗推奉親慶嘉其志尚重兹美遷官聮陟芸書之清階品被銀章之美祗荷榮命永懋忠訓太子太師致仕杜衍可依前太子太師致仕加食邑七百戸實食封二百戸制勑朕齊明祗栗躬執牲玉以事宗廟上帝神天鑒格蒙獲福應四海内外歡欣交通眷惟曩輔實助予徳敷厥恩數以將厚意具官某以清修為身檢以忠藎為國謀昔正台衡進退以道歸休里閈誠心不懈泰元修報慶澤周洎矧惟舊弼望隆天下増埤邑賦之實復累功號之美倂示優寵往服休命樞宻使給事中王堯臣可金紫光禄大夫依前給事中充樞宻使仍賜推忠佐理功臣勲封實食封如故制勑朕親執牲玉祗饗郊廟人祗歡欣慶賚周浹惟予弼輔大臣與圖機政陪侍祠事兢兢齊栗不有恩命曷以章寵數之厚具官某自登宥宻蚤夜悉心以持國論罔不忠藎而於幾事區處中理材賢之稱著在時議適講禋燔之禮竝推渥澤之異陛級彌峻爾其楙哉王觀文制勑朕以純孝事親至誠享帝每厯三嵗躬造廟郊神畀嘉福四海乂安顧于邇臣齊精奉祀不有慶澤曷以將夫厚意具官某材資端茂行實清峻嘗與機政乆參國論比延經業之美復陪講學之奥適已燔燎均賚澤恵增衍田賦進承勲衛寵數之異勿忘祗報給事中充集賢殿學士向傅式可加食邑三百戸制傅一作傳勑朕齊明祗栗躬執牲玉以事郊廟神天鑒格䝉獲福應澤賚之行周于㝢内况予近列奉祀于内述職于外宜有恩數以彰寵異具官某材資沉厚履尚修飭蚤登省闥休有風猷留視宫鑰益彰才稱中壇展報慶自近始增徹輿賦之奉序升陛品之榮勿忘欽承以載光寵王尚書制勑朕臨海㝢庶品安乂且三紀矣惟祖考畀予大憲惟上帝祐予嘉應乃仲冬吉旦祼于廟奠于郊所以薦誠而大報又念臣工之有竭忠純以輔予善者不有慶澤曷以章夫厚意具官某惟爾先正克休令聞執憲中臺參論大政厯踐都座為時顯人爾以端方厚重而資之禀於先覺向所履者咸紹前人相儀精禋率繇儀度衍之井賦楙以勲衛貤于而家以昭世徳之美端明殿學士兼龍圖閣直學士張方平可加上輕車都尉食實封二百戸制勑人主上事郊廟下臨士民理適厥中兹謂興治朕越丁邜享於道祖翌日祼于太室又明日執牲幣以見上帝已而赦天下大賚内外百執事推舉名典况予近侍所宜先焉具官張某汝以文業登禁近以端毅主典憲以通智總轉流之計以善恵布藩宣之政逮兹祠事職奉常顓大正左右助相以成熈事念爾賢勞躐升勲號增埤賦封欽哉服予之休命端明殿學士給事中程戡可加上䕶軍食邑五百户翰林學士吕公綽可加䕶軍進封開國闕食邑五百戸制勅朕齊明祗栗躬執牲玉以祀郊廟神天鑒格䝉獲福應澤賚之行周于㝢内況于近列奉祀于内述職于外宜有恩數以章寵異具官某才資方重履尚修飭蚤登禁宻休有風猷鎮撫蕃屏益彰材稱泰元展報慶自近始増衍邑田之厚進列勲號之榮厥恩茂焉勿忘祗載王珪制勅朕入清明之宫親泰元之祀祖考天地况施無疆厥有秉文之士左右顯相而熈福之蕃嘉與均被具官某才資敏茂行實端方奥學切於本元懿文美於訓令回翔禁近光顯名譽逮嚴事於崇丘常先途於法乗奉珍瓚於七室貢吉玉於中壇祀容雍和志慮齊栗序升階次疏列社封並為寵渥之華益表褒甄之異王贄制勑具官某文美中於科等言亮登於諫垣將漕朔陲有幹給之勞糾䖍都獄有矜平之稱屬以躬祀泰畤奉引皇途甫終享帝之儀均施敷天之賚併增階次兼衍賦封寵數優隆勿忘祗飭殿中侍御史呂景初可上騎都尉制勅祖考畀予以基統故祼芳於室以達孝恭天地相與以施生故升禋于丘以報本始粤爾羣辟肅雍在下福應之格嘉與共之以爾早繇風劭擢居臺憲論議有風亮之節彈治得糾繩之中侍陪禋享顓相齊明載升勲級之榮益表朝恩之茂皇親大將軍遥郡制勅昔我祖宗聖神以有天下付畀於予惟是孝誠以克保乂親執籩簋見于郊廟宗籍羣工莫不齊明以奉祀事庶幾敦于善行成于美化况慶賚之行予何嗇焉具官某天資相厚濟以學術肅雍助祭率繇禮度勲階井賦用勸親賢汝其念之無懈夙夜步軍副都指揮使范恪可加柱國進開國公食邑五百户仍賜忠果雄勇功臣制勅朕以仲冬吉日祗事丘畤陟配三后祀秩百神諸福之物擁佑来格均施之澤宜自近始具官某智略之明而濟其忠厚武材之勝而守以恵和精練事經周旋信遇擢總勾陳之重益修拱衛之嚴自法輅之啓行訖泰壇之峻事天宫有謐蹕路無譁顧是忠謹用推慶賞勲名功號率躐等夷益䖍乃心以永來譽皇城使内侍省内侍押班陵州團練使武繼隆可加食邑三百戸制勅某朕練時日祀泰元躬事壇丘執薦籩簋百靈歆留畨畀永福念惟官師陪侍兢㮚敷與鴻恵以昭慶賚以爾材偹煩使志務恭飭總司禁省親邇軒闥自臨陽畤還御端闈夙夜之勞彌用信倚進疏公社益埤國田良思施之行毋忘祗荷左騏驥衛内侍省内侍押班鄧守信可加食邑三百戸制勅具官某國家接千嵗之統考一陽之元受記於羣靈輳熈於逺極眷惟近從當被茂恩以爾天資深淳學識優邵久于軒墀之列夙司省禁之嚴時飭樂文相承禋意比信宿於所在警夙夜以居中衍陪邑賦之蕃益表拜榮之厚勉思祗載毋懈乃心入内都知張惟吉制勅具官某識慮靖深才資敏邵乆處近宻號為修節總涖禁省動循典憲朕于仲冬祗見郊廟馨誠達於上下熈福被於動植爰念行次訖于竣事衛翼恭肅禮容偹順夙夜之勤時乃信倚躐升勲級益埤賦封恩數之蕃勉荷褒澤禁軍都虞候已上及藩方馬步軍都指揮使并御前忠佑南郊加恩封贈父母妻制勅朕迺者祗事泰元均施熈貺被于四表惟兹信倚之職董齊有衆勤于夙夜乃有恩恤之典以及其先示顯榮于當世具官某姿氣沉毅材略周敏積儲隂施之大導發福祥之逺惟是子姓實司戎紀逮終陽畤之禮特賁禰宫之禭進秩環衛漏恩阡穸靈爽不昩尚承厚澤勑迺者祗祀泰元均施熈貺惟兹信倚之職實有致齊之勤惟榮私門用盡子志以爾姿器魁毅氣尚沈雄嗣續之强服闕十四字予列校逮終陽畤之禮進陞環衛之華歆承茂恩永耀幽穸右竝父制勑有國之慶不及于家孰謂之澤有子之榮不貴其先孰謂之孝朕薦享上帝均覃釐貺首念爪牙之倚追褒慈妣所以示表恩禮之厚也具官某母氏賢恵本于天資儀度隆于閫範誕生子舍訓總戎鈐或陪闕十一字成於熙典特申禭於愍闕十一字册用慰柔靈勅某母某氏貔虎萬旅實予爪牙向祀中壇垂慶方夏眷惟信倚之厚宜有褒恤之恩以爾賢恵本於天資儀度隆於梱範乃繇子舍特啓縣田靈其嘉承佑爾後嗣右並母制勑朕肅恭神祗慶賜方夏百工上下咸受均福豈惟内徳之邵亦有合姓之賢宜於壼中申明褒渥具官某母某氏柔儀閒淑徳性端和儼威服於衡璜循采蘩於祭祀仇欱君子總則和門會郊澤之推榮俾湯賦之有沐勅具官某朕肅見神休覃施㝢縣下逮和門之職率褒合姓之賢以爾淑性端莊柔儀閑婉来嬪遵於禮則作徳謹于閨風乆敦中助之誠克著宜家之譽陽畤方成於熈事脂田特啓于大封恩慶某承益務恭順右竝妻制諸軍班都虞候制勅報本丘郊敷澤海㝢念和門之總衆扈法乗之啓行天策無譁蹕路載肅或成防于邉圉亦均被于恩榮並加綸綍之華益堅忠孝之志防禦使錢晦母制勅朕以天正吉日躬執玉幣薦于郊畤神畀蕃釐予弗自有推而被于臣下四鄰之近達于朝著既澤其身又禭其生廟所以表恩意之厚矧夫忠孝之家詵然嗣續願還慶賜推奉慈妣其可已耶具官某母某氏惟乃君舅克有順徳實啓王國逮于福偶翊冠樞宥作相于外肆爾有翟章之華湯邑之大丕顯厥徳今泰壇已事嘉乃子舍之請徹壤千乗申是愍冊禮非常等揭為封樹之寵靈其承哉禮部尚書中書門下平章事梁適姊故度支員外郎直史館洪鼎妻保定縣君梁氏可安康郡君制勅朕祼清廟奠泰壇非惟薦馨徳於神天亦以興民孝行而輔弼羣公有能含貞予美輟閨門之慶施于近親朕甚嘉焉具官姊生於華閥而天咨哲淑嬪于君子而壼儀雍肅惟爾悌弟以台宰之重相厥禋事願回襚典祗授女兄列封華壤正名小君休哉光榮之澤賁寵而族樞宻副使孫沔妻母制勅朕自郊還居行澤萬里輔弼之重恩數最隆因而延請㒺達其志具官某妻母氏世族甲冠資性賢明克儷令心章著美徳時乃子婿登于樞庭齊明侍祠首被慶渥願上私門之賞推奉外黨之榮徹封邑田褒顯阡禭天光下燭神爽其歆新除樞宻副使孫沔妻可進封郡夫人制勅在召南之詩列公侯之配興鳲鳩之均一言其恩逮下也執蘩葅而祭祀言其動有禮也唯是爵位之崇不有賢婦助成其美則無以表于有衆具官某妻某氏生於華閥歸而宜家禀言容之修觀圖史之奥今沔擢在樞宥為予輔臣爾貴以夫當有加等郡田徹封象服異制爾其荷寵數服訓辭勿忘柔嘉以永休于福禄兩制兒男制勅具官某男某天以陽為元徳施生煦養而百昌蕃廡人主憲之故有恩賞褒慶之事朕禋于帝畤而澤渥淪漬覃施四表矧爾近侍奉祠述職罔不恭顯俾而子舎或其支屬登榮仕版著名京寺勉自修進永克祗荷待制王居白女可封長安縣君制勅具官某女惟爾父行實清修列予近侍嚮陪㤗畤之祀常奉閟宮之嚴推是慶恩屬于息女載疏肅露之澤特徹汾田之封渥命甚華賁于私室司天監五官正制勅具官某學通精伎職在天部朕因景至有事郊丘瞻考祥祲特乃相予澤行百工罔間内外進以階次厥恩茂焉中書録事以下制勅某禋事貺施光被四外矧麗西省咸有闗掌均行邦澤之厚序升郡寀之次祗服恩渙務勤祗飭京官等加恩制勅具官某朕祗見上帝而百工之列或内與齊祠之肅或外㕘職貢之幹悉條㤙渙均被釐貺楙爾誠節服是褒寵蕃官加㤙制勅具官勲等十二所以詔勞舊稽秩序行慶賞示恩信也以爾大順存心奕世嚮化率其種落䕶我邊陲比因榮望之誠誕夫蕭澤之逺錫爾勲級永服嘉寵端明集巻十五
