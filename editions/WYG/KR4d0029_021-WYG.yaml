body:
  text: 端明集巻二十一宋蔡襄撰奏議乞責罰預聞軍政臣等切見河北保州叛卒昨巳招降原其致亂之因乃總領之司不能覺察自都轉運使安撫使而下一例奪職降官此蓋朝廷督厲天下官吏深思撫養士卒之宜先圖遏絶禍患之本然臣等切謂法令之行必自近始若捨近繩遠雖法令日行人不信服臣等聞保州兵士未叛以前數月邊臣曾奏都大巡檢下兵士乞早處置恐其生變大臣聞之絶不為意以至殺戮官吏閉城邀命然後蒼黄或招或攻或作屈赦幸其革心不至大害且帷幄之謀臨事先當准備豈有邊臣奏論如此等事都無制置循以成患其誰之咎今張昷之等已責降其中書樞密院大臣與聞軍政者伏乞陛下推邊臣所奏保州兵士事宜因依特與責罰庶乎法令明而天下服乞賞先奏保州兵士邊臣臣等近以保州叛卒平定之後朝廷以都轉運使張昷之以下不覺察之罪例皆貶降臣等聞保州兵卒未叛以前邊臣曾有奏請早乞處置絶無施行遂至生變臣等伏乞陛下責罰大臣與聞政者伏聞陛下巳得邊臣之奏特以輔弼之重屈天威而恕之伏惟陛下專賞罰之柄而所謂罰者已行於遠而不行於近既失之矣所謂賞者又録其終而不録其初又重失也邊臣先能探伺叛卒情狀聞于朝廷其時大臣苟能深慮而預處置之必絶叛亂之禍及殺殘官吏閉門邀命四面之兵合謀招討中外震駭闕四字營官府之財尚賴朝廷威靈所以即時平定設使偷延時月城堅而不下宿兵於野費用不貲其變豈可量哉今招叛卒閉城門殺賊首者盡皆遷官蒙賞而預言必變之狀者棄而不録所謂勤於其終而不念其初者也語曰曲突徙薪無恩澤焦頭爛額為上客正類是矣所有邊臣預先數月奏論保州事宜者伏乞陛下出宸斷特與恩奬庶使守邊之人精心察伺先絶未萌之患較於推恩之術不猶愈於攻城殺賊而後泛行官賞也論軍賊王倫臣伏見軍賊王倫嘯聚徒黨殺掠人户驚動州郡此賊雖小而其患大何哉臣切見十年以前天下無事輙有開口言兵者必指為妄人既西羌悖戾議者謂西羌未足為患觀朝廷處置如何或少有沮衂北虜必窺我强弱矣已而西師不利北人果肆凶謀幸且暫弭議者又曰西北之事未足為中原近患中原之患在於盜賊乗隙而起此則可憂也或謂王倫亡命之人非有精謀遠慮苟逃其生將就擒戮何足憂乎臣謂不然今江淮兩浙廣南福建諸路城池不修兵甲不繕非有戒守之具戰鬬之備使百夫大呼列城騷動就令朝廷遣一使臣將兵追討賊必依海為固兵至引去分散屯聚非可刻期而破也臣謂王倫黨衆尚在宜速誅翦或淹留歲月不就釜鑕使草萊姦雄之人濳窺此勢其變不可量也臣謹陳捕盜事宜如左一東漢黄巾賊起擇所宜施行者先簡料刺史二千石之能否臣以今事揆之莫此為先臣前年請告還閩中是時軍賊鄂鄰方在海上㳂海諸州軍長吏處置乖方人户騷動賊雖不至其患過於被賊臣請諸州縣長吏有昏老不才者即乞罷免苟得其人處置自然得所一漢建武中賊起其法令賊五人共殺一賊者除其罪臣切思之兇徒不開其自新之路無以離間其心五人共圖一賊其事易濟臣今乞軍賊元殺忠佐者四十餘人若能五人共殺一名告官竝與免罪若被驅掠刺面之人但能首身者免罪若能五人共殺一賊告官者與酬賞一朝廷差去使臣難為跟逐遠去官軍若至淮南其賊雖轉入兩浙福建廣南州軍若待所差使臣必不相及若只委諸處巡檢縣尉必是無由誅滅臣今乞下兩浙福建廣南轉運司選差部下班行有武藝膽勇之人或曾經犯贓諸色玷累降在監當或即編管見有家屬者如能情願捉賊竝委轉運司體量人才令於諸州軍宣毅兵士内揀選三二百餘人於近海要便去處准備舟船候報即時起發若能殺賊將來優與酬奬外更特與除落已前負犯玷累一巡檢縣尉每至遇賊鬬敵之時多是下手之人皆不用命致有陷失官員切縁兵士弓手進則有死退則有生得賊賞薄失將罰輕以此各無鬬志且今乞捉賊巡檢縣尉手下兵士弓手臨賊先退致有失陷官員等竝當處斬一軍賊今來入海盡是劫奪官船梢工水手或掠或雇臣今乞應是賊船梢工水手船主等若能多方用計誘算賊徒或致傾溺或入海澳進退不得之處致被擒殺者其梢工水手等竝同捉賊例等第多少酬賞一從來捉賊兵士弓手殺賊之後多是所管官員自務公廉賊人㳂身財物收拾入官況殺一賊頭只得錢五貫文豈肯用命乎臣今乞應捉賊隨行兵士弓手百姓梢工水手等但是捉賊得賊財物金銀等不計多少官中更不根問一臣前年經過兩浙切見差李元伯收捉鄂憐其時則在廣南其李元伯一行五百餘人㳂路騷擾百姓甚苦臣今乞朝廷戒囑捉賊使臣等所至之處或要舟船所般應用之物竝須闗牒州縣畫時應副即不與擅自攔截舟船科配物色若致轉運司提刑司本州軍或有陳奏必定重刑朝典論失賊官僚乞行罰右臣切見捉殺軍賊王倫李熈古等竝與酬賞恩澤甚厚足以驚動百姓耳目然捕賊之人賞之既優失賊之所罰固宜重京東淮南經歴地分知州知縣巡檢縣尉竝未謫罰臣切以今世之法庇恤民户者悉賴州縣長吏擒逐冦盜者悉委巡檢縣尉昨來軍賊王倫纔過百人而州縣長吏捕盜之官至有斂物資給高郵軍晁仲約屈身迎候邵先迎賊彼此聚飲鹽城知縣等避賊不出揚州駐泊王乞出至光山等便回知賊不救淮南轉運使張可乆楚州知州胡揩知賊在鹽城竝不擘畫救應開城借路如此之類闕二字今遇小冦官吏便至如此失節不幸有大於王倫者闕二字何等屈辱也蓋朝廷姑息日乆威令不行以致官吏畏小冦之威而不畏陛下之法臣乞指揮催促疾速勘問官吏罪狀候到齊足日伏乞陛下出於聖斷擇於情理最重者特除奪官職配送遠惡州軍編管其餘竝乞重罪謫罰庶以戒礪天下官吏稍畏罪罰乞相度開修城池臣於皇祐四年曽蒙朝廷除知福州臣以私事辭免續差天章閣待制曹頴叔知福州臣其時得知朝廷有劄子指揮與曹穎叔漸次開修城池臣今來到任檢閲不下司文字竝諸案竝無宣命劄子切慮只是曹頴叔附身文字將帶隨行其城池不曾開修只築到數十丈高牆又别無行遣計度工料慮有誤事伏須舉奏者右具如前福建一路州軍建劍汀州邵武軍連接兩浙江南路乗船下水三兩日可至福州城下其東界連接温州竝南接興化軍泉州漳州各在海畔四向舟船可至閩中諸州皆福州為根本以自太平興國中歸納疆土後隳毁城池至今四圍城牆只高三五尺可以遮閉牛羊至於私商小兒皆可踰越臣又檢得儂賊作過時有劄子下本路修葺城壘不唯事至難辦兼福州外城周圍約二十里工料極大若行修築須至科㸃丁夫配約物料收拾備足一兩月間便要了當共候兵士功役空延歲月臣今具上件因依取候朝命若令修築乞降指揮檢計工料㸃丁夫木植糧食諸般擘畫事件聞奏若或重惜民力未令修築亦繫朝㫖切縁舊有開修指揮今來竝無文字照㑹恐有緩急朝廷不知未有城池須有陳述謹具奏聞伏候勑㫖乞相度㳂海防備盜賊淮中書劄子節文指揮樞密直學士禮部郎中知福州蔡某奏臣於皇祐四年曾蒙朝廷除知福州臣以私事辭免續差天章閣待制曹某知福州臣其時得知朝廷有劄子指揮與曹某漸次開修城池臣今來到任檢閲不下司文字竝諸案竝無宣命劄子切慮只是曹某付身文字將帶隨行其城池不曾開修只築到數十丈高牆又别無行遣計度工料慮有悞事伏須舉奏者蒙朝廷檢會福建路㳂海州軍與外界水路通接自來未曽别作防備於皇祐四年十二月奉聖㫖令新差知福建曹某候到任專切用心經制應係㳂海地分外寇可來之處立便擘畫防扼設備開析聞奏又奉聖㫖宜令蔡某詳前項所降指揮相度聞奏劄送知福州蔡密學今具相度因依下項一臣今相度福州泉州漳州興化軍盡是邊海若是舟船要到城下逐州各有海口小港約近百里至七十里其海口舊時各有鎮寨把扼海路後來無事兵士漸次減少今來見作㸃檢商税量差兵級在彼㳂海路平靜難以宿兵如有盜賊逐州軍可以隨宜應副一泉州福州漳州興化軍各是海邊今來逐州兵士并不會舟船出入海路收捉茶鹽如遇賊人鬭敵多被賊船慣習水勢立見傷損臣體問福州閩安鎮把港及鍾門巡檢一員在海上封椿舶船泉州有同巡檢一員去城七里每年下海封椿舶船漳州舊有黄淡頭巡檢一員號為招舶亦是夏間下海興化軍巡檢一員却在興化縣山中去軍城百里海上别無巡檢所有逐州逐軍雖招舶船每年或有或無原其創意蓋是沿海州軍要得兵甲習會水戰以防急緩其漳州黄淡頭巡檢後因轉運使高易簡奏移置龍岩縣山中大池驛去州七日防備盗賊因此廢罷招舶一員臣今相度漳州管界巡檢去城五里却令兼帶招舶每年出海興化軍管界巡檢移近軍城給與舟船令往來海上巡警一臣相度㳂海州軍兵事多是不習舟船出入臣於去年奏乞置澄海指揮更不揀添宣毅後來謂諸州已揀添宣毅朝廷難更施行臣今乞令福泉漳州興化軍舊有刀魚船及巡檢司入海舟船量與修整舊有舟船亦乞量置五七隻其宣毅兵士差下巡檢司竝令教習舟船諳習水勢右件具如前臣相度㳂海水路防備盜賊伏乞朝廷特賜指揮謹具狀奏聞伏候勑㫖論中書吏人劉式之罪臣伏見中書提㸃五房公事金部員外郎劉式年滿合該例轉官賜紫入轉運資序知州者切以劉式本自微賤因縁入仕頻倚事勢竊㺯威權臣略條一二事以明劉式姦狡之狀明道初修葺内庭固無勞効僥求名目改轉朝官景祐之間輙求外補宰臣留而不遣姪男特授齋郎非例推恩事權愈重慶厯二年守當官周卞偷竊空字勑黄偽作祠部流散諸處貨賣極多周卞事發之後劉式與本房堂後官張用和方始陳首舉覺及開封府按成之日懼見録問切有干連上下通情奏請周卞更不録問直令棄市豈有中書吏人隂結大臣誣罔聖聰回換刑獄又有守當官荆杞為婺州客人徐昞進狀乞分家産荆杞偽作内降劄子取受昞錢一千餘貫事將覺發荆杞殺徐昞父子三人切見天聖中守闗人吏馬宗夀冩造偽勑下禮部補蘇上逹充齋郎事發提㸃五房公事張仁惠有不覺察罪降之先化軍堂後官李昭度降授齊州監當本房手分竝皆除出去年劉式不覺察周卞荆杞偽造殺人其罪甚重葢縁當政大臣曲為庇護竝只罰贖仍舊守職不隔磨勘依例轉官伏見轉運提㸃刑獄不覺察部下官吏取受并降移差遣今來人吏纔八十貫劉式不覺察苟免過愆若更例與優恩出典大郡不惟小人僥倖何以激勸將來其劉式伏乞朝廷更不轉官特責降監當以表朝廷清明不容憸人干託端明集巻二十一
