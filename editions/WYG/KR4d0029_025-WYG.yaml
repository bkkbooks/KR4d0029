body:
  text: 端明集卷二十五宋蔡襄撰狀乞遣使廣南福建狀右臣伏見遣使天下諸路安撫獨廣南東西福建不與數中臣切謂諸路皆有因而遣者則已然亦有無因而遣者誠以究民利害察吏善惡則去朝廷最遠者尤宜加意焉臣聞君人者萬方之人皆子也今恤近而遺遠於為父之慈豈不謂有所厚薄耶臣願發一方之使布揚德音就令使者無一事可得而還亦使吏民畏戴知天仁涵覆不以遠近為厚薄也况又廣南海盗嘯聚掠百姓之少强者黥之以為黨衆宜及其勢力尚微幸因遣使授以中㫖許其自相殺戮以告及被駈脅能自歸首竝貸以生全賊衆聞之必相疑貳又發近郡甲兵控扼誅捕其勢破壞可指期而待今不蚤圖撲滅淹留時月殺掠鄉閻兇衆愈多罪惡愈大後雖開其自新之路必不來矣區區愚誠願賜裁覽謹具狀奏聞伏候勑㫖乞令御史中丞舉屬官狀臣聞人主擇宰輔宰輔擇長官長官擇寮佐此至治之要至簡之術也周命太僕則曰慎簡乃僚属之公府令自辟召唐陸䞇作相奏請諸司長官各擇屬吏後因讒謗輒有變更陸䞇論之詳矣又高元裕為御史中丞上言御史綱紀之地官屬選用宜得實才其不稱者臣請黜之監察御史杜宣猷李瓖等竝出為府縣之職此皆前世專任長官之明驗也國朝諸司省監悉非本官帷御史臺職不殊古制方今臺中條制如臺官不稱職者亦許糾舉近年臺官宰輔避嫌例不中除多令兩制參舉又限資考苛細多不得人蓋由不寛資限不責長官之弊也近見御史中丞王拱宸奏舉楊紘等充御史朝廷循執舊規下兩制參舉臣謂朝廷既任拱宸為中丞若實非才則當别擇才者而任之若才堪其任則所謂屬官可悉委之未為過也况拱宸於官屬請去不才者而更擇才者是盡心於朝廷不避衆怨也今御史席平巳出潤州若參舉之人又得軟懦傾險之士則何以處之臣故謂莫若專任長官寛其資限則責有所歸也臣乞御史臺官屬只下御史中丞薦舉寛其資限之格資深者為御史卑者為裏行若能稱職亦是官守之常不必過有陞陟或不稱職可并舉者坐之則朝廷有責任之方風憲有得人之美論范仲淹韓琦辭讓狀臣伏見陜西路招討使韓琦范仲淹等各除樞密副使竝以西寇未寧懇辭恩命朝廷再賜手詔督令赴闕臣竊料琦等必再有陳論免讓於未決之間而異同之説有三焉曰使琦仲淹皆來也曰一處乎内一處乎外也曰皆留在邊也使之皆來若此朝廷之本意葢陛下推獨斷之明採至公之論以二人乆處邊陲詳知本末致之密宥思有變更將以求破賊之計耳然論者之説曰邊臣最苦者奏報文字或有稽緩或即裁損動不如意所以乆無成功今得邊臣而任之細大可知表裏相應也用兵不勝由軍制未立無部分統轄之法若不更變未見可勝之期今得邊臣而任之可責以更變之術所以宜一者處乎内也西寇雖已請盟而戎心不可倚信琦等素習兵事上下之情通浹今盡還朝新帥鄭戩山川之險易未知軍旅之部伍未練若賊乗我機便忽有奔突必難制禦此所以宜一者留於外也曰皆留在邊者此沮抑之論也惡琦仲淹者若於陛下前百般毁短之陛下不信矣若稱其材德而信之陛下不得不疑也必謂仲淹等威名已著羌戎甚畏今將去邊必有侵擾臣謂不然仲淹作招討使羌戎既畏其威名今在樞府正議兵謀其畏必甚矣若謂闗中民情素所倚頼今既還朝衆失所望臣又謂不然昔在陜西民既倚賴今在樞府必陳利病而行之所頼者愈大以是校之情偽甚明然或者謂二人孰宜處於内外臣以物議言之二臣之忠勇其心一也若以才謀人望則仲淹出韓琦之右處内者謀之而處外者行之故仲淹宜來琦當留邊於理甚當也其韓琦范仲淹伏乞朝廷不聴辭讓各授恩命上以明陛下任賢之堅意下以協衆庶之公論也薦姚光弼狀右臣等伏覩慶厯元年南郊赦書節文委史院檢討國朝將帥有威名勲業者尋訪子孫録用風聞史院已具檢勘姓名聞奏至今未見施用伏以赦令之文國家大信度必難行之事則不當輕言若以告報天下則不可失信况此一節自是當今合行之事必慮將家子孫例多不肖則宜於尋訪之時便責州郡察其行止無大過惡乃得以聞今舊將名在史官能應赦書所求者凢幾人若便擇其不肖者不用則推恩所及不過一二十人耳必不至濫行恩賞所可惜者因此一二十人失國家大信臣等伏見故慶州刺史姚内斌有孫光弼好學有行止能記前世兵法及史籍所載名將用兵取勝之術比於累年取試方畧濫進之人不同類若蒙擢用必有所為伏乞舉行赦書特賜召試仍下所居州縣隣里察其行實參騐而後行其餘將家亦乞遍加尋訪臣等職在諫諍當補闕遺見國家赦令已行而自失大信及士有寒畯沈抑未用者皆當論列臣等伏覩赦書節文云本房子孫與班行安排如實有勇膽謀畧者仍與㳂邊任使詳此則雖無材藝者亦推恩也今光弼據其學識况有可採臣等所陳只乞比近年方畧之人特與一試上以全國家大信不可不收遺逸之人伏望聖慈特賜施行舉官自代狀兵部員外郎祕閣校理孫甫為學深於經書屬詞長於史傳潔亷可以勵世端方可以立朝向自諫垣求補外吏歴更六任首尾八年資序高於輩流才行信於時俗臣近叨渥命俾職訓詞以甫代臣實允輿論奏乞收録本州儒士周希孟状具銜臣蔡某本州儒士周希孟右件人躭樂墳索棲遲丘園檢身以法於人為學每先於禮屢貧不易其節講解以養其親本州兩次近臣論薦再䝉朝廷束帛之賜臣自慶厯中知福州至今十五年備見希孟履行去年曾講周易座下嘗及三五百人委實經義精通文詞深厚今來年及强仕迹齒編氓至寳遐遺衆所共惜伏乞朝廷嘉其退靜優與收録以勸學者臣不勝勤勤之至謹具狀奏聞伏候勑㫖移福州乞依舊知泉州狀右某今月某日奉勑命就移知福州軍州事臣見候轉運使或提刑朝臣到日交割次伏念臣先自知諫院為父年老乞知福州臣迎侍先父在任三年後來丁父憂服闋蒙恩除知制誥再差知福州為曾侍先父在任日乆今養偏親義不忍往并冬月出京不便遂具懇聞特䝉陛下與免福州依舊守職後䝉朝廷差權開封府臣為偏親年高陳乞泉州近家侍養䝉恩除臣自出京在路亡子喪妻醫藥住滯於今年二月七日到官方得六十餘日又䝉勑命移知福州伏念臣自到泉州得疾至今醫理未退每日只是一兩次粥食日加羸瘦氣短心忪衆所共知又縁遠方不敢自便强力視事疾勢不檢今來福州事繁臣自度疾病必難了當臣不避天威再陳愚悃伏望朝廷憫察許令依舊知泉州或以福州帶提轄兵甲今來閩中最急惟是賊盜羣衆與漳潮之民為害臣乞依兩浙杭越州分領提轄兼福州自前只是朝官不除兩制臣僚雖有劉藥自縁請郡只因差臣知福州遂以為例伏乞泉州已除知州欲望朝廷對移許臣依舊知泉州苟禄養親醫理羸疾干瀆天聰臣實死罪臣候交割訖發往興化軍聽候朝廷指揮謹具奏聞伏候勑㫖奏舉夏侯郎中狀右某伏覩尚書屯田郎中知興化軍夏侯錫亷以持身果於臨事未嘗屈志以干譽或乃省分而遺榮乆處仕途素精吏幹逮於晩節僅領軍麾心力强明民俗畏愛惜其才敏之邵未參器使之繁今保舉堪充刑獄錢穀重難任使如䝉朝廷擢用後犯正入已贓臣甘當同罪其人在朝並無親的骨肉食禄與臣不闕五字謹具狀奏聞伏候勑㫖奏為故崇信軍節度副使尹洙為涇原路經畧時借支官錢回易公用别無玷汚已因此死於貶所臣以西事十年在邊任使甚乆今家貧無依伏乞朝舉牽復舊秩與一子官庶使沈冤闕聖澤事狀臣伏見故崇信軍節度副使尹洙慶厯四年闕知渭州兼涇原路經畧部署是時鄭戩為陜西經畧招討安撫使建議脩永落城永落屬涇原涇原路相度尹洙以為不便㑹鄭戩罷四路經略稱前官移文劉滬董士㢘等脩城如故尹洙以屬本路兵官令其罷役輒拒不從將加之罪遂戩互有奏論洙移晉州劉滬釋放臣聞尹洙之説鄭戩已罷四路經略移牒處分不屬管轄路分軍有鄭戩之心則治無鄭戩之心則亂劉滬等拒見闕之帥命從已罷之使符按之軍法自當抵罪洙之説理道甚明董士㢘因此怨讎結造詞訟朝廷遣勘鞠唯得承例借貸官錢回易公用其餘推窮至悉無分毫玷汚獄官法外飾潤虚詞置之檻穽洙尋死於貶所一觸權貴内外協攻遂使銜冤九泉不照白日皇祐中諫官李兑右正言賈黥各有章疏言洙之罪太深乞與一子官書奏報罷臣伏見西事十年自始至終尹洙在邊履歴最乆至於飲食寤寐力計闕寇薄命無成卒罹罪罟物論憐之至今不已懷忠負義身為國用人情之大節也原情宥過葢䕶善良人主之盛德也如洙之詞學才器名在天下盡瘁營公不恤當路將欲有益於時也一旦仇人捃摭臺官風聞獄吏鍜鍊有司議法謫則謫死則死豈暇自明哉使洙且存至今必自辨雪不幸亡殁知洙之詳者僅五七人十餘年間死者已半歲月益乆昭著無期洙惟一子家貧無依伏望陛下俯回天光下燭幽壤追還舊秩官其一子使喑噎之魂釋禁錮之負零丁衰緒禄及其家干瀆聖慈臣無任兢懼激切之至謹具狀奏聞伏候勑㫖祫享陳乞恩澤狀右臣伏以禮修廟享實講於遺文祫舉宗祧克昭於純孝凢預從臣之例悉推延賞之恩竊念臣有親堂兄之子彛粗習蓺文幸逢聖旦冀霑榮澤獲耀私門伏望睿慈於文資内特與一官臣無任祈天俟命激切屏營之至謹具狀奏陳乞以聞伏候勑㫖舉劉柯述充州學教授狀具銜臣蔡某右具如前伏以教育人材先由學校訓導之職實難其材臣本州進士歲趨貢舉嘗及七百餘人州學生徒相聚講議日亦不减數十百人昨以新授䖍州贑縣尉柯述在州待闕權請教授將及半年考校文詞動有程凖諸生惜其罷去詣臣乞留臣欲望朝廷特除本州州學教授不理資考俾之在學訓勵生徒興明儒術於其助治亦可尚也謹具狀奏聞伏候勑㫖舉知撫州黄虞部狀右臣伏見朝報知撫州軍州事尚書虞部員外郎黄瑊近為舉官事不得原赦追官勒停者臣竊以法令之設貴於必行人情之來亦有可恕如瑊之過本非故為知人之難保任之失亦所難免然連坐之科固當責勵斯法令之所以必行也今聞其遷延日月縁其家有𦵏事未即之官遂坐滯留不原恩霈其情似有可恕臣竊見瑊材器明敏資性公㢘所至有聲臨事不苟惜其年齒漸以衰暮欲望朝廷許令檢責歸里如實有事故特許原赦與之重難處勾當差遣如䝉允用後有犯正入已贓及當官不職臣并甘當同罪謹具狀奏聞伏候勑㫖辭翰林學士知開封府狀右臣伏蒙七月二日准中書劄子奉聖㫖授臣翰林學士權知開封府臣親垂老於義不可遠行病體至羸於力不堪劇任乞依舊知泉州已曾具表陳乞辭免今月十三日轉運使奏某至州交割公事臣見起發往興化軍居住聽候朝㫖臣竊慮朝廷已行之命未賜俞允伏念臣本以親老外補便郡兼臣被病日乆羸乏至甚難以臨涖繁劇今來泉州已别除官臣欲望朝廷與臣知揚州或杭州一任不獨便於養親兼臣易得醫藥屢陳私懇干冒聖慈臣無任戰懼激切之至謹具狀奏聞伏候勑㫖又狀右臣至和年中蒙差知開封府臣是時乆住京師慮及母親思念鄉里乞知泉州到任未幾便移福州臣在福州病患經年未愈乞知興化軍蒙朝廷再差知泉州去年七月准中書劄子䝉恩除翰林學士權知開封府不得辭免臣以老母不可遠行臣又乆病不堪繁劇奉表辭免伏蒙降詔不允臣伏念近便鄉土只有泉福兩郡臣各兩次知州不敢再請具狀陳乞揚杭一處便於迎侍兼臣可以訪尋醫藥十二月十一日准朝㫖不允臣遂奏乞從兩浙乗船赴闕今來巳至南京漸次前進重念臣禄仕之身出處之際上由君父累奉聖㫖令臣赴闕至于再三臣所以不敢不進人子之志惟親所安臣若退居貧無以為生别有營圖是為親累臣所以不遠數千里迎侍老母以就禄食然臣被疾日乆至今羸脊不堪勞苦昨因權知開封府事遷翰林學士恩例優厚臣伏望朝廷察臣誠懇與免開封府并罷翰林之職依舊職名許令在京兼判閒局臣既得禄養醫治衰病稍獲安痊朝廷驅使不敢辭免干冒聖慈臣無任兢惶激切之至謹具狀於應天府附逓奏聞伏候勑㫖乞敘用吕溱狀右臣伏見南京分司吕溱降官責廢已來聞諸道路皆謂坐費公使錢罪當奪官臣嘗見吕溱歴典蘇楚杭徐數州所至皆有風稱絶無貪名况其壯年已在近侍豈肯自棄如此然其為人資性疎闊脱畧細務誠恐檢防不至致陷深法臣竊見頃年蘇舜欽監進奏院日賣官故紙為令之人費坐監主自盗除名為民遂卒貶所事出仇人情輕法重至今天下冤之臣恐臣溱所犯多或類此兼溱素貧奪禄閒居便至失所伏望朝廷矜憫特賜牽復使溱少加檢防不忽鄙碎盡心臨事其於補報陛下未可量也干凂聖慈臣無任戰懼之至謹具狀奏聞伏候勑㫖乞叙用孫沔狀右臣伏見分司南京孫沔以罪譴謫臣以守官海域去京師至遠事出傳聞不得真實然觀貶降之重及有履衊穢之詞皆謂孫沔知杭州日有趙氏事沔誠有之固當重責然沔之治杭州剗除蠧弊擊擿豪强令行禁止與浮屠大族日為讎敵其間雖有過當而風俗混淆至今衰息所為如是雖至愚之人必能自察沔雖闊畧然考於人事以嚴明自處而輒為不法至此使一日罷去小人共怨何恃而得安全是明目而投檻穽孰肯為哉臣恐審問體量之際未得其實臣聞趙氏與父同日下審問所其父一夕而死所以道路之言皆謂搒掠以成其事古者大臣不理沈冤沔以嘗副樞宥待罪而已臣恐繼今以後大臣有罪不能自明由沔而始頃年儂賊寇鈔二廣近侍至多獨沔被遣瘴毒惡地干戈危處沔親當之是亦有勞矣赦宥之餘三州檢索安能無過沔且老矣摧落豈復自振然臣子之分惡名難受伏乞陛下哀已用之効察難明之咎湔洗拂拭有所任用必省以報陛下天地再生之施干凂聖慈臣無任戰懼之至謹具狀奏聞伏候勑㫖奏乞推恩盧侗狀右臣伏見潮州長史盧侗行實朴茂學術優深乆在嶺南衆所稱服皇祐年中蒙恩充補長史先與差攝至和二年就攝已滿兩考轉運司保明解發赴銓除注銓司准嘉祐四年六月條貫攝官須得三周年為滿任以此釐革縁侗發解在未降新勑以前合依舊施行侗乆居京師不能自陳栖栖南歸絶仕進意臣知侗最乆仰其學行昨於杭州遇侗臣不欲盛時以毫末之恩失一賢士遂與侗俱來伏望朝廷下流内銓與注一官庶使寒悴之人上霑恩命如朝廷與官後犯正入已贓臣甘當同罪其人在朝别無親的骨肉兼與臣不是親屬謹具狀奏聞伏候勑㫖奏乞李端恩澤狀右臣伏見建州李端素習醫方乆敦善行盡心博濟為衆所稱兼臣抱病閩中仰其藥石敢援近例輒冀推恩伏望朝廷特與試秩以勸輩流謹具狀奏聞伏候勑㫖郊禋奏外甥恩澤狀右臣叨塵侍從無補盛明偶大禮之慶成廣推恩而逮下臣有親姊之子戴乂粗親師訓未齒仕途幸屬均釐冀霑初命兼臣自皇祐年沗兩制以來不曾酌薦異姓恩澤伏望聖慈許於文資内安排冒瀆宸嚴臣無任祈天俟命激切屏營之至謹具狀奏聞伏候勑㫖端明集巻二十五
