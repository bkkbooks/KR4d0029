body:
  text: 端明集巻三十八宋蔡襄撰墓誌銘尚書屯田員外郎林君墓誌銘君諱冀字希聖潮州海陽人也曾祖珍祖知藝皆以厚行為鄉人所慕父洪裔贈殿中丞少喜學問手鈔經史傳記數千萬言日講諷自休以是終其身母夫人許氏封潁川縣太君君既勝冠得所藏舊書益刻厲考治以為詞大中祥符八年一舉中進士第歴辰惠二州從事以判入高等迺授大理丞又遷殿中丞太常博士入尚書省為屯田員外郎歴知歙州績溪及歙二縣治有善迹移同判桂州以母老還官事歸養不得請改知梅州被喪去職及還朝復官通判杭州寳元元年三司度支副使段公少連薦君監京師征筭二年十一月戊子疾發且殆其子從先取股肉雜糜飱以進祈疾少瘉卒以其月庚子終于官所年五十四康定二年十一月初八日即塟于大墓之域夫人黄氏封萬年縣君持躬有法式處大族上下無異言子男從先從思從可皆孝謹力學女三人長適進士盧幾次適邵武縣尉阮邈其季始䈂孫六人皆㓜君讀書不以博記廣聞為志務躬行其所知者平居與衆言開陳理要或持異論亦未嘗力辨以屈之及莅官當事前有事勢可壓以奪人者君自守益固其直而後巳在辰州時五溪夷獠嘯聚攻剽城中益兵以守君從所分卒徃來督運糧餉每先期至事平詔褒之歙州舊常第民資産歲歛錢三千萬傭僦舟人挽浙江鹽鬻以牟利久之民愈病或冗散旁郡轉運使以利病聞仍表君為歙縣兼總運鹽事君至更請募人為卒度材為舟歲漕益多而歛不逮下流者還集其服勞革弊舉是餘可知也初君卒將作監丞黃君瑊以書至洛謂某曰林氏諸孤哀不能言將扶持全柩背淮絶江山出呉閩數千里還故鄉以塟幸而得子之文以銘其先烈不亦慰諸幽乎某明道中從官漳州始遇君郡下君以某為志於古者作詩稱譽嗚呼今以是銘君墓辭曰求而勿懈者享則既豐委而不與者畀迺弗充覃延厥後兮紹徳収功列文幽堂兮以訊無窮葛君墓誌銘君諱宏字文淵先世居廣陵唐末廣陵兵起舉族渡江而南至江隂遂留家焉曾大父諱㣑以耆徳聞于鄉邦大父諱詳少嘗負知能謂於時無所用不若施于吾家以自効乃力于田數十年累致巨資益散施以廣名稱父惟明一舉進士不中退而積書數百千巻戒子孫業之君始稚巳能去紛侈從鄉黨之學既長記誦通博由鄉舉至京師視等軰之賢巳者輸盡誠禮屏所挾焉而下之故與游多聞世之士意氣豪舉文章亦甚壯徤不能工偶配皁白翦磨細碎以是五試春官輒觸罷晩乃寄隠於酒觀少年新學躡其後跳取貴盛一以命決不挂于中然以己之所學稽本於古人揣稱當世之務甚悉苟汩焉無聞孰與發而在人慶厯元年秋詔選進士君時以霑疾猶强力持筆研屬文辭以求貢比歸益疾殆九月四日終于家享年五十有二以某日塟于青陽鄉母夫人承氏與君之父皆年七十餘而哭其冢子哀甚夫人耿氏躬率禮徳以宜其家子男鈞鑄鏜皆嚮學敦謹將大其世二女長適進士陳賢乂其季尚㓜君於某為婚兄弟求知君之深而宜銘其壙者某不得辭銘曰悲乎文淵學足以辨興亡之端而文足以通義理之要卒不克施其命矣夫葛處士夫人墓誌銘夫人姓承氏世為江隂人居其家以孝謹稱父諱懷與擇其里中人以行聞者而歸之遂嫁為處士葛君惟明之妻當夫人之歸葛氏方為大姓族屬親疎姑姊娣姒節時徃來佩簪纓珥序列慶賀者甚衆夫人處其間自少至壯且老卒無與忤孝婦於尊章恭畏自力姑其子婦益慰愛之故其生雖親者不敢少慢而死也雖疎者哭之亦盡其哀享年七十有六其終于慶厯二年八月五日以十月二十日𦵏于青陽鄉脩徳里之原下生子八人男五人宏求皆舉進士不中第卒定向勤養不懈宜上書論邊兵利害得本軍司仕參軍孫六人鈞最為長既有子矣女三人長適屯田員外郎淩景陽封丹陽縣君次適進士陳玉皆先夫人而亡季女之壻著作佐郎館閣校勘蔡某為誌其所𦵏而又銘之曰夫人於家淑孝則聞既歸而宜法度是勤有子入官女為士妻冢婦持孫福祉實多三月而塟中禮之常考卜既吉寘文以藏贈殿中丞陳府君墓誌銘府君之先曾祖諱沆本魏人仕後唐因官江東為錢呉越王偽署朝散郎知明州鄞縣卒𦵏四明山下子孫始為吳人王父諱鏜聲名出吳中錢氏欲以補闕官起之不可皇考諱處瑩博學於周易楊雄太元尤雅悉其要錢氏數以禮屈致冀得為用亦避不顧及錢氏以地歸本朝遂徙居京師府君既長矣傳解經術尤工楷法得善書多手鈔之甞夢人有授其蓍者因專意治易其得要妙皆誠心潛通不扳舊書師説貴游大人或即其居而訊禍福府君曰吾老於易於是求聖人心焉又以其數度天地萬物消長及天下之所以興廢人之窮通不足引吾術以証愈閉距不言日與諸子考經傳疑説雍然自娛垂四十年以大中祥符四年八月十四日終年六十四男三人長曰見素終尚書屯田員外郎曰大素字仲華祕書丞審刑詳議官曰元素舉進士女二人長適進士盧冲次適殿中丞潘軫府君諱光現字晦之以子登朝累贈殿中丞娶吳興范氏追封本縣太君以慶厯二年十一月二十七日塟河南緱氏縣唐興鄉蔣里以呉興太君祔焉仲華於某同年中進士第先塟以其世家求諸銘判銘之言名也列其先徳以及自名府君之徳著而嗣子繼以仕進仲華涖官亷平以材能稱於時將大其後銘曰世以善脩而賤貧者或驗於天若府君究易之本行潔而堅其享之厚孰與夫空富而且貴者耶尚書主客郎中王君墓誌銘君諱惟正字晦䝉太原人曾祖王父諱襲王父諱劌贈大理評事皇考諱恩累贈尚書工部侍郎皇妣范氏追封昌樂縣太君胡氏封永安縣太君王氏之居太原者為大姓自君之先數世無顯者君始舉明經咸平元年中第選注瀛州司户參軍㑹契丹鈔邊河北用兵擇能吏督芻糧君兼魏鎮定三州皆以期辦轉運司以狀聞於朝授光化軍判官兼通判用保薦者改光禄寺丞東封西祀恩再遷大理寺丞贊善大夫又遷殿中丞國子博士賜緋衣銀魚入尚書省為虞部金部司勳三員外主客郎中初知懷安之金水通判耀州事州將尤濤與君論事不相能條君十八事不如法者以聞詔辨之逮獄具而濤悉以誣服人益稱君亷能移知絳州歲饑民流輒發常平倉粟賑之時權臣有不喜吏在州下風君去之且得善官不肯應其後當丞殿中抑乆不報君力辨乃遷被工部喪罷歸服除歴知遼雅衛徳四州雅州之俗右鬼神而巫覡憑依禍福勒民財以自利君按祠廟之不在祀典者投其像於江徹屋材以補官舎巫覡為之易業龍圖閣直學士劉公􅂱表君亷平可監刺列郡授荆湖南路提㸃刑獄升廣南西路轉運使時安南西道節度使南平王李藴薨二子與其叔爭立叛掠宜欽邕三州敗戍兵殺寨主勢以益振朝廷委君與曹克明圖之君訓兵走粟為守禦策作木龍斷欽亷海路賊不得進君度其内爭必一而止勒兵待之踰年一子果殺其弟叔自立遣使稱藩交趾平君應例遷回讓贈王父一官即評事君也居嶺外聞祖母病請解使職幸得便郡以就養遂知解州道京師圖上交趾事宜賜三品服至郡十餘日徙晉州未幾為江東路轉運使丁永安太君憂還充三司户部判官言錢穀利病多所施行潞州於河東號為繁㑹君得之勵精為治屢辨寃獄入判三司憑由司出領亳州密州㝡後再為絳州慶厯二年七月二十日終于廨夀年七十一以四年九月二十日𦵏于某所夫人韓氏封萬年縣君嬪配之宜治家教子悉有法度子五人長曰敏中試大理評事監楚州鹽倉曰執中未仕而亡曰柔中遼州遼山尉皆以䕃補官謹而好學為吏得其家法女適殿中丞長路開次適穎川陳晟次適右侍禁陳宗望孫三人君喜書史老益不懈尤通緯象卜筮之說持己以儉奉官以法仕五十年而無吏過將𦵏諸孤謀曰古人之傳於如今者託於文也况郎官於令應刻石以載功徳不刻不傳其惟孝思乎建中裒叙其世系官次治迹走求文于余為之銘曰吏治之興功利脩科條奮竒斷而不顧者斯可謂之材矣然不移勢要根人以資已唯是令善必昌厥後右千牛衛大將軍致仕陳公墓誌銘公諱􅀈文字輔臣其先世臨淮人曰珂者因官入閩居泉州仙遊兵阻道絶乃留不還公之曾王父曰太子太傅諱某王父曰太子太師諱皇考曰贈中書令謚曰忠順累封南康郡王諱洪進皇妣曰鄧國太夫人林氏曰河南縣太君林氏者以公追封公之配曰太原縣君故永清軍節度使贈中書令王公守斌之女公之男八人長曰西頭供奉官宗顔次曰三班奉職宗晦宗魯其幼而夭者曰宗回宗旦皆奉職曰宗周借職曰宗可宗傑皆未仕女十人長適皇屬右屯衛大將軍宗鼎三人尚幼六人蚤世一為内殿崇班閣門祗候馬崇懿之妻公之歴官自南康王上漳泉土地之圖除武寧軍節度使授公徐州衛内都指揮使王薨補西頭供奉官七遷至供備庫使眞宗皇帝祀汾隂恩恤勲徳之後以公為閣門祗候公之歴任監筦之局六秦州長道鹽酒税䕶民渠文思院致逺務芻秸之司酒齊之職兵都監之命四興元府舒廣二州許州之長葛一為泗洲廵檢再為明越及䖍吉郡都巡檢使慶厯二年以右千牛衛大將軍致仕明年二月癸卯終于建初坊之第春秋六十九以其年十二月丙辰塟于開封府祥符縣魏陵鄉吳子原從先王之域公之世家功業列于太史氏銘于大墓宜不復紀然某少時居鄉里聞長老為某言王本末自王氏世有全閩其後部將黄紹頗据泉州以守王與留從効誅紹頗有功及從効為帥王為之副從効死張漢思繼暨漢思昏不治王自代之太祖皇帝御天下間道請命於朝即授平海軍節度使太平興國三年以其族歸京師獻所有地朝廷不加一鏃而籍二州之人二州之人耕於山漁於澤不罹禍患涵濡太平之澤者王之庇祐我莫知深矣及某游官知公之為人處豐貴顯榮之間而能脱奢豪之習清約恬默以自娛適招延士人講論書史仕宦四十年率以次遷未嘗吐一語以干勢要人臨官處事一以法令不能輒為輕重將老即引去截然有自止不屈之意終始善良公之沒嗣子宗顔復以孝聞本朝之制𨽻武職者不為居父母喪去官宗顔力求解罷服喪以盡子道朝廷從而奬之以率勵天下又能教其弟宗晦宗魯從學謹飭信乎能蹈孝友之節者也供奉君謂予曰嗟吾母氏一禮法持守門户鞠養諸子慈孝均一自先君子棄世時發篋視諸生平告勅撫而泣且戒曰巳矣乎不復見也孰能永乃翁之傳者耶孤敢以哀請幸次先君子之行誌於墓某於陳氏所聞所見通知其三世遂銘之曰推公之父舉二州之地歸命於朝世名以忠推公之子善天下之善服喪于家人謂之孝公乎上承乎忠而下遺其孝公之令徳於是而顯十世之宥或以無有云誰必之視公之後尚書司封員外郎曹公墓誌銘公諱脩睦字某建安郡人為學通博性介亷喜自脩立大中祥符五年登進士第調撫州軍事推官南雄州判官改大理寺丞知邵武軍之邵武縣遷殿中丞知鬱林州聞母大夫人疾委州印於其佐北走歸道未至被喪哀瘠過禮服除以大常博士通判越州再遷尚書屯田都官二員外通判泉州知邵武軍民有兄弟訟田者公為陳兄兄弟弟之義民相讓不爭代還前丞相杜公時為御史中丞薦公材能拜御史踰年改司封出知夀州又移泉州瀕海有渠道迎潮波溉浸旁田數十里自渠水湮塞田蕪租逋公與疏渠流人還業尋坐舉者奪司封去官歲餘通判信州知吉州公皆不行泰然有歸止意上書願休官政以都官員外郎分司南京既而嘆曰不事事而受禄不可謂亷復申前自列于上乃得請久之丞相章公言公退靜可敦薄者詔還所奪官居數年聲聞益達朝廷以紫衣金魚就第褒之用悚動天下士大夫視聴以重進為髙慶厯六年春疾作次所為文詞四百餘篇勒分三巻疾益漬戒其子薄塟若世所嚮浮屠法輸錢擊鐘與計七日而去齋者皆不得用二月乙卯終于家年六十八月庚申塟建安縣萬石村公之曾王父諱某王父諱某皆潛徳延休貤于後人皇考諱某累贈諫議大夫皇妣某氏贈某縣太君公之配朱氏封長安縣君治家有法卒夀州男覿建安主簿女四人長適南劔州順昌令邱與齡次適進士邱規次適太廟室長陳沂次適常州司理叅軍何辟闕孫二人曰顓太廟齋郎曰某尚幼公兄二人長諱某舉進士早亡次贈諫議大夫諱與公未仕時固在名右鄉國號為二曹仕及諫議居朝剛直好言明道中以刑部員外郎為御史知雜事論請復辟觸章憲明肅太后怒左遷興化軍終貶所其後天子追憫前忠特以諫議大夫表之公年五十有四即引例歸第舎園池疏列泉石置冊書棊琴於其中意之所適則娛味終日賔親過從或道時事輒謝曰吾方與紙上聖賢語差樂勿溷吾聴以是兄弟皆有終譽公之在官不以法令繩馭下吏刻己率之而吏益畏不以威刑讋憚下民平心治之而民益信嗚呼終始之節可謂善矣將𦵏其孤覿哭泣以書來乞銘銘可辭乎銘曰重勢榮利衆所趨也耄昏苟前世所愉也中年能休矯妄愚也惟公之存勵夸浮也西人之法志古無也今民涵濡費産輸也遺戒勿用遵禮儒也惟公之役祛怪誣也尚書都官員外郎致仕葉府君墓誌銘葉氏之先居丹陽在唐梁之際有官于泉州者屬兵戈起因留官下子孫遂為今興化軍仙遊人時方否鬲連世晦遯不克進府君諱賔字虞卿生當天下文治乃始業詞學應進士貢景徳二年中第注潮州海陽主簿再調連州桂陽令廣州節度推官商人陳從吉鬻銅錢捕繫吏治急自誣巳鑄鑄法應棄市府君鈐案狀不署曰是物非巧工不能為從吉商也且鑄必有范鎔具今無請更核果得眞盜鑄者從吉坐買賣得不死一府稱服繇是有能名尋補建州節度掌書記以保任材亷改太子中允累遷太常丞博士尚書屯田都官二曹員外郎歴知泉州永春南安卭之臨卭三縣事永春民有先惡嫌者冒重辟府君曰吾仇也獄雖眞人亦乗以訾我裁附輕比南安盜截牛舌其主以聞府君陽為叱去隂令屠之即有告其自殺牛者府君謂告者曰截牛舌盜汝也訊之伏其罪代歸除通判南劒州事劒當閩衝水行持販茶鹽禁物上下山出銅銀冶場凡三十餘所聚四方游黠輕剽刼擊殺黨與牽連事日下吏懼滯繫被罪率不暇精覈府君専意詰決民得盡其情而獄無留焉還朝以年七十致官事家居九年慶厯五年正月九日終夀七十九明年七月四日𦵏歸徳鄉長安里王父諱擅皇考諱素能以儒書訓子致遂大其門累贈太常少卿皇妣陳氏追封潁川縣太君夫人陳氏河南縣君厚淑恭謹動有婦則前府君卒男二人曰任泉州司户參軍所臨職既去人輒思之曰傳登進士第終泉州晉江尉女五人適郭尹黄佐郭日休郭憲皆進士其季之壻泉州節度推官方愼徳府君為政能察民善偽與吏情數苟有蔽謾必立見然正其事則巳不深嫉而窮治之故所至吏民憚其明而不怨躬自儉約計奉以衣食歴任官無錙銖過累既老閒居課諸孫就學時行田壠視農事載酒肴與旁隣阡巷耆舊徃來道説前事以為樂晚年資用饒歎曰吾其為利乎於是籍親戚富貧親疎者第而散之人益知府君官有餘財而約不以資也𦵏之明年司户君以書并次其先君世族功治卒𦵏月日因其子壻漳州龍溪尉許稹以來乞銘於太史氏蔡某某既以先達軰行視府君又與其子游遂為之序且銘曰葉先丹陽官遷于閩室乆而通翰飛以振初盤邑治爰佐南海直民寃死聲問彌大于泉之治決斷大明一語得盜脱仇附輕劒交衢途猥集剽游事叢獄夥乃恤乃孚還官臥家協比里閭宴處遨遊歲月之逾老而中禮仕禄之儀儉則克終徳厚之基年豈不多兹實其歸載行於詞永世之詒端明集巻三十八
