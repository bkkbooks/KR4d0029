body:
  text: 端明集巻十七宋蔡襄撰奏議乞寢罷唐介春州之命臣今月十九日祗候伏見臺官唐介上殿奏對次宣喚兩府論事及令唐介付臺文彦博留身冄拜次又樞宻院奏事聞唐介得春州臣在殿陛之間所聞雖不審實竊料唐介必是上言執政間事得罪春州然春州惡地唐介臺官今言執政而得必死之謫雖陛下優待大臣而執政何以自安伏縁唐介獨言宰臣所以兩府同列各處嫌疑之地不肯解救臣伏望陛下少霽天威以全國體追寢唐介春州之行臣官為正言又在侍從耳目聞見不敢黙黙臣死罪具狀奏聞伏候勅㫖乞罷温成皇后立忌臣伏聞陛下為温成皇后立忌臣竊謂聖人制禮所以明輕重尊卑之節過與不及皆曰失禮故太常設官職在檢詳陛下臨御天下三十餘年動遵典法聖徳之盛明如天日近者温成皇后薨逝事不下禮官詳檢既以施行雖有過當無由追改又按立忌考之于禮未為適中伏以孝章淑徳章懐四后於陛下為伯祖妣為皇妣其屬之尊如此向來奉慈皆不立忌温成皇后生則為妃後乃追冊於陛下為卑㓜之列不應立忌伏望聖慈追還勅命庶乎天下之人知陛下以禮斷情合於中道乞不往奉先寺酌獻臣伏覩太常禮院公文十二日駕幸奉先寺詣慶基殿酌獻葢陛下孝思之心不憚所至然外人唯見向來奉先未嘗親往今為温成皇后陵廟成就恐因而謁廟臣竊料陛下聖明必不為此臣恐獻議之人不知典禮願陛下深思熟議以慰人望取進止乞罷園陵監䕶司臣伏見貴妃近用温成皇后監䕶葬事稱園陵監䕶使及都監始者衆議皆云便去西京又來已於奉先權攢恩禮偹至附近京城嵗時易為照管外邉人言尚疑有西行别作園陵口語紛紛於事體非便伏乞明降聖㫖中書温成皇后巳權攢畢所有園陵監護司一切並停所貴曉諭外人取進止乞不作温成皇后誌文臣奉聖㫖檢閲温成皇后塟要誌文臣遍檢古今並無皇后塟禮更有誌文蓋以名號已尊兼有哀冊不合為誌臣别具狀偹載唐以来故事伏乞聖慈省覧所有御制更不可作取進止乞罷吕夷簡商量軍國事臣伏見前宰臣吕夷簡被病以來兩府大臣三次詣夷簡家議事及守司徒罷相之後朝廷有㫖令商量軍國大事今月二日宰臣章得象以下又詣其家評論西事臣切謂夷簡病時陛下於内中開設道塲及賜手詔錫與至多眷注之心當世無比臣謂陛下假人以恩則可假人以禮則不可何哉陛下春秋方盛固宜親决萬㡬却令宰臣樞宻詣夷簡决事臣恐天下四夷聞之謂陛下如何主也兩府大臣輔陛下而治天下者今乃並笏受事於夷簡之門里巷之人指㸃竊笑臣恐天下四夷聞之大國乏材而無上下之名分雖陛下特隆恩眷優待老臣正得為君之道而夷簡不能上承陛下之意而無引避推讓之心夫為人臣端居私家屈大臣而自便於理安乎况夷簡謀身忘公養成天下今日之患遂致二邉連搆百姓困窮萬手所指無敢言也上天降鑒祖宗垂靈輒以病解而陛下尚令參决大政皆陛下至今未之悟也臣切以陛下即位之初夷簡便為㕘知政事其後數年漸至宰相出陳州半年復入又出許州一年有餘移領魏府召歸作相首尾二十年間不居政府纔二年有餘耳前後雖有王曽李迪張士遜陳堯佐王隨等更迭為相而厯年之久無如夷簡也輔政以來所言之事陛下一皆聽信而施行之出藩未幾還當大政以病居家兩府問事得主之深無如夷簡輔政既乆得主又深固當敦風敎正庶官安百姓鎮四夷今乃不聞功業但為私計豈不負陛下眷遇之意也夫開直言旌讜論者宰相之體也夷簡執政以來屢貶言者凡三四次如曹修古段少連孔道輔楊偕孫沔范仲淹余靖尹洙歐陽修等或謫千里或抑數年或縁私恨假託人主威權以逐忠賢以洩已怒殊不念陛下虚受惡名此不忠之大者又使天下之人父敎其子兄敎其弟咸以直言為諱此乃絶忠讜之嘉謨成本朝之闕政其過一也夫奬懿行厲㢘節宰相之方也古之聖人敎人之道先以名節為本若使不好令名則何惡不為何善不毁縱不䧟于惡亦不免碌碌因循為闒茸之人也夷簡為性不臧欲人附已見為善介特而自立者皆以好名希求富貴以汚之善人恥此往往退蹜以避好名干進之毁是以二十年來人人不肯尚㢘隅厲名節淺者因循闒茸深者靡惡不為都無愧耻但能阿附夷簡夷簡悉力䕶之使奸邪不改浸成此風俗以為習又使天下之人皆以逐利為智能逺勢為愚鈍此乃廢㢘耻之節成奔競之風其過二也夫善則稱君過則稱已宰相之行也夷簡一恩之施皆須出我門下或先露其事使人預知或先抑其事然後與行若不可行者小則歸怨同列大則稱奉聖㫖以是阿附者多隂為羽翼使天下之人迷大公之論有朋黨之議其過三也夫進賢退不肖者宰相之職也臣見數年以來審官院京朝官吏部銓選人樞宻院三班院使臣授官之後例皆待闕一年二年以此計之冗官甚多曽不裁損竒材異績不聞奬拔貪墨昏耄之人曽經免罷責罰及來雪理務施少恵多與收録使天下貪㢘混淆善惡無别其過四也夫富國恤民宰相之事也自闗陜兵興以来修完城壘饋運芻粟料配百端悉出州郡内則帑藏空虗外則民力殫竭嗟怨嗷嗷聞于路道不幸有水旱之災其變不可量也葢由不選材能充三司使副使發運使但務取人情用為資厯纔轉運使收至數月即又遷移循環奔走日求升進欲以興材利寛民力其可得乎其過五也夫懐忠誅逆宰相之畧也而邉鄙無事之時臣僚或陳偹邉之䇿或述禦㓂之方皆為虛妄引惹或降差遣或與衝替邉臣因此唯尚姑息是以士卒不練器械不完黠羌窺我强弱輒懐異志夷簡當國之後山外之敗任福已下死者數萬人豐州之戰失地喪師鎮戎之役葛懐敏以下死者又數萬人蓋命遣將帥或分或合法制不立上下不和大戰則大敗小戰則小敗使生民肝血塗染砂磧父子夫婦存歿寃痛廟堂之上成筭安在其過六也夫暢國威制鄰敵宰相之謀也自西師敗歿之後北人乗隙遣使入朝輒違先帝之盟妄請闗南之地嵗増金帛僅二十萬而猶勒兵壓境堅求納字凌脅中國大為恥辱度其禍福譬若疽瘡但未潰耳制敵之術為患日深其過七也夷簡出入中書且二十年不為陛下興利除害苟且姑息以致事事隳壊如此臣謂夷簡若實有智謀執政從來只務固寵不肯施設是不忠也若竭盡智謀區處顛倒是不材也不材不忠二者當一責尚貪威勢不能力䕶或必聞夷簡乞令政府一兩人至家商議大事足驗夷簡退而不止之心也臣又見故相王旦執政僅二十年後以病退只帶宫觀使名不復與聞邦政故事甚明其夷簡伏乞朝廷特罷商量軍國大事庶使兩府大臣専當責任無所推避陛下於夷簡正君臣之分存終始之恩伏乞陛下斷而行之以全國體取進止乞罷王舉正用范仲淹臣伏以當今之務至要至切者莫若擇執政之臣執法之臣苟容不材欲百職修舉者無有也切見㕘知政事王舉正材能最下久忝大用柔懦緘黙無補于時天下之人指目羌虜為患兵戈未寧生民困窮國賦貧蹙陛下豈不念祖宗社稷之重國家安危之計而令舉正碌碌備員自陛下擢用韓琦范仲淹以來人人日期大任韓琦仲淹見已到闕若以處置邉事韓琦足以當之乞移仲淹㕘知政事其舉正伏乞退罷以叶公議再論王舉正右臣近論述參知政事王舉正柔懦緘黙無補於時特乞罷退樞宻副使范仲淹才名徳望素著於人乞㕘知政事或者以謂若用仲淹參知政事却令舉正復入樞宻府朝廷大臣不失進退之體臣切謂舉正軟懦無能豈可却令入樞府雖中書總天下之事重于樞宻院専講兵謀豈可用不才之人也臣聞人主之御羣臣稱職者用之不職者去之舉正預政以來有何建明著于時論儻不以罪斥而以恩罷其為幸也大矣伏惟陛下天資仁厚不忍失一大臣之意奈何羌虜皆横生民已困兵戈未寧水旱不節嗷嗷四海思望休息急於用才之日陛下雖欲存小恵宰相雖欲芘同列豈不誤國家大計乎伏望陛下發乾剛出聖斷退舉正用仲淹以答天下之望臣為諫官論列大臣先當議其才與不才若舉正過惡未欲盡言願朝廷早以禮去之無令醜迹暴揚於事為便論李淑梁適姦邪臣伏見李淑罷開封府中書舍人充翰林學士諫官已有論列李淑行迹姦邪醜惡不宜在天子左右皆陛下素所知者而天下之人未知朝廷如何處之臣聞至聖之主至治之世邪人不能為患猶必去之舜有功二十登八元八凱去四凶也以舜之明雖有四凶在朝豈能害舜之治然必去之者不可使邪人在側使天下之人皆曰為行如此猶在天子之側誰肯修身潔行以為忠良以此知邪人雖不為害猶以當去之况能為害乎自古帝王非不能知邪人不去終為大患然有因循不去者亦有以也一曰不明雖知心之惡邪人而不能辨邪人之謂也二曰不忍邪人善為巧佞君雖知之而不忍去之之謂也今李淑姦邪朋附有尸鬼之名聞于天下伏况陛下智照明了之纎毫盡見淑之為行無不諳悉非不辨邪人也臣每進對之時陛下嘗謂臣曰奸邪去則朝廷之福以此定之乂非陛下樂聞巧佞之言而不忍去之也所以不去者必以無實罪故也臣請論之有實功有實罪而賞罰不疑也有司奉行者無實功而賞無實罪而誅唯聖人自能别之有實功而賞者戰獲多少財利豐寡是也有實罪而罰者殺人受贓之類是也無實功而賞者節行是也無實罪而罰者奸邪是也是故聖人之議賞罰者賞節行在實功之先罰奸邪在實罪之上故舜登八元八凱去四凶而曰大功非聖人不能為之臣力詆姦邪世人以臣不思後患為臣寒心笑臣愚魯臣自知甚明苟利國家豈顧後患哉臣不愛身惟憂朝廷不即施行耳奸邪不去正人退蹜此正可痛心也李淑梁適皆有實罪如臣輩所謂者只乞與外郡有何難行若大臣者有専權之嫌有後患之畏不敢明言去之陛下何所憚而不為願陛下為社稷為生靈留意幸甚取進止乞降吕夷簡致仕官秩臣竊聞司徒吕夷簡致仕朝廷除太尉者臣竊以吕夷簡立性姦邪欺君賣國出入政府二十年二虜憑凌百姓困窮賢愚失序賞罰不明一無功勞以病罷退陛下未能誅戮勸厲後人豈當濫推恩禮縱取笑天下其吕夷簡麻詞乞不賜降下别令中書詳議官秩取進止端明集巻十七
