body:
  text: 端明集卷三十二宋蔡襄撰齊文南郊道場讃佛文伏以講盛禮於泰壇用伸嚴事集勝因於淨土宜運鴻仁伏惟皇帝陛下順法乾坤祗奉祖考萬物涵仁而生息庶政蹈道以中和甫届書雲之辰往陳奠璧之祀特開精舍廣肅法筵展龍藏之祕言揚魚山之清梵庶敷善利胥協熙辰今皇帝伏願臨吉土以升煙髙凝祥氣御端闈而灑澤下格幽途永孚環海之心益固南山之夀功德疏奠玉紫壇䖍修於大報布金紺宇祗仰於能仁用集妙因特嚴法供皇帝陛下與天均覆惟日並明運神化以無方置幅員之安處甫臨至景專講上儀就居位以薦誠霈渙思而澤下有來清侣敷誦祕文式賴殊緣宜資熙事伏願五辰協序百福凝祥永隆久大之基益固延鴻之算順祖惠元皇帝齊文豳風流頌陳基業之艱難梵澤垂文降福祥之孚闕諱辰甫及妙果宜憑伏惟順祖惠元皇帝藴神聖之資纍元功之茂詒孫謀而及逺啓天命之來符今皇帝奉清明之宮薦馨香之德敞仁祠之淨土翻文佛之祕詮順祖惠元皇帝伏願鬯並真游髙臨覺地集祥綿緒敷貺羣靈今皇帝伏願鴻算後天至慈冒世萬㝢輳於朴厚四極格於混同然後願台輔協恭宗圗繁衍日星順夫軌道黍稷滋於有年舉是含生悉登夀域太宗皇帝忌文至大之德列原廟以推尊無量之仁依覺皇而薦祐太宗皇帝恩淪四外運紹再傳化治之光在人昌明之慶垂世今皇帝永思先烈濬發精神有來淨行之流聿修祕藏之妙太宗皇帝伏願超游真蓋廣覆羣靈慧如日之圎明化等空而常寂今皇帝伏願夀年山固聲教天臨儲嗣寖蕃宗支彌盛宰路協恭而贊輔霄躔應候而泰和五辰順時百嘉遂性章穆皇后忌文伏以蕙車風逝杳仙迹以曷追竺館載䖍仗佛因而申薦恭惟章穆皇后禀靈魏麓作儷周京修隂教以輔隆正坤儀而中肅真游彌逺靈德逾芳今皇帝孝軫至懷慕存遺懿兹復臨於諱日爰肅啓於法筵用植勝緣以昭嚴奉皇后伏願棲遊淨界超證真乘備福德之莊嚴㑹天人之利樂皇帝伏願運延星劫位固寶圗暢聲教於八遐戢干戈於四裔然後願盤維敦茂丞弼宣和百工罄述職之勤庶績協順時之治若夷若夏有性有生率躋仁夀之期共洽羲軒之化章獻皇后忌文保祐帝尊上繫於慈訓追懷親愛䖍託於能仁皇太后惠澤多方教流中閫逖奉母儀之重再嚴廟象之崇今皇帝孝德因心諱憂在旦軫瞻屺之深念集給園之勝因皇太后性周大空化通妙力護生靈於至樂福基業之無窮今皇帝鴻算後天深仁被物殊俗格乎面內庶品遂於陽中台哲同寅宗藩協輔武皮包乎犀利文象蹈於經常有生之繁惟帝斯賴賦士伸知巳賦古有云賤而達已者道必有裕貴而得士者禮必與鈞意關榮以髙世朅游名於大人威鳯下而覽德微蠖屈而求伸謂周公多才揮沐吐餐而延白屋顔子具聖砥名厲行而附青雲故我氣浩集義遊於天真默守節而無悶動㑹時而益振彬文薄乎河漢長算騖乎臣鄰指素絃而禀潔紉香草兮生春彼美君子風度瑰偉烏在其蔓葛以均戚寧藉乎樹枌而接里夷亷嶷而素言誼幽眇而鈞㫖判柔植於異畦决斷涇於東水始傾崑而娛玩遽倒廪而矜侈耽聖域以同奧秩皇塗而並軌雖韜瑕可以取璧兼體可以收菲矧或太公蛻北海之居安石翔東山而起我拒其歸誰執兹耻必使右雪苑之席屣繡衣之履繩引堯舜以致君蒙合燕趙之多士苟風協而聲同偕克濟乎薰美者也且夫虹玉隱乎巉石玭珠淪乎層漪麒麟非犬馬之比鱣鱓豈螻蟻之持沕明淵而自得曷悚迫而外移華屋千榱柔荑百枚積粟乎京坻躍馬乎騧驪匪衷藏之雅尚差得志而弗為何藴諛以發顔何挾巧而讕詞宜乎厚德表世嘉聞蓋時身享崇髙之貴瞻咫尺之儀謂朽株可萬乘之器廊廟非一木之枝得於道不伐乎衆公推於室不懵乎內私舉巗穴而悚觀峩冠珮而來思上弗求焉無曰蔑當吾取下弗進焉無曰胡為我知然則人之膠於今者或安於近泥於古者或昧乎通擇其粉墨之異考以宮商之同射乃墉上宜乎日中鳴鶴隂而子和雕虎嘯而生風不然則名位相雄師學相攻耕石田而待稔懷珍髢而適戎故非五難而吐論和再刖而窮處嗟乎木秀林而必摧士入朝而見嫉絳灌隱堤而賈遷椒蘭發機而原黜子冉膏舌而墨幽臧倉圜精而軻逸夜光明月招訶按劍之年流水髙山沈思絶絃之日在孤見之卓越發羣蔽之豐密借如說困刑戮何擷其芳尹恬耔耨何鋪其香若歲旱而澤及卒阿衡而自將惟聖睿之親逢俾業履之徛昌奚仕虞而弭廢由自戎而虜亡秦何售之而遂用遽厚之而遐疆仲負闕而仇君鮑何奪徽纆與鋒鋩弗芥蠆乎左右麾干侯而拱天王設隕越於九淵幾夷袵而易鄉寧倚輈而鳴嗌桓何寶其琅琅鬷肆語而靡著向何娛而趨下堂伊郤勳之末圗胥何利乎錫土越石娛薪以相伴嬰何次驂而奄取平負郭而久貧何梯魏而康㝢信鼓刀以周身何翼蕭而登輔節信疲於游宦何怵心於皇甫正平蹶於羈雌何衒能於文舉亮覘時而養晦蜀何奮之於甽畝䝉署籍而委質吳何抗之於卒旅蹇斯類之有徒殫筠素而曷叙被王公之宏略豈數子智謀之補畏遺德於冥鴻思灑恩乎施雨向使失風雲之㑹構竒邪之伍或際立於草茅或殱危於俘虜亘天地以寂寥尚何流嘉風而建英矩者哉今兹有人逺陶聖世少齒鄉黌根英雲之節奏表畛域而墾耕躋陵隅之峻嶻泳垠埃之淵渟若夫名山首乎黃老鬼谷譎乎縱橫桑羊役乎術計商鞅刻乎刑名姑還車而却步目吾肆之豐贏既披閩吳而僑貢未幾唱第於天楹賦從軍兮南土天蓋五而回星莽萬端而外眩愚幽墨而無營憧百趾以髙附愚邅環而後行噂决辨以旁肆愚抑閼而箝聲紛結游以走譽愚友益而盡傾親冒領而雙白又齊伐乎大庭第假田不足以羞㫖烏敢蘄外物而薦榮晞往躅而結援坱回泬而峥嶸介語默於蔀室其誰燭之而使明勾蘖芽於瘠壤又其誰育之而使成豈云病畦而諂笑哀絃而賣名然世主炎黃之化鼎建邴魏之風時乎時者難值旦復旦以親逢倘率道而自進立誠知命抑在乎其中亂曰善知人者豈古有之今無善求知者豈彼智而兹愚倘固其窳而厚其薄必幽者綆而培者扶進抑時而退抑命爾其守約而于于者乎季秋牡丹賦有序爽秋涉秒扶欄間有牡丹舊枿輒吐芳桋亭亭上擢發紅葩一大可徑咫角春取勝無間然爾扶欄當彩翠亭之右亭屹縣圃之西北隅圃直縣堂之背縣介大江之南蓋漢元朔中江都易王上封其子敢為丹陽侯邑於蕪湖此其地與今為太平州管時河間凌公尹之行再朞矣政休賦集又所瀕江英游雅故受署齎伐被石將命者憧憧然率道其疆故觴咏之娛相因無缺及此珍卉罄茂公有異時之貴趣張具髙㑹於其側所謂彩翠亭者酒三行濟陽蔡某釂舉而言曰公走文章聲二紀於兹顛葆幾華位不過禁省二丞官不過萬戶長吏而善禦外物居頗休閒獨以浩博記書稱道聖明為事今是花也韜英和緒揭麗蕭辰時雖後而且大盛意者公其日寖亨㑹才慮將有所讎乎昔騷人取香草美人以嫓忠潔之士牡丹者抑其類與請為公賦之其詞曰朔羽南翔建杓西宅霜天一清露草皆白悲哉轉涼葉於亭臯兮悵穠華之閴寂均百草之不能秋兮何子花天姿之的的使人觀之若披大暑兮臨清湘剝層霾兮仰白日厥初稿壤潜春扶欄向夕芳枝舉以融怡絳蕊局兮羃䍥寶霧宵籠鮮風曉拆麗或中去聲人香可專國刻紅炬以烘焰綴彤霞而薦色鬱茀誰語丰茸自持非倚瑟之神女抑善賦之文姬俯清都而時下簸晴陽以孤嬉霄皓汗兮排金扉氣沆蕩兮張寶帷霓燁煜兮揭朱旗雲朣朧兮纁衣􅒫緑跗兮矉修眉姹鮮萼兮伸微詞沛怡愈兮新相知眇悽惻兮送將歸桃有援兮溪之曲蓮為媒兮澤之湄羌此物之善逺亶夫君之後時君不聞佳麗皇州喧繁戚里清籞迢迢名園亹亹綺櫳曉兮金鑷聲繡牆明兮雨苔紫嚴霰財歸光風半起於是萬蒂駢紅交柯結翠密顔紆餘斜袂輕綺文鴛羣飛霍錦橫被縓蓋攀聨緹裳積委則有姝姝玉人翩翩卿子葆韀過兮飛電珠幰來兮流水擁玩嘉辰笑語成市彼瓊蕤美英縹葉新花羞不得借其餘光矧標揚乎意氣今何為兮江之干地之卑兮歲將闌荆蕪比兮霜月寒望下苑兮思上蘭嘉本擢兮靈根盤泊淮波兮鮮楚山是知元冶一陶昌生萬育無左右先游者淪乎朽株當匠伯不顧者被之散木譬此花之賦命兮亦節暮而葩獨然貴賤反衍禍福倚伏其暮也何遽不為貴其獨也庸知不為福噫化工物情吾以花卜慈竹賦種植至多强名萬彚物拔其萃兹乃當天地之正氣有美竹兮特禀夫慈名而榮被豈有懷於本根兮何千千蓊然而瓌侍若夫吳郡名園王家新第逺閣斜欄橫塘靜水或薰風晝來或秋露宵墜日遲留兮簷外隂移人悽悄兮屏間籟起方且濯峭格而清舉足團欒之生意或翹而舉者若堂有髙年兮勤素風而講議或亞而側者若家有令子兮聞話言而沈思倀如出門而事逺遊兮滋宿雨之清淚雍如奉巵而介眉夀兮羃春煙而怡醉紫芽蟠聨馨兒季稚去者奔追迎者嬉戲疏者如招並者如倚雖復貫千狀於巧筆曾莫形其放􅜜借如秋晚霜重兮萬木林林而僵悴隴榆盡兮塞月髙堤楓丹兮楚江紫此君也束藍田之苖玉刻炎州之稍翠固節虛心兮雖大鈞不能奪其志於是揖三荆於堂下結蔓藟於河涘襲氣同根之豆交歡承萼之棣顧威鳯之時下亦孝烏之來寄設有用於律筒天聲發兮大和備覩此芳物悲哉逺人昔我從軍兮南之海濱今我辭家兮西游洛塵暢然於舊國舊都感莊生之論恭止乎維桑與梓諷周傅之陳指白雲兮天逺採幽蘭而露新嗟碧鮮之得地乃叢茒莫保反而相親吾議爾德豈止乎千畝之渭濱當訂萬石之封君者也傳耿諫議傳耿君傅字公弼以父廕為三班奉職思以吏治自奮更就銓選授河南伊陽縣尉明州司理參軍表其能者數十人改將作監丞寶元元年知河南永寧縣明年三月旁邑人訛言相驚老幼東向奔走道路三日乃止前此澠池人有告其仇衛九思者傳張角之術善以妖幻惑人夜集鄉里男女同室居寢逮明而罷號為講法率嘗往來旁郡數百千家相與為囊槖州縣吏更調情狀且捕之符文未成固巳逸去以是積三十年不敢下其事於縣縣吏度終無能捕之者因受賕不治至是民相驚擾咸意妖者唱之時宋宣獻公始涖河南乃以其事屬君且戒之即不得亦隨坐矣君請緩其期卒以計擒之索其家得所疏行賂簿書逮獄成首惡伏誅其支黨黥若杖男女二十餘人縣吏其得先所受賕抵罪流根株挂連一不窮問於是河南人交口稱之而奸贓吏益畏縮行恐被摘隂指峭刻君或知之自如也宣獻公薦其材就遷通判儀州事至復以材名關中又遷慶州朝廷方議勒兵進討羌虜帥臣署君專督一道糧餉部分已次㑹冦入抄掠遂出禦之諸將失利君亦遇害康定二年二月十三日也初冦至君以書與諸將謂宜少避其鋒擇據便地以量變動若徑往必墮賊計中諸將以遇冦不敢逗留且諭君以不與軍事宜還君曰死且忠志也吾不去矣既死軍中以其書聞慶州孔目官彭忠隨主帥任福在軍中收其書以聞贈右諫議大夫官其子五人於是素所不相能者始快心飾謗以君迫諸將進軍致敗無益而死於恩賞為過厚今斷一指而得公相雖甚愚者不為被殊解支革是亦何願嗚呼孟子所謂捨生而就義者也在易大過之上六過涉滅頂凶無咎其說謂雖涉難過深而志在救時不害於義故不可咎也戾於浮言而中於大義夫何恨哉君姿狀魁毅少所為近俠晚益修厲詳知歷代史書語前古成敗事本末不忘作兵䇿數篇論攻守利害文詞甚壯而嫉惡鮮恕以智謀自喜負氣果勇不肯為人少下然屈之以理畏且從也曹女傳曹氏女建安郡人其父修古博學而文善議論外和內剛所至以直氣聞明道初以御史知雜事言事觸罪降工部貟外郎知興化軍明年不召夏四月疾㬥作一夕而終修古持己潔亷仰祿自足有餘則推之既死妻孥益貧殆無以奉其喪以還其屬吏民思之相與稡錢三十萬用資其歸拜酹堂下前白所以家人未及言女哭曰我先君居朝為聞人以清節自立不幸天不與年終於貶所今臨財苟得尚何面目旦夕哭泣帷中幸趣持歸無吾先君纍也吏民聞之慙罷明道二年女生之十六年先以父命配其里中人徐生未及歸而父歿云許逈傳許逈字光逺歙人也斂於五代末屬僞唐士人僞唐尤以權利輿服相夸逈獨好擊劔負氣以貧事其母不屈開寶七年王師伐金陵逈仲兄為光慶殿使分護北城逈亦以光慶殿承㫖從焉外攻急矢雨下兄被重傷戒逈曰我將死至矣汝歸慰吾親逈以身蔽之兄罵曰君親忠孝我與汝均有不可乎逈乃去明年金陵平利遷汴及兄為魏冠氏令部所部城州城有賊李潜號為强桀所過剽掠入冠氏問令在否曰令魏城下獨其弟逈在耳潜曰吾固聞許逈之為人即領徒去金惟嶽以文詞名江南逈與之善惟嶽嘗從後主弟朝京師俱留不遣當金陵平逈舉惟嶽之族歸汴惟嶽有子先因兵亂失其所之後迹知其為淝水巨盜李某所俘以為已子李日殺奪道上州縣莫能禁惟嶽泣謂逈曰吾且死則誰收之唯公為能出吾子逈時在魏徑之淝水且至果遇盜二人遮刺逈曰李家若雄豪欲殺義士無所事刃盜驚止逈前泣曰汝所俘子吾兄弟子也吾聞義者哀人之急而勇者明已以信汝豈效草問無知輩耶盜迎舍逈厚飲食之還金氏子當是時逈以節勇聞而河北大官屢欲薦之於朝逈曰能寧浮游江淮不能就刀尺間以活遂終淮上年五十八有子㑹云端明集卷三十二
