body:
  text: 端明集巻十一宋蔡襄撰制誥知秦州龍圖閤直學士何中立男景先可特授將仕郎守將作監丞制勑具官某男某以爾父輟自禁垣往帥邊服在注倚之尤重必寵數以兼優爰露奏封請任其子命丞工監之列用為侍從之華勉勵清修以永多慶范仲淹男純粹等四人授守將作監主簿制勑故資政殿學士户部尚書范某男純粹等仲淹素竭忠力勤勞王家不克永年奄爾淪逝嗟其材賢不可見已竝錄子姓逮於族親或列名京僚或試秩監省始終之典予唯不忘清白之訓爾宜自勉范仲淹親外孫賈公直試將作監主簿制勑某朕以仲淹勤勞王家忠義一節奄爾淪謝悼于予衷録其外姻試秩監省勉思所立毋忝異恩前福州錄事叅軍李守寧特授建州録事叅軍監滑州大翟村酒税前廣州司法叅軍劉汝翼特授漳州錄事叅軍監陳州南頓縣酒税制郡督郵之任蓋所以紀綱政治糾司過忒惟强明幹敏者乃可為之以汝等嘗歴諸曹復有嵗最寵以都掾之目涖于征榷之局夙夜思勉毋空厥官開封府推官屯田員外郎王礪可依前官充開封府判官尚書度支員外郎孫錫可開封推官制勑具官某等材不敏明不能決穰劇志不强果不能糾豪勢法令不通不能繩姦吏賦役不均不能恤百姓予惟京府之職嘗患四者之難故求其人以貳尹政以爾礪雅有吏資嘗叅憲職試能滋乆恢然餘裕以爾錫麗名詞館平覆刑書將歴要塗必更幹任竝佐浩繁之治且觀賛助之方服予訓言以竭忠力太常少卿新差知兗州徐起可光祿卿制勑具官某趙魏之域為天下重宿兵聚粟以鉅萬計汝起曏為使者將漕鄰部輪置金繒以濟須給嘗以陟典減從近嵗徳推朝渥乃正卿秩宰膳之寄尤為嚴近勉圖績効以稱嘉寵知撫州都官外郎李先轉職方員外郎制勑具官某爵賞之貴以馭于下凡與遷進必校勞實以爾嘗歴臺署往涖民政續移嵗筦居有功伐在法應陟予何嗇焉郎等唯三乃踐以往膺褒前進益楙勤力三司度支副使兵部員外郎曹永叔充天章閤待制知福州制永一作穎勑朕念善為維持之策者運天下如臂使指欲其大小相臨而威令必達故也東南之郡長樂都㑹表山環海地險而逺八州生聚繫乎總帥非有幹明之資能辨吾事者不可以遣具官某智力精敏應㡬必決薦更器任籍有聲稱將漕益部還貳計省而猥繁之務罔不給肅今屬以方面之重寵以延閣之華爾其繕除兵械補完城堞懷綏困窮翦遏兇猾使吾人無愁苦之嘆朝家有專倚之賴朕志惟是爾儀圖之刑部郎中充天章閤待制知慶州張昇可依前刑部郎中充龍圖閤直學士知秦州制勑侍從之臣雖出撫方面毎被美名以為光寵況内閣之重苟非耆儒厚徳或材通器任者不是與也具官某方嚴出於天性識慮成於學術向在臺省有鯁亮之稱逮臨邊圉有綏靖之略朕念冀門鉅屏羌夷雜處板户繁富軍旅屯萃今升以祕圖之職屬以隴道之事汝乆涖戎政備體忠力無復多訓尚服休命尚書都官員外郎郭申錫可侍御史制勑郭申錫御史府之職正紀綱繩愆繆外以肅官師内以獻忠讜名為清要固難其材朕尚令近臣保薦庶乎得人知雜御史擇行以爾申錫塞詔擢自郎署之列往膺柱史之任汝有鯁正之志精通之議必竭爾慮以達予聞太常博士趙琪持授尚書屯田員外郎國子博士宋詢特授尚書屯田員外郎制勑具官某國家遇官人者之意甚厚凡三嵗則比其殿最按其所當而升黜之其間雖無較然治狀之明而能廉謹自守者亦不遺也爾等監視州郡或臨縣邑計年應法用遷爾秩郎官清列推重於世咸務循勉以稱恩渥縣尉劉宗旦授錄事叅軍監酒制勑具官某汝尉于縣而能禽誅宼盜謹飭其職攸司考課當乎賞等升郡紀綱往臨榷酤自力來績以報甄錄之異也渭州新寨東頭供奉官韓周授内殿崇班制勑具官某保鄣之任刺視疆境䕶防居人幹謹其事逮夫三嵗斯亦勞矣遷與禁墀之列通聨朝著之榮䖍思茂恩以立來効内殿承制高允元授供備庫使制勑具官某祗事内廷素尚忠謹寖延嵗筦益著勞能使介之名禁墀允重特推渥澤俾進崇班勉敦夙夜之勤庶荷褒遷之寵濰州昌邑縣主簿張白授大理寺丞致仕制勑具官某向從祿仕謹身無咎今謝官政推恩惟厚讞刑之秩顯於京曹被榮而歸寵爾衰暮樞宻直學士給事中程戡可依前給事中充端明殿學士知益州制朕撫馭㝢内恃之乆安使上澤周達情不壅者蓋有賢能為予鎮守方面爾蜀道天險劍外遼絶毎委帥臣俾之專決列城側首以承教令今之借威權託腹心者無與為比其於選遣豈輕也哉具官某以文中高科以材任煩使入居憲臺而豪貴斂迹往臨藩翰而孤􅑏蒙福回翔禁近號為恭謹獻納謀議闗於機宥升榮祕殿分寄益部形勝謡俗汝嘗知之夫以刑制民畏而不戴寛恤征賦使之便安予爾賴焉爾其勉力西京左藏庫使沈惟恭可遥郡刺史依舊西京左藏庫使制勑具官某刺部之雄在克尤重今雖遥制必勲勤戚舊者然後命之以爾早由武材乆處禁職間有醻勞之舉與其滿嵗而遷申復朝恩俾司郡契益思勉茂用對寵靈故石中立親孫祖冲可試監簿制進祖文集某人惟爾祖中立嚮以文儒叅與政柄忠朴淳謹為益良厚而其淪逝之日既乆爾能纂緝遺篇削藁來上追念曩輔惻然不㤀京監開榮用顯存沒爾宜脩勵無忝茂恩太常博士王璪可屯田員外郎制勑具官某爾在邊帥幙府既以材智贊其方略又以經營儲粟備辦豐實按格所當宜有遷陟文昌郎位為仕清選用醻爾績恩澤甚茂勉務來効以答褒進樞宻院賈徳明任承睿可都承㫖制勑具官某等樞宥之府所承禀而宣行者皆禁宻之命必求謹厚之材乃可備於陪屬以爾等有恪愿之資加肅給之敏麗名機務實唯勞舊按其資歴擢總綱領勉思勤藎尚副褒寵樞宻院張繼渥可承㫖制勑某人蚤以材敏屬麗樞庭績延嵗月之勞益敦夙夜之恪進承㫖命特示寵榮祗荷恩遷愈罄誠志都官員外郎知坊州母湜可侍御史制勑具官某帝者常欲達聰明于外而與議者重於得人士大夫嘗欲獻可否於上而抱材者難於得位朕侍臣拱辰言爾湜端方有學可以備憲臺之職擢自郎署典于柱史爾以儒進當通理道之要歴更外使固知世務之本繩違正失罔戾厥中服命惟䖍益楙而志皇兄故懷州防禦使承幹可贈保靖軍節度使追封蕭國公制勑朕嘗覽前史天子之宗族有惇良之行終始顯榮者固已稱歎況予弟兄躬是賢徳存則接以恩禮歿則伸於哀禭所以勵於本支而儀于天下某官某承流慶源敏禀善性持信厚之誠而表於屬籍竭忠藎之尚而壯于藩翰天年不永奄羅殞逝臨酹傷惻特加愍贈飾以齋鉞之重躋夫公袞之列靈其不昧歆是休命皇姪孫故右屯衛大將軍世崇可贈防禦使追封侯制勑帝道尚親所以廣恩而推愛也朕於宗籍惇睦良厚其有殞奪毎加褒典具官某貴聫天屬躬蹈義訓飾行有恭靖之美嚮學有沈敏之善已叅環列入奉禁朝遽此云亡予實汝惻進扞防之使紱仍疏啓於侯封塋魂有知尚歆榮渥追官勒停人任達可濟州司馬致任制達一作逺勑某官向臨征筦之局妄加刑罰於人在法所當奪官而廢憫其老疾特示寛優方州典午之曹憲臺柱史之目率為兼命宜體厚恩崇班閤門祗候李樞可供備庫副使制勑某官獠衆弗順寇鈔嶠南州郡用兵調發饋給爾為使者循行往來按視良苦升榮禁闥就總戎鈐勉圖茂勲思對優寵前廣信軍司理叅軍王塾可衛尉寺丞制勑某官某國家邊陲之事必以兵師申其威武然儲峙食要務於流衍使者以爾勤力收斂補於漕輓升榮京寀圖厥勞効勉勵爾志以答恩渥李宗儒可内殿承制制勑具官某爾以武材往涖邊堡種落懷附斥堠甚明眷言帥臣逺形需奏特升聮於殿陛俾耀寵於塞垣勿忘欽承勉立來効葉均可大理寺丞制具官某官賞之法所以磨勵世俗旌㧞賢材然有勞而陟與累日而得者差異也爾治劇務復積嵗功於格應遷命丞理寺勉脩成業以稱寵靈齊州司法叅軍監秦州在城酒司馬京可衛尉寺丞制專筦利資以佐公上必用廉飭乃有羨贏計課應遷京曹是踐勉尚脩勵祗荷恩褒陜西轉運使范祥追官知州制勑具官某爾為使者權涖冀門建言羌酋願上土壤國家不贏尺地之得尚安逺人之歸再屬經圖務存乆静爾深陳便利堅請完修但知開劃之勤殊失預備之䇿致玆宼盜乗隙鈔攘興戎之端厥咎誰執奪去一秩典臨外州實為寛務勿忘循省右龍武軍大將軍克悚可右衛大將軍制勑帝者宗屬惟是飭愿自守其履尚固可嘉矣況乎濳心經術發揮詞業不有恩數之厚曷以勸示來者具官某植性端靖顓務詞學屢形章牘願較藝文給試禁署預列名等特遷環衛之重以醻稽古之効益思為善以對光寵供備庫副使李評可朝散大夫殿中丞祕書丞宋敏脩可太常博士守監簿楊慥可太祝奉禮郎制逐人學士試到奉聖㫖與轉官勑具官某等天下以文治而士人以詞進者為日舊矣惟爾評生於貴戚早聞善訓綴學屬文特然有立敏修暨慥世以儒聞能名其家經術益茂命試列等粲然可觀或遷殿省之聫或舉奉常之列率為恩渥勉務敦脩皇姪故左武衛大將軍常州團練使宗道可贈觀察使追封侯制勑惇睦至親故事之重褒顯令徳治道之先矧惟宗藩之亡宜有哀禭之賁具官某知為善之樂篤好學之心棣跗承上以光華麟定應時而信厚乆司環列之重遥總州兵之雄天奪厥齡予深其悼命以觀風之重徹兹書社之榮冀汝營靈歆此恩寵西京左藏庫副使帶御器甘昭吉可特授文思副使制勑具官某性質温茂材資幹明乆叅省户之嚴仍寄帳兵之信服勞益謹第課應遷優陟使聫用推朝渥勉敦爾志以永厥成狄青奏平變賊有陣前陣内使喚得力人都官員外郎鄭紓可職方員外郎右賛善大夫馮炳可授殿中丞制勑具官某等向以狂獠肆毒嶺嶠之南臨遣帥臣往殄頑兇爾等皆以材敏實從征行還上功次之條宜有遷褒之澤序升郎位擢與省丞竝為恩榮勉務修飭監簿余仲荀可太常寺太祝制勑具官某等向遣樞臣平定戎寇還上功狀之實未紀驅馳之勞爾等咸以材能嘗與軍事或進祕丘之列或升禮寺之華勉圖進修以對光寵入内東頭供奉官梁惟一可大將軍致仕制勑具官某天資粹謹材幹敏明乆叅宸内之聫此嘗任使之劇日親藥劑屢易嵗華備陳懇實之詞願解信要之職擢於環尹俾遂家居終始之榮汝其至矣大理寺丞知梅州許士廉可特授太子中舍依舊知梅州制勑具官某等百粤之壤風土異宜爾分守符實處嶠外積勞累嵗具于有司最要之凡合於遷格進陪宫寀仍涖方州祗荷寵榮勿忘省飭皇后妹仲翹新婦宜特封鉅鹿郡君制勑樞躔紀節兹乃慶辰綸渙推恩厥惟典舊矧乃后宫之戚宜推湯賦之華某挺生慶門早服柔範動靜鑒於圖史夙夜謹於紘綖嬪于宗英著厥閨則宜徹郡田之號益峻封君之榮思楙懿恭用欽寵數貴妃姝宜特封清河郡君制誕慶講辰睦姻疏寵脊惟妃位之重願推女弟之恩舊典具存明命斯允某生高華之族禀茂淑之姿從姆教而甚嚴奉閨儀而愈慎親為外戚陪嘉節之祝延地啟名邦峻封君之等數宜思優渥益荷顯榮供備庫副使王用可西京左藏庫副使内殿崇班張玉可内殿承制制勑具官某等前遣專師平定狂獠還列功次第推恩賞近因振旅引對便坐陣行分合而中法士卒擊刺而奮勇再遷使秩式承制㫖竝為旌寵宜楙忠力前兩府并兩制聖節奏弟姪京官或試監簿制慶誕之節公卿在位忭呼稱夀罔不和悦朕嘉與近侍共樂無疆恩于而家用為榮寵命爾京秩漸于官政力圖徳業母懈夙夜宰相叅政樞宻聖節奏薦子孫各京官制近以誕慶佳節惟一仁弼輔之臣奉觴以上千萬嵗夀誠懇精至詩不云乎無徳不報乃以保任之法除子孫官列于京司所以彰朕之意而登爾於士也可不楙哉樞宻院令史武世長于可乆竝内殿承制制爾等陪屬宥府幹敏著稱從征南方復主符籍以謹宻嵗年之舊加驅馳戎馬之勞積是最成宜推渥澤升聫殿陛傳奉㫖辭甄奬之華往服于命封州司理叅軍林詢被蠻賊殺害贈大理寺丞制頃者盜起南服震驚朕衆汝掾州郡遭罹非命盡忠隕首誠節可尚讞刑之秩用賁幽穸贈太尉追封永嘉郡王允迪長女左侍禁錢隆稹妻可特封郡君制慶毓嘉節率均恩渥矧惟宗藩之逝藐焉息女之愛形于薦引當列封號徹名邦之華壤厚敦族之懿典褒與之重爾宜欽奉東頭供奉官唐中和可内殿崇班制勑具官某蜀險而逺欲以知風謡情狀者必擇明曉事機之人乗驛往來以通上下之意奔走三載厥惟勞止此其還歸宜有叙進殿墀之峻朝紱之重爾宜勉力以報優奬樞宻使檢校太傅户部侍郎高若訥可尚書左丞充觀文殿學士兼翰林侍讀學士同羣牧制置使制予觀前世君臣之際進退以禮始終以義者厥惟鮮乎故予於左右承弼之人尤其慎者其有竭忠淳以謀大體者必度材器而任之均休勞以避要途者必增名數以寵之所以敦其君臣禮義之至者也具官某志尚沈靜才邵問敏博學窮邃古之逺精義達萬幾之㣲進以儒術居然國器寘於諫垣則有獻替之論列於延閣則有顧問之辨甞更外劇旋長臺憲敷納惟允聞望彌著入叅宰度遂正樞庭幄中之謀處而必中堂上之畫知無不為屢陳懇悃之言固辭宥宻之重若乃總文昌之要増祕殿之職日與金華之議兼涖天閑之政併是優寵所以示朕之眷賴而彰爾之謙退其往踐之尚體兹意端明集巻十一
