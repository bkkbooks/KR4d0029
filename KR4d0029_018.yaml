body:
  text: 端明集卷十八宋蔡襄撰奏議乞罷晏殊宰相臣等竊以宰相之職代天工斷國論鎮撫夷夏表則官師非有經綸之才廉正之德而居之者是謂失其所任然當中外多事之時苟能盡心竭力以濟公家之急縱有不逮人或恕之而敢不恤物議務營私産與細民爭利推其為心豈可相天子而率百僚也臣竊見宰臣晏殊自登樞府及為宰相首尾數年不聞竒謀異略以了國事唯務私家營置資産見于蔡河岸上託借名目射占官地蓋屋僦賃以宣借兵匠外多占外州軍人日夕苦役怨讟之言聞於道路臣等謂今年以來災孽相仍盜賊繼作內有百萬驕冗之卒而不能更其法下有億兆愁苦之人而不能寬其力盜賊屢動延及嶺南虜使交來事緒未已河決於北海兵叛於邉城觀此事勢大臣之責其過均矣然晏殊當此憂危之時恬然自安窺圖小利此於大臣中尤見其所為之謬也臣等聞唐高宗朝中書令禇遂良賤買中書譯語官地為御史彈奏貶同州刺史又聞太平興國中宰相宋謀與宣徽使張禹錫互請宫中邸第太宗皇帝鄙其不識廉恥宋謀以本官罷免二人當朝廷無事於官司有所營取尚行貶降今日中外人心憂危殊為輔相既不能了得大計又占射官地役苦軍人日趂數十錢之資情狀如此豈可尚容于廟堂也伏惟陛下以祖宗社稷之大天下生靈之重久付已為失任加之營私忘公無所愧畏臣等伏乞陛下特出英斷罷免晏殊别求賢才以救時弊取進止乞責降馮承用右臣伏見勾當御藥承用為御史臺彈奏受作坊副使勾當北園者臣竊以承用小人憑威恃勢久招物論致有抨彈固宜竄逐以示勸戒今乃優與使名兼管園囿是以罪責而遷官任使與無罪同何以示朝廷賞罰至公之道兼恐依舊出入宫禁事體不便伏乞聖㫖特降於近下官資向外監當庶協公議取進止再論馮承用王守琪右臣今月初一日伏為入內供奉官勾當御藥院馮承用轉西京作坊副使勾當北園臣為承用倚威恃勢久招物論乞降近下官資向外監當至今承用尚在京師且承用既以事責却自入內宫供奉官轉一資何以明勸戒之道臣竊聞馮承用曽受供偹庫使知磁州王守琪青馬一匹却安排侍御郭氏嫁與守琪為妻且郭氏在內中執侍之人雖得出適承用出入宮禁豈可受守琪之馬後以郭氏嫁與為妻守琪陛下之廷臣豈可交結承用敢娶郭氏瀆紊彞章中外傳聞虧損國體其王守琪馮承用各無恭畏之禮罪當誅戮乞送馮承用王守琪下御史臺根勘因依以正刑典臣備位諫官度事之有所損益者乃敢論列期於必行今承用未置刑書臣不得默默而已也乞罷陳執中參政臣伏聞制命以陳執中參知政事雖衆議喧然咸謂不當臣慮傳聞未審未敢指名奏論尋於今月二十六日夜蔡某向入劄子稍緩其事容臣等上殿奏論次日不蒙指揮是陛下以所命得人不容論列臣致均聞聖意以執中建皇儲之議以為有功故復大任也臣見前代以來人臣建皇儲文議者誠為難事或因後宫爭寵次序未分或由皇子衆多材德相逺人臣逢此時建大策力排羣議者誠為有功也真宗皇帝獨有陛下一子天下之心固自系望皇儲之立非陛下而誰但以幼年未行冊命又豈待人臣建言而後定也執中於當年上言正是窺先帝之意自圖富貴又豈為功邪伏况陛下寵遇執中擢居西府西事之始處置乖方如要排墻殺元昊使人又明降宣命令邉臣入界打虜致得元昊來攻延州覆軍殺將為國大恥皆執中之過也兼執中賦性强狠不容同列商議遂致如此敗事陛下明其有過尋已升去及任陜西又以無功而罷自專州責務嚴刻以科斂一向殘暴此固衆人共傳也才性如此豈可置之廟堂况今天下多事生民困苦天地災異中外憂惶正要任用才能之時陛中但以執中曽有建儲之言不念强狠害事任之政府此乃牽私之意安可副天下之望臣伏乞陛下追罷執中前命别用才能如以臣言為非乞行竄逐乞罷吕公綽糾察在京刑獄臣竊見吕公綽先任三司判官後因父夷簡在中書避嫌不就省職遂同判太常寺太常寺舊無同判之名為公綽特置名目近聞本寺失去編鐘四百有餘為寺中執役之人盜賣公綽主判理合坐罪却差糾察在京刑獄臣竊見宗正寺曽因失物主判趙良規坐罪出補外任况兹樂器人主郊天祀廟㑹朝崇禮之器豈容竊去而主判之官並不問罪又遷升糾察刑獄之任顯是公綽明知本寺失鐘事重輒求解罷要作去官若以前因避嫌自夷簡罷相公綽却合入三司判官若以在館嵗月頗深見在資歷深如公綽者不少近曽因父罷相賜紫又授修撰為臣寮論列尋巳罷去今轉更僥求足驗全無廉恥其吕公綽失鐘之罪伏乞朝廷推至公之典劾正其罪依趙良規例施行所有糾察在京刑獄敕書伏乞追寢再論吕公綽右臣近為吕公綽同判太常寺失去樂鐘至多並不問罪却除糾察在京刑獄臣伏劾正其罪依趙良規例施行所有糾察敕書亦乞追寢未蒙朝廷施行臣待罪諫官所言悉皆公論如吕公綽其父夷簡執政之日公綽倚勢賣權欲施一恩則預作因緣欲行一事則先露風㫖若以外人所議直是貨賂交通為宰相之子而暗擅威福之名著貪婪之迹為陛下之臣豈復有恭畏之心乎操履若斯豈臣過論况夷簡作相日久舊恩遍滿朝中或欲屈法以芘公綽之愆或欲遷官以酬夷簡之惠伏惟陛下持大公之柄宰天下之平示公綽均于百官何以恣其僥幸若朝廷以公綽失鐘之罪為輕其糾察在京刑獄之任即與追寢别與閒慢差遣若公綽不合陳論乞加妄言之罪使天下知是非有歸不可空已也乞罷魏兼館職臣風聞前淮南轉運使魏兼先自兩浙安撫回來以有㫖候令任滿之日與直史館者臣竊見前來遣安撫使諸路巡察惟魏兼最為狼籍是時杭越蘇秀諸州旱潦連年疫癘相屬富者疾疫貧者流亡哭聲震野餓尸橫路魏兼専銜恩命往布德音不能悉心撫恤以副陛下焦勞之念輒敢恣情晏樂以斂百姓脂膏至蘇州留止三日窮徹晝夜歌樂娛遊本州盡驅饑民藏于祠廟三日拘束飲食無得殍死多隔年論旱詞狀一程至吳江方得收覽諸州望風悉遣妓樂隔州迎候睦州送至桐廬至有樂人溺死蘇州民謡刋板傳誦臣略得兩句云繞梁歌妓唱動地饑民哭杭州刻安撫夜飲圖賣於都市醜聲惡語傳於道路緣魏兼與宰臣章得象晏殊並是親戚當時無人疏兼罪狀請加誅以謝吳人不惟苟免過尤仍有館職之命伏以賞罰之柄國之大經今無功而行賞已可痛心况以罪而加賞乎上下蔽蒙紀綱隳壞靡不由此魏兼上無畏法之心而下無恤民之意縱有任使焉肯盡忠所有館職之命伏乞寢罷或降與小郡以厲後人乞責罰醫官臣竊見近寶和光公主及公主相繼天殤供藥醫官已聞下開封府取勘者臣切知豫王鄂王薨時醫官亦是取勘只降一兩官未旬月間尋得牽復切慮今來亦只似此行遣久逺不便况近來小兒醫官不一二年超升官資賞賜無數奏薦異姓恩澤過于兩制臣僚賤者立貴貧者立富若以生死有命藥餌難工自來所醫疾病盡是當痊愈此等何故濫受恩賞恣為僥幸若以從來痊愈因藥合受恩賞今日所醫無驗自當伏就刑罰臣竊聞先朝周王薨其時醫官李某杖配廣南陛下一二年間皇子皇女繼亡六人盡在此輩數人之手兼臣聞醫官各是臨病互相推托不肯及時下藥以致病深雖有良醫無由措手其罪至重比於李某合更加刑其術至謬求之今人不為難得伏望陛下念祖宗社稷之重特因此時深行刑罰庶使後人知懼藥餌盡心實為久逺保育皇嗣之計乞商稅院不用贓吏右臣伏見在京倉場庫務有係舉官監當去處近年多是大臣之家陳乞子弟監當就便勾當家務臣竊以外州軍場務錢數三萬貫以上及茶鹽轉般倉等並是舉官監當蓋朝廷以官物出入必在擇人今京師倉場庫務受納天下所輸之物招來四方商賈之資計利最多號為繁重却陳乞監臨未為便允臣非謂大臣子弟例皆不肖蓋守官者憑恃勢要不肯盡心監司者護惜顔情不能糾劾不如泊場布庫在藏庫等處侵欺盜竊相繼敗露其餘損壞官物不可勝數今陛下或無名費及千緡有司必以為不可至於監當損壞官物監當萬計因循不問大可怪也竊見李夀明監商稅院為無名收稅非理勾追市肆之間號為搔擾三司不時糾舉却止出榜曉示本家懼見彰露乞降除近郡通判既有見闕三司依例舉官朝廷却除陳執禮監當臣竊聞陳執禮先曽犯贓追停今來為王欽若家先曽陳乞便與填闕况都商稅京師商賈出入所收謂利萬數不少贓汙之吏豈堪其任臣乞下三司詳定若于倉場庫務合係舉官監當所舉之官並委三司舉曽厯外任無贓汙之人更不在臣寮陳乞之限若一任內有犯入已贓乞坐所舉之人竝與同罪施行所貴局務得人不至枉壞官物其陳執禮亦乞别與差遣乞用韓琦范仲淹臣伏見去年已來陛下拔任諫官都下翕然稱慶又數日罷夏竦樞密使用韓琦范仲淹作樞密副使制命一出士大夫賀于朝庶人喜于路至有飲酒叫號以為樂者謂陛下去邪任忠可刻日以觀太平矣臣聞易泰之彖詞曰內君子而外小人君子道長小人道消否之彖詞曰內小人而外君子小人道長君子道消然則君子進則天下泰小人進則天下否陛下退一邪臣進一賢人而舉國歡欣者豈以一邪一賢獨能關天下利害乎蓋以一邪退則其類退一賢進則其類進衆邪並退而衆賢並進而天下不泰者無有也雖然臣竊憂之頃年莊獻明肅太后初棄六宫陛下親臨庶政一日出令邪臣沮氣天下觀聽灑然快意期于一變以臻大治自後數年內方無事左右之臣易於襲常而恬於苟安陛下憂勤之心且亦少懈已而西羌背違舉兵寇邉遣將興師屢戰屢敗饋運賦斂百姓困窮北人乘勢窺我强弱遣使求地京師震駭幸而增賂以得暫息四海嗷嗷日憂一日以將來之患當何如也然猶惜忠賢之士而屬望焉幸而進用庶其叶力而大有為以解焦勞之急陛下奮發剛斷博采物論拔而任之人人歡欣而臣獨竊憂者誠恐進用之後或有讒間或拘舊例使之不盡所長而去則天下必有遺材之恨所損不細矣當今天下之病臣請譬諸病者其安時調養適宜固不病矣病在皮膚醫者能早去之病且安矣此二者皆巳不及而病在支體若得良醫之時陛下又選任良醫儻信任不疑聽其施設非徒愈病又致民於夀若於此時使良醫不得盡其術則天下之病深雖有和扁之妙難責速效矣願陛下思祖宗社稷之重矜四海生民之困憤西北二虜之恥發乾剛夬决之道拔賢材收衆䇿不憚改作以成大功天下幸甚幸甚臣昧死再拜謹上端明集卷十八
