body:
  text: 端明集卷十九宋蔡襄撰奏議論趙元昊狂僭之計趙元昊棄其祖父盟約妄為狂狡僭稱大號不臣之迹彰著朝廷大增邉偹議者皆謂元昊遣人入朝不從其所請必寇邉郡以肆狂心臣竊謂不然戎狄之心見利則動若元昊欲寇邉當去年未僃之時舉衆而來勢或難禦於其時尚不入寇今乃先自狂悖待我邉之皆有禦然後入寇或有何利臣竊料元昊本無寇邉之心但張聲勢欲求中國嵗與貨財耳論地形勝負論者或以西虜之俗善騎射習戰鬭以為非北人之比臣竊謂過也大凡騎軍利平地步卒利險隘得地形之利者勝勢常多趙魏之地千里無關塞之險虜善騎射故勝勢多在彼也今西邉之地自鄜延環慶涇原沿邉三路皆是山險要塞之處此乃步卒之地非騎車之利若以其俗善騎射樂戰鬭則不減北人若論步騎之利則地勢異矣故勝勢常在我也論敵騎强弱臣聞景德中契丹大舉攻瀛州經二十日不破而彼衆死傷者數萬人南略趙魏之境所攻下者唯通利德清兩軍而已以北人之强舉國而來又趙魏之地無險隘之阻尚不能必取中國州郡况趙元昊以數郡之卒入險阻之地頓於堅城之下豈能必勝哉故元昊當無偹之時不敢伺隙而來但遣使人妄設尊名以搖朝廷之心幸朝廷怯其勢而聽其請此乃元昊狡心能計利害之深者也為國家計者當知其不足懼但審察情僞審於處置則狡謀自破矣料元昊擾邉境或問元昊既無來寇之心今者遣使人入朝不得如其所請元昊之計其將安出臣竊謂趙元昊必自度邉塞險固難于進攻若大舉甲兵既一敗衄則窮蹙之勢日見坐為中國擒也但必時以輕騎偏軍往來邉地鈔略蕃部若此不已是中國邉郡之兵不可一日罷去年嵗之間嵗月之久運芻粟完城寨關中勢當疲擾此虜常佚而我常勞利害可明也臣故謂今來必不大舉兵用偏師鈔擾邉境者此也乞通和之後早計費用自趙元昊狂悖以來朝廷日日發關東兵馬以為邉郡守僃然㳂邉州軍自來只約見在人馬芻粟為一二嵗計今者增兵與馬比舊必多數倍至於饋運芻粟轉輦兵甲修葺城塞燕犒給賜之費日以益廣若終一嵗而計之其費用之物大率必倍多於每嵗既邉兵未有罷期則其費愈多臣恐年嵗之後必有議者建白請賜元昊金帛與之通和者臣謂此謀非國家長久之計也若元昊削去尊號臣禮如舊朝廷但赦其罪亦不當大與金帛與之金帛是為狂悖而得之况元昊豈肯削去稱號何名而賜之金帛與之通和哉國家遺北人其費不少若更與西虜通和使北人窺中國之强弱而啓其狡心非細事也臣謂朝廷將來罷通和之議莫若早計度減損費用之物苟費用不減於舊日則何以持久而制狂虜也論減費用臣竊見正月以來發兵馬赴㳂邉州郡皆全軍而往未嘗精擇夫全軍而往必有老者武藝不精者此等兵卒皆不可用又邉郡之地多處山險而軍中之馬有老病瘦瘠不堪驅逐者亦隨軍而往若有戰鬬亦不可用也况㳂邉如鄜延等山路阻險饋運雖今日中糴糧草皆是本處居民積聚之餘若一嵗之後必須外州輦運苟非擔負不可得至是以不可用之軍馬坐費難致之芻粟臣欲乞令邉郡帥臣於已至兵馬中選武藝精者及馬之强者留之其兵卒老弱者武藝不精者及馬之老病瘦瘠不堪驅逐者皆遣至近裏州軍或罷歸之所貴便於供給夫兵精馬强以戰則力倍自然臨邉之郡糧儲可節也乞置鄉兵或曰練兵擇馬誠省邉郡之糧饋其足以持久乎曰若欲為持久計者莫若增置鄉兵有唐之制天下州郡募百姓為府兵府不過一千二百人外折衝果毅府五百七十四而籍名於官不離其鄉里農隙教習武藝其餘時則居家有警急則集而守僃今若置之不費國家之用足為天下根本矣臣竊謂關中今若召募一年之間可致五十萬人一年教習足以守偹則關中之勢巳强矣或曰今募鄉兵則關中騷動如何曰府兵不黥其靣又立名目若折衝果毅之類與兵卒不同擇其鄉里豪武者為總領乘農間則教習有警急則守城不離其居不妨其業則百姓為之何所苦也若然必有置之術頃年靈武困兵陜西般運糧草最為勞敝至今老人耳目相接往往皆能言之若先下陜西計度轉運糧草往邉次下募兵之制應家充鄉兵特免運般如是應募者衆矣或曰兵散在野則如何曰開元之前不聞府兵為亂者蓋其勢分犬牙相持雖久不為患矣臣今略陳其大槩國家儻行之乞下臣詳議條目乞擇涇原邠寧兩路帥臣臣竊見唐太宗德宗朝吐蕃屢侵邉境是時帝在長安勢大力衆大臣如郭子儀李抱玉渾瑊繼總大兵已鎮近畿猶命馬璘李元諒守涇州張獻甫楊朝李晟守邠州郝玭守渭州分扞虜勢是邠涇兩路自古為西虜之扼而長安之所恃以為屏蔽也今之事勢與唐不侔而涇原邠寧朝廷命帥雖以永興延州二帥遙領西路安撫之名萬一邉郡有警豈能遙制事機應變以破虜乎臣請邠涇二路當擇帥臣使其勢若鄜延環慶之重勵兵訓卒待虜之至而破之此制勝之術也乞立邉帥等威臣聞主兵者權不分則威立威立則令行令行欲上下順從無敢違悖乃可使之赴敵也唐肅宗遣郭子儀李光弼率九節度之兵討安慶緒但魚朝恩為監軍而不置統帥兵權不一議謀不同故無成功也臣切見㳂邉都部署鈐轄都監等官品雖有高下其實無所統至於論議兵事各出意見主將不能自决此權分而將不重將不重則令不行也又見帥臣所統之官若巡檢寨主等請見主帥率用賔客之禮豈有軍中而無等級也臣欲乞自鈐轄而上於主帥皆當用參佐闕五字於主帥合闕十五字乞依附階級條立新制所貴兵權一將威立然後可以制敵也論不利攻戰或曰前所陳㳂邉地形之勢勝在我其利出攻乎曰出攻未見其利也何則我雖有地形之勝而西虜之地亦多險隘是皆地有利但為客者敗多而為主者勝多耳今若興兵出攻且西虜地無水草又飛芻挽粟﨑嶇山谷虜必深遁逺去我若進攻虜必遣兵依險設伏絶我糧道進則不得攻止則糧不給退則必有掩襲之兵此出攻其利少也或曰既不可出攻又不可通和但增兵守邉繁費轉多虜何時可破乎曰若邉郡帥臣能設計謀誘之使其來侵而敗之然後元昊可得而制也此最為上䇿論契丹遣使之意契丹舉兵征元昊以助中國仍責以劫略之罪或曰二國互相疑二勢不兩雄必有釁隙臣謂契丹與元昊久矣親好元昊為中國邉患若與契丹結隙則腹背受敵元昊黠賊豈有如此失䇿假使契丹凌辱百端元昊亦卑屈而就之必無目下結隙之理契丹今日之謀主於自邀通和之功耳論絶元昊通和其終亦戰契丹既請中國與元昊絶和既而必以元昊歸順又請中國與元昊通和度中國必不能拒之既和之後闕馬皆當鴈門之北頓而不解遣使一賀如何闕遺金帛則曰犒軍之資也或求嵗與之或請通和朝廷何以給之既非言詞理道可論是非直以兵勢相臨必戰而後巳臣謂從契丹之請亦戰不從亦戰乞拒契丹之請契丹今以兵助中國討元昊僞為善意朝廷若不從其請契丹必以為詞又駐兵雲州正當鴈門之路或便盟好即為邉患河東河北必為大僃或曰契丹今在雲中只是帳下兵馬不曽㸃集他部非必大舉臣謂元衡歸既得此事端傳檄而起不踰月而大合豈得不為害哉患在目前若拒契丹則當速為偹乞拒元昊之和元昊非久必有使來若更有所求而因而絶之若無所求奉正朔正名分貢方物相續而至朝廷以何事拒之若以契丹之故而拒之相次乂以契丹之故招與之和元昊中國之言足為信今既絶和元昊必以重兵宿麟府之間既防契丹又窺河東以輕兵出陜西㳂邉州郡朝廷不敢輕移陜西兵馬河東一路不增兵則不可以守增兵則糧運難繼不戰已困况乘時觀隙奔突難防非細故也論拒二敵皆為邉患或曰今拒二敵皆為邉患何以處之臣謂校輕重之勢執理道之直者行之然㳂邉兵須偹然契丹一舉我軍未能决勝則人心搖動中國之勢十去五六况元昊之和未决契丹以兵脅之二虜通謀元昊當陜西契丹當河北合兵而出河東則中國所僃者衆而兵勢分此天下至危之勢也乞大為邉僃之要或曰契丹事宜如此朝廷應添兵副擇將可以禦之臣謂不然不去其弊不求其要兵多益分危事也臣所謂求其要者一曰變軍法二曰委兵柄於必戰之人三曰擇偏禆於行陳四曰去無用之兵五曰分守兵與應兵為首尾救援之勢六曰擇要害郡縣之官六者既修然後可言邉僃若因循舊弊未見可勝之期此方今至急之務也端明集卷十九
