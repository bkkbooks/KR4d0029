body:
  text: 端明集卷二十七宋蔡襄撰書上運使王殿院書某謹齊沐裁書再拜獻於運使殿院執事某嘗讀書識其語曰克明峻德又曰后非賢罔乂是知君人者用賢如左右手也又聞仲尼攝魯相喜見於色曰吾喜斯民之得吾也伊尹居畎畝湯三聘之然後幡然曰曷若使是君為堯舜之君斯民為堯舜之民與又知聖賢求道不為已吝明白疏暢翼時君之政化剔愚民之耳目盡力而後已也又聞周公待白屋之士一沐三握髮一飯三吐哺又知職設兹多無有巨細必在賢者是雖有聖賢之材處崇髙之位一良木不能成林藪一龍駒不能備驂服廣求其合同聲呼報以成厥功夫如是則君臣相須之道一不可去明矣中古之世諸侯有地以自保繼承不息治而反亂乎耳嬴秦一天下而為家罷侯置守賦征畢入王帑漢晉而下悉案前武故至於今方地百里為之尹百里之民賦稅徭役之輕重訴訟爭競之是非咸得決之於尹數尹之地為之牧以盡統其屬尹之政彼有所失及其事之大者皆決之於牧是牧之政亦以重矣然慮乎提封廣而員吏多牧尹時有弗明天髙靡聞日不陳於上前奈何盤寃憤於人人之臆於是條天下之郡分命使以按察之牧尹之政有所得失執事之務有所廢興人民之情有所曲直使皆得振舉而與奪之則是使之寄又愈重也使之命難於任人者必矣七閩之地南逺宫庭三千餘里邊江海而圍山嶽土地磽確所居之地家戶聯密有欲耕而無尺土者有畜積踰年即為陶朱猗頓之富者何哉昔者僭王相繼竟取良民膏腴之田以入浮屠氏國朝以來因而不改故學浮屠者絶無徭役第食不乏而衣有餘耳人惡焦苦而竟樂為之版籍何處不因而減之乎矧又諜訴倥偬與民爭利故財屢屈而人愈貧也加以建安之郡延平之壤或收羅茗荈或管𣙜酤齊福唐南直數州煮浪以鹹鹺國家念邊儲巨費是三者利悉入公溫陵臨漳莆陽三郡之民嵗輸鏹以稅其費窮民妻孥無營不能緘口待絶所謂利悉入公夫三者出於已者薄而獲於人者豐雖焦手於猛火殘肌於白刃必冒熱當鋒而進故強宗右姓力於兼並遊手惰農因之以流蕩然後丹筆不及乾郵牒不及息者由來尚矣必使當其人則列郡有準繩下民知教勸於是寬猛得中物遂其所今執事銜天子命而來七閩之人素仰執事德望威名莫不謂執事可以目注口授春和秋肅不俟期月而罔有不利也某竊謂俾列郡有準繩人民知教勸寬猛得中物遂其所在今日矣然封圻僻在軒車罕至之地萌庶之細微者不得自振又宜擇屬吏而委任之屬吏既多則真偽得無相蒙哉有昏鈍而柔懦若能仁者有貪墨而諂媚若能恭者有簡傲而惡倔若能忠者有别白而私徇若能斷者有行加乎人而衆毁之者有明智而力不足者執事又宜黑白清濁以詳之也進之可退之否激昻士流宣贊風美則執事之化無不至屬吏之志有所伸某所謂君人者宜用賢賢人宜輔君化民又宜求其類之者為之助亦在兹矣此蓋執事之所素知而能行者也豈復假某陳熟之言重復而陳於執事之前耶然某亦占一數於吏也奈何性鈍識鄙不足當吏之賢者必矣然其可念者家世無顯榮幼而從學齠齕之嵗偶能習詩賦既而孜孜刻志臨文自省不陷邪説於師道久廢之世自強不息年甫十五再求舉於鄊里皆不利用前嵗間攜幼弟徒步西上艱難困厄僑舉王府偶先多士未幾得就吏祿佐幕偏州實二郡政大之則生殺鞭掠之權小之則勾稽簿領之務皆所參畫而職掌之也以某播迹窮閻心靈局隘當此委任亦以難矣敢不兢戰晝研夕味益其尚短究其未眀旁摉逺探期於有得然後知從政之術無他也必先本諸先聖人之道也憲綱雖密參酌而用之者在乎人折獄必先本其情幹局必預防其弊正其心以臨下盡其心以率職如是者亦以期年矣然才薄位下固未能振發綱領宣暢王化但求內無愧於心外無怍于人而巳其如有所可憂者亦能自料之賦受愚直不能取容於人在已上者有所枉道則咨之在已列者有所罔心則評之在已下者有所干犯則懲之介介而行一無所屈故知獲譽必少而得謗必多也今遇執事使此一方察郡以來將及半載所謂目注口授春和秋肅誠哉吏之不肖者必黜賢者必升政之弛者必張成者必奬列郡畏服不俟一二提振皆以改革勢若建瓴某既在屬吏之列遇執事明白若是倘或緘其誠而不吐鈞是流而偕進則執事以某為何人哉今雖覼縷於座下亦非有所冀私恩而垂曲芘也所以勤勤者但不知量於吾道也每念周漢之際由其臣之文章事業使後世知其時之治亂廢興也至於唐室全盛餘三百年今之推其知道能文者數公耳逮於我朝能以文章為已任提挽黨類恢宏詞於天表挹清醇於筆下煥赫洋溢流於無窮若執事先君子者幾何人哉而位未躋於台輔功不遍於寰區人到於今惜之得非臧孫有後畢萬必大是生執事以翊王道况今天子仁聖逺夷懷柔戈甲生蠧粉農桑竭地脈政教流行罔知帝力執事豈特享富貴足志氣而已耶亦將有以羽翼明主康濟斯民也某又豈特苟芻豢保妻孥而已耶亦將有以驅䇿駑鈍黽勉展效也惟吾君克明峻德求賢共乂豈宜晚用執事也執事喜斯民之得吾也使君為堯舜之君民為堯舜之民職設無有巨細必在賢者又豈宜不竭衷於吾君而求其類之者同聲呼報以成厥功也執事一朝曳履巖廊恢張先德崇大邦基不取於人則已將取人則在乎熟其學行飽其聲猷然後用之而無疑也某今日為屬吏是亦親而且邇也可以察而知之也苟不受知於左右則他日之望必疏矣願執事熟思之譬諸立明堂焉大之為棟梁小之為欂櫨榱桷俾其髙下各得其所則我朝文物聲名日益乎鬱茂禮樂刑政日益乎修舉惟吾君髙出於古之能為君者執事一無屈於古之能為臣者豈不盛與儻執事不罪其愚針其過使革之賜之教使遵之長育以成其材使可就用必出於門下也幸甚幸甚干瀆威眀不勝愧汗察之憐之在執事而已矣不宣某再拜答謝景山書某頓首景山足下憂中辱示新文數十篇其缺八十二字山好稱闕杜筆語於人今而日既師其意又師其辭何患且嗜退之文辭欲誘人同所樂也其謂由道而學文道至焉文亦至焉由文而之道困於道者多矣是故道為文之本文為道之用與其誘人於文孰若誘人於道之先也景山前書主文辭而言故有是云某豈敢鄙文詞哉顧事有先後耳某之為文無能過人其句讀髙下時亦類乎古人無足怪也又病景山嗟世人之不知已務以文詞求於有位今而曰吾以文求正於有位於道為無枉古之人重其自進我仕且困墜求知於人無愧又云有數頃田必歸耕海上景山何樂於自進而勇於自退乎是未離乎躁也妄者易進而難退狷者難進而易退妄與狷君子皆不由也君子之於進退唯其道而已矣景山又多取前世重人自進為比苟有異於某之説雖前世重人某不從矣其稱仲尼佛肸召而欲往孟子不遇於魯侯斯二者何求哉委乎天而待用者也又病景山恤仕宦之顛躓今而曰非恤美仕之未得憤意外之橫辱斯亦景山未之思與夫聖人之言吾畏之賢者之規吾愧之有人加言於我吾置其喜怒而辨其枉直使其言蹈乎聖人賢者之説吾畏而且愧焉其言異於是吾將憫之豈暇受而為辱乎小人之辱君子不辱也景山取之哉取之哉抑憤之心日益損缺三字又云若使某年四十而卑辱未必能如已之恬然不苟也某又復而讀之益悲豈行已之謬與如景山且不能見信尚何望於衆人雖然某無求信於人自信甚明身之窮泰不得而知之為學逺近力窮則已其所自信者不却行而利動也今日視前日猶能樂其所是而恨其所不至使年益加而慮益廣豈肯舍所樂而從所恨哉與景山别久思一相見以道所懷今雖諄諄其詞非求勝於景山蓋陳已之所守抑未知景山以為非是也誠以為非是幸亦語焉某不敢憚煩於屢告也不宣某頓首上再答謝景山書某啓去年得景山新文心竊喜慕且某與景山逰最舊其有疑者不敢自默因而往告焉景山始未之從又往告焉今再辱書復説勤辨將有以開發愚陋然某前者所論罔不盡心景山自取舍之某不能移也於其間取一二事以自辨焉夫辨道莫若言傳言莫若文言者道之所由而文者言之所存道充乎中造次而言無有不極於文也其道餒焉而其文雖工終亦莫之至也某前書云由道而學文道至焉文亦至焉由文而之道困於道者多矣此所謂學者先於學道而後於學文耳而景山謂六經之道皆由文而後明未聞先由文而失道者景山離前書之意而言固不異其所歸復而從之則通矣景山又云某前所論書傳示於人恐醇識君子以某為取友之短售巳之長而取名也誠得世人人皆醇識君子宜不以是過某也且一言之發終莫之禦况為文詞其傳固宜景山示某之書已傳於人也而某之文獨安能止衆人之無傳焉夫道至大也至公也以其至大也故學者莫能悉其要於是異見偏説興焉君子畏道之不明然後是是而非非以其至公也君子是是而非非咸一於至當不得私而讓焉栁子厚於韓退之其友也子厚論史事辭意甚嚴張籍於退之師弟子也亦譏其駮雜子厚與籍豈欲暴其師友之失而自取勝乎以道有所明不得私而讓其師友也其書傳於今人莫或非之劉歆之於父向也論春秋義率多異同歆漢名儒又豈欲前其父乎以道有所明雖其父不得私而讓焉其書亦傳於今莫或非之伊尹陳訓戒於君太甲教告切深其自稱功德無與為大伊尹聖人之徒又豈欲昭其君之所昧而耀已乎以道有所明雖其君不得私而讓焉其書仲尼取之以為世法無有疑也弟子於其師子於其父臣於其君不自嫌於不讓而辨之惟道故也故其師也父也君也亦惟道之恤聞其不讓而辨之必以為當然况朋友之切劘規誨理固然矣春秋之法為親者尊者賢者諱其惡傳曰惡訐以為直皆謂不暴於人之隱匿耳若夫論義曲直必章章然大辨以傳於世豈比家人溫寒勞苦語言務相承取而已哉然景山曾不是慮而謂某售已之長以取名何哉名吾者誰於何而售取名於賢者賢者進人以德不進人以名取名於庸人庸人足名吾哉某不置心於名也且久况期售乎古君子之於人一有賢巳從而學焉一有未至從而告焉學焉者欲人之速至也告焉者欲人之速賢也朋友道衰人務自髙讀書指古人姓名咿嚘稱慕以不見為恨使其人同世而處莫肯公其是非而相推先以道義嗚呼欲朋友之義存而道之興也不亦難乎某以是於景山勤而不已自謂於朋友之義為得而速望於景山者今反過疑於某非敢聞命景山文日益髙某之深慮至乎至也不宣某頓首上上龎端公書閏四月日具官蔡某謹遣公僕獻書於端公執事間者某取孥江南會執事受詔還臺嘗獲承顔坐隅執事以某閩人又素官于閩與之言老儒茅知至及泉南臨漳莆陽三郡稅丁事頗自嗟邑蓋將歸而為上言者某竊思自謂執事美實副於大名不為常俗之為夫俗吏狃祿食矯聲譽計已之利而忘民之勤苟安三年幸而代歸視舊所涖之地之民若踵迹之遺豈皇反顧哉使主澤不宣時弊不改職此之由也而執事視三郡之民有失職者少選必念非恤隱之厚其孰能若是乎及來京師乃知茅君先時朝廷用執事之請以助教官寵之某每以茅君之德宜享束帛之聘亦既寵已不應復論惟身丁之稅宜有聞而未聞何也豈執事嘗言之而某逺賤不得知之與將未嘗言之姑有待與抑亦遂棄之而都不記録與其巳嘗言而行之也則某不獨慶三郡之民之受大賜而慶本朝力太平而粹王道也其未嘗言之而姑有待也則凡事過久易於因循重于建白今兹惟時其遂棄之而都不記録也則執事非宜得此望於人矣昔者五代之季羣豪列壤連兵恣欲國用不給故無名之稅興焉民不相聊天祚真主方內一統人人自謂再生歡欣順命無待威震蓋欲去向者之苦而蒙今者之福謂何其三郡之人引領佇望四五十年未之或省意者建議者之不明而吾君吾相未悉聞之耳聞之豈不為之動心哉南方地狹榖鮮又浮海通商錢散不聚丁男日傭不過四五十文身丁之直嵗率三百衣食之餘終年不能足之必僦産子不幸而疾闕嵗旱而力不售與掌輸之官弗嚴而有遺失之闕願無他營死焉耳矣力能扶持老弱流冗他郡自非勝䇿而又名書不減害延乎司里者其哀勞之狀不可盡數先朝時詔書特免江浙諸身丁錢以貫計者五十餘萬斯時七閩有不材使以謂詔書所免者身丁錢耳三郡身丁之輸者斗斛也非在免中不能舉而覆奏故先皇帝育物之仁均而有遺豈不恨哉伏念主上聖神慈愛設或一日推烈考之遺仁鞠一方之捐瘠無亦禆大化之萬一乎誠未欲盡免固宜闕貧民之無田業者與無貨財之為商賈者分别闕深為之防使貧富判異而人全其生此急務也文王為政先于鰥寡孤獨若先免貧民無害於國力大封也願執事懇至陳之庶乎必行執事以言用天下之所望者本無大體也而某徒言其近者亦跬步之發焉伏惟財察不宣某再拜答王太祝書七月十五日新授西京留守推官蔡某頓首白太祝王君足下前數日幸辱肯臨後二日又惠書纍紙何意勤眷之厚殊甚如此僕資性椎鈍不識他伎綴文績學以植厥中雖渾渾乎進而不畫逾久益逺不知何時至且成也足下過聽一至吾廬遽以道義滋益為謀非欲善之速孰肯為此謀之賢明猶將斂袵避席如僕之固陋適邅回而不敢承足下之賜也然足下謂速得話言以詔之無以世胄願我此豈得不自辨而巳乎商周而上開設庠學以教胄子合考其能施於民上故材必育成而賞不虛授也秦漢以還侯王世襲其大臣宿政有父任之科有家調之澤咸得與政而庠學之設名存實亡非如古者之必計其能也故右姓子弟出襁抱而享貴爵一日用畢願學與不學在其志耳乃有自甘淪敗不圖樹立蠧美材而辜厚賞誠可嗟憤至於道義砥焉惟能者之所存非有布衣紈袴之異而彼輕此重也處約者慮深意滿者志肆慮深故能圖樹立志肆故善甘淪敗雖常人之情未足為賢材議然由此而立由此而敗者豈少哉足下家故相旌躬為善官退託窮約好學樂聞樹立於斯時也有日矣僕何敢置長短於鄙心也窮通不實於中毁譽必至於外而足下惜僕仕宦之未達而自歎名譽之不彰此宜僕與足下皆不得怵其心者蓋非我營者吾不能知也如何如何窮居多故不時前謝具舟旦夕東下必造門為别不宣某頓首白寄尹師魯書某頓首上師魯十二兄去年春平涼之役官軍失利師魯時為經略判官兵事始末宜得其詳若耿傅者忠死而毀尤可哀也初朝廷褒傅以諫議大夫而官其五子於是浮謗興焉謂傅迫諸將進軍以敗行賞過厚某竊以謂諸將多大官而進退之令宜有所從出傅之官微僅為其部督運糧饋於勢安能制迫諸將哉借使與謀於其死也不猶愈於臨危苟免保寵自安者乎然談者籍籍徒以私智稱度無所據依莫之闢也乃謁告還家造辭參政朝公方以西事為念稱歎沒者之忠節因言耿傅始以書勸諸將勿輕進兵擇利而動諸將之議不一遂戰而沒某乃以傅之所以死者明白無疑也道中作耿諫議傳報書一通寓于歐陽永叔比某歸京師則見者多矣是非或參焉然某所以云云者非特弭傅之謗抑亦為忠義唱也雖羣非無愧况有是焉者耶近聞師魯著辨誣憫忠二文其辨誣一篇為傳發也雖未得其書以觀而推迹其名之所謂從可知巳或曰師魯於耿傅同事西鄙相得甚厚不應作文以辨蓋類夫私與者某對曰誠而無私君子之志也以嫌為避硜硜者之為也誠而無私也者不以親疏置於其間惟其公而巳矣以其相得之厚嫌而避之反乃私也且疏者不知而知者不言則死者之志於何而明哉或者遂解師魯居憂河南時某為留守從事始識耿君其為人材智勇敢固已推重若夫道義則交漸劘之今者惟義之恤而死焉不避某以是自疚於知耿君之為未至也嗟乎體節殊處適以招毁甚哉世人莫肯樹夫善也唐安祿山之亂顔杲卿陷賊支解中橋至死罵不休而小説者以杲卿前已向賊既而悔之就令杲卿始嚮而終悔何為仇賊之堅如此萬萬無是杲卿忠烈貫于幽明而垂之無窮而好事者忍加誣之亦何種人也觀古人之遭誣常為之痛憤以親識其人而審其故得不為之動心也頃見師魯為耿君作其先君墓銘其祖蓋亦死國者今録其傳以往願增補之並辨誣篇還以為貺幸甚幸甚不宣某再拜答趙內翰書某再拜叔平內翰七丈足下伏蒙示下衆薦黃晞奏草晞閩人與之遊甚久以書自喜不苟於人誠髙世懷道之士足下薦之於朝庶乎盛時無有遺材足下之存心不特為晞發也然其奏曰石介在國子監時請晞表率生徒晞以介詐善不直為事非是遂拒之弗往乃晞之先見知人識慮髙逺也某以謂斥介而引晞意所未喻介好論議當時人物故衆毁叢至原其所以為心欲君側無姦邪人人為忠孝百姓無疚苦教化明白信周公孔子之言謂太平可立致而不度世務行之難易此介之所以修誠立節之大略也所抵牾者夏竦黨輩耳一旦介去朝姦人巧偽百端構造謗毁必欲赤其族然後快意賴天子聖明辨是非故介久而自白嗟乎謂介詐善何也夫詐善者將圖富貴取名譽也介生不免寒餓而死幾斫棺子孫流離詐善者固如是耶守已見信道而不顧世俗者伯夷叔齊是也死且數百年孔子稱之其論遂定若介信道而守死者也其亦有待於後世乎昔介之存某以同年進士兄事而友之自介之亡未見有如介之自信者介復生當師事之不敢以苟容無所自立為責况敢毁之晞避介聘為學正不肯為介下耳此特小小者豈足為晞髙識逺慮哉足下與介疏知之不至然天下公議固當有聞足下語論衆所瞻望詎可雷同今毁介之人滿朝使某箝口固不為少雖開口明介介豈遂明然賣死友以合權此某所不為而足下所見知之者也近為寒氣薄中日再食粥者矣奉教不知疲憊感歎顛倒不宣某再拜上集賢相公書十二月十七日某再拜上書集賢相公閣下伏自閣下入總台衡天下慰慶况素辱公知遇者然不得奏記左右以導懇懇蓋私門多故以至是耳公之為相伏計進説以助聰明不可勝計髙論者不可為為之無成卑論者不可用用之敗名惟是二者稱量世務因事有作正當今之急要者伏惟留意某自六月去都至南京遽喪長子尋以妻室病患道路就醫處處留滯至衢州比又喪亡半年之間再罹凶苦生意幾盡上願慈親年餘八十強安神情以悅老者昨自開封府以母老得請便郡經嵗猶未到官某有所慮者恐朝廷因有差除而明公不遺姓名或有移易某母親年髙矣鄉土去京四五千里侍親而行則不可委親而行又不可設有一旦之命適足以趣某隱也又念食祿理無自由思欲歸休以奉晨夕生平不能為生無田可耕仰俸自給以供甘旨捨官而養遂為窮人儻台造為之守郡便安而不移則重賜矣設或聖人尚記犬馬而公以此開説當亦可解下誠區區幸冀財悉不宣某再拜修太平驛堂貽鄉人書太平驛當吾里中南走泉漳廣粵里人之仕宦者還家與之官莫不説此然舍館卑陋牆隤木腐相因補治數十百年某初為漳州從事慶厯中以諫官商度鹽利尋知福州遷轉運使及自泉移福往來數四唯是鄉邦父師耆德率相過從堂房之隘不可以少留前無廳事不可以修集會之禮今年知縣事大理評事許君杭乃新廳事而堂室仍故蓋調民而作有簡書之畏某謂鄉人之已仕與業文學而未仕者相與完之異日往還使其中可以休息其外可以延賔親其庭可以陳旌戟而鳴鼓角斯亦吾里之佳事幸留意焉至和三年六月十八日樞密直學士起居舍人新授知福州軍州事蔡某書答歐陽永叔書某啓蒙書以集古録序見託書之於石集古之勤且十八載而得千卷並包夷夏數千里行厯周秦漢魏以來數千百年賢聖功業賊亂事迹往往史傳之外證明偽謬其於所得之多雖勞有益豈特比於犀珠金玉世人之所欲者以永叔之文章與所趣尚舉而行之極於不泯豈假書字之工而後傳哉然古之碑銘桓表亦有以書而傳者觀其人莫不勤苦畢世乃成其藝某之所能特淺淺者爾鄉者得侍陛下清光時有天旨令寫御撰碑文宫寺題榜世之人豈遽知書特以上之使令至有勳德之家干請朝廷出勑令書某謂近世書寫碑志例有資利若朝廷之命則有司存焉待詔其職也今與待詔爭利其可乎力辭乃已某非以書自名而取髙誠以不相知者以利見臨也蓋辭其可辭其不可辭者不辭也如公之文與所尚誠得附名篇末以永其傳兹其幸也其敢辭焉不宣再拜寄歐陽永叔書月日孤子蔡某泣血言某罪惡深重不自死滅延禍先妣護喪南歸指日待盡猶以葬期尚在中冬所存餘喘以哀號於公之門下幸垂聽焉夫喪者託事也又欲永其傳焉必有志銘若得巨公文之今世榮之後世信之是歿者果有傳而生者果可託也母氏孝行聞於鄊里約素而嚴諸子甘貧而自力仕宦無過皆母氏之訓也三十年祿養今其已矣鮮民之生復何為哉適以閣下暫臨近輔居有間日誠能輟一食之頃紀其平生以為哀苦之人罔極之報則恩德莫加重矣謹録行狀一本上呈可否惟命不次某泣血上端明集卷二十七
