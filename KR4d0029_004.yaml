body:
  text: 端明集卷四宋蔡襄撰律詩觀三聖御書應制聖業存功德宸毫冠藝文勢開千里浪光動九天雲法駕乘時至仙都與世分皇心欽寶訓求治益精勤羣玉殿賜宴有序臣蒙恩宣召再至龍圖閣觀書羣玉殿曲宴伏以數千年間無此盛事臣忝職翰墨榮遇非常謹賦拙詩一首備載本末上干聖覽無任戰越之至治道承炎厯皇基亘萬年深仁涵海嶽至德著坤乾文物歸元首臣鄰必巨賢蓼蕭思及下奕葉力追先昕色方羣進臚音忽四傳衣冠紛雜遝臺殿鬱蟺蜎嘉祐七年十二月二十三日詔宰臣以下龍圖天章閣觀三聖御書寶字崇三聖瑶圖祕九天榮河祥氣徹昭漢曉光旋磊砢珠璣在峥嶸嵗月遷家聲終卓越上意益恭虔書觀開鋪首乂幸寶文閣作飛白字召臣寮觀人賜一軸兼賜紙筆墨各有差宸毫落彩箋煙雲初不定鸞鳯互相鮮拜賜兼金重珍藏尺璧全人人皆自得事事獨超先睿藻敦風教賜御詩一首令羣臣次韻和進冥􅊧出化權來從玉山府逺過柏梁篇回馭臨髙館賜宴羣玉殿推恩錫廣筵迷魂逰帝所休應動星躔申命嚴樽俎二十七日幸寶文閣召宰臣以下觀太宗遊藝集瑞物十三種仍賜御書宴羣玉殿宣諭太平無事令羣臣盡醉新章被管絃千齡叨際會曠古絶寅緣大施難論報精誠第祝延唯應歌盛美樂石可磨鐫上元進詩有序臣言臣伏覩法駕特御端門宣諭臣僚上元觀燈不為逰賞蓋與民共樂也臣職在文字恭惟德音宣布睿旨感詩人揄揚盛美之私輒成短章上干宸覽臣無任惶恐戰越之至疊聳青峰寶炬森端門初晚翠華臨宸逰不為三元夜樂事全歸萬衆心天上清光開夜色人間和氣閣春隂要知盡作華封祝四十年來惠愛深夢中作年十八時入京就進士舉過舒州相城夢中作白玉樓臺第一天琪花風靜彩鸞眠誰人得似秦臺女吹徹雲簫上紫煙久寓悟空院剎行而書之寂寂精廬切半空古原髙下稻花中蓮趺披素輕雲梵花萼雕紅細雨宫孤鶴睡迷千樹月斷蟬吟繞五更風心縻尺組遙相謝歸馬南蹄疾似蓬漳南十詠龍臺試看初日照龍臺白玉堂髙錦障開樹色一畨連雨淨溪光幾曲抱山來雲歸深洞天形瘦風落前村笛弄哀擬結青樓遍題詠思王何吝斗量才城東水閣亭上芳樽惜别人亭前斜日欲歸輪傷心定是丹楓樹拂面空來紫陌塵嵗月暗驚山色古愁情長與草芽新何時此地回飛蓋寂寞欄干又一春南溪近郭溪光緑好裁雨晴波底敞樓臺蔭堤佳樹千圍合掠水輕舟一箭開驚釣寒魚拖糝去忘機間鳥信潮回官餘擬欲袪塵意書遍平沙我獨來滿月池亭有客髙懷脫世塵碧灣晴檻樂逰頻無心自合波中月照影誰分鑑內人莎砌亂蛙爭噪雨杏梁雙燕欲留春長年老厭趨豪末來揖孤雲作上賔西湖湖上山光一笋青佛宫髙下裹嵓扄煙收水曲開塵匣春送人家入畫屏竹氣更清初霽雨梅英猶細欲殘星吳船越棹知何處柳拂長堤月滿汀圓山廟風雅遺芬嶽有神此山靈祀越千春彩毫佳句言猶在翠剡新詞意未真絶頂黑林長帶雨曲崖飛磴不留塵瘴雲收盡秋田熟跋境肴漿再拜人陳將軍廟曽憑水柵誓長江報國全軀事不雙力屈己嗟關羽死勢孤猶笑李陵降宿墳古劍龍腥匣壞壁靈旗獸纒扛神理髙髙人意近楮錢祈福暗塵窗白雲亭雲擎翬檻翠嵓巔石老松皴不計年舉世覺來空白日幾人逰去上青天醉看絶壑都無地嘯倚清風只恐仙花晚春殘無限意他時回首定依然齊雲閣紫閣青梯壓翠岑春情秋思共登臨雨嵐供眼橫千掌星漢垂簷直半尋忍别朱欄真俗吏獨棲珍樹祗仙禽當年人事多竒尚擬托巖扄息寸心東郊苒惹晴雲釀雨時東城無處不芳菲斜坡草短孤麛卧平壠麥深雙雉飛照塢亂花驚客眼罥空輕絮點郎衣年來意氣多羈束無復長楸帶酒歸别宋判官縷縷青隂拂去鞍雨花狼籍顫春寒年光别緒侵人鬢莫向離亭子細看城南春會隂雲薄薄地無塵清曉城南集畫輪睢苑即時裁雪霰頴川連夜聚星辰山眉帖漢晴光擬鶯舌尋風碎語真芳草有情迷謝客落花無處問秦人樽前莫厭歌醒耳世上偏饒淚滿巾嘉意未闌繁盛減東皇底事惜殘春序賔亭師律先憂寄朝家此得人門庭環劍佩胸膽貫星辰今已間戎略疇能卜宴申樓髙休暇日臺逈厭登春珍館瑶甍舉璇題寶篆新鴨欄回鬭頸龍壁活盤鱗夾幕寒波顫前峰古黛皴始知仙有路盡恐世無塵武馭來金虎儒簮下石麟機分榮辱主觶序去留賔揖讓盈三魄雌雄競一神氣橫飛客箭歌協大夫蘋萬古浮雲片勞生斷梗身即時歡未巳往事夢非真席久疑枯海琴么似隔鄰釭花明雨暮甕酎壓霜晨鴉動殘絲柳鱸肥滑線蓴晴霞上丹葉熟粉護青筠賦景呵吟筆揮談密醉茵流年祗容易嘉會可因循望春詞霏霏細雨勒梅黃一望春容十斷腸平蕪古栁青青遍獨使潘郎兩鬢霜落花何事蒼苔數點紅曉來花片落春風可憐春色兼花盡今古此情無處窮耕園驛佛桑花溪館初寒似早春寒花相倚醉於人可憐萬木雕零盡獨見繁枝爛熳新清艷夜霑雲表露幽香時過轍中塵名園不肯爭顔色的的夭紅野水濵溪行秋色巳寥落清溪才此行船移酒杯側魚得鱠刀鳴日色浮兼動風痕滅又生從知隱者趣不獨傲榮名淨衆院嘗荔支霞樹珠林暑後新直疑天意别留春京華百世爭鮮貴自是芳根著海濵春酬王知縣賞春不與以詩見贈仙陬翠觀盡繁英朱白相兼照眼明池浸嵐光生晚碧鳥驚人語斷春聲談諧遽喜開懷久骩骳終慙走筆成佳致可能陶靖節庭柯斜眄獨忘情喜弟及第里閈髙髙祖德新魯庭詩禮孟家鄰連登桂籍青袍客共拜萱堂白首親倚國精誠明火玉照人清節對霜筠童襟開慧盈書館漸喜芝蘭在處春西郊曉蓋西郊道春光極或作㴠太虛村風香晚稻溪日曝寒魚雀噪飢鷹下山空病木踈歸期侵杪嵗友思望吾廬三月詣陳逋民振衣凌曉色霽野縱遊韁莓潤溪雲重春深山露香林幽風更細院靜日偏長曽是天皇外相從識酒鄉次韻翠嵓寺攬蔓巖扃峻交繩寶界平斜峰約雲勢乾樹起秋聲泉檻妨蛩響霜樓助月明冥筌兼灑落警句一何清夏晚南墅夏竹侍前楹涼襟折舊酲疊雲封日茜斜雨著虹明魚動池開暈蟬移樹減清葭洲煙向暝鳬鶩自相迎蕪隂樓上野馬沈寒氣神禽度細風斷霞天共紫斜日樹齊紅山口橫虛釣江隈跋逺艐解窮千里目爭奈思無窮杪秋湖上舊暑侵涼巳分銷蕭疏丹樹見斜橋千千露竹全瀟灑一一風蟬共寂寥菰米熟汀來客燕芡絲分水避歸橈月魂未上東城角誰向東城與下招和陳殿丞南州新詠寶坊髙閣遍憑欄曽是芳辰得未間日上天容低接海風輕湖底倒搖山夜深佛火寒星外春過人煙暗樹間無意孤吟採幽致異時行橐斷空還通源驛别顔茂才躍馬東來不記時酒醒寒色入征衣垂楊官道連天去落日郵亭别我歸陪尹子漸申安禮宿香山寺二月巳強半尋春登石樓山光侵雨變草色到雲休歸鳥沈嵓際行人過樹頭剝苔看石碣因火認漁舟漸夜灘聲惡憑虛屋勢浮乘間聊自適觴詠屬吾流正月四日今朝才見雪泥乾日薄雲低又作寒家山千里何時到溪上梅花正好看春曉曈曈初日注窗明窗外雛鶯乳燕聲東風氣味濃於酒曉夢魔人似宿酲晚色晚色在何處樓髙天宇低間雲無去住歸燕自東西過天津橋日暖溪平氷漸銷水聲才下內前橋山川滿眼間宫殿草樹迷人舊市朝每向尋春偏有意却成懷古更無聊洛陽平昔多豪俊惆悵埋魂不可招讀離騷經莫怪靈均戀楚濵可能臣子外君親精心獨去珠無纇飛語潛來箭有神宋玉招魂推意逺揚雄流涕掩書頻江邊自是修門路嗟苦先生隕此身暮春登南門麗譙髙倚晚天霞滿目平臯盡物華千曲胡笳催鼓答三重湘酎倩旗誇連江急雨送歸燕拂地輕風移落花強倚欄干還自問此情何處是邊涯和邱提刑寄湖南賈度支何處多離感山郵霽野光清吟貫騷雅逺意屬荆湘霜樹呈秋色風蘭生晚香使軺偏倚望摛藻寄回腸和邱提刑聞新鴈寄賈度支翔鴈來江渚秋容在逺空幾聲疏樹外一字斷雲中虛館垂簷月平臯敗葉風裁詩託幽思幽思更無窮遊龍門香山寺彩閣縈林轉蒼崖隔水開龕明千像日波起一灘雷緑淺春前草香餘臘後梅背人驚鷺去將雨好風來雲氣隨衣袂嵐光入酒杯清遊知不屢欲下更徘徊聞福昌院春日一川花卉最盛聞道春深多物華遙憐春日思無涯煙涵樹色相依好山擁溪流一帶斜休問主人先看竹只隨漁叟便逢花憑誰畫得當時境持去江南細與誇山前溪上最宜春千樹夭桃一雨新爭得扁舟隨水去亂花深處問秦人登府店福昌山閣危磴通髙閣登臨境逈清雲開千岫出雪霽一川明斷雁來孤影遙泉落細聲野煙依竹見溪樹與橋平巳助騷人思空搖逺客情扁舟如可泛歷歷是江程雪中不見女几山宜陽南路是仙山雪擁雲埋杳靄間洗眼來看無處覓不知可復在塵寰登三鄉寺閣歷覽宜陽道披軒臨朔風地疑塵世外人盡畫圖中巖曲疏鐘答村前小徑通水煙寒更白山氣曉微紅遊宦真浮梗流年似轉蓬長懷無所寄盡日送歸鴻嵩陽道中千里動秋意縈回上古原山樵斫晚日野火著寒雲鐘磬出鄰寺牛羊下逺村振衣歸去好塵事莫知聞訪陳處士橋畔修篁下碧溪君家元在此橋西來時不似人間世日暖花香山鳥啼題建造寺奉先院日照溪山生翠光春深花草雜幽香登臨誰會遲留意門外塵埃去路長送别陳比部祖帳西郊道川原畫閣臨燒痕經雨活樹色入溪深斜日明春態孤雲感客心何人知别意重把酒杯斟城西金明池小飲二首曉出都門外名園連翠屏融怡春物動瀟灑塵慮醒輕風送花信逺水涵空青舊遊無處問芳樹隔重扃城西禁籞宿煙收霜薄朝寒上罽裘佳樹得春生意動平池受日翠光浮十年歌笑驚前世滿眼風花是舊遊從此曲江芳物好定知重到更疑留送張太傅還鄉置器功成佚退身故園南望整車茵青冥直上無餘事白首歸來有幾人門外離筵晴日曉江邊行路雜花春槖金均散心如水冡樹重攀淚滿巾杯酒相逢耆舊少山川不改嵗華新從公几杖何由去更祝千年比大椿寒食樂詞皇州令節已藏煙帝渥乘時錫廣筵和氣去添春色重恩光來助日華鮮千聲鳳吹朱門裏一畨花香穀雨前更喜簮裳嘉宴日親逢干羽治平年喜歐陽永叔余安道王仲儀除諌官御筆新除三諫官士民千口盡相歡昔時流落丹心在自古忠賢得路難好竭謀猷居帝右直須風采動朝端人生萬事皆塵土惟是功名永逺看送楊殿丞通判睦州蒼崖中斷一溪來迤邐人家向水開盡日煙雲迎斾去滿瀧鐃吹引船回虗齋晝夢鳴禽下别塢春遊畫角催莫怪杜郎題處少更留佳致待清才宿揚州瓜洲堰埭阻行橈更等江頭後信潮獨背殘燈數歸路風傳寒柝夜迢迢廣陵廣陵歸客嘆飛蓬懷古傷離向此中前世翻波那復問十年彈指巳成空樓頭畫角催殘日城上寒鴉噪晚風井徑蕭條人不見又隨潮信度江東馬奴周晬思之因成馬奴今日方周晬昨夜迢遙夢到家盤裏應知心所愛尊前唯祝壽無涯咿嚘弄語羣兒學踉蹌初行乳母誇獨上揚州津館望江山搖落去鴻斜聞鴈霜風吹鴈入南雲千里征人枕上聞欲問梁園近消息月沈星轉五更分江頭别杜殿丞楊子江頭南北路木蘭船上往來人年華衮衮東流水世事勞勞薄宦身回首天涯成逺别忘懷物外自相親津亭共起憂時嘆重記津亭淚滿巾題金山寺畫梁詩板暗流塵水石魚龍萬句新誰識髙僧最深意慈航長護過江人端明集卷四
