body:
  text: 端明集巻三十六宋蔡襄撰哀詞長子將作監主簿哀詞并序至和二年予岀知泉州侍親南歸六月十五日至雍丘長子勻感疾又明日至宋都二十二日逝去某年十八為將作監主簿孝悌好學予心悲哀詞以悼之出國門而東行兮乗隋渠之飛流甫百里之畿邑兮將適攬於林丘忽長子之感疾兮畏藥石之難求一日數舎以息乎宋都兮旦暮冀其有瘳隂陽隔井而結固兮越七日氣薄而汗収曾言語精爽之不昧兮奄然逝去而難留豈不念親愛之歡好兮猶焉徃乎窮幽慈母號噭而屢絶兮少婦無依而寃愁觸百端而興慨兮怦乎予心之危而莫投長風吹沙兮浩浩白日照水兮悠悠燈青熒兮夜永彌想像兮沈憂嗟予百年付託之重兮何為一慟而休資性孝悌而沈厚兮謂大吾門者必汝之由神理莽蕩莫可訊詰兮曷與善而為仇豈良醫不偶而横夭兮抑天命巳決乎短修大化運轉而無極兮雖彭殤等乎蜉蝣惟故物之存在兮獨超解而遠遊魂之去兮佋倀誰復魂之來兮哭臨盈舟耳目恍接其聲容兮考真實兮則不愛念中來兮不可以理遣自古皆爾兮不可以智謀終焉莫之見兮巳矣撫棺永訣兮千秋又謂逝者為無知兮夢寐笑言如平生時謂逝者為有知兮親愛號絶盍歸乎來謂遊魂為變兮一氣聚散冺然無知謂明神不滅兮庻類回環誰其自持謂死為樂兮死者自樂生者自悲謂物皆有數兮化鈞播授大小隨宜嗟稽考之無端兮在聖人猶曰焉知極愛非中兮絶愛非道死生循環兮經言是考奄速所遭兮分而非召善不必夀兮惡不必夭逸驥萬里兮不跬而旋良木千尋兮不咫而顛人誰痛迫兮不歸之天永呼大呌兮曾不加憐悵隔絶兮一息慘悲哀兮窮年又淮水漠漠兮淮山靑青晝風索索兮夜雨㝠㝠叢雲聳湧兮虹横密樹蓊欝兮蟬鳴昔之北向兮與汝皆行今也南歸兮汝夭其生笑言粲粲兮哭聲風骨嵓嵓兮神靈忽不見兮歸予汝迎來無期兮孰知我情雲為車兮風為馬天無垠兮日西下旦出遊遨兮夕還其宫先後走趨兮儼以雍容潔鮮兮衣裳芬芳兮肴漿曷不御兮不嘗吁奈何兮悲傷祭文祭河南主簿張正夫文謹以薄奠致祭正夫之靈夫安仁義而遺勢利其特立君子乎君子之為無所譏道焉唯仁義勢利雜然其中予於所嚮之厚以觀其終正夫樂聞仁義之説所嚮雖厚而天奪之年予不得觀其終矣嗚呼哀哉尚饗祭弟文專以清酌庶羞之奠致祭于亡弟開封府太康主簿七郎君山之靈嗚呼吾至家始五日得汝訃音以六月七日感疾終于官哀苦號呌驚迷失次反覆思慮汝之行於父母孝謹於兄弟友悌於當官涖事公亷無私事細大莫不盡其心焉天鑒孔邇汝不應不夀而少亡豈赴告之者謬也發書尋繹皆姪彛與蔣生手疏日月苦疾終始無一謬者嗚呼汝其死矣吾聞死而復生者若秦之諜人石勒之子是也猶幸其非望又渉旬月無有來問鳴呼汝不復生矣汝之永訣矣二親垂老早暮涕泣望祭千里之外汝之妻孥必歸江南旅厝異鄉不獨生者悲慟使死者為有知銜恨九泉終古無巳嗚呼哀哉吾自五歲與汝從學及吾年十五再就鄉舉汝時十三蓋亦與焉衆所指目期必逺到其後三年與汝北遊京師吾先得官為臨漳從事及罷歸汝後登第還家駢首拜慶鄉閭榮之吾佐西都留守幕府汝時選注太康西來過我留遊乆之去年吾忝對讐麗名書府汝以畿縣繼來相見今年夏四月吾謁告歸覲别汝於國門之外誰謂此别為生死之别嗚呼哀哉疾不臨藥死不親歛殯不拊棺吾恨如何汝即死寧無一言以别我乎豈赴告者忍不書也將疾力而不暇及耶其亦忘我於無言耶吾於汝愛為兄弟而學業為朋友每聚議通夕若出入經史記傳浩博貫穿吾不在汝右逮根諸理論吾或有先焉汝有遺文吾當録次以傳于後汝子猶吾子也教朂養育待其成人扶持汝歸以𦵏吾土則吾志足矣嗚呼哀哉吾材與藝下汝逺甚覬汝光顯以大吾門今也亡矣吾力薄而倚重思此益悲平居議論當世得失卓然期有發于人者今豈復能力於是哉聖人推天引神以錫福降殃於善惡而作民監至於善不及福而惡不及殃學者惑之然則賢而夭孰謂其不夀也惡而夀孰謂其不夭也君子之論人也在賢與不賢耳不繫其夀且夭也汝之行之學之文雖不克夀吾謂之夀也夫何恨哉獨手足之念無所窮極古有達觀之士一死生而超乎無有用是決㓕情愛吾不忍為也嗚呼哀哉語言嘻嘻寂而不聞肴漿陳前不食不飲魂兮何之其無知乎吾徒自苦耳其有知乎吾知汝之悲與吾均矣伏紙顛倒不盡所懷嗚呼哀哉尚饗祭陳比部文自某行服退居里門歲時書問詞意敦勤今君順化聞信悽煩某也法不徃弔言實無文猶憑薄奠逺感英魂尚饗祭蘇子美文謹以庶羞之奠致祭于亡友子美之靈世之推天者謂仁賢宜夀而暴賊宜夭苟反於是禍福之應則為無有子美之亡悼惜者多而或歸天咎大造鈞施授受小大兮孰為薄厚謂仁而賢行己適中兮自期不朽豈校歲年龜蛇木石兮如是逺乆嗟嗟子美其中則豐兮其外則屯文詞涵浩海湧天旋兮莫見涯垠動作流行麒麟鳯凰兮指目於人下視世俗可嘔而嗜兮可悦而嚬衆力一舉譁言一發兮羅致以文用是以困垂尾不掉兮尺澤之濆世之所嗟年不克永兮志不克伸行信於友言行於後兮斯其不冺平昔子居呉余守於閩兮相去無幾音問之來放意自虞兮窮通一指慶厯之末余罹大禍兮退伏田里子以書詞慰唁諄諄兮無或喪死曾不隔日聞子信音兮痛徹肝髓禮法之制不行弔問兮哀傷而巳今也吉服道出呉門兮子殯於此有觴列前曾不食飲兮非平生此眉面笑言或髣髴兮子其降止子年四十髪白生顛兮朋友雕離人豈不多知我則少兮子獨何之殁者已矣生者浮游兮誰樂誰悲神乎來哉薦以達哀兮侑之以詞尚饗祭范侍郎文謹遣某人以清酌庻羞之奠致祭于故資政侍郎高平公之靈嗚呼生死聚散物理之宜何公之亡賢愚涕洟人幸公年非有愛私幸公復用庻幾有利於時嗚呼使公且存而復用終有為乎其無有也在天聖中公當言責時士大夫依阿厚嘿公乃言事傾動天下觸指奸權開道諫諍尹京之政例為寛大借吏齒牙光飾眉面公政清明卒以毁去羌種窺邊天兵議討公云士伍未可即用投書叛酋語之禍福逮其款附終若前料登於政府天子問狀公拔根株扳躡三代不為目前苟聞之計勸農養士塞窒僥進衆訾成波擠落在外至死流離惟道是賴大航檝維膠于泥沙渉者罔濟臨流齎嗟公薨之初衆悼以譁市利田宅子女金犀厚味入骨老死營持公薨之後獨無餘資君國以忠親友以義進退安危不易其志立身大節明白如是某晚登公門嘗辱知遇公喪在東欲弔無路陳酧以文千古斯慕尚饗祭永嘉郡君文謹以清酌之奠祭于亡室永嘉郡君之靈惟靈出於豐有來嬪於予能安窘貧天資令兮致養尊老躬事烹餁無日而廢孝誠肅兮節衣推食撫育旁孤乆而益勤惠愛均兮馭下有度宜家以禮始終彌劭賢則著兮從予小官至登近列奩服無加素約敇兮衆善脩舉夀考宜多僅及中年奄忽化兮嗚呼哀哉姑失孝婦兮廟失芳薦夫失良偶兮子失慈祐念生存之所立悵神理之難究嗚呼哀哉人誰不死第有後先日累月計或促或延萬世前觀奔湍不巳就令百年亦一息耳較量多少何者為是溪隂崇邱卜兹吉壤某也守符勢莫得徃𦵏不臨棺涕泗南望魂來歸兮安居嗟予哀之可亮尚饗祭六監簿文遣使以酒肉之奠告汝六郎監簿之靈嗚呼哀哉嗟予生之不厚屢遘災於子姓唯汝嶷然而遐舉逮勝衣而冠聘既授室以承事謂傳家而襲慶去年出乎宋都曾未旬而大病嗟汝母之愛慈慟哭絶而還併旦暮撫棺而不捨終相從而隕命嗚呼哀哉二旐南歸悲感行路况我天性孰云省悟吾於今年髪秃齒蠧沈憂傷人獨語誰訴望穉童之成立念衰齡之遲暮山川迴復兮故林雲路悽慘兮歲隂幽堂既啟兮卜食惟吉宅邱之左兮慰而母心官守之責兮𦵏不臨視訣汝以詞兮涕泗盈襟尚饗祭杜祁公文慶厯之初邊圉多事生民被害天子思得賢輔相以脩庻政於是擢公宥宻公以暮年當主知遇與國謀論念其自効莫如薦引才能迺條當世士可以為時用者數十人上之㑹朝廷適巳拔任除目既下而公疏中姓名徃徃契合有不悦公者乃訾曰上方用人而輒薦引是欲私自朋比也公不辨而求士益切既而作宰相某時為諫官以親求郡得福州將行公又疏曰蔡某願少留之不宜令逺去公之同列曰彼求外補而復留之豈非朋比耶未幾公罷相知兖州遂請老以歸天子思之遣使存問當時指以朋比者不數年列臺閣參待從天下之論益知公有大臣節直己徇公不恤於毁譽不移于用舎也昔公之存某未嘗以不才累公為謝今公之薨可無言哉嗚呼某於公門無有雅舊一見加禮公寔我厚繫官南閩哀誠莫究侑奠以辭永示于後祭王侍讀文謹以清酌之奠祭于侍讀原叔八丈之靈惟靈學通貫變文紹高古華林勸𨗳獻明帝所禁密顧問闕職斯補善與物同世罔有拒當其議論乃心自處智力未究要于夷路孰不永年公何嗇而不與孰不持秉公何後而不舉念哲人之遐躅豈外累之足數信問來門官推守土悵天涯之弔酹異西軒之笑語曷書牘之具存終巳焉其無覩巗巗商邱新阡其下一奠伸哀幽懷莫敘尚饗祭曾奉職文謹以清酌庻羞之奠致祭于故奉職之靈生於世侯蚤服武冠在力可逺而失於一蹶在世可舉而留於漸磐既浮沈於海表亦逍遙於物端余昔初官際君清顔矜豪棋塞之勝寓適觴詠之歡念言始終實惟二紀㑹合有一笑之樂間闊有尺書之委前典州符君迎我喜今兹復來遂行弔禮感游舊之彫落嘆歲華之流駛揭素旌兮悠悠出郭門兮道周瀝斗酒以伸訣君有知乎少留尚饗祭皇考郎中文嗣子某謹以清酌庻羞之奠告于皇考郎中之靈某蚤聞義訓參處近聫頃縁合食之恩均施漏泉之澤恭惟禰廟超正郎曹某被詔還京涓辰展墓肆陳寵禭痛哀劬勞永思昊天罔有窮極尚饗祭劉屯田文某謹以清酌庻羞之奠致祭于亡友䝉伯屯田二兄之靈嗚呼天地之大其如傳郵乎人寓其間若行旅之奔趨相値而喜相失而吁何數十年之游從而不見於須臾我自閩來子官江涘扁舟迓我境上百里我有宿疾攜醫就治意有緩急實為依倚我卧客舎幸子來臨笑言譬喻調護之經間隔一朝聞子被疾曾不及旬遂兹奄忽奉書詞之委曲將永訣於幽明以愛子而見託豈薄夫之可承哀哉材可以通事變而不施於政智可以裁幾𦕈而不任於時豈宰造之無意抑志念之相違前造子庭賔主之儀今也入門闔棺繐帷義雖朋友愛均兄弟哭奠一觴詞以達志尚饗祭外甥陳法曹文專以庻羞之奠致祭殁故法曹之靈人之悲愁兮必歸於天胡畀汝材兮嗇於夀年有藴不伸兮孰知其然惟汝少孤兮成立之難志氣高舉兮困于小官走驅嶺表兮塵土其顔誓將退耕兮何有田園嗚呼哀哉慈母之愛兮愛於汝偏婦歿於途兮旅柩未還穉兒幼女兮誰與加憐文章固有兮寂寞殘編國門之外兮曾非故阡終必南歸兮兹其少安嗚呼哀哉鞠汝誨汝兮今復収汝疾為之醫兮喪為之主衰年慟哭兮痛貫心膂魂魄何之兮莫知其所尚饗祭八廷評文以酒肉之奠告汝廷評八郎之靈天之理不可推人之事不可期嗟爾生而純明宜百其福冀爾大成以熾吾族奈何生不及夀仕不及禄作善之慶曷云反覆噫情莫若父子之親痛莫若死生之别情深痛重腸胃分裂巳焉哉天實為之謂之何哉祭神文鱔溪潤徳靈府感應王慶厯中某為郡守夏旱不雨民憂失業時詣廟下以山川之職致請於神五皷東行隂雲四起奠拜既興澍雨成潦農畝霑洽人有餘食迺新王宫以荅靈貺今將卜年復興符印某之事神不敢少怠秋田乾裂百姓聚首有望於神神其敇職活吾生齒無弃前功以貽神羞又某聞國有凶荒則索鬼神而祭之泉州所部仍旱三年歲榖之入十得三四鄉無廩儲仰給海外或食草木遇病輒絶今春膏澤及時田野早種乗夏之杪彌月不雨日赫而暵苗荗而枯某實有土既憂且懼民命近止非殍即流神乎有知其亦忍此而不惠哉守封有罪罔敢逭罰勿俾斯民罹于大患神其恤之去災為利特顯神休又去月二十日詣神之宫以境内乆旱有請于神仍與神約曰民命近止即七日不雨當鑰廟門以待奠獻甫終雷聲隱然停午之際隂雲四起攬轡東旋旗斾飛揚甘澍初作山川改色大熱一去牛馬其風至于信宿野有羨流巳薧之苗根株荗遂垂殣之人歡謳踊噎唯神之意憂勤于人若是之至惟民奉神萬有千載亦罔敢怠又某祗臨郡治巳越旬浹究民疾苦莫若秋旱不雨之急者然太守能治民而不能為雨以雨活人莫如山川之神考据典禮諏于有衆惟王其當之某謹齋戒詣王之宫為民禱請若一日二日七日霑足封境太守率官屬集鄉社簫鼔牲酒顯王之休若言而神不歆旱甚而雨不作是太守不能事神而神不能愛民慚羞不職與神共之又春秋傳曰乞者重辭也故君子恥之某至郡二十日田野乾燥稼穡失望百姓憂愁有乞憐之色諏詣王宫歴懇載詞以達神聽唯神昭恤庻民敷厥厚澤薧者暢荗憂者歡怡神能愛人救其饑乏某事神以禮雖重私行而不愧也治牲羊薦酒醴管簫歌舞從其風俗王其歆之唯神於禮法不録太守於禮不應私祀以請然而民人有言惟乞神而靈請而從私猶且甘心况公溥乎又去年夏旱某惟民之恤不敢以禮自束輒造神所少選雨作既而霑足遂謀新宫以荅神貺太守不徳天復降旱慚羞强顔復有所請若夫雷雨之施其不救以活猶太守之知神靈而不屈以請其可謂仁乎夫守神之道始異而終通某為天下之守臣而神為吾之守神若夫拜教之通塞民政之能否某之職也風雨愆和疾癘彌作神則為之此所以異也若守臣悉心以治而神不弭災以福民降休神享明祀豈不謂通乎端明集巻三十六
