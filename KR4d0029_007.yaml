body:
  text: 端明集巻七宋蔡襄撰律詩仁宗皇帝挽詞七首道徳由来太古同生靈休養至仁中五兵不試歸神武萬物無私是化工玉座忽逢春月盡金旌遥指洛川窮年年翠輦長陪扈那向西城别梓宫向近千秋節何言七月期遺恩羣玉宴往事荷宫祠仙路雲龍㑹秋風鼓角悲萬人贍彩仗猶認吉行時聲教中原泰恩仁萬國臨憂勤符帝夢付與得天心簫吹凝寒氣雲山斂夕隂還期千載後歌頌莫知深儉薄留遺詔遵行在繼承桐棺㑹稽冡瓦器孝文陵闕外秋螢度林端曉月澄須知無可欲終古不騫崩萬世威神在多方恵澤隆密音通虜壤行哭亦兒童畫翣離丹闕幽堂對紫嵩孤城空雨泣白首抱遺弓儉勤追禹績恭讓體堯仁措枉朝多直除苛更盡循遵儒恩禮異左戚賞刑均立子知天意超然即上賔攅宫開七月隧路閉千秋地帶三川拆天含萬國愁鳥雲知聖沒龍駕想神遊厚祿將無報慙恩更白頭昭陵行宫人上臨候昏鐘簾外香煙燭影紅庭栢飛霜陵漏永可憐今夜月明中和子發有序天聖八年寄居悟空院留詩僧壁今三十五年人事變遷存沒感懐子發逺恵新編語及曩舊披覽數過悽惻之極輒復短章少伸懃懇空梁詩板嵗年多唯有秋蟲占古窠聞道故人時拂拭此生無奈舊情何有遺梅花枕前者因成誰寄梅花置枕傍前時復得枕清香因香夢徹江南路江水浮天月似霜甲辰寒日逰公謹園池二月名園蓊鬱青為憐佳節此閒行偶因觴詠心還適蹔離塵埃眼倍眀風静落花深一寸日遲啼鳥度千聲主公髙意何須道芳物於人自有情四月十七日奉安仁宗皇帝御容於景靈孝嚴殿是日舟次陳留感懐述事十六韻先帝傳基固真人嗣統平餘恩華夏在髙誼古今傾漢法原為廟仙居别有京海中金闕見天上玉樓成睿意懐丕烈宸豪薦大名薦唯將舜擬嚴亦與周并龍向朝雲起奎和晝日呈流光俄洊嵗發號慶重眀令節千秋過端儀萬衆迎讙呼山嶽動驅拂鬼神驚縹緲来佳氣雍容下太清旛旌多異制歌吹自新聲琳館初停御鑾輿始此行盥孚通至感福澤被羣生往事時兼逺孤臣淚獨横晨興西嚮久悽斷老年情至鏁外旗聲不斷鼓聲催堤栁隂濃野色開今日客衣何事淨京塵不肯出城來洪澤阻風今日風期惡遲迴一水濵村旗呈酒聖廟鼓賽河神躍鯉曽驚網饑烏不避人商工時借問何處即通津逰金山寺平日壓塵土今遊興味長波濤圍四際臺殿起中央魚聴晨餐鼓雲和夕炷香薫風休遞吹襟袂不勝涼五月宿江隂軍葛公綽草堂曽解征衣寄草堂枕邊泉石自生涼休論仙訣能延夀蹔得身閒夢亦長七月過孤山勤上人院青林藹藹日暉暉薄晩涼生暑氣微湖上清風如可載畫船十隻不空歸重陽日有美堂南望越壤吳封繡錯分華堂繁吹半空聞山峯髙下抽青笋江水東西卧白雲菊蘂芬芳初應節松林照耀欲迎曛州人不見歸時醉未擬風流待使君韓玉汝山堂㑹别梅花已盛至蘇州示諭水鄉天寒未開遥知畫舫艤江隈寒勒梅花未得開唯有山堂紅燭下至今繁艷傍尊罍梨園小部梨園法部更置小部音聲三十餘人帝幸驪山楊貴妃生日命小部張樂長生殿因奏新曲未有名㑹南方進荔枝因名荔枝香傾宫晨起傅輕粧山殿生風夏日長小部新聲落天上無人知是荔枝香答葛公綽丙午年正月邀葛公綽宿杭州山堂公綽遺詩有為是山堂似草堂之句因以答之山堂争似草堂清俗事随人百種名賴有四窓春茗在甌中時㸔白雲生公綽示及生日以九龍泉為夀依韻奉答多謝山人逺祝延夀杯仍是九龍泉九龍恵山别名餘生事事無心緒直向清涼度嵗年和答孫推官乆病新起見過錢塘之什二首於世無機是海翁客情醒醉任鄰鍾㢘纎雨意還侵夜料峭春期未減冬寳氣上浮難掩玉嵗寒中立不凋松君王自結英雄網千載風雲定有從病來安健賦詩誇甲子新移一嵗加吾道所存唯浩氣世緣何著但空花煙雲已過同歸鴈楊栁初藏並宿鴉便擬尋山逐幽趣春泥随馬不須遮和夜登有美堂忽聞乘月上層臺正值江湖夜色開雲屋萬重燈火合雪山千仞海潮來静遊雖有詩情得獨笑應無俗語陪縱使羈懐多感慨若逢清致少徘徊和偶登安濟亭津亭遥望草萋萋空曠清懐與物齊春水倒行潮欲上晩雲平壓日先低髙城覽古人何在逺渡傷離客自迷好共山翁同出處不隨朝騎五門西和江上觀潮地巻天回出海東人間何事可争雄千年浪說鴟夷怒一信全疑渤澥空寂静最宜聞夜枕峥嶸須待駕秋風尋思物理真難測隨月虧圓亦未通和答孫推官擬將身計入扁舟縱得三公不黑頭病體已輕休賦鵩機心如動輒驚鷗强看吳野江山醉肯為春風花草愁所向乾坤皆客寓可能與我更遲留和古寺偃松古寺無人野蘚滋空庭永日雪風吹横柯圓若張青蓋老幹孤如植紫芝萬乗未輕蟠木器千年終與大椿期須知才短為天幸江上婆娑得所宜和新燕燕燕何來處處喧新從海上振輕翰卑飛不避春泥重竝語應愁夜雨寒客舍暗窺吟筆徤宴堂時見酒盃乾雕梁信美多移主願爾將雛擇便安開州園縱民遊樂二首風日朝來好園林雨後清遊魚知水樂戲蝶見春晴草軟迷行迹花深隠笑聲觀民聊自適不用管絃迎節候近清明遊人已踏青挿花穿㦸户酤酒向旗亭日迥林光潤風迴海氣腥未知何處樂歸路已嚴扃遣興苦竹生笋四五寸櫻桃開花千萬枝空濛野色當樓處寂寞春寒帶雨時已放清歌逐瑶管旋篘新醸行金巵衰翁酩酊自為樂舉鞭不問并州兒夜雨病中乆雨曾無度陽和漸向闌雜香生衆木濃翠入孤巒漏緩宵仍静燈微曉更寒芳時猶卧病何日出城看寒食西湖山前雨氣曉纔收水際風光翠欲流盡日旌旗停曲岸滿潭鉦鼓競飛舟浮來煙島疑相就引去山禽好自由歸騎不令歌吹歇萬枝燈燭度花樓上已日州園東樓地上多於枝上花東樓凝望惜年華潮頭正對伍員廟燕子争歸百姓家粉籜漸髙山徑笋綠旗初展石岩茶流芳自與人兼老樽酒相逢莫重嗟四月清明西湖千頃平湖綠一遭空城遊樂自奢豪畫船争勝飛江鶻翠巘都浮載海鼇芳草堤邊裙帶短柔桑陌上髻鬟髙樓前盡日聞歌笑不啻秋風巻怒濤度南澗隠隠飛橋隔野煙石磯西畔問漁船桃花盡日隨流水洞在清溪何處邊入天竺山留客山光物態㺯春暉莫為輕陰便擬歸縱使晴明無雨過入雲深處亦霑衣十日西湖晩歸清晨出郭又晴曛已見空枝嫩葉新争得山頭能閣日且容湖上不歸春人隨百戲波飜海酒到三橋月滿身三橋乃西湖歸路月中飲於橋上只有牡丹纔半拆未知何處可娛賔十二日晩欲尋軒檻倒清尊江上烟雲向晩昏須倩東風吹散雨明朝却待入花園十三日吉祥探花花未全開月未圓看花候月思依然明知花月無情物若使多情更可憐十三日出趙園觀花水際開花千萬窠初鶯時逐麗人歌欲知太守行春樂只向東城得最多十五日遊龍華浄明兩院值雨垂楊修竹半藏山一徑紆回暮雨間綠滿野田看渺渺白飛嵓溜自潺潺空村鮐背行歌去古寺頭陀乞食還却羨幽人在深僻斷無來客扣禪闗十六日會飲駱園名園何事却居鄽永晝游蜂乳燕喧不計陰晴與風雨巻簾花蘤在尊前十八日陪提刑郎中吉祥院看牡丹節候初臨榖雨期滿天風日助芳菲生來已占妙香國開處全烘直指衣攬照儘從烏帽重放歌須遣羽觴飛前騶不用傳呼寵待與遊人一路歸又往鄭園小小園亭細細風千枝淺白間深紅誰知狹徑無人到留得青春向此中十九日奉慈親再往吉祥院看花天意應偏與春工已盡歸來如從月下去似逐雲飛艷絶聲名逺清多香氣微輕陰資潤澤斜照動光輝劇飲千鍾醉相鮮五綵衣曾非重芳物庶以奉慈闈二十二日山堂小飲和元郎中牡丹向謝之什幾家園館見千枝白髪雖多意不衰香澤最深風静處醉紅須在月明時已知佳節無餘日已過榖雨三日更向殘芳巻一巵擬放春歸還自語來年老信莫先期寄錢塘春遊詩呈南陽郭待制一春遊攬足詩歌寄與南陽語思多若憶錢塘曾到處西湖仍是舊烟波答孫推官不是窮輪始問途肯將全璧混泥汚尚平婚嫁何時畢陶令田園先自蕪羈旅且甘家四壁牢愁須借酒千壚唯應抒素推文富落筆詞章氣象麄和孫推官憶徑山遊三十年前浙右行徑山纔稱愛山情油憧􅋏􅋏絲杉翠五山盡植絲杉環珮涓涓石澗鳴遶寺流泉極峻只疑天上黨遥臨初覺地東傾分符不得重遊賞碣石巖邊記姓名舊有記徑山遊鑴碣石嵓奉答孫推官南屏舊遊已憐叢翠在湖邊最勝濃嵐返照前未省天工能刻飾秪應山骨自清堅巖端下溜添春澗穴底來風送野煙欲仗何人安屐齒更尋幽徑一攀緣和登安濟亭亭上風吹藤帽簷為憐清勝得安恬驚濤觸岸層瀾碎落日銜山半景尖遥認犀奔知鹿角忽逢龍挂見胡䫇浙江詩有龍起郷人謂之龍挂城南一去通滄海無限春寒向晩添和運使王學士舟次徳清見寄洛陽平昔誇文會君已勝冠我壯夫談道最先稱賈誼憂時曾見哭唐衢尹師魯兄弟多同㑹敢將膠漆論同志幸得湖山可共娛須向餘春迴馬足栁堤相逐踏青蕪和運使學士芍藥篇宻葉陰沈夏景新朱欄紅藥自為春香於蘭芷偏饒艷畫入縑綃未逼真已恨芳華難駐景可堪愁卧動經旬病起同觀三年想愛須留戀不為江頭酒味醇遊煙霞洞伏承躬侍安輿出遊煙霞洞拙詩奉呈運使學士新晴特地入煙霞道並南山轉更賖幽磬過隣溪口寺衆鷄鳴午野人家洞深隨溜先如雨石古籠藤亂放花潘岳小園猶作賦輕軒選勝樂無涯寄來安孫推官我愛孫公子安貧無所營相逢雖邂逅一見即平生黑電揮詩筆黄河瀉酒觥輕舟何處在别思若揺旌段家堤西望晩山月下西山千萬重日光山氣鬱葱籠鮫綃數幅須移得惆悵如今無畫工孫武篇入官無所解因笑得君憐豈知孫武子自欲逞威權西施篇越國無雙艷吳宫未始知誰言勾踐黠不自愛西施唐彦猷挽詞二首骾亮馳名久孤髙進路難富文平日業勸學晩年官隧外春江静林邊曉露溥唯應墳上土猶解是芝蘭舊徳推當代新悲入故鄉直當冠獬豸清可濯滄浪美研精煤色文甌晝茗香生平無復見流涕送幽堂六月八日山堂試茶湖上畫船風送客江邊紅燭夜還家今朝寂寞山堂裏獨對炎暉看雪花和錢端明遊南屏山新秋初變一天清急雨仍添萬木聲山勢不根空外起湖光無際槩來平錦衣應有徘徊戀金地聊開燕樂情衰暮典城何所用願公雲路羽翰生送錢端明還京禁墀初别紫霄端故國生光里俗懽二世家聲聨將相百年廟貌儼衣冠躬臨州㦸迎門下每至州廨客次下馬人喜曾孫夾道觀石照老苔封舊迹錦溪喬木涕清瀾東趨越嶺興懐逺夕聴胥濤入夢間江上馳心思魏闕日邊歸路指長安香深離渚花重叠涼滿行舟酒半闌應念非才持虎契平時相繼入金鑾清暑堂會同年當年緑髪上天衢三紀于今雪滿鬚榮路風波多契闊畫堂歌吹蹔懽娛杯中明月時揺動草際飛螢乍有無莫問更籌須劇醉四翁同籍亦難俱清暑堂中秋夜飲江國初凉夕漏均青天無翳地無塵蓮花翦綵燈光燦蕉葉傾金酒味新時節暗遷應不再懽娛難得莫辭頻明年今夜中庭月依舊寒光别照人端明集巻七
