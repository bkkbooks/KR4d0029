body:
  text: 端明集卷二十六宋蔡襄撰劄子乞復五塘劄子臣昨至興化軍訪聞得莆田縣有陂塘五所勝夀西衝大和屯前東塘自來積水灌注塘下沿海鹹地一千餘頃為田八千餘家耕種為業大中祥符年中有百姓陳清等陳狀於秋蘆陂開渠引水灌注屯塘下民田却決去五所陂塘以地為田官司妨礙不與檢給天聖年中陳潭知軍日其陳清却與官戶形勢計會同共請上件塘內地土州縣徇私曲理先次給却屯前大和東塘陂塘三所去水為田舊日仰塘水灌注之地盡皆焦旱百姓爭訟州縣一向抑迫不與申理至李餘慶知軍日陳清又請勝夀西衝二塘為田其時不與檢給寶元年中汪隨政內徇私順情一向檢給科率産錢供輸稅賦臣體問得自決去五所陂塘已來沿海鹹地只仰天雨有種無收州縣多是不與放免稅賦是致人戶逃移見居者只括土煎鹽枉陷刑獄慶厯二年秋旱官司檢放産稅例及九分切緣舊作陂塘灌田一千餘頃濟活八千餘家及決塘為田已來收得塘內田一百餘頃豐贍得官勢戶三十餘家又年年雨水不克放却稅賦至多前後百姓論訴不絶官司為見已出却産錢經屬省帳難為除落不與受理若以民間利害即貧困却八千餘家只豐贍得官户三十餘家若以官中租賦即每年蠲放千頃租賦只得百頃租賦其為利害公私均然所有上件田土雖是臣鄊里即本家及親戚無有一畝相連臣欲乞下本路轉運司選清強一員取索應是干連案卷看詳親詣五所陂塘處定奪聞奏如與臣所陳利害稍同乞賜除落塘內新定産錢依舊積水為塘利濟民戶取進止乞與福建路轉運使同相度鹽法劄子臣於去年曽上言為福建路州軍鹽官中煎賣每年官中所費甚多而獲利甚少枉令生民日陷刑獄臣條件理利害乞許百姓納錢通煎及許客人納錢於本路通販可以嵗減數萬人之獄及獲一兩倍之利後蒙朝廷送下三司尋聞三司送下本路相度諸州官吏不知本末多有異同伏乞朝廷連臣所言文字令臣到福建日與本路轉運使同共商量分析利害以聞然後朝廷相度可否施行取進止乞不與招設宣毅兵士恩澤劄子臣伏見朝廷招置京東西宣毅陜西保揵河東河北強壯義勇等兵士當時條約立限人數知州通判兵馬監押等並與轉官切緣宣毅等指揮並是揀刺諸州為見有此酬賞皆不能精選人才細問疾病一例刺面充填人數未久之間逃亡病死者不少枉令農人半失本業虛廢金帛坐空國帑去年陜西保揵刺面之後却揀退數萬人以此推之諸處之兵可知矣况知州通判監押分官受祿招刺兵卒並是本職而所招兵士率皆疲冗未即便加譴罪若更轉官通計諸路招兵之官選秩不可勝數而勝兵之卒堪用者知有幾何計其功勞實為濫賞臣欲乞諸路招置宣毅等兵士知州通判監押等更不引用舊例酬奬取進止乞選翰林學士不用資序劄子臣風聞臣寮上言為翰林學士員闕乞求添補臣竊謂暫減員數不若精選賢才有唐以來此職最為親近朝夕間宴與天子論議天下之事如陸贄李絳皆不世之才所論者足以開悟人主聰眀贊成天下之業今來只循資序隨例補選或行迹姧邪或才識暗懦中書據名開改莫敢抑退况兹一職動是兩府之資苟不擇人豈陛下選任忠良之意臣欲乞今後翰林學士闕員中書不得依資差除伏望出於聖衷選人任用庶乎姧邪暗懦之人無由濫進乞不令中書出諫疏宣示劄子臣竊見諫官每有論列臣僚事狀日近中書多是取旨召逐人示與章疏使自知省臣為陛下耳目之官凡有所聞須當陳述中書得臣章疏只宜酌奪是非而後行之與否決於聖斷今乃召而示之使昏謬之人紛紛怨謗臣所言者天下之公議豈避衆人之私怨但於國體有所虧損臣欲乞今後章疏不令宣示臣僚乞減放漳泉州興化軍人戶身丁米劄子臣伏見泉州漳州興化軍人戶每年輸納身丁米七斗五升年二十至六十免放臣體問偽命日前諸州各有丁錢惟漳泉等州折變作米五斗至陳洪進納疆土之後以官斗校量得七斗五升每年送納價錢伏緣南方地狹人貧終年傭作僅能了得身丁其間不能輸納者父子流移逃避他所又有甚者往往生子不舉人情至此可為嗟痛伏惟祖宗恢復天下大去無名之斂然諸州身丁尚猶輸納真宗皇帝哀憐百姓困窮之弊祥符中特降御札蠲除兩浙福建六路身丁錢四十五萬貫其時漳泉三州亦是丁錢折變作米無人論奏因依科納遂至先朝大惠不及三郡三郡之人引領北望迄今又四十年矣臣聞聖人以生為德以孝為本今陛下之民至有父母不肯養子不亦纍於生生之德乎先朝所行之事有所未盡陛下推而行之可謂至孝矣伏望陛下上成先帝之仁下恤逺民之苦蠲放三州軍丁米只令依建州例嵗納口錢在大國經費萬分之一于生民性命全活豈少也取進止乞廂軍屯駐廣南只於比近軍州節次那移對替劄子臣前知福州日竊見本州廂軍差在廣南諸州屯駐軍回日人數比去時大率死損一半前後六七次盡皆如此臣體問得諸處兵士差往廣南又分在巡檢下其間逺處至有去本營八十程者多為土風不同霑染瘴毒廂軍屯駐本為優輕每至差發便與父母妻子生死訣别極可哀憫臣竊謂若只於十數程內比近州軍節次那移鄊里不過自然習熟風土損失終少又緣屯駐自來多尋舊軍年月對替臣今欲乞諸州軍屯駐廣南係奉宣差者只乞於近比州軍節次那移對替年嵗計之存救人命不可勝計取進止乞諸州弓手依舊七年一替劄子臣伏見新編敕節文弓手除廣南益梓夔利路三年一替餘處並不差替臣先任福建轉運使巡歷州縣體問差役惟弓手一色最為重難竊緣一夫應名全家給送七年一替比他役縻費數倍今來若不差替直至節級方得免放須令四五十年一家便至失業若謂經久嵗月練習武藝可以擒賊臣見農民執役雖經教習多亦無能不堪使用其間武藝稍似精窮強便即情願久役捉賊酬賞臣今欲乞諸路弓手依舊七年一替情願且充役者亦聽取進止乞致仕官郎官已得恩澤更不得陳乞差遣劄子臣竊見常朝官致仕例得一子恩澤又許陳乞差遣者並是指射有職田優便去處伏緣朝官致仕日日有之在銓選人稍有優闕多被指射不無嗟怨臣欲乞今後致仕郎官已得恩澤者更不得陳乞差遣不惟正絶僥幸兼免抑奪選人闕次取進止乞選人注官經一季者臣僚陳乞與免衝注劄子臣竊見選人注官各歸外待闕其間已有經一年已上或被臣僚陳乞指射衝却差遣雖有指揮依到銓月日須移文外州射闕路分文狀往復動經時月選人至有經一二年不得赴官者臣今欲乞應選人注官後已經一季者雖有臣僚陳乞指射與免衝注取進止乞留歐陽修劄子二道臣竊見知制誥知諫院歐陽修授龍圖閣直學士河北都轉運使臣等已有論列乞罷河北之任依舊知諫院至今未蒙朝命臣等伏念事有重輕度才而處才有長短適用為宜朝廷安危之論繫於天下則為重河北金穀之司繫於一方則為輕修之資性善於議論乃其所長至於金穀出入之計勤幹之吏則能為之任修於河北而去朝廷於修之才則失其所長於朝廷之體則輕其所重伏惟陛下增置諫員以來外人不計諫官之能否但知陛下有開納之美一旦驟榮修之身便令逺去外人不知朝廷任用之意但以修好切直不容於時臣等非私於身實為朝廷惜任人之體伏乞陛下罷修龍圖閣直學士河北都轉運使任令依舊知制誥知諫院事取進止又臣等竊見知制誥知諫院事歐陽修授龍圖閣直學士河北都轉運使降命之初外人翕然稱修之才不宜逺去朝廷又臣等自念備官諫諍之職無所裨益如修之論實有根本纍狀論列乞令依舊知諫院至今數日未奉聖旨臣等憂慮日深外人公議日迫皆謂朝廷增置諫官已來今僅踰年厭苦言者雖驟榮修之身其實速令逺去又謂臣等顧避不能為陛下力言以留之臣等譏謗四至不敢默默臣等竊謂修之此行若以保州未下則用兵將帥各有主名非修専得指麾若以河北糧草軍須所急堪此任者其才亦多方今天下多事塞外有夷狄之憂境內有盜賊之變規補闕失必借藉賢才臣等識慮下修逺甚若修必行臣等實不堪諫諍之職伏望陛下採衆人之言察臣等區區之志特出睿斷令歐陽修依舊知制誥知諫院事今取進止論財用劄子臣伏覩陛下賜三司紬絹詔書曰使斂無暴橫而公須足民無愁痛而國用登又聞詔旨以利觸罪者與議輕刑臣伏惟陛下視赤子有父母之慈臨萬物有天地之施不緣嗜愛而率斂於下每因乏匱而資助於中有以見陛下克巳恭勤憂民切至德音屢降聖慮彌深庶官所宜奉行百姓固當少息然而殘苛之吏未已供應之家轉勞陛下恤黎庶之心翻無實事海內仰朝廷之令悉是空言首尾闕三字病安在臣以貧賤之迹叨耳目之官細民疾苦之情天子未聞之事俱合陳論伏自羌賊負恩天兵致討備禦之處數千里更戍之役五六年飛挽芻糧繕修器械於是不時之斂作焉無名之賦興焉言利之臣出焉緣姦之利起焉配取相仍蠧傷滋甚供軍之物制作多門任土之求有無不一金穀之職轉遷靡常管庫之司給納是利前符未至後條已行郡縣承風急於星火虐者先期集事曲施酷毒之威貪者與吏通謀力恣誅求之害以欺罔窮愚為智有作者苟得而必行以攘奪豪富為公當權者避嫌而不主破家流離之苦十室九空呼天苦訴之辭萬人一口原其本末皆有因緣挾私讐者有之為身計者有之只如陕西𣙜鹽江南議鐵增添酒課採取銅苗移東就西指無為有或賜章服或改職名或與遷官或承奬詔所以爭求目下錙銖之利不為日後久逺之謀臣竊謂朝廷推賞不責其實之所致也倍添屋稅鬻賣官田刷江淮見鏹上供欠商稅便錢不給配物於不産之所嚴程於可緩之期如此之類三司之過也借買銀絹豫折田苗逼抑納錢名為勸誘髙下物估官取贏餘如此之類轉運司之過也貧富不均姦貪不禁妄為退剝故作滯留殺牛納皮仍科徒罪償官竭産更虐親鄰如此之類郡縣之過也觸類滋長不可殫論陶陶生民若在風濤之上嗷嗷四海偷為旦暮之安逺近之情若思國家之患未已臣聞民為邦本本固邦寧又聞財聚則民散財散則民聚是知民不可不恤財不可不通若専奉公家不究民病所得則寡其失則多臣非不知吏員軍旅之繁郊廟賜宴之廣北有餌邊之費西有禦寇之須常賦既不足充遺利必當悉取臣又非敢故興恤民之論務黜言利之人執髙古之虛文道當世之切務所冀言利者上能資於國下不害於民饒益既多孰云不賞所可痛心者明知無利冒怨必行幸可寬期力為督迫自古剝下無厭而民不亂誅財無已而國不危者未之有也昔漢武帝逺事征伐算及舟車四方雕殘大業幾廢以至下哀痛詔封富民侯雖僅安全而劉氏之不亡者如線唐德宗朝盧杞輩専為刻剝稅椽僦匱别斂促追掊虐於民都下尤甚涇兵乘怨近入長安驅呼市人用此藉口臣竊思今日之事兵不得已而用財不得已而求然漢唐致危亂之因種種略施行矣故復冦盜未平干戈未息或百姓之心總動顧天下之計如何伏望陛下踐詔書之言推實惠於下民不勝苦在精擇郡縣撫養之人利不可遺在博求錢穀通流之術所入之賦有常而所費之數無極則去太冗而節煩費所得至薄而斂怨至深則去小利而存大惠上下兩濟公私兩行伏惟宗祖不拔之基全付陛下朝廷更張之事更待何時願陛下申戒大臣力求衆弊以幹家之術而憂國以恕已之善而及人使百姓之心不撓則天下之計大定言先於事多為迂濶之謀事至而言無救阽危之禍臣憂深語切意拙文繁陛下儻賜詳觀於時實有裨補臣所言民間疾苦及處事乖方者形之於左臣所聞所見民間疾苦不敢備載粗舉一二條所冀上達宸覽知天下有如此事其間啓請者乞賜施行乞用新樂於郊廟劄子臣伏覩朝旨南郊且用舊樂令兩制禮院詳定聞奏臣竊以五代多故大樂淪亡至王朴竇儼始加詳造太祖髙皇帝每謂雅樂聲髙近於哀思不合中和因詔和峴討論以影表尺比王朴所定尺長四分遂造十二律管校其聲下朴所定樂一律當時雖詔許施行然未嘗制作樂器至今所用皆王朴舊物伏惟陛下紹隆祖考精意禮樂博延天下儒者尋繹經義設司制作垂二十年其費巨萬然周禮史記漢書雖有舊説施於制器自已不合乃者兩制諸儒參議約古制減下一律其功甫就陛下親御便坐按閲侍臣畢與觀聽工作精好聲律和暢陛下審慎再令詳定臣竊謂今來皇祐纍黍尺與影表尺同不異古制一也減下一律歌者協聲近于中和二也上符太祖皇帝減下一律之旨三也前來諸儒或有異論只於形制小大與緣飾之本文時有異同至於聲律本無他説四也以四者之明驗故可用而無疑也臣聞聖人制禮作樂皆因時隨法必以考周舊典以求古樂自秦漢以來其説已亡况其形制聲律豈得盡傳幸今所存者略可依倣雖不能盡及於古比之今樂器精而聲和若施之郊廟肄於朝會亦一時之盛事臣見前代諸儒議事未始一定多亦制決今南郊甫近若衆論一有未合則屏而不設是陛下二十年精求之心一旦又復捨去必天降秬黍然後定尺此空論也伏望聖斷特許施行取進止乞不書張堯封碑石劄子臣今月二十六日上殿奏為奉勑書張堯封碑石念臣備員詞掖忝列近侍書寫碑銘合歸書藝待詔之職臣侵其官有虧事體伏蒙聖慈許賜矜免臣尋詣中書竊知前狀已曾進呈伏乞専宣中書許令繳納張堯封勑命取進止看詳奉神述劄子臣今月十四日張茂則傳宣奉神述額後欲題真宗章聖製奉神述並御筆更令看詳聞奏臣伏以章聖是尊諡中二字簡便稱號故云章聖若載在文字又緣尊諡字數頗多止稱章聖即不盡盛美於理不安所以稱廟號則字簡義重也其御筆二字前代碑文少有稱者只是臣下不敢直言至尊故云御若上文云真宗皇帝製奉神述即不須云御只云並書理似近古臣欲乞只題為真宗皇帝製奉神述並書石臣又看詳委得允當取進止辭李璋潤筆劄子臣奉勑書隴西郡王李用和碑石了畢近李璋送到書一封載上件物與臣充潤筆臣伏念陛下追母后之勤勞伸元舅之德美睿藻輝乎河漢宸章賁於鸞龍臣學藝不工朝選猥及名列堅珉之末榮幸居多利兼實篚之來惶悚無措所有李璋事例不敢收受取進止啓請里正衙前劄子臣伏見去年張問啓請里正衙前條貫第一户充衙前已經五年許令人戶糾決却充衙前要得寬紓次第人户已頒行天下臣前知泉州福州備見鄉戶衙前舊來勑條約每州合用人數存留上等人排定姓名逐年勾差以其産髙下為重難分數只如合用十人存留百戶是十年一次充役十貫産錢合差重難十分七貫只差七分最為均平兼絶詞訟若今五年却充衙前二十年間便充四次雖有富強無不破産於理未安臣昨離福建已見民間詞訟妄相糾決久逺不便臣欲乞下本路轉運司相度如是舊來條貫實利便乞令轉運司便行指揮依舊排名差遣訖奏臣今建言只是福建一路切緣南北風俗事體不同别路州軍亦乞下轉運司相度利害施行取進止乞戒約體量放稅劄子臣伏見今年開封府界京西陜西等諸路春夏愆雨麥苗不遂已有朝旨諸路更不檢覆只今體量放稅兼續有奏乞省倉賑貸亦有朝旨遂其所請此朝廷愛民之意推而行之為惠深厚然臣竊恐開封府諸路轉運司所差官員不能盡心或旱損處多蠲放數少或旱損處少蠲放數多至於賑貸亦不酌量輕重分數均濟回顧均儲有無準備只陜西近奏去年霜雹秋稅放一百萬餘石今年二月賑貸軍儲六十萬餘石即今夏稅未見申報已纍有申奏乞從軍京撥銀絹應副闕入軍儲乞將黑錫中納斛斗以此言之若諸路放稅不得其實賑貸又無分數一旦却闕軍儲三司雖有錢帛亦是臨時置辦遷移不得伏况見在帑藏嵗入嵗支之數有限何以濟辦臣非不知寬貸百姓以為美事職在國計誠慮一朝窘闕重煩朝廷臣雖責罪甘心而事幾既失言不可及欲乞下臣所陳於轉運司戒約體量放稅官員委須得實賑貸州郡亦須軍儲有備如後檢得别有闕誤乞行朝典取進止乞封樁錢帛準備南郊支賜劄子臣伏見慶厯年中因郊禮遣朝臣於江南等路剗發錢帛後來或有闕用時亦遣使嘉祐七年明堂為計校左藏所管錢帛數事巳差官諸路取撥去年為仁宗皇帝山陵並覆賞奏乞朝廷差朝臣撥發茶本錢並諸路寬剩錢帛今來粗有數目以此連年剗發江淮諸路嵗計别無寬剩將來南郊雖更遣使出外取索又緣內藏庫不住申奏取索纍年借過錢帛非河北河東陜西各有非次陳奏今來若不擘畫至時切恐有誤支遣臣今欲乞將見管錢帛金錢等依附明堂支數封樁準備南郊支賜具數於後見錢明堂度支九十六萬二千餘貫鹽鐵支八萬六千餘貫共計一百四萬八千餘貫今樁一百二十萬貫榷貨務銀明堂度支三十五萬四千六百三十餘兩鹽鐵支三千三百餘兩共計三十五萬七千九百餘兩今樁留四十萬左藏庫絹明堂度支一百二十萬八百餘匹鹽鐵支七萬八千四百餘匹共計一百二十萬九千二百餘匹今樁留一百四十萬匹紬明堂度支四十萬一百餘匹鹽鐵支二千八百餘匹共計四十萬二千九百餘匹今樁留五十萬匹左藏庫金明堂度支金腰帶計六千七百七十兩今樁留八千兩見在金只有八千兩如有支動即逐旋撥還元數第闕等生衣物明堂度支計錢四十五萬貫今樁留五十萬貫錦綾羅鹿胎透胎等明堂度支九萬九千八百餘貫今樁留十萬貫絲明堂度支三十八萬八千兩今樁留四十萬兩綿明堂度支一百四十二萬八千餘兩今樁留一百五十萬兩右謹具進呈取進止上財用總要劄子臣待罪三司已踰三年伏念金穀貨殖之職顓總大計民齒耗登財用豐寡日考而月課之乃見虛盈然而知識昏冥不知通流之術無補於國又當此冗費無極之時每一念之竊祿苟安慙死無地謹撰成天下財用總要一册上進伏惟陛下覽之可以知當今天下之勢選求長材俾臨是職與臣間地廩食養親臣不勝激切惶懼之至取進止端明集卷二十六
