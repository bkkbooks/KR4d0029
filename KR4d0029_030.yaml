body:
  text: 端明集卷三十宋蔡襄撰啓謝知制誥啓某啓伏蒙聖恩授前件職者入贊訓辭冒華於天奬旋躋禁近假器於人微賁榮三品之章釐正五花之判乾坤涵覆輪桷登收謬恩莫回靦處為懼切以聨視北門之草唐循四禁之防典司內史之書周先八枋之重陪正朝之樂酒扈威路之喜遊振職事之經居中可作集右文之治精選匪輕國家總神轡以馭方闕皇源而圗治震於諸福格乃大和遴延英絢之資輔益聖神之聽處則裁號令之溫麗進則條科指之通行以故書渾渾而繼虞朝穆穆而踰漢自匪國器稱乎髙雅士林推乎純深學善詩經文諧律吕則何以奉行䇿命之密前望光景之嚴類常揀求奚取叨越如某者結髮平進濫中下藩賴天時明有祿親逮食畫墁者無望於三釡安槍榆者自足於一枝旋給筆於中宸得盈篇於燥吻重以隨牒一官之褥䇿名十載之淹狂簡成章僅就小能之技氃氋不舞幾貽真賞之羞濫及英遊巳虞過任進曬牙籖之盛虛鳴璲玉之長以至承諫署之缺員預王闈之記事朴遫補過冥煩忘勞丐使節以去邦泣父書而銜蓼養堂所倚僅求吟喘之餘祥辨亟更還宿編摩之舊兹承命召番掌制綸不能追昭文之坦明徒亦伸笥服之安燠矧復寧平考實畯譽比肩皇麟在囿之儀儀元鳯覽暉之翽翽遽收材譾深奬寵多斯蓋伏遇某人發澤真誠推轂寒素恤稀遷之末迹懋樂育之深仁過私華衮之褒濡及春天之潤敢不恪修志介朂濟官成勤磐石之細書勉鉛刀之近用是圗報上無玷與人杭州謝兩府啓右某奉勑差知杭州軍州事已於今月二十六日赴任訖剡奏陳情幸諧於前命自中易外獲領於便藩切念某學術迂踈器能朴陋早際重熙之旦寖階膴仕之榮徒知執節以致忠不能應機而趨務歲月持久寵光益蕃雖要職之屢更顧微勤之靡效間以親闈之養懇辭計省之勞旋改近班俾分外鎮矧東南之奧壤號繁劇之名都遂其夙心實亦優寄此蓋伏遇某人協和元化俯徇物情議論繫乎重輕任使均其勞逸敢不益堅素守勉布寬條上酬覆露之仁次答陶鎔之力回韓舍人啓右某啓伏審祗奉寵章進司民命伏惟歡慶切以朝家百化整整萬官林林曰重與輕自內而外况直星垣之祕處天禁之嚴文章之所本原號令之所基始鼓萬方之動莫尚乎辭搴三代之英以至于道號為清貫屬在元英伏以某人德粹行方學老文巨為之英䇿可施廊廟之崇語以名聲宜冠公卿之重歷登膴仕常邇清光遽升秩於春華遂試才於翰墨旋繇官邸密謹宸趨二螭之坳既重史職四禁之祕闕二字詞林以仕論之居髙故褒章之特異擢名近闕三字珍羣敷天下之言一還於深厚遞省中之直猶闕二字嚴凝矧復通國政之論思自上心之東注若夫台望由此階升承禮意之相先辱箋修之來貺感銘無既交萃襟膺回賢良李祕書啓右某啓伏審奉方聞之語置絶異之科寵榮闕三字駭羣聽切以朝廷考百化之統究萬微之源內則參知於廟堂外則博訪於郡國尚慮疑異之至有幽而難曉經綸之術有鬱而未通乃於簮紱畎畝之間起䇿謀文學之士俾造便座極陳昌辭指朝端之紀綱論天下之利害上切親覽弼成化功伏以賢良祕書學該天人識洞今古聲華溢於韶夏行實粹於璆琳練達經權講通治亂賈誼宣室深對於所然平津太常首承於召見修程伊始親議所歸方拭目以想聞遽裂箋而見授情文甚厚衰拙何勝永光篋笥之藏愧乏瓊瑶之報回賢良范祕丞啓右某啓伏審入造明庭恭承大問擢升異等光駭衆聞伏以賢良祕丞學臻本原言有閫域精識萬變深天人之交大名一飛在日月之下以久大自處而不習章句以功業自期而好談經綸賈揚之鴻藻何多朝董之芳蕤盡在頓自上心思啓沃之論深詔執事舉方聞之賢薦書適達於九閽俊譽已交於多士程文禁閣並厠於羣英奉對宸儀超躋於上第龍階尺木之翼鵬漸南溟之圗號為得人丁此盛旦猥承大軸之貺首講好言之勤在於踈涼非所宜稱愧乏瓊瑶之報但光篋笥之藏泉州回交代啓膺命簉藩交龜視事否德踰爵無禆漢詔之嚴善政告新幸服蕭規之誨喜及瓜而為代傷折栁以贈行詣闕旌軒淹致堯而有素攀轅父老思借冦以無階促祖禮之空疏賸思心之愧結去德未移於旬浹因風頻寄於年華敢圗謙矩之光加有公極之賜巽辭溫密誠虛長者之懷褒指勤能似重宵人之過永言佩刻逈異尋常顧水驛之阻修逼年籥之遒暮勉祈寶嗇前拜寵靈禱系之私剡濡曷既賀文相公樞使啓竊審拜恩宸闕正位樞庭伏惟歡慶恭惟樞密相公望重本朝聲加殊俗抱夔龍明允之業會堯舜光華之辰忠言嘉謀盡上前之啓沃入輔出帥繫天下之安危四方于宣二府更踐上方尊任舊德圗回太平委大柄於機衡運闕二字於帷幄雖本兵之地載副於具瞻而當軸之司闕四字任某聳聞成命增抃鄙悰恨守外藩阻移崇屏回秦州知府錢端明啓涖官東周無日暇給引領西屏若天阻遙勤企宴遊積深悰悃久稽寒暑之問懼黷髙明之威忽辱眷私逺煩禮訊竊惟節制方面奠安藩維神明擁全戩榖來相伏惟某官識通聖奧德重坤言行業幾於古人經藝純於當世光映朝列簡在宸衷延登書殿之崇總統麟符之重敢兾副上之眷御生以和兹用感藏豈勝談悉省主端明韓侍郎啓伏審祗奉制書總司計籍伏惟慶慰恭以某官至誠格物奠學際天飛步書林文采昭於羣聽正冠憲府風聲凛乎四方厭從事物之勞繼得藩宣之請化行右蜀入尹上京理狀亟聞帝衷彌簡領縣官之經費尚屈周才代天工而燮調佇諧僉議某屬嬰官守阻簉賓除抃蹈兹深名言罔既呂樞密啓伏審顯膺中旨榮二內樞伏惟慶慰恭惟某官資以天髙美由世濟親觀亨嘉之會自祈睿聖之知材用之全所臨必最禁嚴之選其歷始周由右蜀之召還領中都之經費上心已簡師錫攸歸籌幄深嚴已參於坐論國鈞繁委即應於具瞻某限守藩方阻趨賓屏側聆涣號徒抃深衷回校勘孫學士啓伏審被命宸庭升榮文館伏惟歡慶國家纂襲慶緒網羅藝文惟名號之浩繁重簡編之舛缺旁求時彥增置舊員豈徒正録略之訛蓋亦廣賢才之育校勘學士業履尤異名稱甚隆向在先朝首當髙選緝羽陵之紛蠧覿金匱之幽藏歷日居多疇庸果茂先貽啓幅敷敘榮期感抃之深名言罔既賀李太尉啓竊審榮加使節出鎮侯藩明命載傳僉圗允協恭以知府太尉長才經逺敏識通微世濟美於大忠家聨華於近侍早更中外之寄夙藹縉紳之稱吳國撫封久思於留務漢壇授將初建於齊牙仍殿重邦併光優渥元戎十乘已宣連帥之威泰階六符即正熒煌之座方聞殊拜增抃鄙懷其諸曕祈難以文諭回知瀛州知府待制啓言念竊便藩之寄越在天隅瞻帥閫之嚴恍如霄極惟神交之留念煩手記以相先宛然成章永以為好伏以某人以道自鎮與時會亨進更臺閣之遊積有朝廷之望維北道之分邊防且嚴重天之威兵制盡在况直雲章之祕方司武律之崇併授權綱用清氛祲行促追風之召入持造物之鈞冀保興居庸符公望判府相公問候啓近以國家載煩舊德専鎮大邦阻窺上衮之嚴莫簉翹材之盛明神薦佑景福如歸伏以某官大方無倪全德若隱武公之政宜在國人文子之勳復刋盟府然且解魁衡之務重屏翰之權孟津三門已給甘棠之愛豳詩七月載歌零雨之思庸副具瞻大庇羣品敢祝為上毗倚精調寢興私所禱祈坐勞懇悃回慶州經略觀文孫侍郎啓伏審就膺詔書移奠侯服夙叨奬願不無歡心恭惟某官推誠在民以道結主出處聳當世之耳目議論繫本朝之紀綱故日月之光得以明其義雷霆之下不能移其忠上以天下之雄時惟關中之會維周之翰申伯偃藩自陜以西召公作帥然考來今之制此為元宰之基納願兼常治書見貶意非詞盡感與抃俱回秦州密學侍郎啓伏審外改使符西鎮侯服斗樞進直朝望增榮伏以某官性明而誠體靜以正中外共仰聖神所思頃繇司牧之卿進拜緑圗之府出持漕節曾未歲辰上惟秦谷之雄前控戎庭之會特煩鎮撫用遏披猖闕提數道之兵大建一方之政兹實岩廊之漸允符薦笏之言致慶未遑流書見枉感銘抃系交萃悃悰回河東都運孫侍郎啓伏審肅拜制函進升書殿地兼權重才與望并伏惟某官體被中和德含方重露賢才而特起會聖旦之重雍向領帥垣翹専方面上以大鹵之奧部天驕之接疆輸轉至煩調度頗急足兵足食將仰於周才為龍為光豈量於後拜何期沖抑遽辱飛箋謹於置藏永以為好賀運判啓伏審顯膺涣綍出二均輸爰擇剛辰以諧上禮伏惟慶慰伏以某官秉心醇粹植操清夷早遘休期薦更寵數圭府佐治方成刺部之猷簜節宣威爰假工商之畫矧惟下車俯邇投刃皆虛暫資強富之謀即奉清間之宴叨分寄任始喜同官抃躍之誠剡削無諭回賀編校丁學士啓伏審榮拜王言進居文職且賢者器業已為人之所知而朝之公卿由此途而登用伏以某官學奧知巨德粹行方入紬四庫之書深被九重之眷權升詞館度越珍羣行居天禁之嚴仰直星垣之祕側聞優拜倍積抃悰煩禮意之相先遽箋修之來貺玩詞益感敷敘奚周觀文侍郎啓伏審懇避樞衡出専方面進陟天官之二榮躋書殿之華制命傳聞歡頌交慶伏以某官均嶽之鎮得坤之元簡在聖神踐歷中外本兵之府勞制勝於未形瀕海之邦暫均休於共理明詔一出先聲四飛側聽下車即聞報政惟恐中途之召促調元鼎之和系詠之深敷宣罔既回盧龍圗啓伏審得請宸廷専制方面號稱東海之表仍寵駟車之榮上眷素隆歡頌交慶伏以某官以道結主推心及民議論繫本朝之紀綱出處聳士人之觀聽暫解經筵之務邉分藩屏之雄齊魯連疆報政不須於期月勳華當寧經邦即賴於謨明會承驛置之來首枉箋修之貺兹用感服豈勝究宣回定州傅密學啓伏自進直斗樞領府屏朔謀帥之重注意益隆惟幕府之初開保靈襟而加謐伏惟某官抱器閎逺逢辰靖嘉內外展勤文武惟憲中山屏翰北道襟喉常宿徑兵號稱要壤聊護諸將式遏一方矧鄰好之締修屬戍防之罷警行膺迅召别遲登庸猥荷眷私逺煩音訊曲敦夙契倍切感銘回洪州施刑部啓近膺中詔出守外藩理舟御以沿流敢稽嚴旨奉親輿而至部幸慰慈顔承候置之逺貽辱珍縢之見貺持謙自處匪異巽牀推美過隆有如華衮此蓋某官之方繇器望適統藩垣早者奉朝實託雅遊之厚今兹忝寄又通鄰道之歡尚阻披承倍深感系回沈郎中啓側聞優拜上恩往釐外計地兼權重才與望并伏以常宿徑兵實最他道率資用調亟委均輸申命數以載隆總事為而益厚伏以某官周才應務逺識前民乘西洛荒歉之餘盡歸經畫奉朔易浩穰之給佇出謀惟由此階升别膺柄用願言珍嗇以慰傾凝回陜西運使蔡司封啓言念日月靡居闕歲華之易得江關修阻曾記問之難通伏辱郵音特形禮意承按行多暇固擁之福以假寧伏惟某官早逢聖神自奮闕三字淵闕美闕內富激昻感慨以特髙矧兹陜服以西號為要地朝廷之任式藉通才尚希保和别膺闕任回廣西沈運使啓向者承祗事闕言過敝封暫闕八字臺之重請行甚闕結戀兹深諒安闕六字及時之問眷存良厚感戢增多矧惟才逺而闕二字能以介臨按逺闕所闕出車之遊召歸嚴宸闕三字笏之賜願持主術庸副睿詞衡州國博啓伏審某官顯膺闕綍出領使麾殿衡嶽之名都冠荆湖之巨屏徒兹闕重闕二字均勞豈謂特示隆私闕貽芳檢篤叩勤之雅誨摛葆飾之英詞闕二字露冕之餘無廢髙壺之樂民俗歸厚巳銷南顧之憂堯闕疇咨宜偹西清之問克伸宴集增煥邇班傾頌之闕翹凝更積陸太傅啓郵驛相遼聲猷且阻欣聆二政多所上聞近者猥示榮緘備形謙德曲敦奬飾之旨極摛彪絢之詞繹玩於三置藏不滅餘杭會屏東浙要封屬當贊治之餘益振批軱之利坐旌美課行峻榮階歌薰在辰浮瓜阻宴傾企之素敷敘奚殫建州運使曹郎中啓曩涖闕二字實託雅遊之厚洎分郡寄復通鄰道之權猥辱闕二字逺勤禮訊詹言清晤彌切中藏伏以某官適總闕二字夙推時望風生列壤欽抗志之澄清闕奏中臺闕二字褒恩之優渥歊炎方熾會見尚賒系闕銘矜膺闕華回宫使曹相公啓竊藩垣之便越在逺方瞻門戟之嚴恍無虛日承抑宰衡之體時頒使驛之書諒惟拱揖大和介受景福伏以某官膺時間傑與國純忠在環衛之崇尤號敦固加戚里之近最為賢明更冀對時之休御生以道匪私勤禱抑衆具瞻回唐龍圗啓伏以延閣疏榮髙牙開府闕洮河之種落握大鹵之師屯節制闕二字表儀體重闕常闕始傾抃尤深伏以某官盛德鎮闕嘉名拂世忠義所激髙視於古人權任所専威流於異域逺煩禮訊欽荷謙光感篆欣瞻併嚴悃愊謝鄰州知通啓近膺中旨出守近藩瞻言篤信之邦俯出經塗之地薦呼趨而狂駕陪捉麈以間談逖念眷私實懷感著屬兹視事之始早稽剡牘之儀緬惟首夏清和惠條寬肅處於餘裕固練神而有方給布歡謳行辦裝而趣召杭州侍讀啓向者赴治鄙州借途上府洊瞻姿望特荷奬延置酒宴堂屢齒下座解維客艦旋逺重門領職伊初望風寖阻恭惟靜鎮居叶淑祥伏以某官內閣元臣禁林舊德簡侯分閫聊福斯民曹參治裝行須大位伏冀上為明闕善保粹真建州林書記啓言念雖處僻郡多謝來賓人豈慕於生芻禮敢忘於瓠葉賞心樂事幸可備於良辰旨酒嘉肴絶將意於君子尋以暌判慙無宴歡豈謂惠書過承雅好但捧味而無斁卜欵會之未期更冀珍調以需光寵回賀劉祕監啓伏承拜命為藩涓辰立政何撫封之在始特貽教以相先禮意曲隆銘言不既矧惟踐歷華貫徊翔盛時九寺近班最重蘭臺之長四明要地適分竹使之符行聽政成别膺詔委連名部闕實假鄰光尚冀珍調少慰傾想回知太平州李郎中啓外塵薄服勉奉官成雖維一隅距更數舍積有闕齋之戀僅稽驛闕之行敢從順風獲此來教如奉燕集諄諄所談抑聞寢興簡簡其福既感且抃非言可窮矧著幹聲之聞將結主知之厚冀精道味以蹈天和回新嘉禾知郡郎中啓曩聞被命未遑馳一介以舉書徒切傾風不啻逾三秋而結想忽詒汗竹之訊審赴及瓜之期甫邇晤言預深抃幸矧惟領劇藩之久次踐華省之上遊佇報政成更比齊侯之速别膺大寵旋觀漢札之飛餘冀珍調庸符詹咏錢舍人問候啓言念川陸差逺信郵僅疏虹霓之光適此東望金玉之間遽然南來損抑載深感服良厚伏以某官文巨且粹行髙而純道靡緇磷溫其美玉之潤心無枉撓淵然止水之明行奉節騶復升詞掖冀精道味以永天和端明集卷三十
