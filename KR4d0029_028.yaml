body:
  text: 端明集巻二十八宋蔡襄撰記羣玉殿曲宴記嘉祐七年十二月二十七日上幸天章閣召輔臣近侍出太宗游藝集真宗文集以示之又出瑞物石之類五一曰趙二十一帝二曰真君王萬嵗三曰天下太平石本如拳皆隠起成字四曰石佛像石一面平有黑理如浮屠像五曰軟石狀如界尺可長五六寸持其兩端而曲之木之類一不知何木長一尺許中分之白質黑文曰大連木竹斷兩節直剖之雙絃属其上下命曰君臣合歡竹龍鳳卵二龍卵可容三升鳳卵可一升皆中空以黄金飾之為瓶狀金珠之類四生金山一重七斤十四兩嵌嵓峭突有山狀丹砂一重十二斤八兩色黑若鐡間有芙蓉頭七星珠一徑寸之四分有北斗星文旁出輔星皆隆如粟粒褭蹏金三漢武帝詔所制以應祥瑞者凡一十三種既已移幸寳文閣親書飛白四十餘字遍賜羣臣遂宴於羣玉殿是日名香珍闕金縷綵花皆自中出宣諭以太平無事卿等盡醉乃索鹿頭酒易以大杯丞相韓公得金蕉葉一飲空杯上舉醆以属曰可更飲否又引一杯上喜甚左右顧令盡飲恩意隆厚伏惟陛下臨御天下四十一年宴享之勤未有如羣玉曲宴之盛羣臣感激際㑹咸進詩歌稱詠其事明年正月八日翰林尚書吏部郎中知制誥權三司使臣蔡某謹記賜御書記天子即位之明年建仁宗皇帝别廟於景靈宫三司户部副使張燾修奉九月三日御篆題榜曰孝嚴之殿命燾謄摹既成即以其本賜之伏惟陛下思慕孝烈躬洒宸翰豈特以字畫純厚勢力端勁髙出前古以為美觀蓋所以昭示孝誠於外而令臣民瞻諦知天子念親之深追逺之謹如此其著靡然而化者也燾以職事首荷恩賜雖丘山之冠無以喻其重傳之子孫為盛時之榮遇也三司使給事中蔡某記新泉記功不益於世望不悚於物抱美而淵潛者蓋徯昌於時期大於人而已徯得乎昌期得乎大則益世之功悚物之望固不加少若新泉者斯之謂耶予頃年求薦天都道武陽之西鄙暮抵蘧廬時適新憂思以綆泉煮茗招神宅府而所居之民啜漿熟饍日汲溪隅之水帚遺而溝洩者有之足滌而面沬者有之則曏之綆泉之發莫有所㥦焉循溪而下巨石盤互有罅然中斷者平沙之間泉竇如流縷潤數咫若披而決焉若培而浚焉激乎渾然止乎窪然甘出天味清鑒人骨焚葭植鼎且償昔意既而莫知其為瓦礫之遂堙乎為罌缶之給用乎五年於今矣不意解官就道迹追舊賞所謂新泉者礱石以環植宇以覆居者行者且引且酌徳哉泉乎獨曰惟其時乎則日遷稔革孰泉之顧獨曰惟其人乎則氷瑩玉澈孰泉之有泉莫克明予得肆辨間使弗披而決弗培而浚誠有甘出天味清鑒人骨兹焉之美適以下滋蟄蚓之壤上沃棲鳬之莽豈復居者行者且引且酌之為利哉且夫崪天之幹惟工之斧剸玉之鋒惟工之砥物莫不然斯亦固然予倡厥初是為新泉記云逰徑山記記徑山之逰臨安縣之北鄙直四十里有徑山在焉山有佛祠號曰承天祠有碑籒述載本初唐崔元翰之文歸登書之石今傳於時云始至山之陽東西之徑二登自其西壁絶襟繞轎行少休松檜交錯盤折䝉翳尋丈之間獨聞語聲躋稜層披翠蒨盡十里許下視來逕青虬蜿蜒搏嵓騰霄且及其巔峽束洞隠幾不容並行已而内括一區平林坦壑四面五峯如手豎指一峯南絶卓為巨擘屋蓋髙下在掌中矣其間小井或云故龍湫也龍亡湫在嵗率嘗一來雷雨暝曀而鄕人祠焉者憧憧然環山多傑木絲杉翠檉殆千千萬萬若神官蒼士聯幢植葆駢鄰倚徒沈毅而有待者導流周舎鏘然璆然若鑾行珮趨而中莭者由西峯之北數百歩矻然鉅石屏張笏立上下左右可再十尺劃而三之若川字𨽻文曰碣石嵓其石甚神並傍巖被谷修竹茂宻嘗以契刀刻竹兩節間成景祐三年十二月十五日字云爾由東逕而往坎窞為池游魚曠空其西逕東折蹴南峯領脰之間平地砥然盈畝而半偃松一本其髙丈其䕃四之横柯上竦如芝孤生松下石泓激泉成沸甘白可愛即之煮茶凡茶出北苑苐品之無上者最難其水而此宜之偃松之南一日千里浙江之濤可挹越岫之桂可攀雲駁靄褰狀類互出若圖畫蟲蠧斷裂無有邊幅而隠顯之物尚可名指羣山属聮呈露岡脊矯矯翦翦咸自意氣若小說百端欲聖智之亢而不知其下也臨觀久之魁博通幽之思生焉古人有言曰登髙能賦可為大夫㫖乎哉予於斯見之矣曷止大夫之為也大凡言之天隣地絶山囘物靜在處神巧舉可人意雖窮冬閴寂未睹夫春葩之榮薰風之清秋氣之明然取於予者猶在也既歸無幾何而曩所歴者重鈎複結無一見焉追而言之若覺而言夢使人悄愴而不知其自也同逰者建安黄瑊君度岳陽朱師徳宗哲又君度之姪曰子常子美甥杜沂皆從遊其前與謀而後以事已之者朱宗哲之兄師道希聖杜沂之父叔元君懿掲陽盧幾舉之三人莆陽蔡某一與之善惜乎不及俱也書所經見往貽之人一通嘗刻竹兩節間之十字其遊之年月日也通逺橋記隋都洛陽負城封地以為苑圃唐全盛時距城西絶穀水治兩上陽宫梁其水以通之益修臨幸觀游也館囘繞幾百里禁民無得至者自天子在沛河南為别都悉弃故苑囿地與民耕而為田復舊梁以達東西道焉榖水發源甚近於其常也特漸車之瀆然北並山阜乗積雨支流之勢湍注益悍雖鉅木叢貫而力不堪植漂浮判散行者艱濟即又新之雨輒復壊若是嵗或再三焉寳元二年資政殿大學士禮部尚書常山公既莅河南視民之所以利與其所以病必興且置之物制事辦罔不脩舉其夏榖水敗橋公曰道吾疆而有病渉者孰使然耶吾思懲數勞而圖久利無所事木必伐石為之乃可於是命三班奉職勾當橋道司王懐吉専董其役復以内侍髙品監修大内任修已府推李昭逢總其區處考規度商功費謹財用庀工徒罔懈以力始作於八月丁亥迨十月癸未以既事告公謂某曰橋抵宫城七里舊以七里為號今新矼益壯大子其擇所宜稱者名且記之某退而次其道所從來蓋西屬於陜達於秦雍盡關中地方數千里又西南踰襄漢通巴蜀其王官之奔職邦士之修貢傳郵之將命商旅之遷貨若方外羌夷荒忽之域涵澤而内附凡東走京師以往來者車蓄背負蹄軌相軋莫不出此逺哉其為利乎請以通逺名之古諸侯國咸有史官事小大悉存於簡冊魯新作延廏而書之春秋蓋無不録也後世州郡無以紀事職其官者有所興治非特識焉則泯昧而不傳焉某謹載其實掲石道周異日職方氏訪通逺橋作之所始於是乎考十二月二十五日留守推官朝奉郎試大理評事蔡某記導伊水記伊水出伊陽縣西南山北流至闕塞折東㑹於洛自闕塞治渠釃水行一十八里以貫郡城伊瀕大山屬連數百里其生植深逺無窮多材木林竹薪蒸橡栗之饒嵗取之設方泭以載浮伊而下循渠引行萃於城中物衆售平人用頼焉其後渠廢水涸昔之可浮而至者悉載且負久之莫或復也寳元元年今振武軍節度使知延州范公以資政殿學士吏部侍郎居守西都首圖伊渠之利乃命知河南縣事尚書虞部員外郎王益恭右侍禁皇城廵檢李昭慶迹視其故計費度功以三班借職監竹木務劉信河南主簿歐陽昱總庀工徒秋九月二十七日始作冬十一月十六日役休納石竹落以障大川更起隄防壅其來勢及城且五里洛渠横前不得絶其流而度編木為槽承以石趾架而通之向之載負者復捨陸而浮矣官寺民舎往往支取其饒溉注園池碾磑為利滋博其年公持節守邊明年以書與某俾述渠以遺後人庶完治勿壊某竊謂近世官守亟更易無常處所臨之郡官稱姓名適在人耳目則又罷去雖良吏勢不能施發徳恵積染風俗之久而必從三年而遷視其地與民置之若遺迹非志於民者孰去而思之耶公方専制羌虜蚤夜設方略審機勢以攻取決勝為事今乃勤勤洛人之利而不忘可謂志於民者矣二年十二月日留守推官朝奉郎試大理評事蔡某記白波發運使㕔壁記唐開元中裴耀卿建言瀕河設倉廩治舟以漕湘衡吴楚淮泗之粟水行數千百里浮鴻溝達河泝渭以食長安用是國富以强其後劉晏修舊制費益損而力益贍號為材能自天子居其大梁南方之饒萃而不西乃取闗中地水以東下而三門白波河隂咸設官莅治發運之職其治白波者増使名而重之金部員外郎陳君既總使職凡邦計之所頼貨財百物遷徙上下必精思以行之故事無留者因視其所治介於河洛之間南北有嵩山少室天壇太行羣山絶特之美逺近環合登臨而觀之可以娱逰而宴處於是累髙以為臺誅榛以為圃植宇聮屬互作佳致啚誌記書盈溢几案官事且休日出其下彷徉而自適夫治繁而簡者其中有餘以靜而動者於外無累君處尤劇之務而未始離乎淡漠其為心也豈不裕哉謝公堂記副閣舎人陽夏公天聖中通判府事首議以河南天子西都學館宜鑒唐故事建名比上京遂請易其號為國子監延致舊儒講解經術以教學者公雅以文重於時又躬與諸生立程凖評辭章毎更品目聲聞輒隨而上下咸益奮厲業成而登仕者比舊加衆自公捐世諸生日相視嗟戚皆曰孰從而求導予者既又曰逝者不作而思者無窮昔後魏劉道斌治常農脩建學校郡人追繪其像於孔子祠唐楊瑒為國子祭酒其徒即而立頌稱載休徳今或圖公像於學以厭羣慕不為無所則乃疏其說於府而遂圖之以時禮焉公氣和志直内外修眀文章謹於法度叙史體述制命尤為深約典重臨事通敏雖衆所難能論致公前立斷可不可已而皆宜設於政治依放物情裁以教義故所至令順而民懐樂推進人善器其所存不强其力所不逮士無賢愚一造門下滿意而歸議者以公材全而徳盛使且貴顯必霈然大施嗚呼享年之薄天下所以重為之哀悼况洛之士民親闕而薰者於是舉也宜矣公諱絳字希深以寳元二年十一月終於鄧州春秋四十六其年十二月二十五日留守推官朝奉郎試大理評事蔡某記安州孝感縣井記闕陽君闕二字始作安州雲夢尉自以事辨治如何豈闕官闕二字為闕乃厲精舉職慶厯元年今資政殿大學士闕右丞范公時將其州表君才能移孝感孝感之闕飲旁瀆若嵗雨潦溢汲者罌缶顛道寒闕五字逺難致君至則令其民曰吾將井以闕四字者百姓奔譁皆曰能是瘉我病矣相與出雇錢陶塼治傭以須君為之相所宜地發之得泉甘美其年夏秋不雨土膏乾燥他水日索而泉出愈甘源來無窮民益異之又相與礱石乞文以識其始古有厮陂渠教農種殖貨財或功利饒於人而資於國者前史書志皆特載而詳言之以法於後以君之智力使有能知而用之者盡所謀為則功利一闕二字名氏宜得附書志以顯復井上銘耶然尉之闕二字莫得自効因井之利而紀之以永其人之思且君後果用是以驗云二年十一月十六日記臨安海㑹寺殿記杭州臨安縣海㑹寺梁大同中始作號曰竹林及五代正明之初呉越王又新之王縣人也少嘗往來里中困甚已而跨有全呉名貴地大私念所從來豈非隂有相我者耶且竹林最得山水佳趣因大治之益廣前制當是時呉中浮圖居雖百千數無是倫闕大中祥符間例易天下寺名遂錫今額天禧五年冬十月火通夕而墟其徒散去摠持僧有明願思惕然以興所廢為已務毎說於衆曰吾師之法或資於塔廟福報之來稱其所出今殿適謀始而大家力饒不能厚施異時名氏不齒篆載反索氣於後人其可乎於是盛仁俊張從實先輸而唱之又從而和之數十百人以圓監元一盛張兼筦度材礱石暨茨階級之役積費錢三千萬役一十年而後已既成列像其下皷鐘其中㑹合邑子而落之墟者復庀而散者還集昔錢王以一國之資基之於前而有明以一已之志繼之於後可謂能且勤矣慶厯三年正月十五日記福州修廟學記闕六字地險而壯福州之治尤据其勝勢為薰漬劘闕日以滋衆然庠校之興前無著者自五代錢呉越王制専甄治分子弟以莅之乃作新宫號為使學本朝太平興國中轉運使楊公克讓始立孔子廟以闕春秋景祐四年通判謝君微權職郡治遂表建州學仍請賜田五頃以久衆處詔書報下謝適罷去逮范公亢許公宗夀更守此邦參擇曹椽之能者東南一都㑹其風俗尊嚮儒術唐之友盛間有重人闕黄中方嶠繼任其事商工度材歴五載而大備公帑之泉計費千萬植宇之楹總數六十中設孔子與其徒髙第者十人像又繪六十子及先儒以業傳於世者皆傅之壁曰九經閣以蔵舊所賜書曰三禮堂以圖輿服之制祭享之器黌舎齋廬旁翼兩序庖次幷飲百用資給今尚書都官員外郎沈公之來入而拜出而歎曰學成空不居無以育賢才而起風化乃與監都太常博士陳君議増美田充所賜數迎舊儒敷解經術又立此業凖程羣居約束掲為衆則以侯官尉呉及兼總之於是遠近學者靡然従慕初公至精究疾弊繩治强豪人用震㮚既而譬曉士民教之六藝以是知公摧兇枿而培善本威與恵並施有所歸頼更口滕道厲戒幼小無或失業咸願刻文於石垂延久後遂相與來請某為之記已又作詩曰於戱生民角翼者羣上聖有作才治人文執道之中立世之紀厥後迷謬乖離本始躬服儒方偶嫓言詞専用於神乃文之疵入齒王官出知法令不失有罪乃政之病然於當時咸著能名使二者失由學弗明學斯謂何忠義悌孝政斯謂何禮讓風教譬如大鼎量入於鍾龠石百數罔不兼容在學於政先其大者言詞法令進闕之假唯州有學邦君實謀駈汝閩民來處來逰象圖嚴嚴記書整整衣冠肅雍室廬閟靜敦為人父敕戒而子往焉問聞弗往攸恥孰為人師啓率其徒開陳統要罷詘巧誣闕二字廢興屬於繼承益完勿圯惟賢者能葛氏草堂記葛君公綽即其居之東園植竹檜果花㡬萬本又因其髙下以為丘池疏渠行水於其間冠丘於亭跨池以梁作堂其中可以安處而逰息焉予嘗過之公綽指而謂予曰宅於山雖有嵓壑靚深之趣然以人逺欲從賢豪逰不可得也至於都城雖與人近然俗塵時溷人意欲自親邁不可得也吾不晦於山不汩於城堂中儲書數百千帙先生當前子弟羣植考經義之微咀文章之華如是者吾所以學為業也若夫花飛而草長竹隂而泉鳴蟹魚果蔬俛仰掇拾登臨據倚醉歡笑歌此吾所以從賔逰也賔既休矣蟲鳥幽幽樹林暝色而烟歸荷芰泛光而月來此吾之所以閒燕而自適也若東園之勝吾専有之吾無負於斯矣予謂之曰子之兄子雅君而下皆以文藝中科走官四方子之嗣葉日益新又將仕矣然則所謂東園者殆與仕而老歸者為謀子安能専有之而且不負也皇祐四年二月日記杭州新作雙門記杭州二浙為大州提支郡數十而道通四方海外諸國物貨叢居行商往來俗用不一自錢氏専有呉越治兵蓄財日為戰守政出臨時朝廷除刺史以來蓋八十年其風流治迹有足稱者要之起廢弊變繇習斯亦難已至和元年資政殿學士給事中孫公自樞宻副使來撫是邦六月署事曰此吾故鄉也敢易治之闕里之稅嵗糜中産餘二十家為之籍其地而出其資市賈謾欺取予不均為之正量衡而一之富黠倚强蝕貧誅利為之索其黨而逐之盗俠閉蔵出沒無常為之根株而去之俗尚浮屠歸施無節嚴以約束婦人女子潔㢘其行寵以衣珥髙年舊徳或復諏訪數月之間所部逺近莫不竦動迎向公訓公知衆之已悅也隨所譬諭勉之於善秋八月語其僚曰諸侯臺門以髙為貴蓋以尊天子所命而示等威也昔錢氏於山阜為治所而雙門置縣木錮金鐡用為敵備今方内統平吾為守臣於以遵化而流澤毎大號令從官屬陳兵校㑹州之士民即門首張次班列而布宣之門圯而地狹又非禮制豈所以重方面之體乎吾將易而新之即以其説謀之轉運使資以羡錢又詢之於民良家大姓願以力助於是商其用而裁取之凡金埴竹木之材必可其直塈陶蓋梓之功必當其傭十一月甲戌興作明年五月訖工十有五日壬申合樂燕飲以落之至於下邑旁郡攜扶老穉闐溢郛郭相與觀聴指是巍然者曰上之命令由是而出下之情偽由是而入一有不誠重為門羞吾屬戒焉是年某出刺清源州人遮余而言曰我公之為治固有聞於執事矣始者革弊屏惡人畏其明已而拊養鰥惸教勑子弟及其治成井市童兒不收落錢田豐海熟人得其職公作雙門我實與之公歸有時我思無竆願為紀所作之始而刻之石庶幾傳之子孫益遠不忘初公定邕廣大寇還請莅杭上以其能讓而不伐中道召司宥宻未㡬以直議不能與衆合遂伸前請至則勵精夙夜決事不以宴息自處其忠義進退之莭與所施為若千里之績固不足書然州人過余再三稱頌懃懃不書無以慰其志九月二十日樞宻直學士起居舎人新授知泉州軍州事莆陽蔡某記亳州永城縣廟學記孔子之門人顔淵最為髙第其稱之曰有顔囘者好學不遷怒不二過昔之所以教人與其所以為學者類斯道爾孔子沒其書傳於後而學者繇其言以之道顧有不至者非道之逺葢利汩之也戰國以材智相傾士以儒文其身而挾其私術趨時嚮利獨孟軻荀况顓其所守而不屈於當時漢以明經射䇿六經之徒自名其家顓務師説是非或戾於大中然決大事尚傅經以正其義故其治迹文質有可觀者由漢以來曲褒孔子至列王爵而廟郡縣奠其春秋用尊大其道以勸民學而取士之路以闕詞為進士以數字為明經中其選者相躡為公相顯榮天下天下承流其徒以千萬數至不可勝計其師弟子皆以仕進之具相從幸如博奕苟入科則禄士或以孔子之教人者倡於其徒則為窮師以顔子之所謂學者學之於人則為窮人數百年間雖大賢功業班班見於史載而其風化之美不臻於三代之隆蓋其源流異也亳州永城縣孔子廟居城西隅庳陋不完皇祐四年大理評事杜君誼知縣事杜君以孝行聞而治民有誠信以謂均賦徭辨曲直剔姦弊興美利斯材吏之易能孰若教明以善道而使漬於仁義乎眀年出奉泉遷廟於東南直汴之陽作文宣王及兖國公而下十人像籩簋之數率據典禮又旁廟設學舎數十區將以教育人材於是縣人之為學者各以其力相之冬十二月廟學成杜君録其本末以來請文予謂居其舎者師若弟子皆知其所以為學之本勉而求之能以是治其心而立其身所謂進士明經之術者庸有不能哉嗚呼瞻於廟㳺於學以思其道斯可謂之學矣舎是而言學學斯為利學其利乎斯下也已修驛記興化軍仙遊縣太平驛在唐為風亭館事載皇華四達記今門有新題而鄊俗猶名其舊葢所繇來久矣嘉祐元年始作㕔事六月某自泉移福詒書鄊人共完堂室二年再臨泉州時殿中丞知縣事閻君仲甫來况行舎曰此吾所治也於是上葢旁立不完與正者易之閎廉隘狹椽甓缺朽者去之治材於公民不知勞旬月而大備使者行部王人乗傳之南者以舎息便安之美為言予嘉邑大夫能修其職適事之宜又思自幸扵東歸也與夫鄊里有徘徊之頃實被其利斯可忘哉因取詒鄊人書兼載所造列之屏著之側昔人郵亭不修見譏前史惟事毋小乃政之紀五年五月二十八日莆陽蔡某記萬安渡石橋記泉州萬安渡石橋始造扵皇祐五年四月庚寅以嘉祐四年二月辛未訖功絫趾於淵釃水為四十七道梁空以行其長三千六百尺廣丈有五尺翼以扶欄如其長之數而兩之靡金錢一千四百萬求諸施者渡實支海去舟而徒易危而安民莫不利職共事者廬錫王實許忠浮屠義波宗善等十有五人既成太守莆陽蔡某為之合樂讌飲而落之明年秋䝉召還京道繇是出因紀所作勒於岸左杭州清暑堂記京師東南千里入呉越杭於呉為一都㑹其地傾而属海又多陂池以故善濕方春夏時梅雨蒸欝礎甓皆汗披纎衣覆大厦猶鼻息奄奄不得曠快非有髙明之居曷以禦之於是清暑之堂作焉清暑者負州廨之左直海門之衝其風逺來灑然薄人日以決事佚而忘勞至者莫不悦之或曰昔者邵伯將營邵以居重愛民力暴處逺野廬於甘棠之下而聴斷焉百姓思之作甘棠之詩以羙其事今斯堂也度面勢掲崇宇前有江海浩蕩無竆之勝潮濤蚤暮以時上下奔騰洶湧蔽映日月雷震皷駭方輿動揺浮商大舶往來聚散乎其中朝霞夕景不繢而彩翠旁走羣山濵山而湖崖溓瀰漫幷包鉅澤岩岫崒峍圾乎江漢之上蒼烟白雲少頃萬變茂林香草冬榮不彫此所以娱君之視聴也及夫夏日此室煩燠方且披軒闥據髙凉放蕩於無何翺翔於至極蕭然而自適或賔従環次鳴管揳瑟釃酒均餌歌呼晥醉此所以懌君之心意也於民乎何有豈不與昔人廬乎逺野者異哉余謂之曰惟人之情不得其適則慌然余於是堂也愈吾疾亦於是休吾心焉體康志寧然後究民之不至而教之度民之所有而用之去其所不願就其所便安如得其本於為恵也亦大矣乗其閒也燕賔友接和好是亦為政也且邵伯之治或失其平雖木棲露寢民莫之思甘棠之政後世仰而慕之甘棠之茇不可常也遂以其説為清暑堂記平治三年九月十八日端眀殿大學士尚書禮部侍郎知軍州事蔡某撰端明集巻二十八
