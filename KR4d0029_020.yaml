body:
  text: 端明集巻二十宋蔡襄撰奏議論契丹事宜契丹遣耶律元衡奉書為元昊不通和及曽為大舉兵馬出征元昊及請朝廷不與元昊通夫自元昊悖逆以來失於處置數敗威靈消闕五字臣之謀屈金帛之遺而議通和苟求目闕四字食將來之患其失一也我與元昊通和自闕五字却令契丹與謀使之主張輕重之權不自操其失二也既令契丹與謀或聞當時許之事闕五字傳謝及元昊歸欵之日契丹適闕八字意致令生疑復為變詐其失三也闕七字救今元昊議和將有期矣契丹復又自以舉兵問罪元昊且助中國駐留雲州以觀事勢臣竊謂若從契丹之請必絶元昊則為邉患若從元昊之和而拒契丹則執以為名二者必處一焉拒契丹之與拒元昊要其終一於戰而已矣計嵗月之遲與速耳勢必交兵莫若速為邉僃臣見前來契丹壓境増二十萬物人皆謂大臣嘗膽必能為朝廷刷去大恥至今二年一切如舊不聞有邉偹之計或事至蒼黄添兵擇將多不堪用豈若僃之有素也前之弛慢尚可苟安嵗月今禍患已成中國之辱至極矣生民之力至窮矣然彼志方驕假如廟堂之謀月増厚幣日貢卑詞其勢不已若不早為邉偹一旦兵興天下之勢大危矣陛下以宗祖至大之基四海完全之器甘其屈弱聽於外裔豈不痛心臣推其事端葢由朝廷威令不行無人肯為陛下横身當事若朝廷威令必行人各効力轉危為安反弱為强不為難也自元衡之來兩府祕宻安危大計臣不得知今於傳聞復採衆論條列事宜如左論契丹邀功或曰契丹既欲邀功理當趣和今乃請朝廷不與元昊通和何也臣聞每有朝廷使者在彼契丹多出元昊之書以示之然以功不顯著既和之後中國之償我者必輕又元昊必自恃已力能與中國通和不以契丹為重故契丹以兵脅我之絶而示元昊又以兵制元昊之和以示我左右持之而自收其功足為威武之勢臣謂今雖請與元昊絶和朝廷若從之非乆必遣使請與元昊通和言河北帥臣臣伏見數年以來北人觀我事勢恣負固凌脅之驕廟堂失於計謀抱屈意依隨之辱然契丹貫盈自任當極盛必衰之期若朝廷處置得宜有反弱為强之勢方今虜衆於雲州㸃集河北繫天下安危深思作偹之方盡在得人而已臣竊見河北鎮定都部置李昭亮鎮州張存雄州王徳基澶州李昭述等或居要郡或總重兵假使智能竭盡足以輸服於人猶恐計慮或見輕於彼而况指數名姓知委任非人尚令列在邉防得不取笑外裔李昭亮張存李昭述王徳基乞速行差替朝廷若以皆無顯過不欲非時改移是惜數人之顔情不顧生民之禍患若以無人可使延日苟安侍從文武之班同國家休戚之計度才委任必濟艱危伏望聖慈决於睿斷論楊偕請與西賊通和右臣等竊聞楊偕曽有章疏西賊事疏中引用漢吕太后遭匈奴侮慢以遜辭答之事伏以國家方大舉兵討蕃臣叛極者而偕乃引前世女主遭外裔欺侮之事以比聖朝意欲陛下遜辭苟稱臣於突厥且唐高祖本是隋臣初來乗亂乃是隋室叛臣當其困時尚有屈從之事以就權宜其後竟雪大恥今陛下承祖宗之業富有四海豈可引唐室初起權宜之主為比哉臣聞主憂臣辱主辱臣死為陛下臣者見羌戎悖慢陛下憂勤必須痛憤為大恥辱楊偕身充侍從之列不思乆逺之利引前世天子稱臣於外裔之事將客西鄙不臣之人如偕所論非所宜言若在古法即當誅戮伏惟陛下天資仁恕恐未即行然楊偕執論昏謬不宜處侍從之列惑亂朝廷伏乞除外郡以戒妄言之輩乞不與西賊通和臣竊聞元昊遣使請和朝廷命邵良佐報問見遣六十人到門臣竊以元昊叛逆以來大舉則大勝小入則小得都無困敗之事何故請和或曰絶互市而困耳臣謂雖絶互市於土俗非有衣食饑寒之急豈肯卑屈而請和乎此必不然也或曰欲專圖嘉勒斯賚畏我乗其後日欲通和以濟其事臣謂元昊頃曽出擊嘉勒斯賚子瑪爾珍孤軍深入旁邉諸郡未有一將出一騎以躡其虚者後雖専攻嘉勒斯賚邉郡安能度其進退乎然嘉勒斯賚亦元昊腹心之疾勢不兩雄意欲圖之必矣而我㳂邉甲兵三四十萬豈敢全然無虞此欲通和以濟其事亦狡謀之一端也或曰為北人而請和臣謂元昊素與北人通謀推北人主張其事元昊時且自屈以修好為名事巳之後北人來賀是中國弭兵之事全因北人之功何以酬之或要割地或要重賂我既酬之元昊别求隙端舉兵擾邉况元昊父二三十年盟好一旦棄之今縱與盟安能乆乎元昊天資好兵未嘗敗衂豈肯退蹜而久處乎此必通北人之謀成北人之事又以自便也然元昊請和嵗得金帛有益而無害朝廷雖推恩信以待之然元昊狂狡其計難測若邉郡抽減兵馬入近裏州軍以寛饋運之力賊或非時忽有奔突則邉郡之患重於屯田之時若不抽減兵馬饋運如故却添嵗與之物不減闗中之費此無益於事明矣不惟無益於事又有深害今既通和邉郡自然懈弛朝廷務為鎮靜禦㓂之偹練卒之勤必不能如舊日也或曰和而益偹何患乎臣謂用兵之日常虞㓂至將卒訓練未能精鋭以之應副猶有遲緩通和之後其勢自然懈怠一日元昊背盟其禍難救此所以為深害也臣竊料朝廷欲與元昊之請者其説有三焉一曰闗中百姓苦勞凋瘵日望休息聞元昊請和而朝廷拒之必怨而離志也二曰若朝廷拒之元昊得以為詞以卑屈而請和不見信納必將大舉以圖我又適以招戎人之怒也三曰北人自攬通和之事以為已功若不成就是拂北人之情恐生怨隙加之邉帥懲往前之敗且務伏兵廟堂苦戰伐之謀幸其無事所以孜孜急於講和臣竊謂或名分不正不可從也元昊稱臣舉貢雖知其無益見其狡心或存大體而許之飭主兵之臣戒偹嚴謹未為近患或未肯稱臣更有他號或陳兵境上遥為制脅如此之事寜可血戰而死守不可少屈而聴從事也且元昊既不稱臣於我而稱臣於北人或北人遣使來問元昊臣我而不臣中國中國與元昊敵矣别求名分不知此時以何辭答之此臣所謂寧血戰死守不可從也臣不知邵良佐得何要約而處但聞遣使甚衆又慮供具過厚事體漸大望陛下令大臣先議深思本末勿務汲汲通和若虧損名分不惟後萬萬年作大恥辱即生北人之計便為今日之患不可不重也乞不聽議者許西賊不臣事臣伏見元昊遣人乞和名分不正需索過多必朝廷深究事體已有定議然臣切慮有昏謬之人請損名分且與和好務從權變以寛民力此實苟且之論非長久之䇿也今邉兵乆戍饋運繁數誰不欲通和以就休息奈何名分不正需索過多便生北人之心立見厄亡之患非特執一端之説與羌戎爭氣而巳伏望陛下深思熟慮拒絶小人之言主持天下之計大凡百事處置失錯從可更改若此事一失更無可救之理欲絶後患莫若斷之在前區區愚情不勝披瀝肝膽之至乞不許西賊稱吾祖臣伏見元昊使人乞和之事朝廷以其所請過多而又不稱臣未見成議臣竊謂雖得元昊稱臣猶未見可從者初元昊以烏舍之號自通中國及邵良佐使賊以還元昊欲稱男為號吾祖者葢先時瓦卒之名知中國已許其稱呼即譯為吾祖足見羌戎悖慢之意也吾祖猶言我宗也今縱使不肯稱臣而上書于朝廷自稱曰吾祖朝廷賜之詔書亦曰吾祖是何等語耶説者或曰得其稱臣正吾闕二字吾祖於詔書為無害是明知侵侮之端而自為屈辱之事臣竊料議者欲降損事體屑就羌夷者不過曰將帥不才也士卒畏懦也民力困窮也國帑空虚也方今天下之廣士民之衆基業完具但處置未得其方因循不究其弊必大有為然後振起豈得便為無可究治之理去年北人以鄰國制脅已俛首而受辱今年元昊以叛臣而悖慢又欲俛首而從之嗟乎中國之臣何為甘心受此屈辱將帥不才非天下全無將帥之才但求之未得也士卒畏懦自古無不可用之兵顧未有能用之之人耳知民力窮困當求其所以寛之之術知國帑空虚當究其所以節之之理不可為此數事便屈從其議臣非敢故持高論所以惜者恐無益於事虛損國體為大恥辱不敢不論伏惟陛下裁亮請納元昊使人右臣等伏見北人請絶西人使纔去而西人納款之信巳來從北人則畏西人納西人則畏北人不審廟堂之上何以為謀自元昊㓂邉以來國家有累敗之羞而無一戰之勝復忍恥屈體以金帛買和又不能自為而假手北人當北人對梁適遣耶律徉使元昊之時中國今日之患已萌矣而中國有可悔之理而大臣執不悟之迷事至於今勢何可巳使北人晏然不動俟和而邀功故巳為吾大患二虜詐謀一來納款一請絶和而使中國絶和莫知所從亦足為慮二國實有釁而相攻使中國納西則為北怨顧北則失西好亦足為患然等為受患宜擇其輕何謂擇輕速納西人是也今料二國者不過宜疑其實有隙與實無隙耳且俟我和西而責報是敵本志今和垂就而反請我絶之其意何在豈非敵衒其强自示能指麾中國謂和必由我不和亦由我欲使元昊必信中國和與不和皆由之故託有隙之名而遣絶和之使苟中道遂從其請則元昊不得不信中國動止由於外也是北人一與西賊為有隙之名使元昊遂信中國不得自由此則北人之舉南則指麾中國西則能信服羌人他日却為元昊服罪之名又使中國好通則度吾今巳從其請則後日必不能違苟至於斯中國不能為國矣以此言之二國雖無隙而詐來請絶不可從之必矣若實有隙則納西人粗為中國之利西人新與北結釁而與我和得無南顧之憂而東併力以拒北必不肯輕絶吾盟北人方欲西戰元昊吾雖不從其絶和亦不有力分兵而㓂中國以此而言雖實有隙尤宜早納西人也伏以二國交搆中國憂危葢由從前所議參差兩端不决切恐西人已到議者尤更遲疑伏望聖慈决于睿斷乞早降元昊冊書伏見元昊使人巳至數日如聞誓書大體頗有朝廷約束兼余靖使北已有回奏别無齟齬之意切謂宜速行封冊者今契丹兵西嚮在未勝負以前遣使報之度其勢必假他議苟有所俟契丹幸而勝元昊其心益驕或於賚謝之外輒有所求何以處之臣故謂莫若速之利也若報聘之禮已行契丹雖欲乗間生端則屈不在我况存元昊之和則契丹未敢輕絶中國而為患也伏惟陛下揣度事勢不可緩也請誅保州叛卒臣伏見保州兵士近為罷却㳂邉巡檢發怒逐殺官吏閉城而叛以邀朝廷議者更去他謀便用招安之䇿方今天下處處兵驕若徤兒殺官吏而叛朝廷即日招安則今後主將性命生死全由徤兒國家威令干戈不行境内矣朝廷苟要藉將吏守城捍邉則叛卒更無可赦之理若只苟保州目下無事臣恐自此有兵之處叛亂日生是顧一州之苟安而不慮天下之皆亂今招牓既出已不可追然叛卒尚有可誅之理臣今願乞速降勅㫖與王果令以勁兵數千伏於保州之側俟招牓入城隨而突入除百姓外逢兵即殺彼二三千叛卒方得朝廷姑息乗其疑惑懈怠之間我兵卒至擊其不意可以盡誅仍宜先諭軍中每一首級錢賞十千以我器甲被其貪賞之兵而擊倉皇空手懈怠之卒乗此機便無不勝之理若慮其燒刦倉庫殺戮人民此乃閉城之所為耳今既開門我軍卒至彼將救死不暇安能復為刦殺之謀朝廷若必為過慮更當别用救兵隨後䇿應縱使拒死而鬬傷人民是乃一城之患以天下叛亂之禍較之則又不足顧矣朝廷深念安危之本力絶禍亂之萌當此事機决於睿斷論保州都巡下兵士殺戮官吏閉城而叛臣伏見保州都巡下兵士殺戮官吏閉城而叛尋聞朝廷許令招安臣與臣修臣甫等已有列論乞令王果領兵隨後討戮未聞施行臣竊以天下養兵内外百有餘萬苟無誅戮可行之令必開驕慢叛亂之原今輕殺郡吏閉城從而招之傳於四方使營幕之間聞之明知朝廷有畏衆不戮之恩官吏有觸事可持之勢縱横作過誰敢復言少有論其長短則必立遭誅戮之害又於其黨擇不才者殺之然後自請則無罪矣治兵之法如此臣見天下禍患生於今日矣臣謂必以安危之計為言則保州數千叛卒無可恕之理伏乞朝廷力誅剪以振威令若以已行招貸不可失信亦宜准量輕重固當棄小信而存大法况閉城而邀命非朝廷之意若謂事機巳遲莫若選擇可任之人付之保州宻與處分得便盡誅庶可戢驕兵而絶禍亂矣乞戮保州兵士臣見保州兵士閉城作亂殺黨中懦兵十餘人指為首惡以要朝廷招安臣等已有論列欲令知定州王果引隨招牓入城盡以殺戮不聞施行竊以天下内外之兵有百餘萬苟無誅决之令必開叛亂之源今州兵殺官吏閉城門從而招之使傳之於四方知朝廷有畏衆而不殺之恩官吏有觸事可持之勢何憚不為議者若謂今日北人妄生釁端不可更於極邉之地張皇小事為敵人所窺是不知制兵權而昩威戎之畧也夫以中國為狂狡所輕者本由朝廷威令不行今以重兵入城誅一二千叛卒以絶天下禍亂之萌而敵人咫尺必將竦動安慮其見窺乎機不可失惟陛下發睿斷而行之端明集巻二十
