body:
  text: 端明集别集類二宋提要臣等謹案端明集四十卷宋蔡襄撰襄字君謨仙遊人天聖八年舉進士甲科官至端明殿學士知杭州徙南京留守未及行以憂歸越嵗卒於家乾道中追諡忠惠事迹具宋史本傳宋史藝文志載襄集六十卷奏議十卷文獻通考則作十七卷多寡懸殊不應如是疑通考以奏議十卷合於集六十卷總為七十卷而傳刻訛舛倒其文為十七也然其初本世不甚傳乾道四年王十朋出知泉州已求其本而不得後屬知興化軍鍾離松訪得其書重編為三十六卷與教授蔣雍校正鋟板乃復行于世陳振孫書録解題惟載十朋三十六卷之本與史不符蓋以此也元代板復散佚明人皆未覩全帙閩謝肇浙嘗從葉向髙入祕閣檢尋亦僅有目而無書萬厯中莆田盧廷選始得鈔本於豫章俞氏於是御史陳一元刻於南昌析為四十卷興化府知府蔡善繼復刻于郡署仍為三十六卷而附以徐􅎾所輯别記十卷然盧本錯雜少緒陳蔡二本均未及銓次後其里人宋珏重為編定而不及全刻僅刻其詩集以行雍正甲寅襄裔孫廷魁又裒次重刻是為今本觀十朋序稱所編凡古律詩三百七十首奏議六十四首雜文五百八十四首則已合奏議於集中又稱嘗於張唐英仁英政要見所作四賢一不肖詩而集中不載乃補置於卷首又稱奏議之切直舊所不載者并編之則十朋頗有所增益已非初本之舊今本不以四賢一不肖詩辨首又非十朋之舊矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀端明集序文以氣為主非天下之剛者莫能之古今能文之士非不多而能傑然自名於世者亡幾非文不足也無剛氣以主之也孟子以浩然充塞天地之氣而發為七篇仁義之書韓子以忠犯逆鱗勇叱三軍之氣而發為日光玉潔表裏六經之文故孟子闢楊墨之功不在禹下而韓子抵排異端攘斥佛老之功又不在孟子下皆氣使之然也若二子者非天下之至剛者歟國朝四葉文章尤盛歐陽文忠公徂徠先生石守道河南尹公師魯莆田蔡公君謨皆所謂傑然者文忠之文追配韓子其剛氣所激尤見於責髙司諫書徂徠之氣則見於慶厯聖德頌師魯則見於願與范文正同貶之書君謨則見於四賢一不肖詩嗚呼使四君子者生於吾夫子時則必無未見剛之嘆而乃同出於吾仁祖治平醇厚之世何其盛歟夫以臺諫之風采朝士莫不畏其筆端自侍從而下奔走伺俟其門者紛然也文正鄱陽之貶余尹歐既與之同罪矣蔡公乃於四賢相繼黜謫之後形於歌詩而斥為不肖羞其見縉紳之面而辱甚市朝之撻則公之剛又可知也十朋初見其詩於張唐英所撰仁英政要甚歆慕之其後見公文集乃沒而不載竊以為恨乾道四年冬得郡溫陵道出莆田望公故居裴回顧歎而不忍去入境訪公遺迹則首見所謂萬安橋者與大書深刻之記爭雄且深惜其有濟川之才而不至於大用登愛松堂九日山則又見公之詩與其真蹟猶在凛然有生意如見其正顔色坐黃堂時也蓋公至和嘉祐間嘗兩守是郡至今泉人稱太守之賢者必以公為首求其遺文則郡與學皆無之可謂缺典矣於是移書興化守鍾離君松傅君自得訪於故家而得其善本教授蔣君雍與公同邑而深慕其為人手校正之鋟板於郡庠得古律詩三百七十首奏議六十四首雜文五百八十四首而以四賢一不肖詩置諸卷首與奏議之切直舊所不載者悉編之比它集為最全且屬豫序之豫曰端明公文章文忠公嘗稱其清遒粹美後雖有善文辭好議論者莫能改是評也豫復何云然竊謂文以氣為主而公之詩文實出於氣之剛入則為謇諤之臣出則為神明之政無非是氣之所寓學之者宜先涵養吾胸中之浩然則發而為文章事業庶幾無愧於公云五年十月永嘉王十朋序
