body:
  text: 端明集巻三十五宋蔡㐮撰茶録序臣前因奏事伏䝉陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念草木之㣲首辱陛下知鍳若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之本至於烹試曾未有聞臣輙條數事簡而易明勒成二篇名曰茶録伏惟清閒之宴或賜觀采臣不勝惶懼榮幸之至謹叙上篇論茶色茶色貴白而餅茶多以珍膏油去聲其面故有青黄紫黒之異善别茶者正如相工之視人氣色也隐然察之於内以肉理潤者為上既已末之黄白者受水昏重青白者受水鮮明故建安人鬪試以青白勝黄白香茶有真香而入貢者㣲以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真若烹㸃之際又雜珍果香草其奪益甚正當不用味茶味主於甘滑唯北苑鳯凰山連屬諸焙所産者味佳隔溪諸山雖及時加意製作色味皆重莫能及也又有水泉不甘能損茶味前世之論水品者以此藏茶茶宜蒻葉而畏香藥喜温燥而忌濕冷故收藏之家以蒻葉封裹入焙中兩三日一次用火常如人體温温以禦濕潤若火多則茶焦不可食炙茶茶或經年則香色味皆陳於浄噐中以沸湯漬之刮去膏油壹兩重乃止以鈐箝之㣲火炙乾然後碎碾若當年新茶則不用此説碾茶碾茶先以浄紙宻裹椎碎然後熟碾其大要旋碾則色白或經宿則色已昏矣羅茶羅細則茶浮粗則水浮候湯候湯最難未熟則沬浮過熟則茶沈前世謂之蟹眼者過熟湯也况瓶中煮之不可辨故曰候湯最難熁盞凡欲㸃茶先湏熁盞令熱冷則茶不浮㸃茶茶少湯多則雲脚散湯少茶多則粥面聚建人謂之雲脚粥面鈔茶一錢匕先煮湯調令極勻又添注之環回擊拂湯上盞可四分則止眡其面色鮮明着盞無水痕為絶佳建安鬪試以水痕先退者為負耐乆者為勝故較勝負之説曰相去一水兩水下篇論茶器茶焙茶焙編竹為之裹以蒻葉蓋其上以收火也隔其中以有容也納火其下去葉尺許常温温然所以養茶色香味也茶籠茶不入焙者宜宻封裹以蒻籠盛之置髙處不近濕氣砧椎砧椎蓋以碎茶砧以木為之椎或金或鐵取於便用茶鈐茶鈐屈金鐵為之用以炙茶茶碾茶碾以銀或鐵為之黄金性柔銅及鍮石皆能生鉎音星不入用茶羅茶羅以絶細為佳羅底用蜀東川鵝溪畫絹之宻者投湯中揉洗以羃之茶盞茶色白宜黒盞建安所造者紺黒紋如兎毫其坯㣲厚熁之乆熱難冷最為要用出他處者或薄或色紫不及也其青白盞鬪試家自不用茶匙茶匙要重擊拂有力黄金為上人間以銀鐵為之竹者輕建茶不取湯瓶瓶要小者易候湯又㸃茶注湯有凖黄金為上人間以銀鐵或甆石為之後序臣皇祐中脩起居注奏事仁宗皇帝屢承天問以建安貢茶并所以試茶之狀臣謂論茶雖禁中語無事於宻造茶録二篇上進後知福州為掌書記竊去藏稿不復能記知懐安縣樊紀購得之遂以刊勒行於好事者然多舛謬臣追念先帝顧遇之恩攬本流涕輙加正定書之以石得永其傳治平元年伍月二十六日三司使給事中臣蔡某謹記荔枝譜第一荔枝之於天下唯閩粤南粤巴蜀有之漢初南粤王尉佗以之備方物於是始通中國司馬相如賦上林云荅遝離支蓋夸言之無有是也東京交趾七郡貢生荔支十里一置五里一候晝夜奔騰有毒蟲猛獸之害臨武長唐羌上書言狀和帝詔太官省之魏文帝有西域蒲萄之比世譏其謬論豈當時南北斷隔所擬出於傳聞耶唐天寳中妃子尤愛嗜涪州歲命驛致時之詞人多所稱詠張九齡賦之以託意白居易刺忠州既形於詩又圗而序之雖彷彿顔色而甘滋之勝莫能著也洛陽取於嶺南長安来於巴蜀雖曰鮮獻而傳置之速腐爛之餘色香味之存者亾㡬矣是生荔枝中國未始見之也九齡居易雖見新實騐今之廣南州郡與夔梓之間所出大率早熟肌肉薄而味甘酸其精好者僅比東閩之下等是二人者亦未始遇夫真荔支者也閩中唯四郡有之福州最多而興化軍最為竒特泉漳時亦知名列品雖髙而寂寥無紀將尤異之物昔所未有乎蓋亦有之而未始遇乎人也予家莆陽再臨泉福二郡十年往還道由鄉國毎得其尤者命工寫生稡集既多因而題目以為倡始夫以一木之實生於海濱岩險之逺而能名徹上京外被夷狄重於當世是亦有足貴者其於果品卓然第一然性畏髙寒不堪移植而又道里遼逺曾不得班於盧橘江橙之右少發光采此其所以為之嘆息而不可不述也第二興化軍風俗園池勝處唯種荔枝當其熟時雖有他果不復見省尤重陳紫富室大家歲或不嘗雖别品千計不為滿意陳氏欲採摘必先閉戸隔墻入錢度音鐸錢與之得者自以為幸不敢較其直之多少也今列陳紫之所長以例衆品其樹晩熟其實廣上而圎下大可徑寸有五分香氣清逺色澤鮮紫殻薄而平瓤厚而瑩膜如桃花紅核似丁香母剥之凝如水精食之消如綘雪其味之至不可得而狀也荔枝以甘為味雖百千樹莫有同者過甘與淡失味之中唯有陳紫之於色香味自拔其類此所以為天下第一也凡荔枝膜形色一有類陳紫則已為中品若夫厚皮尖刺肌理黄色附核而赤食之有查食已而澁雖無酢味自亦下等矣第三福州種植最多延施原野洪塘水西尤其盛處一家之有至於萬株城中越山當州署之北鬱為林麓暑雨初霽晩日照曜絳嚢翠葉鮮明蔽映數里之間焜如星火非名畫之可得而精思之可述觀覧之勝無與為比初著花時商人計林斷之以立劵若後豐寡商人知之不計美惡悉為紅鹽去聲者水浮陸轉以入京師外至北戎西夏其東南舟行新浮日本琉球大食之屬莫不愛好重利以酬之故商人販益廣而鄉人種益多一歲之出不知㡬千萬億而鄉人得飫食者蓋鮮矣以其斷林鬻之也品目至衆唯江家綠為州之第一第四荔支食之有益於人列仙傳稱有食其華實為荔支仙人本草亦列其功葛洪云蠲渴補髓所以唐羌䟽曰未必延年益夀蓋云雖有其傳豈果能哉亦諫止之詞也或以其性熱人有曰噉千顆未嘗為疾即少覺熱以蜜漿解之其木堅理難老今有三百歲者枝葉繁茂生結不息此亦其騐也第五初種畏寒方五七年深冬覆之以䕶霜霰福州之西三舍曰水口地少加寒巳不可植大略其花春生􅉡􅉡然白色其實多少在風雨時與不時也有歲間生者謂之歇枝有仍歲生者半生半歇也春花之際旁生新葉其色紅白六七月時色巳變緑此明年開花者也今年實者明年歇枝也最忌麝香或遇之花實盡落其熟未經採摘蟲鳥皆不敢近或已取之蝙蝠蜂蟻争来蠧食園家有名樹旁植四柱小樓夜棲其上以警盜者又破竹五七尺揺之答答然以逼蝙蝠之屬第六紅鹽去聲之法民間以鹽梅滷浸佛桑花為紅漿投荔支漬之暴乾色紅味甘酸可三四年不蟲去聲脩貢與商人皆便之然絶無正味白晒者正爾烈日乾之以核堅為止畜之甕中宻封百日謂之出汗去上聲汗耐乆不然踰歲壊矣福州舊貢紅鹽蜜煎二種慶厯初太官問歲進之狀知州事沈邈以道逺不可致減紅鹽之數而増白晒者兼令漳泉二郡亦均貢焉蜜煎剥生荔支笮出其漿然後蜜煮之余前知福州用晒及半乾者為煎色黄白而味美可愛其費荔支減常歲十之六七然修貢者皆取於民後之主吏利其多取以責賂晒煎之法不可行矣第七陳紫巳下十二品有等次虎皮已下二十品無等次陳紫因治居第平窊坎而樹之或云厥土肥沃之致今傳其種子者皆擇善壌終莫能及是亦賦生之異也江緑大較類陳紫而差大獨香薄而味少淡故以次之其樹已賣葉氏而民間猶以為江家緑云方家紅可徑二寸色味俱美言荔枝之大者莫之敢擬歲生一二百顆人罕得之方氏子名蓁今為大理寺丞游家紫出名十年種自陳紫實大過之小陳紫其樹去陳紫數十歩初一家并種之及其成也差小又時有􅧎核者因而得名其家别居二紫亦分屬東西陳焉宋公荔枝樹極髙大實如陳紫而小甘美無異或云陳紫種出宋氏世傳其樹已三百歲舊屬王氏黄巢兵過欲斧薪之王氏媪抱樹號泣求與樹偕死賊憐之不伐宋公名諴公者老人之稱年餘八十子孫皆仕宦藍家紅泉州為第一藍氏兄弟圭為太常博士丞為尚書都官員外郎周家紅獨立興化軍三十年後生益竒聲名乃損然亦不失為上等何家紅出漳州何氏世為牙校嘗有郡將全樹買之樹在舍後將熟其子日領卒數十人穿其堂房乃至樹所其来無時舉家伏藏欲即伐去而不忍今猶存焉法石白出泉州法石院色青白其大次於藍家紅緑核頗類江緑色丹而小荔支皆紫核此以緑見異出福州圎丁香丁香荔支皆旁去聲蒂大而下鋭此種體圎與味皆勝虎皮者紅色絶大繞腹有青紋正類虎斑常於福州東山大乗寺見之不知其出處牛心者以狀言之長二寸餘皮厚肉澁福州唯有一株毎歲貢乾荔支皆調於民主吏常以牛心為凖民倍值購之以輸予嘗黜而不用玳琄紅荔支上有黒㸃踈宻如玳瑁斑福州城東有之硫黄顔色正黄而刺㣲紅亦小荔支以色名之也朱杮色如柿紅而扁大亦云朴柿出福州蒲桃荔支穂生一朶至一二百顆將熟多破裂凡荔支毎顆一梗長三五寸附於枝此等附枝而生樂天所謂朶如蒲桃者正謂是也其品殊下蚶殻者殻為深渠如瓦屋焉龍牙者荔支之變怪者其殻紅可長三四寸彎曲如爪牙而無瓤核全樹忽變非常有也興化軍轉運司㕔事之西嘗見之水荔枝漿多而淡食之蠲渴荔枝宜依山或平陸有近水田者清泉流溉其味遂爾出興化軍蜜荔支純甘如蜜是謂過甘失味之中丁香荔支核如小丁香樹病或有之亦謂之􅧎核皆小實也大丁香出福州天慶觀厚殻紫色瓤多而味㣲澁雙髻小荔支每朶數十皆並蒂雙頭因以目之真珠剖之純瓤圎白如珠荔支之小者止於此十八娘荔枝色深紅而細長時人以少女比之俚傳閩王王氏有女第十八好噉此品因而得名其家在城東報國院冡旁猶有此樹云將軍荔支五代間為此官者種之後人以其官號其樹而失其姓名之傳出福州釵頭顆紅而小可間婦人女子簮翹之側故特貴之粉紅者荔支多深紅而色淺者為異謂如傳朱粉之飾故曰粉紅中元紅荔枝將絶纔熟以晩重於時予嘗七月二十四日得之火山本出廣南四月熟味甘酸而肉薄穗生梗如枇杷閩中近亦有之山在梧州右三十二品言姓氏尤其著者也言州郡記其所出也不言姓氏州郡四郡或皆有也嘉祐四年歲次巳亥秋八月二十日蒲陽蔡某述端明集巻三十五
