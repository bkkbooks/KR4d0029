body:
  text: 端明集卷三十五宋蔡襄撰茶録序臣前因奏事伏䝉陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念草木之微首辱陛下知鍳若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之本至於烹試曾未有聞臣輒條數事簡而易明勒成二篇名曰茶録伏惟清閒之宴或賜觀采臣不勝惶懼榮幸之至謹叙上篇論茶色茶色貴白而餅茶多以珍膏油去聲其面故有青黃紫黑之異善别茶者正如相工之視人氣色也隱然察之於內以肉理潤者為上既已末之黃白者受水昏重青白者受水鮮明故建安人鬪試以青白勝黃白香茶有真香而入貢者微以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真若烹㸃之際又雜珍果香草其奪益甚正當不用味茶味主於甘滑唯北苑鳯凰山連屬諸焙所産者味佳隔溪諸山雖及時加意製作色味皆重莫能及也又有水泉不甘能損茶味前世之論水品者以此藏茶茶宜蒻葉而畏香藥喜溫燥而忌濕冷故收藏之家以蒻葉封裹入焙中兩三日一次用火常如人體溫溫以禦濕潤若火多則茶焦不可食炙茶茶或經年則香色味皆陳於淨器中以沸湯漬之刮去膏油一兩重乃止以鈐箝之微火炙乾然後碎碾若當年新茶則不用此說碾茶碾茶先以淨紙密裹椎碎然後熟碾其大要旋碾則色白或經宿則色已昏矣羅茶羅細則茶浮粗則水浮候湯候湯最難未熟則沫浮過熟則茶沈前世謂之蟹眼者過熟湯也况瓶中煮之不可辨故曰候湯最難熁盞凡欲㸃茶先須熁盞令熱冷則茶不浮㸃茶茶少湯多則雲腳散湯少茶多則粥面聚建人謂之雲腳粥面鈔茶一錢匕先煮湯調令極勻又添注之環回擊拂湯上盞可四分則止視其面色鮮明著盞無水痕為絶佳建安鬪試以水痕先退者為負耐久者為勝故較勝負之說曰相去一水兩水下篇論茶器茶焙茶焙編竹為之裹以蒻葉蓋其上以收火也隔其中以有容也納火其下去葉尺許常溫溫然所以養茶色香味也茶籠茶不入焙者宜密封裹以蒻籠盛之置髙處不近濕氣砧椎砧椎蓋以碎茶砧以木為之椎或金或鐵取於便用茶鈐茶鈐屈金鐵為之用以炙茶茶碾茶碾以銀或鐵為之黃金性柔銅及鍮石皆能生鉎音星不入用茶羅茶羅以絶細為佳羅底用蜀東川鵝溪畫絹之密者投湯中揉洗以羃之茶盞茶色白宜黑盞建安所造者紺黑紋如兔毫其坯微厚熁之久熱難冷最為要用出他處者或薄或色紫不及也其青白盞鬪試家自不用茶匙茶匙要重擊拂有力黃金為上人間以銀鐵為之竹者輕建茶不取湯瓶瓶要小者易候湯又㸃茶注湯有凖黃金為上人間以銀鐵或瓷石為之後序臣皇祐中修起居注奏事仁宗皇帝屢承天問以建安貢茶并所以試茶之狀臣謂論茶雖禁中語無事於密造茶録二篇上進後知福州為掌書記竊去藏稿不復能記知懷安縣樊紀購得之遂以刊勒行於好事者然多舛謬臣追念先帝顧遇之恩攬本流涕輒加正定書之以石得永其傳治平元年伍月二十六日三司使給事中臣蔡某謹記荔枝譜第一荔枝之於天下唯閩粵南粵巴蜀有之漢初南粵王尉他以之備方物於是始通中國司馬相如賦上林云答遝離支蓋夸言之無有是也東京交趾七郡貢生荔支十里一置五里一候晝夜奔騰有毒蟲猛獸之害臨武長唐羌上書言狀和帝詔太官省之魏文帝有西域蒲萄之比世譏其謬論豈當時南北斷隔所擬出於傳聞耶唐天寶中妃子尤愛嗜涪州歲命驛致時之詞人多所稱詠張九齡賦之以託意白居易刺忠州既形於詩又圗而序之雖倣佛顔色而甘滋之勝莫能著也洛陽取於嶺南長安來於巴蜀雖曰鮮獻而傳置之速腐爛之餘色香味之存者亡幾矣是生荔枝中國未始見之也九齡居易雖見新實驗今之廣南州郡與夔梓之間所出大率早熟肌肉薄而味甘酸其精好者僅比東閩之下等是二人者亦未始遇夫真荔支者也閩中唯四郡有之福州最多而興化軍最為竒特泉漳時亦知名列品雖髙而寂寥無紀將尤異之物昔所未有乎蓋亦有之而未始遇乎人也豫家莆陽再臨泉福二郡十年往還道由鄉國每得其尤者命工寫生稡集既多因而題目以為倡始夫以一木之實生於海濱岩險之逺而能名徹上京外被夷狄重於當世是亦有足貴者其於果品卓然第一然性畏髙寒不堪移植而又道里遼逺曾不得班於盧橘江橙之右少發光采此其所以為之嘆息而不可不述也第二興化軍風俗園池勝處唯種荔枝當其熟時雖有他果不復見省尤重陳紫富室大家歲或不嘗雖别品千計不為滿意陳氏欲採摘必先閉戶隔墻入錢度音鐸錢與之得者自以為幸不敢較其直之多少也今列陳紫之所長以例衆品其樹晚熟其實廣上而圎下大可徑寸有五分香氣清逺色澤鮮紫殼薄而平瓤厚而瑩膜如桃花紅核似丁香母剝之凝如水精食之消如綘雪其味之至不可得而狀也荔枝以甘為味雖百千樹莫有同者過甘與淡失味之中唯有陳紫之於色香味自拔其類此所以為天下第一也凡荔枝膜形色一有類陳紫則已為中品若夫厚皮尖刺肌理黃色附核而赤食之有查食已而澀雖無酢味自亦下等矣第三福州種植最多延施原野洪塘水西尤其盛處一家之有至於萬株城中越山當州署之北鬱為林麓暑雨初霽晚日照曜絳囊翠葉鮮明蔽映數里之間焜如星火非名畫之可得而精思之可述觀覽之勝無與為比初著花時商人計林斷之以立劵若後豐寡商人知之不計美惡悉為紅鹽去聲者水浮陸轉以入京師外至北戎西夏其東南舟行新浮日本琉球大食之屬莫不愛好重利以酬之故商人販益廣而鄉人種益多一歲之出不知幾千萬億而鄉人得飫食者蓋鮮矣以其斷林鬻之也品目至衆唯江家緑為州之第一第四荔支食之有益於人列仙傳稱有食其華實為荔支仙人本草亦列其功葛洪云蠲渴補髓所以唐羌疏曰未必延年益夀蓋云雖有其傳豈果能哉亦諫止之詞也或以其性熱人有曰噉千顆未嘗為疾即少覺熱以蜜漿解之其木堅理難老今有三百歲者枝葉繁茂生結不息此亦其驗也第五初種畏寒方五七年深冬覆之以護霜霰福州之西三舍曰水口地少加寒巳不可植大略其花春生􅉡􅉡然白色其實多少在風雨時與不時也有歲間生者謂之歇枝有仍歲生者半生半歇也春花之際旁生新葉其色紅白六七月時色巳變緑此明年開花者也今年實者明年歇枝也最忌麝香或遇之花實盡落其熟未經採摘蟲鳥皆不敢近或已取之蝙蝠蜂蟻爭來蠧食園家有名樹旁植四柱小樓夜棲其上以警盜者又破竹五七尺搖之答答然以逼蝙蝠之屬第六紅鹽去聲之法民間以鹽梅滷浸佛桑花為紅漿投荔支漬之暴乾色紅味甘酸可三四年不蟲去聲修貢與商人皆便之然絶無正味白晒者正爾烈日乾之以核堅為止畜之甕中密封百日謂之出汗去上聲汗耐久不然踰歲壞矣福州舊貢紅鹽蜜煎二種慶厯初太官問歲進之狀知州事沈邈以道逺不可致減紅鹽之數而增白晒者兼令漳泉二郡亦均貢焉蜜煎剝生荔支笮出其漿然後蜜煮之余前知福州用晒及半乾者為煎色黃白而味美可愛其費荔支減常歲十之六七然修貢者皆取於民後之主吏利其多取以責賂晒煎之法不可行矣第七陳紫巳下十二品有等次虎皮已下二十品無等次陳紫因治居第平窊坎而樹之或云厥土肥沃之致今傳其種子者皆擇善壤終莫能及是亦賦生之異也江緑大較類陳紫而差大獨香薄而味少淡故以次之其樹已賣葉氏而民間猶以為江家緑云方家紅可徑二寸色味俱美言荔枝之大者莫之敢擬歲生一二百顆人罕得之方氏子名蓁今為大理寺丞游家紫出名十年種自陳紫實大過之小陳紫其樹去陳紫數十步初一家并種之及其成也差小又時有􅧎核者因而得名其家别居二紫亦分屬東西陳焉宋公荔枝樹極髙大實如陳紫而小甘美無異或云陳紫種出宋氏世傳其樹已三百歲舊屬王氏黃巢兵過欲斧薪之王氏媪抱樹號泣求與樹偕死賊憐之不伐宋公名諴公者老人之稱年餘八十子孫皆仕宦藍家紅泉州為第一藍氏兄弟圭為太常博士丞為尚書都官員外郎周家紅獨立興化軍三十年後生益竒聲名乃損然亦不失為上等何家紅出漳州何氏世為牙校嘗有郡將全樹買之樹在舍後將熟其子日領卒數十人穿其堂房乃至樹所其來無時舉家伏藏欲即伐去而不忍今猶存焉法石白出泉州法石院色青白其大次於藍家紅緑核頗類江緑色丹而小荔支皆紫核此以緑見異出福州圎丁香丁香荔支皆旁去聲蒂大而下鋭此種體圎與味皆勝虎皮者紅色絶大繞腹有青紋正類虎斑常於福州東山大乘寺見之不知其出處牛心者以狀言之長二寸餘皮厚肉澀福州唯有一株每歲貢乾荔支皆調於民主吏常以牛心為凖民倍值購之以輸豫嘗黜而不用玳琄紅荔支上有黑㸃踈密如玳瑁斑福州城東有之硫黃顔色正黃而刺微紅亦小荔支以色名之也朱柿色如柿紅而扁大亦云朴柿出福州蒲桃荔支穗生一朵至一二百顆將熟多破裂凡荔支每顆一梗長三五寸附於枝此等附枝而生樂天所謂朵如蒲桃者正謂是也其品殊下蚶殼者殼為深渠如瓦屋焉龍牙者荔支之變怪者其殼紅可長三四寸彎曲如爪牙而無瓤核全樹忽變非常有也興化軍轉運司㕔事之西嘗見之水荔枝漿多而淡食之蠲渴荔枝宜依山或平陸有近水田者清泉流溉其味遂爾出興化軍蜜荔支純甘如蜜是謂過甘失味之中丁香荔支核如小丁香樹病或有之亦謂之􅧎核皆小實也大丁香出福州天慶觀厚殼紫色瓤多而味微澀雙髻小荔支每朵數十皆並蒂雙頭因以目之真珠剖之純瓤圎白如珠荔支之小者止於此十八娘荔枝色深紅而細長時人以少女比之俚傳閩王王氏有女第十八好噉此品因而得名其家在城東報國院冡旁猶有此樹云將軍荔支五代間為此官者種之後人以其官號其樹而失其姓名之傳出福州叉頭顆紅而小可間婦人女子簮翹之側故特貴之粉紅者荔支多深紅而色淺者為異謂如傳朱粉之飾故曰粉紅中元紅荔枝將絶才熟以晚重於時豫嘗七月二十四日得之火山本出廣南四月熟味甘酸而肉薄穗生梗如枇杷閩中近亦有之山在梧州右三十二品言姓氏尤其著者也言州郡記其所出也不言姓氏州郡四郡或皆有也嘉祐四年歲次巳亥秋八月二十日蒲陽蔡某述端明集卷三十五
