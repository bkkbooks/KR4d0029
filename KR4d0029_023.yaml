body:
  text: 端明集巻二十三宋蔡襄撰書疏乞戒厲安撫使書朝奉郎秘書省著作佐郎充館閣校勘臣某謹昧死再拜上書尊號皇帝陛下臣伏覩臨遣使臣循行郡國臣竊謂人主宅中國居法宫而使幽遐異域風謡習尚寃隱沈抑無一不陳於前者其道何哉託聰明於臣下故也人主知其所託之為難明賞罰以馭之賞罰既明則臣下不敢蔽欺而聰明無所壅也今天下之俗至有鉅室富家兼并貨財作為奢靡超踰法制交通大吏欺轢愚弱而貧者父子轉流無養生送死之具不幸孤獨廢疾不得終其天年州縣吏既不能掩遏豪强矜哀窮厄而又侵牟漁奪不識休已或愚謬昬耄無所是非或依倚權勢壞裂公法其卓然有善狀可指數也監刺之官大率以寛紓含隱為良即發一姦贓衆輙指目以是須其自敗乃始糾擿或有所思慮垂敗之人亦加意覆藏使得脱去甚哉蔽蒙如此監司之設僅與無同欲百姓之無害其可得乎吏之偷苟姑息寖以成俗頃年遣使安撫諸郡比其還奏薦舉雖多而蠧㬥不察是徒取善譽而空厥職也夫收材選能誠為治之首務然惡吏不除窮民不恤有使之出不若無出之愈徒使郡國之民交口而議曰是舉也特與被遣之人為榮進梯綆耳豈有意於吾民哉臣竊見漢武帝遣謁者博士分巡天下存問孝悌力田鰥寡孤獨賜帛有差獨行君子遣詣行在而治苛者奏舉又唐太宗遣杜淹巡闗内諸州出御府金贖貧民男女自賣者還其父母其後又遣禇遂良等二十二人以六條巡察四方黜陟官吏臣詳觀古之遣使皆務恤窮民除惡吏舉材能收滯逸而已請使者所至之郡存問鄉里其孝行著聞及年八十九十以上鰥寡篤疾依漢故事量予布帛即貧無所養而有男女僦傭於人償其餘直而追還之若為僧尼僧年四十尼年三十以下並除其籍而歸養更無此等子孫官給餱糧責任親黨隣里養之以没其齒孤獨者戒勑所養之家務全其生寃結無告使者擇吏而治其曲直力行篤學衰老淪滯表之以勸風俗郡縣吏治績可稱條例其狀顯褒其尤者貪墨腥聞即令責訊材不任職於其職之相倫者易之或雖潔亷而違法慘刻及年七十以上昏耄而不知退者咸以名聞願一切罷之其官吏貪墨因使擿發監司之官素所不糾隨而坐之即使者不糾異日傾敗事在使者循行已前并使者坐之伏唯陛下垂意生民而恩澤未大洽於下者蓋督責官吏未盡其道也方使者之行因幸嚴賜告諭令其畢力推揚德音以致於下究悉利害庶有補於政治母徒使郡縣供具吏民遮列道途迎候往來重為此紛擾也狂愚之言願陛下省覽財擇天下幸甚幸甚臣昧死再拜謹上言增置諫官書臣伏見朝廷選用王素余靖歐陽修等增備諫官是三人者皆特立之士昔以直言觸忤權臣擯斥且乆今者一日並命人無賢愚萬口相慶皆謂陛下特發神斷擢任不疑蓋陛下深憂政教未舉賞罰未明羣臣之邪正未分四方之利害未究故増耳目之官以廣言路此陛下為社稷生靈大計也臣竊思任諫非難惟聽諫之難聽諫非難惟用諫之難如素靖修等忠誠剛氣著信於人况䝉陛下奬㧞之知必能箴闕政獻明謨擿回邪擊權倖思所以報効也然邪人惡之必有禦之之説不過曰某人也好名也好進也彰君過也或進此説正是邪人欲蔽天聰不可不察臣請為陛下陳之一曰好名夫忠臣務盡其心事有必須切直者則極論之豈頋名哉若避好名之毁而無所陳施則土木其人皆可備數何煩陛下選揀如此之至况名者聖人以之勵世俗分善惡豈可廢乎借使為善近名陛下試思今之人遠權利敦潔行以近名者亦有幾人哉二曰好進前古諫臣之難者庸主昏世上犯嚴威旁觸勢要鼎鑊居側斧鑕在前死所不辭安得好進乎蓋近來諫官進用太速故世人咸以謂之好進今諫官有盡忠補闕之効陛下但乆任勿遷使其人果忠且義雖死於是官亦無恨矣三曰彰君過凡諫諍之臣蓋以司乎過舉也緩則密疏急則昌言期於必正若人主從而行之適以彰乎納練之美安得謂之彰過乎然諫官亦有好名好進彰君過者異於此巧者之為諫臣事之難言者則喑而不言擇其無所忤者言之就令不行復再議退而曰某事我嘗言之矣此可謂之好名也容容黙黙無所恥媿踐歴資序以登貴仕此可謂之好進也凡人主之有過諫官最為近密或不盡言人主何從而知且變更乎傳之當世垂之於後終以為過此可謂彰君過臣向之所論乃忠與巧者之分願賜省覽今陛下出於聖慮自擢官必自主之若有陳述於理適當即賜施行無使天下之人謂朝廷有好諫之名而無好諫之實使其言有訐切亦願優假無為姦邪構間致有斥逐使天下之人指朝廷有拒諫之失也臣迹遠言近不任兢惶激切之至臣某昧死再拜謹上言用韓琦范仲淹書臣伏見去月以來陛下㧞任諫官都下翕然稱慶又數日罷夏竦樞密使用韓琦范仲淹作樞密副使制命一出士大夫賀於朝庶人喜於路至有飲酒呌號以為樂者謂陛下去邪任忠可刻日以觀太平矣臣聞易泰之彖辭曰内君子而外小人君子道長小人道消否之彖辭曰内小人而外君子小人道長君子道消然則君子進則天下泰小人進則天下否陛下退一邪臣進一賢人而舉國歡欣者豈一邪一賢獨能開天下利害乎蓋以一邪退則其類退一賢進則其類進衆邪並退而衆賢並進而天下不泰者無有也雖然臣切憂之頃年莊獻明肅太后初棄六宫陛下親臨庶政一日出於令邪臣沮氣天下觀聽灑然快意期於一變以臻大治自後數年方内無事左右之臣易於襲常而恬於苟安陛下憂勤之心日亦少懈已而西羌背違舉兵冦邊遣將興師屢戰屢敗饋運賦斂百姓窮困北虜乗勢窺我强弱遣使求地京師震駭幸而増賂以得暫息四海嗷嗷日憂一日以將來之患當如何也然猶指忠賢之士而屬望焉幸而進用庶其協力而大有為以解焦勞之急陛下奮發剛斷博採物論㧞而任之人人歡欣而臣獨竊憂者誠恐進用之後或有讒間或拘舊例使之不盡所長而去則天下必有遺材之恨所損不細矣當今天下之病臣請譬諸病者其安時調䕶適宜固不病矣病在皮膚醫者能早去之病且安矣此二者皆已不及而病在支體若得良醫可速愈也天下之病勢已如是於可醫之時陛下又選任良醫儻信任不疑聽其施設非徒愈病又致民於夀若於此時使良醫不得盡其術則天下之病愈深雖有和扁之妙難責速効矣願陛下思祖宗社稷之重矜四海生民之困憤西北二虜之恥法乾剛夬決之道㧞賢材收衆策不憚改作以成大功天下幸甚幸甚臣昧死冄拜謹上論東南事宜疏臣近者蒙恩賜告歸覲父母臣出宋都歴淮上絶江而南出東吳之域縈委千里臣濳度事勢周問民隱可為寒心者請試陳之願陛下少賜清閒之宴而垂聽焉臣竊以天下治平之日已乆東南列郡城池隳塞士卒必少府無完兵廩無儲粟内無戒守之僃外無維制之具道路人之所共知此其尤可憂者蘇秀杭越等數州頻年以來旱澇更作稼穡不登厲疫仍起貧者流轉溝壑居者連病喪亡相屬苦哀之聲痛貫人骨雖朝廷屢行賑恤然渥澤之施未能周及今歲春夏不雨野田半蕪前秋之期居可知矣吳民媮侈災患之變亦一極也臣竊觀前古兵革之興多縁饑旱姑此苟生相與為盜及其勢盛制脅郡縣漢唐之世終為邦梗而况姦雄豪傑覘伺釁隙須時而發此不可不虞也易萃卦之大象曰澤上於地萃君子以除戎器戒不虞説者曰聚而無防則生衆心今有珠玉之貨納于府藏勅主守吏嚴其扄鐍常若冦至而地方數千里生民數萬族乃忘保固之術謹其細而遺其大臣未見夫長畫也借使浙東饑病之餘兇突之人嘯聚百數草竊閭巷臣未知以何郡兵卒而能制其死命乎誠以東南之勢為不足患臣恐天下之患正生於不足患矣當今之策莫若擇郡守寛民力募兵卒嚴盜法四者最為急務一曰擇郡守臣謹具録諸州軍長吏姓名年齒所為績狀伏望陛下諮問宰臣令議其材否而更易之使材足以應變而惠足以利民然後可倚以為重也二曰寛民力莫若蠲賦税均借貸省配斂賑流移所謂發於國而藏於民也三曰募兵卒臣謂因此饑歉頗易招置大凡吾民軟弱不便高寒不知騎射驅以僃邊非可速用臣請權罷寄招禁軍於兩浙重鎮量多少之數各令召募教習以僃冦盜亦東南一勝勢也四曰嚴盜法臣竊見頃年亦縁饑旱强刧盜賊多蒙寛貸實小惠而大害也臣願申勑兩浙災傷州軍應有賊盜一凖法令無所矜宥密戒提㸃刑獄臣僚如有因饑刧盜應死而情有可矜者即詳度以聞刑罰不失厥中亦以遏兇人之慮也夫未形之言難於信用既形之言無逮於事臣之狂愚非能造幾而辨徒以見聞過為慮度願陛下采而行之臣不勝惓惓懇懇之至謹衢州附逓以聞臣某昧死再拜謹上乞罷减降疏臣伏覩比年以來盛夏之月陛下親慮京師繫囚令天下負罪者减降便從輕典此蓋陛下嗟憫元元重罹禁網冒炎暑之苦而處狴犴之下天衷惻然下寛大之詔實羣生之厚幸也臣愚無智慮不能識天地無垠之施而竊有惑焉臣聞古先帝王躬慮獄囚皆以決訴寃滯非特專宥過戾也迫隆冬縁亢旱則或行之非一定而不易之制也向者國家行之比三年矣編户之民習蹈前事咸知指時月輕觸憲度豈非屢行之乃滋而為弊夫法者天下大公之本也故罪有小大法有輕重今所涖者大罪而所處者輕法以非其罪邪雖輕法不得施安在降其等乎誠當其罪耶重法尚不足以禁顧輕之何以革小人之心而驅之嚮善哉國家每郊禮必大赦貸民之罪固不鮮矣又仍歲有疎決减降之制臣謂貧弱者多負寃而富強者多蒙宥為惠甚小而其蠧甚大非有補於治體也伏望陛下參前古之制拯當今之弊罷减降之詔而責天下州郡吏審辨獄情而無多繫也臣職賤而言近不勝隕越之至臣某昧死再拜謹上論疏決罪人事疏臣伏聞朝廷疏決罪人有日臣竊思古之親慮獄囚所以申寃隱而出滯淹非特務寛貸而成小惠也近年夏月疏決例從减放閭巷之人謂之熱恩指期作過比比皆是夫刑者輔治之本豈可使民預知而故犯哉然行之且乆恐難即罷伏望陛下臨問之時擇其情理最重者特與嚴斷一二事庶使下民知懼不敢指恩為罪乃陛下之深仁也論改科塲條制疏臣伏見隋唐以來以進士明經二科取士迄今以為永制進士雖通試詩賦策論其實去留專在詩賦糊名謄紙以示至公㸃抺細碎條約纎悉所司奉之便於考校明經逐塲對義鈔節注疏計誦字數至有一字旁寫聲形類者三兩字如有一中亦是通義字猶不識經㫖何從而知取士之方一至於此臣聞有國家者取天下之士將以治民而經國耳故敦其行欲以表風俗試其才欲以濟成務今進士之詩賦明經之帖義於治民經國之術了不闗及其間或有長才異節之士幸而有之或官而後習非因設科而得也今有善射者或使之御其人必自以為不能世之人亦曰彼射也責之以御强人之所不習不可也而以詩賦帖義取士偶與科合者即為中第一日使之臨民謀國其人必自以為能而世之人亦習而不恠茲大可異也或曰取士在於得人豈繫策論詩賦乎皇甫鏄以賢良方正中科而姦邪過人豈不專試策乎裴度以進士中第而功德尤著者豈不由詩賦而得之臣竊不然取之以其道任之以其術而陷於姦邪其人自隳也取之不以其道任之不以其術而能功德著聞其人自立也豈可以自隳與自立之人而害經乆之制乎三代之道鄉舉里選專取德業漢察孝亷加之策問取士有經術隋唐以來盡失之矣行之既乆難於卒更今就其所試之業而裁之以試策為去留進士之術以大義為去留明經之術庶幾可行也一天下之州軍盡許立學選擇鄉里有年德通經義者補為教授講説經書教授生徒不應舉者三年後乞與助教名目且令説講應舉之人須經本州學聽書其日限以國子監新立條約為例一請試策三道為一塲考校驗落外次試論為一塲又考校驗落外次試詩賦為一塲以三塲皆善者為優或策論詩賦互有所長則互取之其策仍請一道問經義異同以觀其識一道問古今㳂革以觀其學一道問當世之務以觀其才此其大畧也一明經只問所習經書異同大義所對之義只合注疏大意不須文字盡同或自有意見即依注疏解釋外任自陳述可以明其識慮若以經科文人所習已乆未能變革即艱其取而薄其恩取能對大義者頗優奬之自然稍有智識之人去彼取此請改軍法疏臣伏見西鄙用兵以來首尾六年自劉平任福葛懷敏三將覆没亡者十萬餘人沮損國威公私空匱邦賦㸃差之計為患日深今被邊之郡甲兵非不多也歴涉數年訓練非不乆也然而屢戰屢敗何哉臣熟思之葢軍法未立將謀不專也所謂軍法未立者今之都部署及統帥之名其鈐轄路分都監都同巡檢等並是佐屬裨校各以賔禮相接主帥等威既不尊異向下官屬更無節級相轄之理及至出軍首尾不能相救號令不能相通所以多敗也所謂將謀不專者朝廷每有指揮事件多下逐路並令鈐轄都監都同巡檢等司共從長商量大凡兵事惟大將得以專之秘計深謀豈容衆議乃令僚佐叅論短長至有各出意見互相詆毁謀無所主事無不漏所以多敗也臣竊以軍法不立將謀不專而勝敵者無有唐郭子儀李光弼等以九節度之兵攻安慶緒而輙敗者何也子儀光弼名將也九帥之師共數十萬也以安慶緒之窮困豈能禦之然而輙敗者葢軍無都帥不相統轄謀議不同所以致敗也太宗朝曹彬潘羙興兵北舉而無成功者何也曹彬潘美名將也三路並入大舉也然而無成功者蓋監軍劉文裕王詵貪功立異主將不能奪之所以無功也以古今事理參之未有主將不專而能立大功也或曰今逐路帥臣各得便宜劄子臨事自可處置何必變更軍法乎臣謂若法不素立威不素行雖得便宜豈能使上下必信乎臣請逐路都部署見管兵馬人數列為裨校部曲之差分為前後左右之屬管兵臣僚官員並乞改換軍職使名依排陣使之類以所領兵多少為等大小相乘節級相轄如有違犯並同階級所以立成一軍自然選揀精審以戰則勝以守則堅此至急之務也端明集巻二十三
