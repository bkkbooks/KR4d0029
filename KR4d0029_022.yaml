body:
  text: 端明集卷二十二宋蔡襄撰國論要目一曰興治道明禮二帝三王相因作禮樂以正民性革其非心使之寡罪而遠刑通萬世之法也秦任兵刑而棄禮樂漢魏以還至晉日用干戈禮典殘缺至於亡隋盡矣唐興四方治定欲有所為制作雖具朝廷之禮時亦修舉而風教習尚各隨其俗五代禍亂日不遑暇專以刑治之宋興五十餘年太祖太宗平天下皆以兵威助治真宗皇帝契丹結好之後遂至無事朝廷禮文罔不修舉仁宗皇帝好生恤刑澤及禽獸然四方之俗未聞由禮樂專用法法者網羅過咎而施刑耳臣請以一二事言之冠昏喪葬禮之大者冠禮今不復議昏禮無復有古之遺文而喪禮盡用釋氏獨三年日月則類古矣臣請集大儒鴻博之士約古制而立今禮使百官萬民皆有等夷便而易行遠罪省刑之一途也擇官聖人能無為治天下天下之事至衆也何以無為而能治之百官無不為也百官修職則萬務舉矣何以致百官之職畢舉在擇官也擇官在於取士今之取士所謂制科者博學強記者也進士者能詩賦有文詞者也明經者誦史經而對題義者也是三者得善官至宰輔皆由此也資蔭以恩不問能否下至軍職以戰功流外吏人以歲月三班所入鞭朴刑戮之人無所不至取士之法淆雜至此一旦使之官人小者治一務大者治兵民欲其各得其理猶驅車而水行然行之已久不可暴革當漸節其所取之路又於歷任察其材能稍旌奬之庶幾可勸其為人害者去之而已安民古之治世百姓各安其所士農工商各得其分量取其力以供公上上使之以時而民不倦是故百姓上以奉天子下以養父母畜妻孥其力有餘故安其所也不妄作為故得其分也然而學者不原其本不考其實以謂民飢則哺之寒則衣之天下之衆雖堯舜不得濟也是有憂民之意而民愈不安也臣謂今日之民至無禁也太平日久民有智能者乘時趨利為農則兼并為商則高下取天時人力之大者遂以富強奢靡冒法出於王公之上此古所謂亂俗之民可誅者也而法莫之禁雖有禁者亦莫之信民相趨效不知紀極不貧不已此民妄為而不安其分者也天時水旱堯湯不能免之然而民有備故不害也今天下郡縣水旱爭發倉廪以濟之又曰振貸以假於民隨而倚閣經赦除放謂之恤民其意善矣其䇿疏矣古之治世役民不過三日其不役者出三日之傭此百姓所以奉公上也今百姓有幸有不幸其居瀕河歲以丁役過重此不幸也天下生齒脫漏亦有不輸一錢以助官者至於水旱流移又出倉廩以濟之賦入有程散施無極國何得而不貧國既貧矣民又不安其所豈所謂安民哉臣故謂學者不原其本不考其實者以此必曰安民禁姦豪均民力使民各得其分而安其所是謂之安民二曰正風俗正凌慢賈誼之説曰人主之尊如堂人臣如陛陛高則堂高矣蓋人主之於天下其勢漸高至於極尊民不可得而慢者由其羣臣等級之差漸而至也先皇帝仁愛如天包容萬物雖有觸冒譏斥者多亦矜恕至有侮慢朝廷自以為直臣以謂人主開受直言蓋盛德之事若肆譏斥而無人臣之禮此不可恕也天子可得而慢其下宰臣百官復何級等之差借如兩府大臣陛下所尊禮而優待之也日於漏舍或雪罪之人或求恩賞所求不得如意詆訐譏刺務以為能大臣難與較是非也但隱忍容之以為常事京師僚屬能侵長官天下州軍佐官能去長吏皆以材名之風俗如此所謂下凌上者也又有甚於此者士大夫之有怨憎黨類相朋造作謗毁或為歌詩傳於都下或移書啓於言事之門隂幽暗昧被毁之人無由辨明甚者搖動公卿以希貨賂古之所謂清議公論豈如此耶此在可嫉者也陛下少留聖聽因事正之易如反掌辨邪佞知人則哲帝堯猶以為難堯聖人也難於知人曰人之難知雖聖人必須審慎也進説之臣萬端人主以要道持之阿隨人主之意而不論理道之是非此佞臣也附託權要之勢因事自媒其身此邪臣也多引前世之事專為高論不顧今世難行此迂疏之臣也多取衆人之譽舍違公道不為國家久計此姧詐之臣也其言忠其事實此鯁直之臣也無所附依進退自守此公正之臣也陛下進一忠直退一邪佞則天下莫不慕忠直而醜邪佞矣惟陛下博訪問則天下幸甚廢貧贓傳曰廉吏民之表今夫食祿而治官材與不材出於天性不材者不可強之使材雖廢職尚可恕也至於憑恃官威因緣為姦求取贓賄以曲為直上負朝廷之用下為百姓之害是其心豈復有所畏哉古之聖明之主所深惡之也近年之俗以容貪贓謂之長者視其害民虐物若無有也何則凡贓吏皆狡惡之人雖欲發擲其過惡必須下獄然後置之於法既斷之後彼贓吏必須稱冤理雪朝廷必於近郡别令鞫勘當時一獄之人盡須追呼或經時月禁繫對詞百姓已不勝其苦矣若只依前案彼贓吏者必又再雪朝廷又須别推勘一獄之人又須追擾如此百姓何以當贓吏之辨而受此苦毒例皆引虛自認或經赦宥才得免脫是以百姓被害不死不休贓吏雪贓不盡不已監司之官以是莫敢輕發貪贓之吏自以得意嗟乎百姓何罪惟陛下憐之貪吏何人惟陛下察之又有不取贓賕自為營利者臣自少入仕于今三十年矣當時仕宦之人粗有節行者皆以營利為恥雖有逐錐刀之資者莫不避人而為之猶以恥也今乃不然紆朱懷金專為商旅之業者有之興販禁物茶鹽香草之類動以舟車楙遷往來日取富足夫貪人日富而居有田宅歲時有豐厚之享而清廉刻苦之士妻孥飢寒自非堅節之士莫不慕之貪人非獨不知羞恥而又自號材能世人耳目既熟不以為怪管子曰禮義廉恥國之四維今風俗之壞是四維不舉伏帷陛下貪贓者廢之清廉者奬之則廉恥興矣三曰謹財用強兵今天下大患者在兵禁軍約七十萬廂軍約五十萬積兵之多仰天子衣食五代而上上至秦漢無有也祖宗以來無有也真宗與北敵通和以後近六十年河北禁軍至今十五萬陜西自元昊叛增兵最多至今十九萬天下諸路置兵不少臣約一歲總計天下之入不過緡錢六千餘萬而養兵之費約及五千是天下六分之物五分養兵一分給郊廟之奉國家之費國何得不窮民何得不困然今之兵不可暴減固當有術以消之又當有術以精練之其説至多難以遽言陛下敕兩府大臣博求其弊漸講其術以為長久之䇿今之為政此第一事富國或曰何以富國今天下之廣四維萬里可謂大矣農田商賈茶鹽酒稅銀銅金鐵之類莫不𣙜之可謂察矣籠天下之利至纖至悉宜乎國家富有府藏充牣不可勝計然後為得今則每有支費嘗遣使諸路取索錢帛以供公上京師無大儲積至於天下諸路僅能自給者是為全實此何故耶曰養兵一百二十萬自古無有也歲入日少而歲出益多或曰何謂也曰兵日益多官日益冗財物有限而支費無涯國之所以貧也然則富國有術乎必先用意於兵然後可言富國之術臣則曰今之為政兵強為第一事富國為第二事或曰為政止於此乎曰非也自此而始去冗治天下者如治家凡民之家隨其富貧視其族屬幾何一歲之費幾何賔客之資公上之須復用幾何度其家之所入然後量力而出之如是乃可以為家計也不如是其家無以自給則族屬不得自安矣今治天下乃不如是宰相不與知兵增兵多少不知也樞府不知財用日日添兵而財用有無不知也三司使守藏吏也歲了一歲便為辦事不幸有邊境之急必取於民譬之家計是不度所入不量所出國不富實陛下未得高枕而優遊臣故謂兵冗為大其次又有官冗今且以轉官一事言之太祖太宗朝仕官者或有功勞或有名譽則拔任其人人莫不勸然以孤遠守常之人湮沈不遷者有之真宗設三年磨勘之法然後孤遠守常之人與夫權要圖進之士無異也日月既久漸以成俗雖有長材異能出衆人者有小過纍未可遷也但能飲食言語於人無忤者數嵗必遷此三年一遷之法今為大弊也祖宗時卿監郎中無十數人觀今班簿姓名可見也天下州軍三百餘處合入知州軍凡幾何人局少員多每至差除待闕須一二年通判知縣之類率皆如此真宗時選人磨勘有遷京官者有不遷者仁宗時但無過咎無不轉官官冗如此豈有不思其變更之術也哉去冗百端此二者最大願陛下熟思之漸求消冗之説四曰賞功實原賞古之所謂賞者有大功則賞之臨兵戎則賞之有大功者了大事禦大難非常事也臨兵戎者前死有榮退死有辱雖小功必賞以其履死地也今之臣一切務賞何謂賞所謂酬奬者是也守土之臣刺史縣令招徠逃户磨勘稅賦皆其職所當為也不修其職罪當罰也今有為之者必自陳而求賞不立賞格則不為也天子斂生民之財以祿之分職位以寵之借威權以使之可謂至矣而於官守常事即求賞天子豈與羣臣為市道哉至於茶鹽酒稅之局物物皆有賞格下至吏人百姓莫不皆然此為政之弊也戰功必賞也捕賊之法必賞也功異於常者可賞也其餘無名酬奬可漸罷之以正官守之法也任材凡人之材各有所能不一等也一人之智兼治數局時有不能也有文詞之職有吏治之職有兵戎之職有財利之職夫有吏治之材使之臨兵戎之事則時有不能也有財利之術使之論朝廷之事則時有不能也今世用人大率以文詞進大臣文士也近侍之臣文士也錢穀之司文士也邊防大帥文士也天下轉運使文士也知州郡文士也雖有武臣蓋僅有也故於文士觀其所長隨其材而任之使其所能則不能者止其術莫善於還詞令之職還於文士講説之職還於儒學典禮之職還於博士兵戎之職還於武士吏文之職還於法吏金穀之職還於利臣所謂還者與其能者不以一人之智兼責之也若夫宰輔大臣必兼衆能文學之士皆其出身忠義之節皆其素立故不論也不明法令不可也不知軍旅之情不可也不知邊疆夷狄之數不可也不知金穀利病不可也不知禮典之舊不可也是故難其人陛下知其難也得人則愛重之又於羣臣詢咨而擇之臣故謂任材者明天子之事也正刑聖人可謂愛民矣可謂慎刑矣殺人者可殺矣而或貸其生者州郡一有誤殺人者一獄所干官吏停廢竄逐無有貸者古先帝王慎刑不過是矣原其所因好生之人及於下也重刑誠審矣而刑之輕罰及無罪天下之官皆得施杖笞於其部通判職官於州之吏民主簿縣尉於縣之吏民皆可笞朴由是觀之民無完膚可謂濫刑矣天下州縣有長吏京師百司有長官有罪之人可歸於長吏長官則不敢妄刑也律有監臨主司不合行罰勑許執衣白直得施小杖臣竊謂天下州縣官司京師百司惟執衣白直令依勑科罰其餘公事各隨所屬長吏長官行之一歲計之可減妄刑千萬人矣臣願陛下明勑法官議之理當如何若律勑可行則行之必重其罰則不敢違也論兵十事一事臣近上國論要目十二篇以謂當今之急務強兵為第一事富國為第二事欲修治道自此而始兵不強則國不富國不富則民不安是故始於治兵而終於安民本末之論也強兵之説如何一曰消冗謂冗兵不可以暴減當有術以消之二曰選擇謂老弱疾病不堪戰陳之人即揀擇而去之三曰省兵謂不應置兵處與置之過多者則省之四曰訓練謂兵雖少壯而訓練不得其術與不教同五曰立兵法今之兵法絶無統制故不可用用之則敗此五者備修則兵少而精矣兵少則財用饒財用饒則國富矣兵精以戰則勝以守則固兵強矣其説皆世人之常論也然而行之則為治道之始不行則為天下大患是世人之常論乃當今之急務臣故謂之第一事一事中書不與知兵增兵多少不知也樞密院要兵則添財用有無不知也管軍將帥少兵則請曾不計較今日兵籍倍多何故用不足也三司但知支辦食糧日日增添不敢論列謂兵非職事也四者各為之謀以至於此若通而為一則可以計較兵積多少財用有無不致於冗臣欲乞招置增添兵數樞密院中書共議之先令三司計度衣糧如何足用管軍每乞招添邊臣每乞增置必須詰問其所少之因必不得已方可其奏如此慎重乃省兵之一端也一事近年置諸路安撫鈐轄添屯禁軍自京西江南東西廣南東西兩浙福建等駐泊禁軍皆是北人南方風土異宜水行不知舟楫之利山行不堪阻厄之險一往三年死亡殆半其不便一也只如差二萬人駐泊及至當替又須二萬人常須四萬人可了辦以此屯戍之多軍還到營未及三兩月又復出軍不惟道路勞苦妻孥間闊人情鬱結其不便二也今欲除京東淮南外諸路鈐轄安撫司所管駐泊禁軍候其年滿量留合要人數差補外並只放還本營更不填闕或問南方難用北軍祖宗平定南方盡是北軍今來何故難用曰祖宗之兵誅討大計也誅討大計未有不從中出兵今者南方但當作禦盜賊之計若禦盜賊諸路各有招置禁軍練習精熟可以驅使賊勢大者暫遣北軍不為失策此省兵之一端也一事陜西河東自慶厯以來用兵之際添置寨柵數多所以添兵寨柵本以通糧道護耕農非有益於攻守今當先去無用寨柵或只量留兵卒隨宜罷遣以寬置糧草之費亦省兵之一端也一事防邊兵卒老弱病患先須揀選若在邊鄙不唯虛費糧儲兼亦不堪戰鬬千兵若有百人老弱遇敵而先奔即是千人皆廢如此為患須至選揀馬有不堪入陳者而為患與老弱之兵同陜西河東方今無事時若先選揀不唯訓練精熟倉卒有備大可減省糧草以寬國用一事或曰招置土兵如何曰陜西弓箭手之類只給與田不給與衣糧於事為便且如河北招置土兵為害深矣土兵一人可給戍兵三人兼又父子相承未嘗出城坐窘邊費驕蹇難動故曰為害深矣河北義勇十九萬人昔年差點人情驚動今耳目已熟但須整緝訓練緩急得力於其間更選強壯須及十萬人不費衣糧可與土兵相制屯戍之兵可減也一事養兵之費禁軍一兵之費以衣糧特支郊賚通計一歲約費錢五十千廂軍一兵之費歲約三十千通一百一十八萬餘人一歲約費四千八百萬緡此其大較也若減禁軍十萬歲減緡錢五百萬減廂軍十萬歲減緡錢三百萬欲減禁軍先減屯戍欲減廂軍先減綱運此其要也一事諸路廂軍一指揮有六七百人檢尋舊額並無條制蓋年歲既遠亡失舊文今若朝旨諸軍指揮并將校以下不得過五百人舊額不滿五百人即依舊額今日以前有剩數者並令依舊候及五百人一依今來指揮今後輒敢額外添人並以違制論不在去官原赦之限一事禁軍指揮近年添置軍額名目數多指揮將窠雖全兵卒只有三二百人虛費將窠請受今若逐路軍額先與條約謂若兵士三百人即有將窠三十人見在人數已多者仍舊或移補别軍候及三百人更不補填漸可併省也一事欲減廂軍先減綱運今天下無名綱運最為枉費兵士邊郡兵官替移迎候送還廂軍動皆數百人多者至千人自來明有條制州郡皆以人情不敢自約此一事也南方替罷官員近由江浙遠自湘潭一舟十人至二十人大者倍之一嵗往還京師可了一次一舟之費小者五百千大者七百千所在官物不過數千緡之直衣糧所費幾何此二事也天下州郡自太平以來廨宇亭榭無有不足每遇新官臨政必有改作土木之功處處皆是不惟枉費財用必須多役兵卒此三事也天下持送官物入京如牛皮兵器之類多由陸路若委本路轉運司不急用者罷省之或令水路可以減省兵役此四事也養兵挽船不若和雇和雇則止於程限之資養兵終歲給之其費必倍此五事也大要舉此五事嚴與條約廂軍可省矣禁軍六十九萬三千三百三十九人廂軍四十八萬八千一百九十三人共計一百一十八萬一千五百三十二人錢收三千六百八十二萬二千五百四十一貫一百六十五文內秋夏稅只有四百九十三萬二千九百九十一貫文支三千三百一十七萬六百三十一貫八百八文南郊賞給不在數內管軍及軍班兵士九百九十四萬一千四十七貫九百三十三文十分中三分有餘匹帛絹紬收八百七十四萬五千五百三十五匹內稅絹二百七十六萬一千五百丸十二匹支七百二十三萬五千六百四十一匹南郊賞格不在數內綾羅錦綺不在數內管軍及軍班兵士七百四十二萬二千七百六十八匹半十分有餘糧收二千六百九十四萬三千五百七十五石內稅一千八百七萬三千九十四石支三千四十七萬二千七百八石管軍及軍班兵士二千三百一十七萬二百二十三石八分草收二千九百三十九萬六千一百一十三束支二千九百五十二萬四百六十九束管軍及軍班以下二千四百九十八萬四百六十四束八分夏秋稅所納錢四百九十三萬二千九百九十一貫匹帛二百七十六萬三千五百九十二匹斛斗一千八百七萬三千九十四石已上三件更有折變在內其餘所闕糧草匹帛並是見錢和買并課利折科諸般博買應副得足一歲所用養兵之費常居六七國用無幾矣臣懇懇而言蓋見其本末不早圖之是謂失䇿矣右謹具進呈取進止端明集卷二十二
