body:
  text: 端明集卷八宋蔡襄撰律詩宋君輔許當世陳彥謙蘇宣甫自逺還鄉上元同飲故國逢君慰喜偏清宵行宴重留連山樓上火人初合天漢無雲月自圓樂色時聞花院裏春風都在酒旗邊莫辭徹曉須沈醉後會還應不計年李閣使新種洛花堂下朱闌小魏紅一枝濃艷占春風新聞洛下傳佳種未必開時勝舊叢園館春遊只帝京可憐哀悴海邊城縱然得酒心猶在若也逢花眼亦生客有至自京師言諸公春間多會于元伯園池因念昔遊輒形篇詠緑渠春水走潺湲畫閣嵩巒映碧鮮酒令已行金盞側樂聲初急翠裙圓清遊勝事傳京下多麗新詞到海邊曾是樽前沈醉客天涯回望重依然秋日城頭蔓草受新霜天外孤鴻叫夕陽送客情懷楓樹老蓍人襟袖菊花香秋日登郡樓二首秋水已復漕秋風初怒號天容霜後淨山勢北來髙落葉隨飛鳥疏砧答暮蟬悠悠戍樓角悽切萬家傳七月二十四日躬弓破的心仍在爭豪力不堪開弓初覺顫盈貫未離貪衰病先期老中年豈分甘唯應樽酒在萬事一醺酣七月二十四日食荔枝絳衣仙子過中元别葉空枝去不還應是天人知憶念再生朱實慰衰顔中秋夕獨坐望月萬里凄凝魄幽深在處通清流河漢盡寒入水雲空踰久方全白彌髙適正中開書還自卷把酒復誰同泫葉溥宵露吹衣變暑風更看庭樹影漸過粉墻東九日許當世以詩見率登髙霜雲明淨海山隈一嵗登臨始此回堂上夀觴淋浪滿欄邊佳菊似疑開故鄉情味人人好今日榮恩節節來正是秋風洗煩暑力將衰颯上髙臺杭州璘上人以花栽數種見寄名品參差十數窠商船千里任風波土花分破根株小春色隨來意氣多欲種更看移樹法將開須與傍欄歌中年漸不勝杯酌紅翠他時奈爾何冬溫海曲封疆僻冬溫氣序差蟲蛇誰閉户草木自開花霧重朝迷日風號夕卷沙可憐天地雪偏解舞京華庚子上元即事老去年華只自驚又蓬佳節向山城春臨半夜寒猶重月到中天色更清上客風流連宿醉遊人歌調得新聲遙思鳯闕行時令紅繖朱欄萬燭明醉後醉後歸來月滿衣重重花影帽簷欹行人路畔猶相笑未似山翁倒接㒿朱樓朱樓燈燭一聲歌臘後天街月色和平昔黃公酒壚下誰知跬步邈山河一百五日開千葉間金西園花􅀢過中春微雨初晴不受塵莫怪芳叢開發早欲將紅艷送行人庭松安靜堂偏愛堂東砌下松三年瀟灑伴衰翁寒聲動蕩潮初上疏影孤圓月正中清徹紗帷延晝夢緑涵金盞帶春風自緣多病饒歸思便覺山林野意通四月池上風下平池水暈開池邊露坐水風來草香冉冉生吟席雲影飛飛度酒杯荷葉偶成雙翠蓋荔枝才似小青梅人間物靜兩相得月色蒼涼始肯迥乞雨題西方院有序嘉祐三年七月某再領泉山是嵗春夏不雨祈飛陽廟明年旱詣靈嶽祠又明年五月復來三次皆晝寢於是頻年不稔豈非郡守不德之致乎年年乞雨問山神羞見耕耘隴上人太守自知才德薄彼蒼何事罪斯民北園登髙即事呈諸同僚江雲寒薄不成霜九月登髙菊未黃飛鏑有聲弓已力小槽分溜酒初嘗秋容行見丹楓老客意難勝紫陌長時被召還都曾是禁園風物好故鄉時節可能忘重陽錫宴外園送馴鹿與東禪長老二年馴擾傍山家欲領東還道路賖送汝給孤園裏去此生長伴大牛車畫生李維寫豫像今已十年對鑑觀之因題其側清眸緑髮十年前朴野風神不易傳今日青銅莫相照白髭垂頷面雙顴將赴京留題山莊西壁禁林京尹荷恩光三上螭頭乞郡章貧薄奉親須仰祿此心安敢繫軒裳燕司封同年以詩見迎寄問閩州明使君十年蹉跌路岐分帳前約束承嚴節福州乃象之轄按下文書接署雲隔政知福州北去最先趨畫戟老來應免醉紅裙新編一攬思遊舊搔首孤吟日又曛題共樂亭層巒髙與赤霄通節嵗歡娛衆庶同庭有美音非獨樂音嶽會當炎暑自多風山川勝勢欄杆下井徑追遊月色中私幸編民居客右使君樽酒未應空徐虞部以龍尾石硯邀豫第品仍授來使持還書府玉質純蒼理緻精鋒芒都盡墨無聲相如間道還持去肯要秦人十五城辨歙石以此法若端石則不然過囊山寄宏師三十年間登第初青衫羸馬叩禪居鬢毛白盡猶奔走慚愧髙人得自如人日立春舟行寄福州燕二司封清溪潮上送行船回望髙城隔曉煙景色似看名畫展前日君家盡出名畫醉魂猶憶夀杯傳君家世傳夀杯行之侑酒春盤食菜思三九人日書幡誦百千南國逢君唯道舊後時何處笑今年又寄興化徐虞部梅花狼籍拂輕舟人日溪行動客愁上晝去程初北首故山歸思滿東流垂垂朝雨隨雙槳草草春蔬送一甌不獨懷鄉便多感看人難似府君侯上元至南劍州大雨寄泉州許通判路繞溪回不計程行郵今復宿延平陰雲藏月不知處急雨落天無數聲病起尚疑羣蟻鬭夢餘初聽一雞鳴泉山去嵗同遊賞惟有神君識此情大湖驛寄建州同年竇職方别驛臨溪曲清寒結曉陰灘聲生亂石雨意在間林登第年華久相逢禮愛深茶山春物近那得共追尋嘉祐辛丑蒙召還京二月八日道過陸氏之門因觀小欄花卉風色微和日晝明小欄花卉新芽生行人不是愛春物一見芳叢似有情題嚴先生祠堂遵此巢由志誰希公相權人瞻祠樹古天作釣壇圓髙節千秋外遺蹤一水邊孤風敦薄俗豈是愛林泉杭州過璘上人花圃封培剪剝奪天工欄下長年見萬紅投老暗知心力少自開還落信春風雪六年守郡在天涯冬暖無因見雪華今日復看千里白強憐寒色作詩誇寄題華藏院清軒湖邉無地有塵埃況復虛明向此開山氣每隨朝氣變水光長共夕陽來船行天上遊人散樹沒雪中宿鳥回一到便應離火宅不須花雨拂經臺提刑司封以鄰霄臺佳什垂示輒成拙篇以答厚貺峭拔幾千仭孤髙無四鄰低回傾北斗突兀起東閩締結青雲上登臨滄海濵溪山來面勢歌吹徹穹旻子夜先看日隂崖後得春三韓空瑣碎福人云髙峰晴海新見羅州島萬落自埃塵使者風流在詩人格調新驪珠忽投我神筆動驚人平昔持州契于今識路津去天知不逺咫尺仰威神過楊樂道宅西桃花盛開城隈繞舍似山家舍下新桃已放花無限幽香風正好不勝狂艷日初斜自憐馬上空愁望誰向樽前與醉誇京國難逢春氣味莫隨塵事度年華和龎公謝子魚荔枝霜鱗分不登枯肆丹實全應勝木奴欲效野芹羞獻去敢期佳什墜驪珠宋宣獻公夫人畢氏哀詞二首世閥推台路嬪賢秉國鈞生緣隨迹化歸處覺空真訓子清風在傳家令德新九原終一致悲喜盡成塵國賦雖千乘身期未百年針圖遺舊機簫吹向新阡行哭追前日超生定幾天寂寥原上樹薄晚起寒煙和張唐公約遊名園遇雪輒止京塵官事日區區擬出芳郊佩一壺樓外隂雲迎曉合陌頭霏霰與風俱翩翩珍騎曾來否種種名花更在無若得縱遊休秉燭月中沈醉倩人扶和宋次道宴日不赴有懷殿中佳氣帶春容天上雲謡落晚風獨向下陳霑醉斚羡君清臥寄詩筒春日東風吹雨濕鞦韆紅點棠梨爛欲然擬買芳華贈年少紫榆春淺未成錢唐公以公纍出知濠州湛湛清渠風力微濠梁行客布帆歸到官應過莊生廟試問鷦鵬兩是非桃杏園上有繁葩下落英紅波動蕩逐風行夕陽開處猶光艷何況今宵值月明送客來仙館清幽處處尋春風行酒面書日到花心獨厭歸期促難忘野意深歸鞍更回顧檜柏自陰森三月出城别張唐公會玉仙觀隴麥青青溝栁新春歸聚落少逢人如何試與持鞭手拂却向來身上塵玉仙池洞府花飛不減春輕雲成片玉成塵香軿縹眇知何在無限池頭再拜人凝祥池上晚歸緑徑陰陰落景微楊花零亂上人衣長煙似愛滄波面風色雖豪不肯飛和楊龍圖蘆鴈屏何事髙堂秋思生野蘆寒鴈畫工精風前挺立孤根老雲外相從去意輕不似丹青能借色若逢霜月定聞聲研桑心術都無取回望江鄉計未成和楊龍圖獐猿屏畫莫難於工寫生獐猿移得上幽屏相逢平野初驚顧共向薰風適性靈引子晝遊新草緑嘯羣時望故山青可憐官省沈迷處每到中軒頓覺醒和吳省副北軒湖山之什誰於素壁寫江流雲樹疏疏映荻洲盡日清虛全却暑一川搖落似輕秋暫逢明畫心猶在終向扁舟老去休只有遊鯈能自適莫懷香餌重遲留送仲庶待制知澤州十年臺省獻嘉謀新總兵符鎮上遊琴有薰絃多舜俗地連沙尾舊湘州江邊行色船千丈塞外威聲馬萬頭宣室夜談思賈誼未應鄉國久遲留送子真給事出守常山安得長材護北州暫煩儒將擁輕裘聲名不啻一敵國功業何須萬里侯設館髙牙延永晝獵場飛騎入清秋天樞嚴近恩榮重歸夢應思帝所遊送程刑部出守洪州何事名郎出計臺鍾陵都會久須才江山不是人間有旗鼓初從日下來列郡五符歸總制故鄉三組少徘徊勿嗟南國多懷感寶氣還應徹斗魁端明集卷八
