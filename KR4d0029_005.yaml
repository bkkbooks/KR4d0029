body:
  text: 端明集卷五宋蔡襄撰律詩題僧希元禪隱堂院在蘇州城中遊錫遍他方歸休靜默堂孤吟時有得諸念若為忘刪竹減庭翠煮茶生野香雲山莫騰誚心地本清涼經錢塘故宫廢苑蕪城裹故宫行人苑外問秋風當時歌舞何年盡此意古今無處窮往事蕭條隨敗葉客情迢遞寄孤鴻扁舟欲去更回首寒樹蒼蒼夕照東經林逋舊居二首修竹無多宅一區先生曽此隱西湖詩言不喜書封禪亦有餘書補世無逋詩云茂陵異日求遺草猶喜曽無封禪書山色凝嵐水色清山雲長與水雲平先生來舉持竿手釣得人間亢俗名離錢塘迎潮小舸滿旗風回首津亭暮靄中惆悵今宵歸去夢迢迢直至海門東至睦州一帶滄波兩面山扁舟中去幾時還浮生多半在離别此意明知未肯閒題杉溪驛二首宵行避酷暑山路乍縈回明月正相向涼風時一來幽林潜物怪祕洞蓄雲雷豈敢憚勞苦畏途誠可猜隘道臨深壑俯䦨千仭强驚禽忽獨去怪石偶成行月下芙蕖色風前䆉稏香反慙羣動息幽意更倣徨宿延平津鳴籟蕭森萬木聲濃嵐環合亂峯青樓臺矗處雙溪㑹雷電交時一劍靈曉市人煙披霽旭夜潭漁火鬭寒星畫屏曽指孤舟看今日孤舟在畫屏呈沈子山邈字子山時知福州荷葉新詞天下工玉人垂手倚秋風一聲清唱穿雲去斜日烘簾曲未終六月閩溪荔子丹新秋猶喜薦雕盤自嗟千里歸程逺不得繁枝雨後看題福州釋迦院幽幽亭有序東陽沈子山前此十年為侯官縣政休乘間頗自娛於登臨之適得院之東北隅地方數丈誅草茅而列樹石時哦遊於其所因命曰峻青臺今復為郡太守其僧曰吾使君儻一來執事者可暴露乎並臺作亭以除風雨子山至其下又名之曰幽幽亭邀豫題榜以揭之遂作詩以賦山川之美而序以紀其始焉路盡得佳賞川原何淨明周圍地形壯灑落世塵清背郭千峰起涵空一水橫風帆人共逺潮嶼歲重耕曉市炊烟合孤庵汲道縈俯窺嵓鳥過微認野雲生香氣林端出秋容物外呈表閒幡弄影覺盡磬傳聲官舍今稀訟轓車此駐行唱篇知寡和君世負詩名題漁溪驛昔年同向臘中回曽向欄干折早梅今日獨來攀舊樹風翻黃葉下蒼苔晚上碧峯亭城頭近晚忽開晴有色皆鮮是物清地勢四來州午向山圍一罅水東行乘風歌吹無時巳靣日樓臺觸處明不比兒曹誇衣錦自緣恩與養親榮春潮納納春潮草際生商船鳴櫓趂潮行封書欲寄天涯意海水風濤不計程病中偶書二首巳感節候變物態舒陽春那復壯年意如今多病身淨室焚香久烘爐煮藥頻神歡百慮解銷盡眼前塵行年三十六幾是半生人舉止不入俗清修難厭貧宴坐爐烟暖微醺甕酎醇前看簫管輩未免作埃塵和王介夫遊西禪兼呈黃承制山城只有四圍青海國都無一㸃塵荔子風標全占夏荷花顔色未饒春水邊清吹傳觴久路上殘陽立馬頻不是閒來誇景物欲將謡俗寄王人興化軍曹殿丞荔支厚葉先枝新絳囊使君分寄驛人忙彩毫封處曽留意筠籠開時不見香風色甚豪應少損路程差近得分嘗閩州縱有千千樹未抵家園氣味長和曹殿丞寄荔支荔子凝丹摘曉鮮江南來路與雲連託根曽是三山下結實應歸萬木先鄉國逺攜甘㫖重宴堂分玩色香全清才仍更傳新唱一一驪珠照眼圓飲薛老亭晚歸終日行山不出城城中山勢與雲平萬家市井魚鹽合千里川原彩畫明坐上潮風醒酒力晚來巖霧蓋鐘聲歸時休更燃官燭在處紗燈夾道迎和許寺丞泊釣龍臺見寄釣龍臺下艤行橈獵獵船旗待晚潮萬里征人應悵望一川秋色正蕭條雨雲來去山明滅風浪髙低日動搖有志四方男子事莫懷鄉國便魂銷十一月後庭梅花盛開迎臘梅花無數開旋看飛片㸃青苔幽香粉艷誰人見時有山禽入樹來日暖香繁巳盛開開時曽繞百千迥春風豈是多情思相伴花前去又來發篋得亡友書扎宿昔重交義零落今誰存舊情留紙扎永恨入丘墳世味薄於水生涯空似雲撫孤無力及流淚復何言寄答汝州王仲儀待制汝水閩山道路長行郵時復寄新章諫垣笑别三年近病枕魂飛萬里强烈火未應焚玉石埋輪曽是問豺狼主恩未報頭生白羞見龍泉百鍊鋼正月十八日甘棠院上元才過去尋春紅白山花粲粲新似喜使君初病起隔欄相向笑迎人天氣和柔酒更醇緩歌花底正青春狂花有意憐醉客撩亂飛紅滿一身無奈閒情著物歡更愁花草便䦨珊夭紅嫩翠宜燈燭放散笙歌靜裏看福州寧越門外石橋看西山晚照寧越門前路歸鞍駐石梁西山氣色好晚日正相當夢遊洛中十首有序九月朔豫病在告晝夢逰洛中見嵩陽居士留詩屋壁及寤猶記兩句因成一篇思念中來續為十首寄呈太平楊叔武天際烏雲含雨重樓前紅日照山明夢中兩句嵩陽居士今安否青眼看人萬里情司門員外郎王益恭年四十餘致政居洛中自號嵩陽居士修竹蕭蕭曲檻前清泉㶁㶁小池邊琴中一弄履霜操人靜當庭月正圓豫為留守推官新作緑竹堂王勝之劉伯夀多㑹宿彈琴過雨池塘涼氣早落花門户亂紅多松亭石上題名處誰剝莓苔看在麼王相宅號史館園嘗與府僚遊宴題名石上廟下春行香霧合觀中朝茹藥牙尖故人别後無消息荒草生墳白露霑嘗與尹子漸遊嶽廟寺觀今子漸亡矣霜後丹楓照曲堤酒䦨明月下前溪石樓夜半雲中笑驚起沙禽過水西從尹師魯宿香山石樓韓王宅裏酒千壚范帥園中花萬株行樂主人今巳矣春風還似舊時無趙韓王宅有藏酒百千器范太尉宅花最多名花百種結春芳天與穠華更與香每憶月陂隄下路便開圖畫覓姚黃月陂張家牡丹百多餘種姚家黃為第一草白霜晴鶻眼開原頭遊騎四邊來枯叢鴉鵲休驚噪日暮分持走兔回曽權洛陽縣屢陪諸君出獵履道園池竹萬竿竹間池際笋斑斕當時酒所誇文戰今日誰登上將壇普明寺乃白樂天履道第水竹最佳數為文字飲白馬寺前冠蓋盛送行賔友盡英豪耿丞血染邊場草留得聲名日月髙罷官時交遊送餞白馬寺耿大監丞今死西事題何山人大隱閣萬井連交道中天敞靜軒由來隱鄽市全勝賁丘園目極無留賞心閒不避喧沼光搖屋動花艷出欄繁雨霽山容靜潮生海氣昏幽人披彩檻永日對芳樽素業名家久通醫與義存丹圖環八卦仙訣遁三元造化今為友歡憂本聚門應須超世纍宴坐此忘言正月巡歷部郡侍親還家養親方解郡奉使又還家逺岫鄉關近前旌父老遮揮金貧自愧舞綵喜仍誇特地延賓友相期詠白華方山渡口占江上行人空自愁壯年雙鬢巳驚秋不知風裏千重浪何事無情也白頭江村黯淡江村春日斜汀洲芳草野田花孤舟橫笛向何處竹外炊煙一兩家三月再還家曉樹鄉關路春衣使者軺江眠聞落霰野飯掇新苗入里威稜減寧親喜氣饒勤勤父師教民病若為消宿海邊寺潮頭欲上風先至海面初明日近來怪得寺南多語笑蛋船爭送早魚回建溪桃花何物山桃不自羞欲乘風力占溪流仙源明有重來路莫下橫波礙客舟吳屯驛曉起殘月依山明朧􅀈長煙浮水白糢胡竹林繞舍啼鴉臼石井當窗下轆轤迎吏逺傳空狀小僕奴潜報一錢無騶兵不管晨炊絶呵呌蓯籠意氣粗王臺驛見晚李花有感玉京仙子愛春芳弄遍瓊枝嗅盡香祗有此花知舊意又隨風色過東墻晝寢宴坐軒憶與蘇才翁㑹别投涼下馬卧僧家繞簟清風卷絳紗修竹滿前微雨過逺山無際薄雲遮武侯舊隱人應到京西提㸃刑獄㕔宇在鄧州閩粵孤城日自斜解與塵心消百事更開新焙煮靈芽漳州白蓮僧宗要見遺紙扇每扇各書一首山僧遺我白紙扇入手輕快清風多物無大小貴適用何必吳綾與蜀羅野老尋山翦白雲欲將清吹助南薰不堪便面張京兆恰稱能書王右軍徑尺規圓比雪霜昔人何事恨秋涼珍藏篋笥未為失更有明年夏日長武侯白羽麾三軍帳前甲馬生風雲憐君才地亦疏薄相過書林至夜分薄似蒲葵質更圓忽疑明月落尊前南堂暑氣生圓濁一座清涼直幾錢滉白新箋卷線稜刮青纎竹纒紅藤可憐子夜書帷下一片圓光得未曽堂隂壁罅蚊蚋都指麾西向先驅除山翁一夜穩眠睡若或論功誰勝渠老去將攜只要輕況臨炎暑繞風清兒童愛把承簷溜未識山家質素情不掩歌脣向畫堂不須名筆作花房直應攜去林泉好轉覺林泉興味長虛堂永晝來風長石枕竹簟寒生光文園肺渴厭煩熱更要夫君在側傍懷文雅儼上人填填車馬走沙塵中有伊人離俗氛千里不逢京下信五年虛斷海邊魂何窮世事秋林葉自在心靈晚岫雲聞道西堂今粹隱暮鐘朝磬欲何云寄題處州朱山人幽居之子適所遇愛此山林居禪心庭下樹仙訣枕中書溪明暑醉後洞暗春遊初逢疴藥籙補得意琴聲徐人生隨樂住世事與閒疏勿用挂雲網孤鴻翔太虛耕園驛有序明道中豫為漳州軍事判官晚秋嘗至州西耕園驛驛庭有佛桑樹十株開花繁盛念其寒月窮山方自媚好乃作耕園驛佛桑花詩一首既而乘桴東下又作溪行一首慶厯七年豫使本路明年夏四月自汀來漳復至是驛花尚仍故追感昔遊因紀前事并載舊篇龕於西壁使軺迢遞到天涯候館遷延感嵗華白髮却攀臨砌樹青條猶放過墻花悲來唯見金城柳醉後曽乘海客槎欲問昔遊無處所晚烟生水日沈沙題白蓮院東軒有序漳州白蓮院豫為郡從事時多所宴遊今十有五年因使復來當時遊者零落殆半愴然成詠寄題東軒兼簡宗要上人昔年文酒自為情身外鴻毛萬事輕暑醉每憐風引夢夜歸多見月隨行重尋蘭若餘芳在却怪桑門老態生㸃數朋遊今有幾拂塵看字淚先橫端明集卷五
