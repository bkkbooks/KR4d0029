body:
  text: 端明集卷三十九宋蔡襄撰墓志銘蘇才翁墓志銘蘇才翁諱舜元其先自漢典屬國武葬武功其後周邳公隋房公唐許公文憲四相世居不遷文憲之後曰傳素避廣明亂西入蜀其子振仕蜀為梓州桐山令生劔州司馬寓司馬生贈刑部侍郎諱協是為曾祖考其配薛氏追封河東郡太夫人刑部生祖考贈太師尚書令兼中書令諱易簡終禮部侍郎祖妣崔氏廣平郡太夫人禮部生皇考贈工部侍郎諱耆終尚書工部郎中直史館娶王氏金城縣太君太尉文正公之女生三子皆有才名而才翁最長七歲能為歌詩文正公愛且竒之奏授同學究出身調蔡州興平主簿移尉越之新昌時詔復唐十一科而新令門選者不得與焉君乞還所有官以應詔不得報乃上所著文章召學士院試賜進士出身明道中主開封之扶溝簿畿內饑甚君欲發廩以賑之其令畏縮輒移病君即出粟以活饑者用舉任者改大理寺丞服工部喪外除知開封咸平縣咸平聚兵以萬計軍中旦閲卒有厭大校之虐己者方持弓矢輒怒罵衆兵牽連一營驚譁君聞之至其所衆惶泣且訴君闕二字罷之因飲射至暮明日易其軍校而流其唱為驚譁者遷殿中丞移知眉州眉山㑹西夏元昊冦延安君條上禦賊方略知府事吳公遵路薦其才除通判一州事賊酋李興歸命邊州繫之而上其事踰時令未下君因言其賊來者宜厚其資速寵借以驅闕三字至者李興輩反為囚虜必巳自悔且元昊慘毒而其偏校雖畏之其心豈易服從哉若餌以購賞必相引而至並陳攻守利害十二事以聞以太夫人憂去官尋勾當京東排岸司改太常博士三司使王公任君三司勾當公事出為荆南路提㸃刑獄未行易福建路汀州民王寧毆王先至死以賕蓋覆得不敗且三年矣君至即捕按尚書屯田員外郎王稷為部將治窮其事發王先尸驗其傷猶然以歲久為請君特奏殺之又遷尚書祠部員外郎移京西未幾又移河東以弟舜欽謫死湖州求江吳一郡得揚州未至改兩浙凡四皆為提㸃刑獄君益謹職顔杲卿真卿之後流寓溫州君索其祖告身家諜推之得其實建言近年守臣因賊屈附抵法誅戳蓋忠義不修莫為之勸今二顔之裔曰惟孜似賢皆為編户民若録其嗣顯白二顔事以動天下可不刑而化朝廷特官顔氏二子祀明堂恩度支除京西轉運使雍州峒獠鈔二廣邊用不給君以所部羡錢二十萬緡助之充三司度支判官至和元年五月初二日終于京師之祖第年四十九夫人劉氏旌德縣君賢而有法男曰涓大理寺丞曰澥注洞皆太廟齊郎鴻汶及二女皆幼君曾祖而下葬開封府開封縣宰輔鄉才翁之歿汴無資産以為生諸孤就養江南居潤州侍柩以行某年某月某日葬於丹陽某鄉使人請銘某與才翁兄弟遊最久今皆巳亡矣尚忍銘哉初才翁少年欲以文詞進願還官就科試思與天下英豪角逐於筆研間以力決勝不得如其意逮邊隅兵興夙夜講畫謀策要以術數翦屈夷虜書屢上不見省用大臣如前丞相賈公丞相文公故參知政事范公皆持國秉力推薦之終以序進志不得騁平居談辨唐數百年間喜稱魏鄭公諫諍裴晉公德業李臨淮將兵衛公處邊事劉忠州通流財利韓退之文章類此數人而巳其議當世人物亦以之為標的於人少所稱許至有同班列偕出入漫不省記以是與者益少然􅊩官當事定慮果决所至制束强黠敦尚風儀其為文不迹故陳自為髙古雖所不與者亦不能掩也君善草𨽻藏書數千卷皆手自讎校撰述奏御集十卷塞垣近事二卷奏議三卷文集十卷課子舍治經史率有凖程所以諸子皆積學有立銘曰龍淵之器不投兕犀孰知其利志古豪英不任於權孰知其智負才自髙不屈於人與世或異先民之載德不必年賢不必位大江之南順卜之吉慶延嗣世瑞昌縣君孫氏墓志銘夫人之父故禮部郎中直史館諱冕在祥符間少直言有聲名數更劇郡治用嚴明當世推重夫人少喪母鞠養艱勤及既笄禮部自負才稱又加憐幼女孤苦必擇竒士得今尚書職方郎中葛君宫公雅遂以女歸葛氏初夫人之行公雅年餘二十以文詞中甲科為州將幕官指期可得貴仕久之回旋銓管僅工紀平居益邑邑不自得或復慨嘆夫人曰為官窮通豈不有命耶既而公雅升郎位再以郊祀恩封夫人樂安瑞昌二縣君至和二年公雅罷南劍州夫人從還京師道病發亟命旋歸以三月二十日終於正寢年六十七月二十九日葬江隂軍江隂縣化龍鄉祔於先塋有子䝉登進士第處州縉雲尉女一人未嫁孫六人曰逢郊社齊郎曰充曰三老女幼夫人守禮法動止有度舉族姻內外無有不得其所持生簡約使公雅能專意公家而無錙毫擾於民有內輔焉喜誦浮圖書將終遺戒薄葬祭之具神情如平生無有悲怛蓋婦人之難能者銘曰叢蘭之芳一香同色生於名家化治禮則歸助其夫約清厥德惟善不忘夀考有極新阡崇崇子孫孝思置丈幽堂兹後之儀延安郡主李氏墓志銘延安郡主李氏太宗皇帝之外孫真宗皇帝之甥齊國獻穆大長公主之女也父為鎮國軍節度使駙馬都尉贈太師中書令尚書令許國公諡和文諱遵最大父運州刺史贈太師諱繼昌曾大父樞密使鎮國軍節度使贈太師中書令尚書令隴西郡王諡元靖諱崇矩家世勳業列在國史大中祥符三年十一月主生於永寧第彌月獻穆公主見主於帝所帝曰女吾之所出也且有竒法異時非才賢不以逑匹因出縑帛以為慶逮周晬召至內省臨視除髮以珍寶戲物百餘種賚之甫七歲即賜冠帔入謝賜見皇太子將拜之帝曰齒同矣孰為長徐推主生月日後皇太子乃使拜蓋欲以長幼序之每宴㑹中常呼置旁坐所以恩愛之良厚非諸王公主女所可擬天聖五年封長夀縣主以歸今閣門使忠州防禦使錢君晦錢氏自忠懿王舉所承襲十有三州之籍上于朝廷而其人民數十百萬不罹兵革之役以至太平隂施深長勳美蓋世主家以是通婚姻及主歸而其君舅文僖公以代誥命參禁密遂持將相印其族植笏而通省户者以百數門闌厮役青紫羣列號為貴顯然以主之重務自損下主益恭謹持禮承舅姑奉祭祀夙暮不少懈姻親娣姒降屈色詞以相接親疏有意於是諸錢內外悉稱主賢明道二年進延安郡封自和文公薨主歎曰吾獨有母存乎孝憂愈至時物之新者必先獻乃敢用皇祐三年獻穆捐世主哀戚甚却珠金之飾日夜涕泣思慕因見癯悴上念先皇帝弟兄無復存者乃恤其孤謂主曰大長公主歲常資郡主厚甚今寂寞耶俸錢九月六萬特增至十萬是年除夕主還外舍設奠蓋歲新矣而母不復見也號慟咽絶左右更勸莫能止夜中氣悶胸比歸疾益力戒二子自强以立門户斂葬之用必以約四年正月四日終春秋四十有三上惻悼不視垂拱朝一日命中司賔臨弔賻贈加等以其年四月十日葬河南府洛陽縣邙山之原從先姑之兆子三人曰景初光祿寺丞景裕大理評事其季早夭女適右班殿直趙思復封夀安縣君先主二年而亡孫男四人初父和文公博雅有文喜與賢士大夫游獻穆又以賢德輔之著於天下主更見清習皆善行故不以貴勢富侈自用閭閻民有死喪不能給必資其家𨽻侍使令未嘗訶譴有嘉賔焉親視烹飪雖其資敏淑然有所從來矣主善書能為五七言詩居閒設烈女圖讀書史以自娛二子就學日程其所為又勤解說曰吾觀持粱策肥者外雖矜豪而中空無有多慢侮人豈聖人所謂愛親者不敢惡於人之義乎若不為此吾意安矣故二子知所以為學防禦君能亢其宗以有聲名主實訓有助焉銘曰猗哉延安肖於哲親少所養習既歸有聞婉娩令善率禮而文唯時貴重世莫與隆羣從祁祁車服有容天子惟舅言朝於中北第髙門爰東其軌父王之孫母兮帝子曰豫爾思我適則喜旋於我家相印簪斧齊珥則多君姑娣姒以承以比和樂有序孝愛深矣哀隕其生子學而力夫以材名胡不遐考用觀厥成孰不願年曷支其傾惟德之夀寖久益明於何其夀其夀斯銘尚書職方郎中謝公墓志銘君諱某字某泉州晉江人曾祖某祖某父某以信義稱於鄉太夫人徐氏生三子君最少祥符八年舉進士歷撫州臨闕四字軍事推官太守受賕賄舞法君据平無所撓訟者不之守而之君州政得不敗守亦善去改大理寺丞知龍溪縣縣人曰是故州從事持守正使無害有恩於我相與喜具酒食相過從為慶賀者至則决滯訟條剗舊蠧民以便安徙容州北流縣城郭倉庾廨舍道粱一皆新之就知雷州軍州事州傅海有蠻夷風不知學為葺孔子廟聚諸子弟教以儒術雷人業進士自君始大豪李郁築城得古印立盜契奪民田百餘家五十年不能直有訴於君者即捕繫庭下問狀具伏而郁老當贖君條其甚惡不可假卒致以法通判福州畫購巨盜悉誅其黨諫議大夫方公謹言治廣州辟君二政亷取番舶輸官之利以招其徠至罷去夷人涕泣思之知建州歲無留獄長老紀焉又知開封府之祥符治愈精微有聲名朝廷用薦者言將任以刑獄錢穀而君懇求便藩得海州㑹歲旱有蝗過境一昔拱穟死吏民驚歎以為異政之應皇祐五年正月十四日卒於官其孤護全柩以歸某年某月某日葬某縣某里娶黃氏故直史館宗旦從妹也再娶其弟封永康縣君子四人彥輔太廟齊郎先卒仲規舉進士第越州蕭山尉叔矩未仕季成太廟齊郎女八人適余昞祝嘏楊璟劉鼎臣黃世永朱仲陳大雅陳針君性樂易無貴賤親疏接之皆盡其衷故人多喜愛之數官嶺表不以僻陋自失所至喜設施為民賴利在海州嘗謂其子曰謝氏居閩未有仕者吾起家州縣自大理丞八遷為尚書職方郎中贈吾父都官郎中母長夀縣太君斯亦榮矣歷官三十九年無小過失實吾謹畏然爾汝曹念之故其子益循篤學皆可以大其家者銘曰六十九為巳夀位郎官才未究政在民斯不朽內殿承制王君墓志銘王君諱翊字輔之兩浙都巡檢使罷還皇祐五年五月七日卒於京師以其年七月二十四日葬於開封府開封縣褒親鄉其孤兟哭而杖授書使者以來請銘曰我先君之先錢塘人後遷於汴少孤家窶以書藝補官歷七任終六十有一今葬有期且走公門下日久固知其所為幸或銘諸墓使有聞於後世公之賜深矣余為次其官族初授涇州保定主簿治有稱再調永州司理參軍州將曲獄君曰獄辭定法可妄移哉永邊溪洞蠻獠冦境殺巡檢使君請募敢戰五百人自率之遮厄設伏餌以羸形賊果來擊之敗走入焚其廬以理官不應捕冦不當其賞除常州無錫尉轉運使段少連以材明嚴察部吏每行郡縣必載君舟中語至移日出界乃遣尉滿君歎曰俸微不能芘吾族還都退居視時物上下取與出納居二年廄有粟馬所與遊皆貴近人久之陜西用兵討元昊君奮曰陋矣吾視此屑屑耶上封章言十事書奏即召對延和又令於資善堂究陳利病再遣使問所欲為曰臣言可用幸天子用之不敢徼利夏隨為陜西招討使薦君智能授左侍禁涇州長武寨主元昊入冦至渭州寨民將逃去君諭之曰入保此吾必能守衆乃止遷西頭供奉官河東麟府路走馬承受公事専置堡寨一十有五招懷蕃户二萬餘每進對多言時政得失輒觸權要再遷為承制三司使葉公清臣任君監在京𣙜貨務僅十月計所贏錢二百萬三司使移他官君失所知求見上言事願解局遂除都巡檢使又上書曰臣有通流貨財之術歲可得錢千者四百萬欲道其所以然於上前再三不得召猶曰罷歸幸得望殿陛咫尺盡吐吾術矣比至京師病且卒卒不能出其術悲夫君娶胡氏子七人男曰威三班奉職曰兟兢舉進士兢中第哲班皆幼女長適前河中河東主簿吕公次適謝公弼早亡銘曰材以時成則資材艱於用匪成之艱利國有原動如轉圜曰時與成惟命惟天右班殿直監慈湖都鐡冶務程君墓志銘程君居興國軍大冶縣世為著姓右班殿直諱叔良字仲卿尤有善行其曾祖諱侃仕僞唐軍器副使祖諱滿光政院承㫖父諱昭字某三班奉職以材智自髙金陵平浮江而上至慈湖依鐡山冶以通吳蜀之利積數十年致巨資散施周人急難名譽翕然君承父兄之舊少從學好老氏書服其慈儉之訓所居夏秋潦水環民舍衣食無所從得君計其口而食之疾者餌以藥石死者葬以槥歲用為常明道中江南饑疫殍殣狼藉道上詔督郡縣開廩以濟之發徒以瘞之尚莫能周而君之里間無饑人無露骸其視人之所苦若出於己晝夜不懈親戚之貧而歸隨所厚薄而活之至於資身自為約薄不營出入悉責家奴時一省視去其欺己者以是雖居豐有而甚適旁居田墅治園池植草木發泉石在處為亭臺賔親遊行嘯歌一醉灑然當世名公卿作詩以詠道其善年五十有六以疾終皇祐二年閏十一月六日也將疾自疏簿目一通皆治喪事親族之禮施用之具與其葬所若年月日既終其孤啓而行之無有乏事遂以五年十月二十五日葬於流水里之南岡君兩娶鄭氏有子九人男大年三班奉職治經史力世其家曰龜年堯年康年皆敏飭向學女五人長適大理寺丞郭之美次適開封府太康主簿蔡髙次適衛尉寺丞聶平仲二人尚幼太康主簿豫亡弟也以㛰姻家知君最舊有所部官嘗以書通客與之錢不能塞欲其人後言財利事得出使南方猶泄前怒增君官課鐡歲百萬指期必破産或諭君出其手迹以直其事君曰寧破吾産勿破吾行豫乃知君終長者為之序且銘也銘曰致適於無以放其身厥隱於真捐己之有利及於人唯義之倫愛協鄉閭不獨其親允富其鄰生也勿纍沒焉不泯考信於文泉州司户參軍葉君墓志銘葉君任字仲堪興化軍仙遊人父諱賔尚書都官員外郎致仕恩補一子官君以是為江州德化縣尉歲餘乞便家事親得泉州司户參軍時監司有不喜君所為不苟者因自牒去職歸侍都官府君至殁不去左右遂無意仕進以終其身君於為吏臨衆必先繩其尤强猾者治民必先憐其尤貧弱者故所至必辨而去則思之上官以勢奪其是如以礫食吾不從也其餘家居廩有餘粟遇歲凶荒薄其直而出州黨賴之民有喪與疾時其急難以濟其力游舊之好益困愈親若寒而就燠吾不去也故其生也人譽之而亡也哀之迹其所從來蓋有以得之者初棄官歸年方壯强頗窮山水娛詩酒以自放或說君起仕君謂之曰達者人之表而議之招也享其利而不勝其任得所欲而違於義君子不為也古之人所以約而自全者其心豈異乎人哉蓋知其所以然而安於分也且怵惕窮年孰與茫洋無間以自適乎君生五十四年而終於嘉祐三年十一月三十日葬於歸德鄉化善里其世次豫嘗志都官之墓可從而考也初娶王氏再娶吕氏皆有賢行而早世長子曰祐以文詞為名進士卒年三十曰裕十有五歲持父喪如成人曰祫尚幼女十一人二人適太常博士許禎郴州宜章令陳啓期六人為進士妻三人未笄許君與豫善述其孤之意從豫請銘銘曰行修於鄉而老少之懷志安於分而榮悴不遷此力於吾道者也若夫冥乎造之有端託於適化之㑹於我不居乘時以行抑老嚴之徒歟太常丞管勾河東安撫使機宜文字蒲君墓志銘蒲君叔範天聖八年自閬州以進士貢至京師年二十第中乙科余時少君一歲而第同籍居同巷出處相從意氣相得也皇祐五年君以太常丞管自河東安撫使司文書隨其府君并州而余為知制誥權禮部貢舉有以雄詞壯論異於衆者驗其名氏曰蒲宗孟其父師道乃君諱也是年春宗孟釋褐豫喜君之有子且將賀宗孟歸亟以書訃曰我先子以四月一日終於官孤宗孟扶喪以寓京兆明年十一月一日遂葬京兆府咸陽縣龍首鄉之北原敢以告余既弔之而為之志其墓曰君曾祖荗璘仕僞蜀為彭州判官祖穎士善藏書父伸贈大理評事三以鄉薦退於春官自號北谷散夫君承父詞又得所蓄書以讀而性警悟十餘歲能誦經傳屬詩賦陳漸以文學名於蜀一見君所為詞章乃以女妻之今延福縣君也太夫人陳氏追封奉先縣太君君少失所恃事繼母朱氏封夀昌縣太君禮孝尤至故鄉黨稱其詞行及􅊩官處事又以材聞初授成州團練推官吏易君年少不更事君未旬月已通法令簿書擲其隱謾惕惕畏服再調延州推官元昊慢形見君謂州將郭勸曰度元昊必變變則延為冦衝城圯塹堙無以為備願建言治之郭勸以其言聞於朝報不下既而元昊果叛詔城延州君曰役促民勞未戰而困也范雍以振武節度為陜西經略使治延州宦者盧守勤為兵馬鈐轄中貴人臨邊自喜事必己出嘗欲決有所行而雍難之守勤怒發聲色引起君止之復坐曰太尉為大帥而軍政不一鈐轄驕傲如此何以帥下願太尉斬之以徇衆守勤泣恨日攟其過至罷歸莫能塞所願尋為武寧軍節度推官梁洋二州人爭水利數十年競訟至破産不巳朝廷下其訟轉運使遣君按視君從二州人以行隨所曲直而辨之為立約束分水溉注二州之人各當所欲迄今便之以父憂去職服除除鄆州觀察判官監杭州清酒務改太子中允知京兆之高陵高陵前號難治君後威刑而先禮教有父兄告其子弟之不令者君召其子弟語之曰順於父為孝順於兄為悌汝以悍父兄之心遷而為順則為善人夫何難哉我即坐汝不人類矣聞者愛服遷善縣豪距縣二十里作府君神祠以巫覡蓄蛇怪日言禍福簫鼓歌舞通晝夜男女往來輸金繒木石為之立廟至有冒為尚方器服者君與民期曰令將禮府君神民聞令來悉集既至羣豪翼巫覡以導君曰未齊潔未宜見神且汝能迎置府君神者及能帥衆力而廟者巫能通神以下禍福者果誰乎衆各指之君即麾縳數十人繩以嚴法籍其材而夷其廟移知泉之晉江㑹宣徽使李昭亮知延州奏君改發署判官事宣徽徙澶州并州皆辟為從事君感宣徽之知己事無巨細力為畫議君沈靜有識慮壓於貴勢必諍辨是非平居鮮語人過喜察姦貪梏其手則巳不務煩苛善議論上書言禦戎備蜀廣儲嗣事皆切於世者而官止太常丞年止四十有六自初仕至終皆在幕府助人為政而未嘗得専所為以見於人也既卒貧空孤宗孟紹其家有女七人三嫁為士人妻四人尚幼其稱明年至和元年也銘曰才不必有位而德不必有年或曰命然生有善行而殁有嗣傳孰與祉焉巳乎奈何歸安兹阡端明集卷三十九
