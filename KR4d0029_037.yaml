body:
  text: 端明集卷三十七宋蔡襄撰神道碑光祿少卿方公神道碑方姓周方叔之後東漢紘避地丹陽因居歙縣世為豪長唐泉州刺史取述者紘之苗裔歙睦最近公之六世祖唐季之亂由睦州徙家泉州興化縣曾祖諱京仕僞唐為清源長史祖諱守禋漳州漳浦縣主簿有詩三百篇曰仙巖集父諱鼎太平興國初陳忠順王以其地歸朝廷即泉之莆田立興化軍又徙為莆田人纍贈工部侍郎公諱偕字齊古少聰警十四能為文詞薛公奎知縣事公以文見薛意其少年倩詞於人延坐令作賦一篇立就薛公器其逺至二十進士及第授溫州軍事推官校其州之進士州守以客不私託公曰貢舉無容私出之守導客訴于監司覆校不私守以是免罷歲大饑民有欲𨽻官軍以就廩食而兵有定數吕公夷簡為提㸃刑獄公白之曰溫民饑且死勢將聚而為盜豈若署壯强以尺籍且消患於未萌而公私交利乎吕即移文於州縣㸃七千人再調漣水軍判官部有浮屠人曰婁道者能以術却寒暑驚眩民俗所至受施金繒無量其徒以高資為姦橫公密捕一夕輒病死沒入其財而逐其黨轉運使梁楚聞公材能每委以難事因而保薦代還吏部銓將上舉者姓名或諭公曰保章固多宜置梁楚宰相之所甚惡者公曰梁知我者幸遷而置之吾不為也及績最上中書丁謂果沒之又為汀州軍事判官唐公肅使福建建之建安訟日數十百命公權涖旬月之間至於閒靜縣管茶山先社集民數千噪山谷中助達陽氣以發茶茗公名害吾農時而作無益耶是歲不用後亦遂止丁侍郎憂去官外除改著作佐郎知福之福清吏質衣以自給人至今頌之徙監南劍州石牌場月入白金三萬兩就遷祕書丞久之徙知資州資陽縣遷太常博士未行喪太夫人行服景祐二年遷尚書屯田員外郎御史中丞杜公衍判審官院與公無雅故因視閥閲曰唐公高潔於人少可今力慰薦如此子之才行可知巳㑹被詔舉屬官即乞公殿中侍御史朝廷以實無資歷不如詔又請御史裏行其官久廢罷之杜公奏曰臣所知者無如方某即不如例願令他官舉薦於是除推直官雷孝傑知代州貪贓不法屢鞠失實公馳驛往劾即正其罪還見賜緋衣銀魚澧州逃卒從民李某就傭而歉其直遂誣其家事摩馳神歲殺十二人以祭州捕其族三百人薦棘於州門獄久不决詔遣治之公詰之曰必得被殺者主名乃疏其姓氏鄉縣移問所疏或存或亡悉有根柢無見殺者告者伏法御史知雜事龎公籍薦為殿中侍御史裏行二年即真命又遷侍御史使南都降慮獄囚時鴻慶宫災將議修覆公引漢唐罷原廟故事疏勿復治以答天戒元昊叛邊寇塞門寨鄜延路副都部署趙振閉城不救塞門沒賊大帥言振畏懦當置於法公將命按問振以逗撓其當棄市公入為上言振兵衆寡不敵出亦為餌矣振得不死流竄改開封府判官時西兵未解軍資百出取辦臨時民苦不聊朝廷遣使四出以安撫之公往江南東西陛辭之日曰民所甚急者行而後奏事大而緩者請以須報庶乎惠澤速逮於下也比至去貪暴薦循良數十人平寃死决滯訟威動所部先時轉運使第民産高下給以乳香令其輸絹民輸之絹而吏奪其香率空手去三司出綿綺之類下州郡鬻之促期斂錢而帛無所用公一切罷絶而上其為害之狀轉運使坐免其恤民疾宣風㫖率多此類入為三司判官使契丹復命拜兵部員外郎兼御史知雜事判大理寺賜金紫糾大臣之不循禮法者數人九十六日擢副三司度支是時江淮發運使與諸路轉運使事皆違異歲漕闕其舊常除公天章閣待制充使江淮東南乃辦發運以近侍處之自公始也移知杭州杭於吳最為繁穰公時與賔從載酒殽鳴絲管周遊湖山之間牒訟至前談笑遣之若無可為治者二年未嘗有留獄遷刑部郎中以疾得太常少卿分司西京祀明堂恩為光祿卿歸休里閈至和二年七月二十七日終于家年六十四詔中使賵贈明年正月八日葬侯官村之靈隱山公嚴明潔亷察民情數民事尤劇益以精敏其下少欺必擲之惕惕畏伏在三司開封每議刑平獄鈎簿領通財利率有條理後以為法性樂人善汲引後進常若不及生平所任保二百餘人多顯達者尤善飲酒遇酒聰明過於常時知福清吏乘醉白事明日覆之吏隱其一公曰有某事在吏叩頭謝使契丹其主酌大金瓢屬之曰此所以侑勸也公不辭酌之契丹大驚喜遺以名馬號其器為方家瓢云母王氏贈太原郡太君妻陳氏封安定郡君故祕書丞諱靖之孫女也子四人浹漳州長泰令洽守將作監主簿早亡沃太常寺太祝澤郊祀掌坐女七人適劉孝先陳勵王拱並進士宣州涇縣尉鄭伯齊福州連江縣尉李昭文二人尚幼浹既克葬乃以書載公之官籍拜除卒葬之歲月請於某曰先君之於法有碑其文將誰託乎某謹序而銘之曰任職於朝志不上屈作政于藩勢必己出臨劇以簡明謹惟刑為利以寬矜恤惟民要望是更法從之聫何命之嗇疾其末年夀兮必終德則滋久銘以著之唯公之有墓志太常博士致仕胡君墓志胡氏世居長安詢為唐兵部尚書其孫韜因亂留蜀為僞蜀陵州刺史蜀平歸京師終衛尉卿於君為曾祖生泰州司寇參軍諱修己卒葬海陵司冦生寧海軍節度推官諱訥贈太子中允博學善屬文吕文靖公夷簡嘗薦其書備修國史君其長子也諱瑗字翼之少有氣節顓意經學兼通律吕之法力貧以撫兄弟之孤愛義良厚景祐中范文正公仲淹上言君知古樂召見論樂拜試祕書省校書郎康定初元昊寇邊陜西帥以辟為丹州推官後移密州觀察推官丁父憂舉其族之亡於逺者九喪歸葬服除遷保寧軍節度推官治湖州州學又召教授諸王宫病家辭免遂以太子中舍致仕泛恩改殿中丞驛召㑹祕閣議樂除大理評事兼太常主簿尋復解罷歲餘授光祿寺丞國子監直講仍與議樂樂成改大理寺丞賜緋魚嘉祐元年遷太子中允充天章閣侍講既而疾不能朝拜太常博士還官政從其子志康杭州節度推官以就養四年六月六日終于杭州享年六十有七明年十月五日葬於湖州烏程何山之原母隨氏贈京兆縣太君娶王氏封長安縣君有子三人志康進士及第志寧志正皆力學長女婚大理寺丞滕希魯次進士王伯起季女尚幼孫守約君孤進所立不恤權貴義以自信本朝承周用樂其聲高不合中和太祖皇帝嘗詔下一律而未遑制作天子知樂命李照等修之君初得對崇政廷辨照等所修樂非是詔令改作未幾報罷及㑹祕閣議按周禮以正鐘律用上黨黍列為九等纍其中者為尺尺定而律成驗之比舊下一律於是徹前樂而新之天子臨紫宸鐘磬在廷天子曰學者能通典故而不能知聲工者習其聲之傳而不知制器之理斯難能也先有議鎛鐘當有大小今與黃鐘一之非古制乃用倍半之法作應鐘至是鐘成特小小者不堪備宫縣諸儒侍從無異議者天子可之用於郊廟又令作皇祐新樂圖記布之天下蓋積二十年而後成其間同議論皆貴官老儒相抵止者豈一二哉然君未始恤之也尤患隋唐巳來仕進尚文詞而遺經業苟趨祿利及為蘇湖二州教授嚴條約以身先之雖大暑必公服終日以見諸生設師弟子之禮解經至有要義懇懇為諸生言其所以治已而後治乎人者學徒千數日月括劘為文章皆傅經義必以理勝信其師說敦尚行實後為大學四方歸之庠舍不能容旁拓步軍居署以廣之五經異論弟子記之自為胡氏口義侍邇英講不以諱忌為避既疾上數遣中貴人就問安否蓋亦有所待矣比去京諸生詣闕下乞留者纍日公卿祖送都門甚盛莫不惜其行也君雖老於訓𨗳在丹州實與帥府事建議更陳法治兵器開廢地為營田募土人為兵給錢使自市徑馬漸以代東兵之不任戰者雖軍校蕃酋亭障厮役以事見輒飲之酒訪被邊利害以資帥府府多武人初謂君徒能知古書耳既觀君之所為不以異己義翕然稱之君雋材而行篤卒艱勤以歿所著資聖集十五卷藏於家嗟乎士之有志於道以身法世莫不欲致之於用推之於逺然才德之士多亦蹇軋難通豈不有命乎君不鄙小官進不及用功於誨人其施博矣晚乃得侍天子左右若將有為輒病以廢豈人事也哉謹志墓表尚書虞部員外郎尹公墓公諱仲宣咸平三年明經登第歷梓州銅山鳯翔麟遊二簿調永興司理參軍又為潞州襄垣主簿遷汝州梁縣懷州武陟二令又遷蜀州軍判官薦公之行能於朝者十數人由是除大理寺丞又四遷為尚書虞部員外郎歷知汝州葉鄭榮陽二縣又知大寧監通判華州華州由知資州最後知郢州以景祐四年三月七日卒于官春秋七十一公之為治應事輒決未嘗迎立科指辨詞周復細民自得盡其情實然慈恕雖發見巧僞不忍置之深法所至之州若縣其人至今皆曰尹思公為我主曲直寧可得也其尤著明者許州進士朱公祐嘗遊資州當是時公初卒資州聞之鄽巷傳道老稚相扶攜涕泣入浮屠宫哀號弔問道交踵往來數日而後巳公祐於公父子間無平生之舊美公愛於資遂記之以傳於人曰遺愛録云嗚呼公乎其厚德者歟古者太守刺史權大官久能以威惠滋其下故時有思者今之為郡霑三歲輒更罷去事小大率有法令雖材者巧摘竒斷立威刑以為强名然其居也民畏之去則巳矣公平易不設垣塹悉驅所治之民而內之俾其自安之存無能指引一二事以稱說及其終乃懷思無窮豈非盡其中者其迹愈隱而其感益深乎公始至郢州以書語其子洙曰吾州土風和民俗厚有所治有池臺樹石觀遊之美可以休吾心焉終此觀吾老矣署事始三日蚤作被疾比呼醫至巳大劇志莫克遂可悲也巳公之先世居太原祖某贈光祿卿葬河南夀安其後子孫遂居河南考文化仕至尚書都官郎中以才能名當時纍贈刑部侍郎母鄭氏追受德興縣太君夫人張氏夀安縣君以賢德稱於內外族前公七年卒子男源洙湘沖淑沂澄七人源洙澄皆中進士科湘以䕃補官沖淑並早亡沂尚幼公之卒明年十一月從葬祖考之兆其孤謂某曰歐陽永叔既銘吾先君子之行藏壙中冀千萬年以永存子且無詞慰豫哀乎某謹次其始末用考信於後人其年十二月日刻石以表于墓下楊公明墓表豫友楊公明景祐元年登進士第籍名下吏部銓將補官輒病其年某月日終于京師其友張平叔用浮屠法火之而歸其家以某年月日葬于皂洋之北山嗚呼人孰不貴子之祿不逮其身人孰不夀子之年止於二十有七天乎命耶豫莫得而悲之惟子之志不得伸而利於人者最可悲也豫幼學於鄉序及長舉進士與公明並研席者數年公明居一室方牀環列冊書而飲食寢休於其中蚤夜讀誦不休羣居談噱終日過耳若無人笑語者於是博通經史豫觀公明而自省日益修勵即戲言小失亦愧公明之知者豫之道獲益於公明也久矣間嘗語豫曰今世取士失其方而仕者多所矜伐智詐以為材能位通祿厚侈心夸欲縱肆使其風流霑染於下偷靡敗爛我曹儻得志正當立誠苦莭以代磨世俗豫甚器其言而未知其為利之博也自豫入官奔走四方游京師觀世俗態狀益思其所以語我者嗚呼公明亡矣豫思其言則矍然檢己之所為使公明且存其規我者豈少哉此所以不獨為今世惜也公明諱暈五代祖某唐末因官入閩兵亂不還留居泉州之惠安縣父處士君輔以善行隱於鄉妻陳氏一男尚幼嗟乎公明之不顯匪豫誰咎詞以紓哀刻之墓下後千萬年指此邱曰賢者之宅無敢或壞慶厯四年三月二十二日記許處士墓表處士許君諱懷宗字德祖有長子曰程為潯州司户參軍次曰稹祕書省著作佐郎某嘗與著作君學同舍觀稹之為人年最少而恭謹有法度逮過其家拜處士為丈人行聽其言懇懇誘人於令善而考之鄉黨稱處士默治其心居城市接應鞠然視公府門若坑塹不敢投足力衣食未嘗欺人以入一錢不校有無資其子以從學然後知稹之行己者抑有所授也及程稹繼登進士第調官得食而處士亡矣生二子自立其所知而材薦之者皆當世名公卿每知其子者必曰其父母為誰耶則處士不待書功行列姓名蓋巳見之其子也雖然處士名氏不著以聞于後其子之孝心不能自安也皇祐四年秋二子來京師謂某官在太史宜與世人别族系而銘行實又久知吾先君願文之以表墓域之側處士興化軍仙遊人年五十三卒於天聖八年三月十四日其葬在縣之潘衝原娶楊氏有賢行常從子稹祿養益自清儉如其子之未仕也後處士十五年終年六十五男三人其季曰稹女三人嫁為里人妻曾祖諱祐祖諱潤父諱術皆以善訓傳其家者凡史氏所書喜家世與功伐以其能侈健其文詞處士世微而中修故所以文之者約也約也者所以重之而必信者也八月十二日右正言直史館同修起居注判三司度支勾院蔡某撰墓碣尚書屯田員外郎贈光祿卿劉公墓碣公諱若虛字叔陽姓劉氏漢之衰楚元王子孫不去彭城歷魏晉以來彭城劉猶為著姓至唐司徒晏以雄材精智用轉流輕重之術於乾元上元之間飽國饑者二十年至宰相功名益顯晏兄暹為汾州刺史治有聲稱生大理評事談經評事生左常侍濛常侍生吏部郎中埴自司徒至吏部四世或居長安或在汾晉吏部生伎實公之曾祖考也為鄂州節度判官湖南帥據其地自王兵四起乃以其孥循江入閩居泉州卒葬南安縣始為閩人鄂州生文濟是為祖考徙家福州閩王王審知以其女妻之卒官吏部郎中生皇考府君諱甫閩亡仕錢吳越王法自取所部以為俸府君不入一錢逮王歸京師而其官屬大小皆得仕府君以母老辭不就祿至今鄉閭稱其孝亷娶李氏生子九人公其次子也公嚴明有大略始學見鈔録集書如白氏六帖類即麾去曰要當以法禁去之耳通五經大要擲其㫖義以為修身治官之用不苟為利祿學也咸平五年登進士第授大理評事知溫州永嘉縣還上所為文章真宗皇帝尚儒每親程自言者召中書試就遷寺丞知隰州溫泉縣移通判保定軍再遷太常博士通判洪州大姓胡氏子殺人以厚資雇老貧者代死舉郡為之覆藏獄且成公曰被殺者年少壯强今囚瘠老豈能制其命躬劾之果老貧者自賣以資其家於是捕弃胡氏子市出受錢代死者郡中驚伏瀕江民以漁為生而土豪常半取之曰江食我田汝漁當吾田所也公按視奏除沒江田租縱民漁改尚書屯田員外郎知邵武軍其俗鬼而不醫平居殺牛聚酒侮欺善良喜鬭擊以氣力加人而得罪戮意愜不恨公至徹淫祠禁巫覡教病者藥朋醉羣鬭賊竊恃强置于深法又治孔子廟收學者為之開說孝弟之行尊奬賢節吏民刷故所為而聽公之所以為俗習大變年五十終於官天禧三年二月二十三日也其年九月八日辛酉葬福州懷安縣越城里公以恩受其父之太子洗馬致仕祖母馮翊縣太君母潘源縣君夫人新鄭縣君贈工部侍郎潘吉甫之女謹淑有禮嬪於大家承上以順睦衆以和終三十年人未始聞其笑罵聲閨門之內肅然也及公卒愈自約以奉時祀勑諸子學遂以有成為婦為母皆有稱問男四人長曰弇不邇勢利負竒自隱曰奕有大材智曰异以文學知名皆終尚書屯田員外郎曰戒未仕女適進士林孝伯某初與奕异為同年進士奕嘗謂豫言丁謂為宰相私天下士必歸我乃得進聞公聲名欲屈一見即推進之公不肯往於是始知公之所以立身也慶厯中余知福州州人言公事親親有疾輒不食酒肉居親側雖大暑中夕必嚴衣冠長幼內外皆有法度鄉人效之又知公之所以為家也後為轉運使至邵武邵武稱公亷平市人持物入廨舍以就善價屬官莫敢侵牟治事快於決疑靜於臨劇初若不更意慮及施下皆當理要守法不貸而民不敢怨又知公之所以為政也是三者皆世人之所難者故悉書以為法公以二子為郎纍贈光祿卿銘曰劉自漢文史載陳唐有管簫晏其人厥材絶特持國鈞晏兄而下八世孫剛嚴明允惠在民蟠于郡治屈所伸種施必獲後嗣振孰從考信唯隧文尚書屯田員外郎通判潤州劉君墓碣君諱奕字䝉伯其先漢唐以來世有顯人至祖考皆仕國朝考諱若虛尚書屯田員外郎贈光祿卿光祿之碑某嘗銘之系次詳焉君天聖八年進士及第授惠州推官疾不果行次調南康軍判官移知洪州武寧縣事改大理寺丞纍遷尚書屯田員外郎官歷知鄭之榮陽鳯翔府判官通判漳州潤州事以皇祐三年五月二十三日終潤州年五十三明年正月二十四日葬福州懷安縣靈山鄉越城里夫人陳氏封寶應縣君子康夫寧夫岐夫女長適韓昌國次明州慈溪令陳章其季進士林回君於文章要以道理為得不苟聲律其論性情推明孔子之法尤非浮屠所傳力教於人開曉其路從之學者咸以吾道自處久之貧無以生就舉進士中乙科喜曰吾不能為時之文章恐不復得仕進今幸中第吾志得矣其在武寧民喜訟而易刑為令者多嚴法以止之猶不能勝君雖細事為之盡心有兄弟訟者譬之親愛之理以感動之輒涕泣自咎引去刑省而民格慶厯中元昊叛陜西用兵韓丞相為經略使辟君鳯翔一道兵民劇事多倚君辨集連年兵敗民窮乃上書朝廷言其兵所以敗民所以窮之狀其略曰陜西之要練兵運糧最為首務其策皆未為得都部署者上將軍之任也而無專制之權其偏裨才否不敢輒去留之軍無行陳之法見利輕進畏敵遽退所以每戰必敗偏裨不死上將之令士卒不知什伍之制其理豈有勝哉邊戍益多廩粟益廣轉運使職其事也今之轉運使皆以序進不計其能未更年歲屢遷易之文書凡目曾未能知其暇以民為意乎一方之患內靡度支外輟兩川之賦調及天下關陜之民流離窮困而邊儲日窘不幸天下之患有大於此何以攴乎蓋由轉運使不擇其材不久其任無所歸責也又言被邊宜募士人給其閒田使之自衛其境可以省費言數十條率多此類事格不報漳州漳浦有䖍州民四百人入縣買官所賣鹽令捕之民因鬭拒遂鞠其私販而强置其法應死囚多繫久疫殍相屬君為喜其非私販而出其不鬭拒者坐法數十人而巳君初仕願天下事若無所為而可辦歷官二十年所至施為謀議多不能如其意然後知不可以力為也於是補吏南歸展省墳域緬然有退耕之志而未果也其終之歲豫適寓潤君病漬以手書謂豫曰吾止於此矣惟稚子遲記既終斂無新衣橐無餘資郡使民集錢二百千以賻夫人辭焉歸葬於閩居無室廬産無田園勤勞其家清節不渝夫人之力焉嗚呼十年之間康夫以學行自立而能請文永其先烈豫既悲之而又慶其有後也銘曰文弊於詞在天聖初牽拘嫓偶華調剽膚君於斯文本末扶疏世言情性淪于浮屠君為中庸聖哲之樞經營萬務於時有需既官于陜晝思夕圖條兵轉餉實究民痡上書于朝事願之殊漳有寃獄卜百其徒辦處平治脫釋不辜最後丹陽聲聞益敷齊終克明歸宅海隅父子兄弟次序不踰既順以安斯其巳乎端明集卷三十七
