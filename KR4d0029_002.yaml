body:
  text: 端明集巻二宋蔡襄撰古詩憶弟有序丙子年春三月予解官漳州與弟君山西行至順昌富屯之間夾溪十里紅白薔薇盛開時與君山臨流飲而賦詩甲申夏四月二十日復來追悼君山之亡留詩屋梁以紓哀思清溪曲曲抱山斜遶溪十里薔薇花春風吹香襲人骨乾紅淡白相交加眼睛眩晃不能視爛如赤日凌朝霞時有扁舟向中下共疑來處從仙家于時邀我臨流飲下踞大石盤犬牙平生意氣一快論屈指世務還驚嗟酒酣襞紙探强韻胡塗醉字成亂鴉侵更把火入官舍下馬猶吟詩各誇何言花落悲人世只見溪流度嵗華今年初夏我復至深叢晩艶餘孤葩山川故物依然在惟子别路幽明賖想象音容杳何許桂旗獵獵隨雲車悲來獨坐䕃芳樹涕淚揮灑霑黄沙行人恠我愛溪水那知此恨無邊涯道中寄福州王祠部臨津館下日銜西風巻寒潮上碧溪畫船急槳隨潮去山川滿眼烟凄迷醉起開船看潮落林深日落哀猿啼離魂復與潮東下兀然愁坐心酸悽今年賜告歸鄉里翩翩飛鳥投故棲雙親素髪喜我至鞠撫歡笑如嬰兒東阡北陌來慶問嫗翁罍醆交持攜雖欲晨昏在環堵奈何職守通金閨春暮辭家就行役幽蘭在手空萋萋閩州太守意慷慨一見歡甚無町畦欲令邦人滿瞻聽灑酒髙㑹撾鼓鼙我知君侯落落者胷中氣象盤虹霓問之當今至急務無若羌虜方突梯君言區處果得術勢類秋隼持寒雞養兵精悍不在衆黠賊頭顱可立提海隅僻郡誰與語强欲論列懲吹韲又言人生尚忠孝二者輕重均銖圭以諫名官宜盡節健行勿縶驊騮蹄别來破熱走山驛神疲骨痩顔容黧作詩遥寄復感激豈不戚戚論乖睽龜山夜泊書事十月淮水平瑩淨鋪寒簟浴日弄淨光涵山碎青㸃開帆直千里快去曽非漸盲風斗作勢怒浪立呈險枯林助呼嘷巨蜃工騰閃偎崖少休息繫纜猶欹颭忠信古云伏奸邪神所貶扣心良自安濳祈亦羞諂夜分羣籟息天明惡雲斂霜威寒更清霽色鮮可染懷安固俗喜乘危豈予歉賜告雖慶幸被恩實慚忝慈親慰衰髪嬌兒别啼臉人情足愛戀將思輒閉掩世事忽憂來驚起類癡魘金絮北餌胡弓刀西壓陜天子欲求理羣材務􅊧檢大明破昏翳久弊刮痕玷有如廣厦時拙者亦磨剡行路勿遲遲流年空苒苒送楊渥赴西安主簿余思去夏還甌閩溫風赤日爭陶蒸舟行夜寄浙江稜江濤洶湧來相仍雷電翕虩蛟螭騰方牀竹簟寒生冰上隴西去景色澄青山兩向水一絙猿鳥啼叫交酬應晩樵出霧魚投罾脱離滓濁躋陵兢造託微波訊嚴陵清遐可使貪者懲山窮水盡乃攀登爛柯巖岫孤崚嶒幽邃闚矚崖險憑少留觀愛喜莫勝子官其間良足稱子材又美神粹凝萬象態度遭披凌吟咏設寫踰畫繒當有味者論淄渑今予癡仕如秋蠅飛塵滿耳汗浹膺聞子大艑行可乘骨目森竦神慮興子姑去嗟予未能送子一念魂九升贈勤師勤為浮屠人形類心不偶獨負山林棲逺犯風塵走如聞大衆居乃是賢豪藪專意學文章韓編不離手退之所尚者豈以言深厚徑馳周孔域不為雜説誘大凡民之生蟲豸均一醜聖人酌中道君臣與夫婦飲食若衣冠事行而易守不喜釋老言詆斥遭誣負子今讀其書無乃相紛糾學本勿學末何為恤衆口和黄介夫憶竹君家有美竹繞廬千百个種時意慮深别後年華過顔色日益新根本久已播石間鳴溜去烟外哀禽和子特何依因兹焉辜嘯卧慈親齒髪暮學宦非敢惰風雲乖㑹遇羽翼頓摧挫遺經極精究收功若計課懷策遊鉅公鯁語幾喙唾忍腹大窮歸離魂費招些予嘗欲論薦身微蟻在磨藉令或指擿聲名屢自墮吾師天下賢黠羌久未破屈禮致豪英雋材多將佐古來死恩士乃是翳桑餓况子挾所能何門不驚坐丈夫感氣義豈肯類市貨行矣勿棲遲曷曰祖車車犬憶竹夙有尚直節無染涴勉哉困益堅持之以為賀李山英以疾歸田客有言山英移書石守道者因摭取其略作詩以送之吾友守道氣剛勁醜邪扶直出天性意髙身賤無所發胷中事事先後併襄嘗畏其大勇果願以中直為得正忽聞魯士李山英移書告之要力行曰今天下最急務邊頭戰守羌夷横異術紛囘蠧化原佞夫欺巧疵邦政生民失職餽斂繁勢若久旱方雩禜安得快雨洗長空萬物蕭森䝉大慶古人有以身徇言前者已僵後者更况值朝廷上寛大苦諫兼容天子聖我疾不幸子可屬或列封章或庭諍勿學得路世俗兒軟語妖歌日酣醟乃知山英落落者支革雖疲心愈競予思物理似顛倒難用智愚准衰盛賢豪既少遇又稀或老且困壯而病就令貴顯亦迍躓尤觸隂機石臨穽一思九嘆起呼天何等官曹司是柄由來宰主都㝠寞用捨惟時窮達命山英歸去亦何恨門外無塵春色淨囘看名宦似浮漚都把雄心付觴詠送許寺丞知古田縣大雪擁都門子行亦良苦予貧乏觴豆子車誰為祖少止聽我言於子不無補于今方用兵連年戍羌虜戰死動萬計募人填卒伍賜衣縻國帑走粟填邊庾平時賦税外弓刀甲楯弩干名應急須筋皮角毛羽前年科鞏革農牛半斤斧殺之先冒禁不殺即鞭楚江南供鵰翎是物不棲渚十倍買所無贏利資商賈編紙作戰䤴紉聮驅婦女輸來不適用空屋窠蟲䑕此類如蝟毛更僕難悉數大凡斂貨財百姓若外府苟可入軍須豈敢怨官取蓋患在不均又索非其土有司失預計臨事纔披簿嚴程弗渝日落符灑飛雨使者但依違州家不敢主况復為邑令喑吟莫伸吐其間或得才吏手無容舞子今佩縣章所領十萬尸志慮固精明利病前可覩姑能務均一瘵瘼庶蘇瘉遊鼓山靈源洞郡樓瞻東方嵐光瑩人目乘舟逐早潮十里登南麓雲深翳前路樹暗迷幽谷朝雞亂木魚晏日明金屋靈泉注石竇清吹出篁竹飛毫劃峭壁勢力勿驚觸題名石壁捫蘿躋上峰大空延眺瞩孤青浮海山長白掛天瀑況逢肥遯人性尚自幽獨西景復向城淹留未云足新作春野亭太守職民治詔書劭吾農載酒事緬邈作室當廨中况憑軒牖髙申視田野功澹沲沐新澤依微生柔風江潮漲新緑山麓延朝紅耕鉏時節動歌謡聲意通慙非共理材幸遘頻年豐未厭畎畝樂駕言誰相從春野亭待月有懷淅瀝凉風來空郊生暮寒山氣鬱蒼蒼江流去漫漫闔闗行人稀投棲夕鳥還疎鐘度林際華月吐城端徘徊待遥夜露下明河寛心朋隔萬里獨坐起憂歎送柯祕書三子歸泉應詔祕書昔共官臨漳時呼三子侍側傍脩瞳闊顙善應對舉措不類羣兒行遥知成就在他日爾時迄今十載强閩州太守無伎術乞持符竹還故鄉近觀詔書下郡國選訪行實登俊良嶷然三子復過我衣裾飄灑凝秋霜各攜編軸幾百幅互以理要充詞章久之濳思叩幽眇角牙騰觸聲礌硠言歸溫陵入塲屋爭奮筆舌論短長海鷹上雲出爪翼天馬歴地無羈韁祕書多才晩未遇有如此子傳義方吾徒沉昇不須議且看少者騰聲光州學餞送解發進士坐中分得意字朝家嵗取天下士官守小大悉分治育材論薦苟失宜徳業英豪苦難致予嘗備員内供奉作書㕘議科塲事鄉舉察廉未易復責其節行在長吏策之當世之大務適時可以觀周智問之六經之歸趣知言可以見精意衆賢一劃天子可開設學校朔南被世儒苟欲便有司詔令初傳尋已置今年郡國選多士糊名仍舊􅊧瑕纇常憂璣貝隨手遺往往中夜起不寐拆封辨號指姓名十九㝠合州人議耽耽黌舍秋景長芳殽㫖酒邀賔醉惜哉今樂與古異遣士禮數不能備霜天寥寥萬象清健風開送羣飛翅大明帝居一氣傍春日照耀桐槐翠勉思竒策當天心厚禄榮名時所貴時之所貴亦外物君子存誠思逺至寄題滁州豐樂亭君為滁上守乘間務幽尋羣從留山阿美望窮前林良醼追佳賞髙亭曠遐臨煙雲無定姿水石唯清音靜見魚鳥適遥聞雞犬深時節屢豐有民里無欺侵豈獨延衆物因兹託冲襟大筆每絶唱芳樽寧孤斟别日念巳長來期詎能今安得凌風翰相從殫嵗隂達觀亭峭峻釣龍石飛亭壓其端曠徹四無際因之名達觀扳雲躋大庭仙路何紆盤秋明澄逺緑晩霽凝新寒城郭烟火稠水陸漁樵安偶暇按民俗適遊心意歡鳴絃俯清流對酒環蒼山重拂衣裾淨從帶夕嵐還聖泉竭十餘年今者復溢俗傳熯則民安源流出何山湧涸兹有異湛然盈不泓餘波下金地清甘本無滓渴飲得真味端能發茶色博亦資農利矧兹民俗安湓溢尤可憙滿酌復攜歸良追曲肱意聖泉寺松徑徑中草不植青松苒苒門前道根氐堅牢顔色好鳴籟蕭森風雨生紫鱗開動龍蛇老天若有意别留種百年其下無纎草雷霆遶遶雪霜重勁節支扶不顛倒野姿峭拔已背時肯要藤花彊纒抱南方赤夏苦蒸濕萬木無聲就僵槁忽經密䕃少休息肌骨便驚秋氣早寄言匠者勿復顧留作清凉除熱惱釣龍臺龍在固神物動與風雲㑹胡為脱淵泉輒觸鉤綸害無乃䕶明珠睡目方瞢昧而或嗅香餌貪涎適霑霈不爾騰角牙自衒鱗蟲最來應山嶽揺去等蟬虵蜕傳聞曠百世兹亊久晻曖空餘古臺石硉矹塵沙外湍流巻白日巖壑動清籟乾坤終蒼茫物理有否泰授轉運使罷州端居述懷被詔領均漕前解閩州符掩闗謝來賔釋然捨攣拘日晏眠空齋啼禽在髙梧神情已欣快痾恙還輕蘇蹔閒固自適况與塵滓殊勿樂夸毗子開眼趨畏途投身試羅網反用腴妻孥精慮成長謡鑒此非迷愚移居轉運宇别小欄花木三年對小欄花蘤見顔色紅薇開已久春風長先得素馨出南海萬里來商舶團團末利叢緐香暑中拆餘畦十數種亦自尚風格念爾幽芳性乞致多手植瑶草固微生栽培子豈徳别去重來看猶使中情惻北苑十詠出東門向北苑路曉行東城隅光華著諸物溪漲浪花生山晴鳥聲出稍稍見人烟川原正蒼鬱北苑蒼山走千里斗落分兩臂靈泉出地清嘉卉得天味入門脱世氛官曹真傲吏茶壟造化曽無私亦有意所加夜雨作春力朝雲䕶日華千萬碧玉枝戢戢抽靈芽採茶春衫逐紅旗散入青林下隂崖喜先至新苗漸盈把竟攜筠籠歸更帶山雲寫造茶其年改造新茶十斤尤極精好被㫖號為上品龍茶仍嵗貢之屑玉寸隂間摶金新範裏龍鳳茶八片為一斤上品龍茶毎斤二十八片規呈月正圓勢動龍初起焙出香色全爭誇火候是試茶兔毫紫甌新蟹眼青泉煑雪凍作成花雲閒未垂縷願爾池中波去作人間雨御井井常封鑰甚嚴山好水亦珎清切甘如醴朱幹音韓待方空玉壁見深底勿為先渴憂嚴扃有時啓龍塘泉水循除明中坻龍矯首振足化仙陂回睛窺畫牖應當嵗時旱嘘吸雲雷走鳯池靈禽不世下刻像成羽翼但類醴泉飲豈復髙梧息似有飛鳴心六合定何適脩貢亭予自採掇時入山至貢畢清晨挂朝衣盥手署新茗騰虯守金鑰疾騎穿雲嶺脩貢貴謹嚴作詩諭逺永題譙國評事壁長岡隆雄來北邊勢到合下方回旋三世白士猶醉眠山翁作善天應憐如彼發源今流泉子孫何數鷹馬然有起家者出其間願翁壽考無窮年遊冲虚觀按圖經黄霸昇仙之地真人玉骨輕御氣升瑶臺俯首視下方萬落腥塵埃香火久寂寞山川空徘徊舊樹絡青蔓虚壇生紫苔宴坐白晝永長吟清風來飛花亂棋子游蜂依酒盃嘉月當醉飲上客誠珍才神仙那可異金鼎何時開題延平閣雙溪㑹一流新搆横鮮赭浮居紫霄端卧影澄川下峽深風力豪石峭湍聲瀉古劍成蟄龍商帆來陣馬晴光轉羣山翠色著萬瓦汀洲生芳香草樹自閒冶主郡王士安髙文勇枚賈顧我久疎悴霜髭漸盈把臨津張廣筵窮晝傳清斚舞鼉驚浪翻歌扇嬌雲惹歡餘適晩霽望外迷空野曽是勌遊人意慮亦瀟灑送勤上人歸吳中吳江水好吳岫靈吳人晢白神氣清當須比屋皆佳器奈何儻有名公卿究觀是事見藏伏例學浮圖超死生遂令才智蓄利澤若曰不下霑四瀛勤師内外久著力文字骨節初老成十年棲遲輦轂下淵然澹薄無經營惜哉明了足見解獨擘迅翮飜青㝠殘秋忽别東南去塵土擺落衣裾輕西湖勝處拂談席緑波畫舫吾其行送石昌言知宿州符離封城古云望扼控東南地形壯飛流金粟走舟車鎮壓奸雄宿兵仗昌言才思老臺閣聲名逺出風騷將倦直承明得守符詔書遣臨士民上萬家裁製須得宜譬若楩楠迎大匠京師從遊日月久送君酒酣益惆悵人生豈効雞鶩羣意在糠粱取甘養邊隅多故方急材往往稠人拔公相吾儕有策空自竒皎皎丹衷亦誰亮欲隨戎馬僅勝衣强作文章還覆醬大都用置繫於時丈夫未死固難量觥巡巻到君勿辭行看岸下船頭放我今聮束若愁鷹注目青雲思逺颺一麾當復泛隋渠願君加數為公釀觀宋中道家藏書書宣獻業文學嘗作調羮鹽藏書百千帙傳世惟清廉東堂得春和花卉晨露霑之君延賔從當晝褰珠簾朱函青錦囊寶軸紅牙籖大令至歐褚屈玉聮鉤鈐草行戰騎合楷正中軍嚴水墨固昏淡骨氣猶深濳江田亦名手農野興鉏䥥桑麻婦女喜饁餉兒童覘列女自幽閒明眸咽頸纖昔人何遥遥意㑹相披瞻南曹古貌醒博士新詩炎持杯屢屬我謂我毫錐銛煤嫗浮醉鈿研流泣秋蟾放灑雲雷起取餘風浪恬鄙藝豈足多詫語誰能兼因思左宣獻載檄陪車幨辱公知遇厚表裏曽無嫌間復請筆法指病如投砭今朝觀故物惜已悲慚兼層丘恩徳重素髪年華添不能枉尺尋况乃事飛箝壯心久已衰竒尚顧未厭幸公有令子辭源横江灊劇飲以自慰後慶其人占端明集巻二
