body:
  text: 端明集巻十宋蔡襄撰制誥中書試金吾衛大將軍除邊鎮節度使制門下天下之重惟將相之任必在於得人閫外之専有文武之資乃可以屬事眷兹藩屏控夫朔陲開府文書董貔貅百萬之衆被邊亭障實耕桑什伍之人求其遠御之良付以中權之劇厥有成命告于廟朝具官某沈勇本於天資練達通於世務有明敏之智臨機而必決有方厚之質自信而不疑久歴官聯關總環衛亷行徼巡之道督刺大衆之居士旅勑馴㓂攘衰止嘗以清閒之宴與之從容而言亮其忠純授以節制於戲甲兵乃刑之大軍旅以禮為先爾其察甘苦而周下情明法令而一羣志乂綏封畧旌錄勲勞惠愛究於黎元威聲伸於大漠副兹委用勿懈乃心可中書試禮部尚書除御史大夫制門下朝廷興治之原法制修明為大内有公卿臺寺之衆外有牧守方伯之聯察繩其違第次厥課秦漢而下専委中司祿秩之崇差貳上宰所付兹重惟才之求具官某服先民之言承名家之學文章深厚以華於國行實朴茂以充其中歴侍禁嚴益劭風問嚮居都座嘗典春官傳經決事而甚明飭躬率下而自正是用獨持朝憲彈肅官師夫聲利不訹之謂剛端勁不阿之謂直獻議毎形於鯁亮舉邪勿吐於權豪汝服斯猷往勵而屬可中書試郡國察孝悌力田詔勑朕念古先聖人極遠慮而垂大法元元之民其生長也有教育之地故能興行於家力作於埜親族和同愛足以相恤衣食贍給力足以相保然後獄訟衰而盜賊息以格於治平嗚呼其盛也哉自戰國歴秦重利而寡恩孝悌之風薄矜奢而廣欲惰游之手衆驅人於不善率由是巳豈斯民之性有所偏異蓋導之之具至與不至耳朕居士民之上父母之司内竭至誠奉祖宗而惇族屬外務朴素却侈用而息煩費思與吾人尚本而棄末然而生齒之聚或戾於教義而困於饑饉者其導之未至歟今郡國長吏皆朕協力而宣化其有孝悌章明勤於田畝可率鄉黨者其以名聞朕將錄之以風天下戒勵臣僚奏薦勑右正言直集賢院同修起居注韓絳奏臣竊見臣僚奏薦文武官頗或所舉無名所稱不實妄冀朝命以為私恩伏恐請託公行重増爵賞之濫此弊不革為蠧實深欲望聖慈明降詔書嚴行約束今後中外臣僚巳係擢任若提㸃刑獄已上並不得薦舉如有所舉無名所稱不實違犯詔㫖並仰御史臺察訪事由彈奏伏乞重行朝典候勑㫖兼近年以來中外臣僚奏舉官員内有人品庸常薦章交上亦有宿負罪累迹狀醜濫者乞行雪復奉聖㫖令降勅戒勵勑朕制臨天下思與賢材而共治之故開薦舉之路又於羣臣無有疑間故所薦舉多亦陞任然比年以來或所薦者材資茸薄加之品目下人遠甚然有公卿交牘稱道或宿愆醜濫曽非招註請行湔復或職任疏遠不稱重輕引援清近迹其本源豈非造請衒鬻者傍依權門無亷恥之行交結恩私者苟蔑王爵無公共之志不然何以臻此不知不賢而言之兹曰蔽惑知其不可而言之兹曰欺罔左右官師懷此事上嗟予何賴誠心未孚遂致於法朕甚愧焉其令御史臺察訪中外臣僚奏薦如有所舉非其人者立須彈奏必行之罰宜自近重兹伸警尚體予意廣南轉運使元絳奏南海洪聖廣利王獠賊至廣州城下官吏等屢禱有應乞加崇顯之號奉聖㫖特封昭順王制皇祐五年勅易載害盈益謙之㫖蓋神道正直必有輔於教也厥有陰相吾民沮遏兇醜應答明白不列美稱曷以揚神之休南海洪聖廣利王惟王廟食尊爵表于炎區年既遠矣唐韓愈記稱神次最貴且有福禍之驗國家秩禮祀等尤高康定中朕嘗増王徽名牲幣選數罔不稱是今轉運使絳言迺者儂獠狂悖暴集三水中流颶起舟留三日逮至城闉廣已守備火攻甚急大風還燄閉門渴飲澍雨而足變恠屢見賊懼西遯州人咸曰王其恤我者耶朕念顯靈佐順靡徳不酬其加王以昭順之號神其歆兹顯寵萬有千載永庇南服廣南東西十一路轉運使提㸃刑獄揀放配軍勑勑朕臨馭海内念憂元元冒以至仁期於遂性比因郊祀赦宥辟刑顧惟羇𨽻之人特解錮留之負或能悛省不仍舊轍者遷移便地或加癃老不能自力者去籍遣原列郡守符監州使其悉心按視以稱朕懷皇姪故左衛屯大將軍信州團練使從質可贈觀察使追封侯制朕惟至治之主本於仁愛内澤宗族以化於下矧予是弟之子親於屬籍年不克永朕甚悼焉具官某忠恪以立朝信厚以行已久更環衛薦歴嵗月休有令善著于羣聴今其殞逝重以優恤増亷使之秩啟侯社之封飾終之恩於斯為厚惟汝之靈歆是嘉寵司農少卿致仕吕士宗男克禮可將仕郎試祕書省校書郎制以爾父久歴煩使方兹引年命汝以官往試祕省夫仕宦善歸而嗣子有祿始終之典可謂厚矣汝其勉勵以稱恩寵前光化軍乾徳縣令同監秦州西溪鎮鹽倉徐介前湖州觀察推官監台州黄巖鹽監張倜可並著作佐郎制勑國家爵賞之設以待賢才計秩遷官殊非本意然殿則有罪而最或不遷又非所以馭吏之法也爾等並緣保薦分幹權利校課所當宜在陟典夫先中文詞之科今列譔述之局其資盛茂爾宜勉之追官人前朝奉郎成端夫行太常寺奉禮郎制勑具官坐墨奪官理宜廢棄屢更嵗月或能省循敘還京司實為恩渥勉新刷故以務後圖尚書兵部員外郎直史館知滄州田京可工部郎中餘依舊制勑具官迺者大河之北遭罹水患板户貧困冗散旁郡朕甚愍焉屢勑所部毎加矜恤人情懷土而未聞還集汝京所守濱海都㑹襟帶之固兵民所聚而能上體予懷下究民隠申慰勞來歸占者衆使者條狀願為褒異文昌草議起部要司命汝踐之用為増秩夫計功實與累日月而遷者固有異矣汝念此意撫安居人可龍圖閣直學士起居舍人李絢遺表男將仕郎守將作監主簿秬特授太常寺太祝男秠特授將仕郎守將作監主簿制勑某官某男某等朕念乃父早中科選以文華深厚而居詞命之職以材智聰明而付浩穰之治方膺外補奄爾淪逝錄其嗣子以伸予懷或遷與禮臺或麗名匠寺並為優寵勉自進修儒林郎守雅州錄事㕘軍兼司法事田九思特授太子中舍致仕將仕郎守真定府平山縣主簿宋象特授守國子監丞致仕制勑具官爾等久歴州縣願還官政念其退止宜伸恩典或進與宫坊或㕘名庠序持此以歸示於閭里亦足以為光榮也兵部員外郎知制誥胡某可依前兵部員外郎充翰林侍讀學士仍舊判銓制勑朕念君人者左右前後皆正人則諷諭顧問之間莫不循於治道故侍從之臣心在精擇而況觀學之職尤其重者自非飭躬端慎濟以文業則不與其選也具官某勁清有守臨事不回記問該閎屬詞精敏久居禁掖日有嘉稱今命爾以金華之要爾其考聖人之言攬前史之載有以發智慮之明作安危之鑑者附當世之事而為朕論之使授受之際謂之得人豈不美歟兵部員外郎知制誥何某可依前兵部員外郎充龍圖閣直學士知秦州制勑朕惟關陜之右冀門為重内宿兵師百萬之衆有政令之決外連羌夷千里之遠有綏安之畧必欲恩威行而士伍服信義著而種落附非有文武之資者不可以輕授具官某爾以文雅中詞科以智敏被器使典訓誥之職而復於深厚歴官守之政而濟之果斷㑹秦闕帥慎擇其人惟汝之能斯可往治輟自禁垣之要増以内閣之嚴若夫入㕘侍從之聯出委藩翰之寄士林華選爾實兼之隴道之雄為天下首講訓綏輯控制外虞使朕無西顧之慮者爾其望也勉楙勲績以稱休命奏舉人前邢州錄事㕘軍禇士言奏舉人前潞州上黨縣令正王世範並可大理寺丞制勑具官某等天下郡縣之吏其員以千萬數材之與否莫可周知惟監司長吏以善狀保薦者則校閥閲而升奬之以勵能者爾等効官有勞而舉者又以連罪為任往丞棘寺並為優陟夙夜思省以答茂恩追官人李君俞授大理評事制勑使汝為倉庾之吏而粟不可食奪免一方以戒不職今所監之司皆曰向以西事應猝便辦蓋無他腸又所輸粟移之秣飼厥數不減屢更郊赦之澤請還京寺之僚吾其從之爾當自省前宿州臨渙縣令郝周授太子中舍致仕制勑具官某受吾俸祿驅馳州縣至於衰老今其歸也不念其力乎遷與儲坊為爾光寵未復舊官人内殿崇班李昭素復内殿承制制勑某汝嘗失刑民死非罪奪官既久省咎則多復禁省之舊聯實朝家之優渥勉遵成憲勿蹈前為如京副使兼閣門通事舍人侯宗亮可特授西上閣門副使制勑具官某帝者日臨法宫以朝羣臣宴御便坐以講庶務臚傳辭令之美贊相規儀之多惟二閣之權允司其事予欲擇其能者非敦良敏茂之人莫能勝其任也以爾某資性恪毅器質淵通周旋軒陛之間屢更寒暑之變宣納夙夜罔有不勤出入禁嚴罔有不慎敘爾績効進貳使名朕左右之人所籍者雖衆要近之職得與者無幾汝益修勵以稱寵靈前開封府祥符縣尉趙偕可著作佐郎前趙州錄事㕘軍范孝思可大理寺丞制勑具官某等郡縣之下勤勞職事嵗考滋久而能謹檢操履為保任者所知者朕常與進用以勸焉爾等咸有吏資著于銓筦條列績閥當於陟典或㕘祕丘之選或進理寺之名各服寵章益邵來效故大府卿畢世長男試將作監主簿從益可授守將作監主簿制勑具官某男某以蔭入仕深歴年所進列卿位屢更藩翰因其淪逝閲其子姓一門之内咸列官簿然恤孤之典朕乃不忘唯爾從益頃試匠寺今與即真爾母不勤以墜寵命東頭供奉官薛讓可内殿崇班制勑具官某向以馳驛邊障將命往還既涉嵗月不亦勞止升聯殿陛視秩朝閨兹為褒渥之隆用朂官成之効往欽爾次無怠厥修江州彭澤主簿閻旦可守國子監丞致仕制勑具官某占名中銓逮于暮齒謝還官政退休其家念爾知止進丞上庠往服茂恩以安汝志故廣惠等八州㳂海都大捉賊西京左藏庫副使武日宣宜特贈忠州刺史制勑具官某綏懷之徳不及蠻獠至使拔其種類㓂鈔嶺外徑趨清海鋒氣尚銳爾惟邏巡之職實司翦捕而能忠果挺志勇毅自奮身先士伍轉戰不已兵力失利殁於鬭格遠聞予聴終夕悼惻特推恤典列於刺部忠䰟如在歆此哀寵故知封州殿中丞曹覲宜特贈太常少卿知康州贊善大夫趙師旦宜特贈光祿少卿制五嶺之表面内以來南連海澨西屬蠻峒未嘗有鳴桴之警故守封之臣幸其無事莫為戰備迺者獠衆猖悖乘襲疆場爾等並分符竹對典州郡當賊鋒鋭亡身徇國嗟乎城池不足以為固甲兵不足以為衛陷於非命傷惻良甚恤恩之厚並貳卿列汝其有知承朕此意故乾州安遠㑹昌縣巡檢禁董玉等宜並特贈禮賓使故賀州管界巡檢殿直趙允明等宜並特贈南作坊使制勑具官某國家設警巡之職用以誅磔㓂盜撫安人民有能死其官者朕嘗旌異追進名爵收錄子孫所以表忠義也蠻方猾横弄兵嶠外爾等咸以忠勇疾憤狂㓂擊刺襲躡遭罹不幸朕為人父母而使汝等身膏草野妻孥望祭萬里之外心焉哀惻其何已耶特寵使名以慰幽路靈其不冺歆我嘉命廣南西路鈐轄下捉殺故奉職萇用和宜特贈内殿承制指使三班差使張亢等宜並特贈内殿崇班制勑具官有生而死磨滅者衆為忠䰟蒙烈雖没不忘汝等㕘於裨校往捕㓂攘矢石之間殞其軀命朕心哀愍特優恩恤追榮近墀賁終幽穸冀爾靈䰟享是嘉寵故賀州司理㕘軍劉冕宜特贈左贊善大夫故英州攝官李稹宜特贈光祿寺丞制勑具官某等並為嶺外州縣之吏屬以蠻峒猺蠆毒我列郡恃兵跳梁殺辱紳笏汝等並懷忠節捨生不屈朕惻然義之特行哀恤追褒宫宷榮贈宗司靈其歆之良慰汝志步軍副都指揮使觀察使張茂實可馬軍副都指揮使節度觀察留後制天下之本在於京師而宸極之下必有材勇之士居則拱扈威陣出則番茂外國分建三帥以治其政兹率故典厥惟舊矣今予有百千萬數精鋭熊虎之衆曽是强毅有能為予訓忠義之節明法令之禁者吾其用之具官某有沈敏之才通夫將畧有謹厚之行達于予聞擢領萃屯翊侍軒陛惟時蚤夜罔違靖恭遷兩使留務之名總萬騎選鋒之勝車田符籍爾則専之噫以嚴一衆其術匪難服于衆心其道匪易平直無頗情乃上貢亷明不撓惠乃下究委注惟重欽哉惟承馬軍都虞候王凱可殿前都虞候步軍都虞候王達可馬軍都虞候制勑國家列三帥以治拱扈之師設虞度以貳董齊之政非有沈武之資敦信之實者無以條理尺籍嚴威環衞朕嘗於是擇而任之具官某用之邊圉敢於戰格而服其士伍具官某遣之戍禦奮其材勇而聲在戎漠咸以勲績分提禁旅藉其能力尚取疆陲外陪殿陛之崇佐䕶騎屯之次候奄至重倚信彌親爾其下達於衆情上裨於長政恭勤一志毋懈厥初韓絳可右正言依舊直集賢院同修起居注赴諫院供職制勑具官某百執事各修其政而諫諍之臣得與國論其職要其責重故難其人先朝命置六員而終不克備朕毎擇是官必沈慮久之而後行信乎其人之難得也惟爾絳擢在高第屢更器使執心方勁落落自立今易處西省往備諫列若夫罷軟而畏權要附阿以希進用徼訐以干譽煩碎以欺俗有一于此兹謂壬人術學通於大體言議中於至理弼違箴闕以輔不逮知而必為靡悼後患有出於此兹謂正士予期汝絳作予正士可不楙哉前蘄州黄梅縣令兼監税申房可漳州錄事㕘軍監京山稅制勑具官某向治征筦最目有勞督儲曹於外邦商美利於劇邑關市之務本以察譏爾屢為之毋或苛撓睦州司理㕘軍諸葛寘授試祕書省校書郎知真州揚子縣事為捉賊溫州永嘉縣尉韓釴可萊州即墨縣令制寘一作㝠縣道之設尉屏兇盜而䕶善人所以助令興治者也空官有罰敕職有賞而勸沮行焉爾等捕除攘奪咸應遷格或試祕省分治劇邑有民有社可以為政勉楙平直以稱褒典深州司户㕘軍李徳宣守大理評事致仕制勑具官某士之壯則從王事老而歸則教鄉黨未嘗不為善以助治也汝掾于劇郡逮於暮齒願還官政引卧丘樊遷丞京司以霈朝渥爾之仕與歸亦有助於治歟可端明集巻十
