body:
  text: 端明集巻十六宋蔡襄撰奏議言災異一臣等伏見自春至今四方亢旱日蝕地震變異相仍有以見上天垂意於陛下至深至厚臣不知陛下何以報天戒之貺乎臣聞古之人君遇一災異循省修飭或以六事自責或避正殿不居或減膳徹樂或遣使巡察求直言于朝究愁苦于下於是轉灾為福者有之矣若天之戒告之不懼民之寃隠之不求乗饑旱之會其變不可量也伏望陛下避殿減膳以自修省仍降詔書戒勅百官各舉厥職遣使天下求訪闕失或有官吏貪殘而不糾刑獄寃枉而不治賦斂繁數而不均徭役頻仍而不息孤獨無所飬流㪚無所歸朝廷之恵不逮于下萬民之情不達于上皆得條奏而施行之伏惟陛下鑒前王戒畏之理觀當世安危之勢留意而行天下幸甚言災異二臣等近以亢旱請行自古帝王消弭災譴之術避殿減膳發詔書遣使者上以答天戒下以慰民心數目顒然徳音未降臣聞天地之氣與人相通隂陽不和本自人召今若不修人事則無以回天意而召至和伏自兵興累年天下困弊外有三邉百方仰給之卒内有四海億兆愁苦之人方此公私匱乏之時必無拯捄災異之力將來流徙必衆盜賊必多患至後思恐無所及况朝夕以來祈禱未應人心如涸天意益高陛下為蒼生憂念非不勤臣等為國思慮無不至凡人有可為者皆勉而為之以捄災害况避殿減膳發詔遣使此乃典冊常行之故事帝王修省之盛美伏望陛下早賜施行苟能下悦人心自可上消天譴言災異三臣等伏覩陛下以災變屢見飛蝗為殃責躬引過祈于天地宗廟社稷不令殃及萬方臣伏念災變之來實由人事政治闕失感動天地故古之人君或遇災異則避正殿撤常膳深自刻責思所以致之之咎改之之理以至册免三公者有之詔求直言者有之此皆消災異召和氣之道也方今天下之勢至危矣外裔驕暴凌脅中國盜賊縱横驚刦郡縣養兵至冗擇將不精配率頻繁公私匱乏内外之官務為辦事而少矜恤之心天下之民急於供應而有流離之苦治道如此未聞救之之術臣等伏見數年以來天戒屢至朝廷雖有警懼之意然而因循舊弊未甚改更今日災變頻數葢天意必欲朝廷大修人事以救其患乃可變危為安也救患之方莫若原其致災之本致災之本由君臣上下之闕失也闕失之事臣等敢次第而言之陛下不専聴斷不攬威權使號令不信於人恩澤不及於下此陛下之失也持天下之柄司生民之命無嘉謀異議以救時弊不盡忠竭節以副任用此大臣之過也朝有闕失而不能救民有疾苦而不能達陛下寛仁少斷而不能規大臣循黙避事而不能斥百官邪正並進而不能辨四夷交構内侵而不能謀有願避之心無力諍之節此臣等之罪也今陛下既有引過之言達于天地神祗矣伏乞陛下必踐其言必行其實踐言行實之要莫若専聽斷攬威權號令信于人恩澤及于下則災異消而和氣應矣某大臣不舉職之過伏乞陛下以致變之由赫然督責之若督責之又無近效則用災異冊免三公故事而去之别求能賢以救大患如臣等蒙陛下非次選擢不能稱職尚致陛下有如此之失大臣有如是之過臣等負罪至深伏乞朝廷逺加竄逐求方正材識之人俾居諫職必能禆贊朝綱上副聖選臣等謹具狀待罪以聞言災異四臣等伏見陛下以災變屢至責躬引咎憂勤至切臣等究災異之來蓋由君臣上下皆有闕政是致内外空虚民力彫耗怨毒之氣干動至和所以數見災咎臣等偹位諫列無所補益再有陳奏乞加竄逐待罪多日未聞朝旨臣等切慮朝廷以災異所因上下引過不欲専罪臣等然臣等自念昨䝉陛下于衆人之中非次選擢當時物議謂臣等必有建明臣等協心期于必有報効觀今天下之勢日可憂懼天人災變相仍而至豈非臣等不能補助之致也或朝廷不欲深罪臣等即乞各與外任合入差遣庶盡心力以展實効又朝廷别得賢才使居諫職必有謀畫以助朝政臣等謹具狀陳乞以聞乞罷迎舍利一臣切聞開寶塔為天火焚燒因發塔基取舍利入宫中嬪嬙煉臂削髮者甚衆喧傳滿街無不驚駭又聞以二十二日大具僧儀迎舍利歸寺臣聞救天下之患必有濟時之術施行之事若憑依神靈以要福利是為非道也今令僧徒迎舍利自禁廷厯都市萬人瞻觀衆口傳道下惑民心上虧聖徳取笑無窮非細事也所有迎引舍利伏乞寢罷宮嬪煉臂削髮亦望嚴加禁止乞罷迎舍利二臣昨日竊聞宫中因取塔基舍利入内宫嬪煉臂落髮者甚衆及擬二十二日大具僧儀迎舍利歸寺臣已具奏聞乞賜寢罷尚慮至誠未能上回聖意臣聞治天下之道匡生民於富夀皆由敎化刑政修舉以臻太平至於非禮之福不可徼求况奉佛無効前世甚多臣竊見唐文宗時常令僧百人於宫中念誦謂之内道塲每有西蕃入㓂令講仁王經以至人事不修羌戎犯闕至今言大厯紀綱弛壊皆由事佛之致也舍利有光前世有之何足為靈今天下生民困苦四夷驕慢陛下正當修人事救時弊若専信佛法以徼福利豈可得耶陛下設置諫官本為規正過失今迎引舍利事出於中専損陛下聖徳臣終夕不寐臣言為是如能妄行威福臣犬馬之軀全當咎罪所有開寳塔舍利伏望指揮送還本寺不令迎引乞罷迎舍利三臣等今見左掖門外僧衆廣作威儀迎引舍利都人會集甚駭物聽臣甫臣襄自昨夜二更至今日邜時連入文字乞賜寢停迎引舍利免至有損聖徳即今却去外靣廣作次第臣等切慮必是僧徒交結陛下左右之人張皇其事誇惑都人因此勢力别圖財利至于光怪之事多是妖僧所為若果神靈所憑豈有天災可及事理甚顯不足信奉伏乞陛下速賜指揮寢罷迎引威儀只令送還本寺乞罷修開寳寺塔臣數日聞迎引舍利歸開寶寺臣始疑之必以為無有此事屢以為言乞賜寢罷不䝉聽納今又聞民間傳言皆謂陛下欲重修開寳寺塔伏念陛下必以邉事為憂必以蒼生為意豈肯枉費施于無用然慮僧徒妄引靈怪以惑聖聰臣請悉推意而盡言之或以舍利有光引為靈騐臣謂浮屠舍利之所居不能䕶惜天火所焚一夕而盡豈可謂之神靈枯久之物灰燼之餘或有光怪多亦妖僧之所為也或以此塔太宗皇帝所造理須修復臣謂昭應宫上清宮皆先朝所置天火一空已不復修孰有非議若有禁中共出資財不費于官不擾于民臣謂一塔之費數百萬錢一錢之資皆生民膏血當此多事匱乏之時豈可虚費若施于木土果有福利以之助軍須少寛民力此豈獨無福利哉况天災所焚大示警戒陛下當修人事以報之今大興功役是以人力而拒天意也伏唯陛下聖喆聰明必無此議人言不已臣實憂疑所有開寳寺塔如有乞修復者伏望陛下特加深罪以絶欺妄乞追還孫氏臣伏見皇族宗鼎妻孫氏禮度不修髠辱膚體屏棄外郊以厲失徳臣竊謂於繫獄之初陛下審得其狀即賜之自决於義猶不失今乃暴陳其惡著在民間指斥譚賜飭以重宗枝之醜而損風化之美也臣聞詩曰緜緜葛藟在河之滸夫葛藟之為物生于水涯則蒙潤之延茂喻王之同姓被恩之甚美也春秋之法為親者諱其惡夫惡之名聖人之所深嫉然而隠者務敦睦而芘宗族記稱公族有罪鞠于甸人夫甸人掌郊野之官治公族不于市朝而屬之甸人者葢隠之耳昔漢梁王有罪為有司所按驗谷永上書以為帝王不窺閨門之私且汙衊宗室無益於治體於是梁王獄寢不治伏惟陛下覽詩人廣恩之義繹春秋隠惡之道稽周典之要根漢臣之論而蒙覆宗屬虧忠撓法於道無所容者以義奪恩不得已而誅之若宫奥晻昩之事宜勿究明必爾章章然不可掩者亦借託法之不斥其本末以傳四方務以疏厚澤而敦善化也其孫氏乞追還京師安置以息羣口臣疎逺蒙陋不應與論國體誠有見聞莫敢隠黙幸陛下悉察臣昩死再拜上端明集巻十六
