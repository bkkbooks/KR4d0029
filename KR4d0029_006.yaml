body:
  text: 端明集巻六宋蔡襄撰律詩後舍緋桃十年樹底折香葩蓛蓛浮光弄曉霞只恨無情是風雨直將紅片入西家題龍紀院僧室山僧九十五行是百年人焚香猶夜起喜酒見天真生平持戒定老大有精神須知不變者那減故時新宿黄蘗聴彬長老譚禪一圓靈寂本清真誰向蒼浪更問津欲說西來無見處奈何言句亦前塵南劍州芋陽舖見臘月桃花可笑夭桃耐雪風山家墻外見疎紅為君持酒一相向生意雖殊寂寞同士安飲我數杯至觀音院纔醒聞灘聲泉響因留短闋林外灘聲砌下泉泠泠幽響靜中傳朝衫却染京塵去爭得夫君醒醉眠别邵武長史朱照鄰竊比君侯病駃騠時看雲路忽長嘶十年還此同杯酒三驛剛來踏雨泥士行滿鄉元自好官名當世不勝低未霑釡粟榮新祿應上亨衢别有梯相送三日自漁梁驛至衢州大雪有懐大雪迷空野征人尚逺行乾坤初一色晝夜忽通明有物皆遷白無塵頓覺清只看流水在却喜亂山平逐絮飄飄起投花㸃㸃輕玉樓天上出銀闕海中生舞極揺溶態聞餘淅瀝聲客爐何暇煖官酤未能醒薄吹消春凍新暘破曉晴更登分界嶺南望不勝情華嚴院西軒見芍藥兩枝追想吉祥賞花慨然有感寄呈才翁辛卯四月吉祥亭下萬千枝㸔盡將開欲落時却是雙紅有深意故留春色綴人思烘簾微照自生光吹面輕風與送香誰把金刀收絶艷醉紅深淺上釵梁的的名花對酒樽欄邊沈醉月黄昏今朝闗外尋蘭若忽見孤芳欲斷魂崇徳夜泊寄福建提刑章屯田思錢塘春月並遊夙昔神都别于今浙水遭故情彌切到佳月事追遨太守才賢重清明土俗豪犀珠來戍削征鼓去啾嘈湖樹涵天濶船旗罥日髙醉中春𣺌𣺌愁外夕陶陶新曲尋聲倚名花逐種褒吟亭披越岫夢枕覺胥濤論議刀矛快心懐鐵石牢淹留趨海角分散念霜毛鱸鱠紅随筯予之吴江瀧波淥滿篙君往嚴瀧試思南北路燈暗雨蕭騷嘉禾郡偶書盡道瑶池瓊樹新仙源尋到不逢人陳王也作驚鴻賦未必當時見洛神讀宿州天慶觀門扉仙篆有感玉骨霞衣帝所遊案前香氣與星浮無端醉語落塵土一過人間四十秋送張處士二首垂垂秋雨沒韉泥經晝門前無馬嘶乗靜因題送行什江南歸思巳凄迷梁園塵土着人腥不似淮山照眼明愛君心迹曽無繋一片孤雲去就輕温成皇后挽詞二首紫極騰軒曜青春委蕣顔雲軿何處去金殿幾時還仗下編簫咽陵中夜燭閒六宫哀送返疑是夢魂間翟綵開新禮金文易大名真游上仙路故物感皇情月落辭丹禁春前引素旌宫闈鳴挽鐸不是珮環聲司徒侍中宋宣獻公挽詞五首重器推隆棟馳光逐逝川人應騎尾宿嵗亦在辰年文思精天下忠謀盡帝前唯無豐室累清白是家傳申命増華衮遺忠動紫宸世風存令子暮哭有慈親復辟前言在論兵密疏陳如何年不永無路問蒼旻懐道初名世乗時遂致君平分百年筭中据兩台文行翣連寒樹凝笳上晩雲路人那得識揮涕指幽墳洛宅初開府非才辱顧隆遺思謡俗在餘論宴堂空巳矣蒼生望嗟乎吾道窮豈惟懐舊徳一慟向春風去嵗洛城東公歸秉樞務今日國門西輤車行哭度同此晩春節依舊西山路千古訣幽明一年纔旦暮逺恨寄山川餘哀慘雲霧平昔送公詩何言歌薤露哭賈少卿庚辰年自潭州謫所遷少卿知廣州未行卒畫旟南度謫長沙粤海新恩路更賖子日鵩來知主去辰年龍㑹為賢嗟猶多婚嫁先捐館無復田園可寄家曽是徳公推奬厚一觴何處酹魂車别顔慥下第四上不登第漂流二十年依依去國恨杯酒春風前和杜相公謝寄茶破春龍焙走新茶盡是西溪近社芽纔拆緘封思退傳為留甘旨減藏家鮮明香色凝雲液清徹神情敵露華却笑虗名陸鴻漸曽無賢相作詩誇謝杜相公有序伏覩宫傅相公精詞健筆輒然成詠敢觸冒戰鋒但伸懃懃之至謝政閑宫傅當年老相君詩情通造化筆力作風雲是則經綸手施於淡泊文捧窺心感悸無路候公門銓舍後軒秋欄疎索水葒花坐見花邊日向斜莫問幽人超世訣即心無累是仙家閣下晝眠急雨初收宫殿明紅薇花落暑風清忽傳午正驚殘夢寂寂西軒喜鵲聲戯答王仲儀零落黄花動節辰送行杯酒感風塵誰知最恨張京兆畫徧修眉不示人哭石曼卿仕宦晩益困忽驚朝露晞嗟嗟命不偶事事志多違直節未嘗屈英魂何所依有材真國器無悶即天機前日猶言笑今亡果是非城南春滿路空見素旌歸銅雀妓十五燒香繐帳前幾多幽怨入危絃誰知千載臺傾後何處西陵有暮田城西射弓挺之以病不至簡示新詩有唯應欠我渭城歌之句謹吟一篇以答佳意雪後西郊物外清官閒乘興此閒行出門疎樹無塵色入内流渠帶野聲近臘酒醪香更釅得風弓箭力還生知君病起心猶壯獨背船窻唱渭城汾陽夫人挽詞二首其夫李留後端懿國甥福偶天家出賢名戚里推朱顔不待老萬事却成悲宿露霑新隴秋風過舊帷誰歌均一徳傳繼召南詩借有百年在都如一夢迴幻生還復滅仙去不重來樂色閒宵院衣香祕夜臺行人知令淑哭送侍兒哀泰靈園書事檻外珍叢叨下泉祥符天子泰靈仙忽逢野老臨池水自剪殘花趂嵗錢上元天仗款琳房靈圃遥傳玉殿香要識年年桃李色不闗春力是恩光讀太平告身綾紋金彩射星霞潤墨新騰玉署麻不用著心驚寵辱去來元是坦空華因書答河東轉運楊樂道前嵗君提嶺外兵國門南路送君行由來成事多天幸直向危時見世情勉力朝廷論大計甘心江海就私榮予請罷開封府出知泉州牢愁應解侵人骨未老先教白髪生楚州聞晩角有懐欽天門外警場開郊宫有欽天門畫角千枝疊鼓催今日淮邊孤壘畔晩風時送數聲来過真慧素上人院見紅薇盛開因思西閣後軒數株遂成短章寄翰林原叔八丈禹玉閣長兼書真慧壁間以記所遇八月吳天覺早涼翠叢初拆碎朱房繁枝欲卧不勝力落片將飛猶是香西閣二年臨晝夢金刀一夕掩春芳嘗令花工以綵為之殊逼真也欄邊想像頻回首漸覺星垣逈漢傍杭州訪吉祥璘上人追感蘇才翁同賞牡丹曽乗春飲遶花畦花底餘香入燕泥剪處佳人傳燭下歸時明月到雲西重來草樹驚秋色零落交朋感舊題若使他年逢勝賞一觴知復共誰攜寳月法喜堂少悟浮圖法因傳法喜名於人無厚薄知巳盡豪英藥舍朝爐暖碁窻夜燭明性懐元自得未用厭逢迎過泗州嶺衢州道中是年冬十二月室家永嘉郡君葛氏亡逝二十五年間三迴共往還那知臨白首相失向青山想像音容在侵尋鬢髪斑平生多善行應不下塵寰丙申元日過浦城西陽嶺曽侍天王玉几傍累年侍執夀觴捲簾袍色殿中央重霄未徹宫縣樂上宰初持萬夀觴曉日半臨幡影轉春風徧送佩聲長今朝千里穿雲嶺喜奉親輿返故鄉宿漁梁驛庭樹疎疎河漢低瓦溝霜白月平西寒鴉不奈單棲苦落泊驚飛到曉啼過南劍州芋陽舖見桃花七年相别復相逢墻外千枝依舊紅只有蒼顔日憔悴奈緣多感泣春風見勻親抄書泣悼巻末得汝抄書心自喜古来清白紹家難誰知向老秋燈下一見親蹤不忍㸔寓居興化轉運廨舍病惱連春夏居閒意味長海風生永晝山雨送微涼書帙梅蒸潤衣巾荔實香塵縁消遣盡物我兩相忘丙申五月逰興化西門上溪尋溪因過上溪逰雨後溪渾水亂流因傍堤松却飛葢為聞山鳥輟鳴騶平田䆉稏青雲合滿谷芭蕉碧玉抽開濟無功須早去故時𤓰隴有通侯謝宋評事有序伏蒙評事宋丈分貺家園丹荔世傳此樹巳三百年黄巢兵過欲伐之時王氏主其樹其媪擁樹願并戮巢兵為之不伐今雖老矣實益滋繁味益甘滑真佳樹也因成短章用酬厚意齋館從容接燕申每臨佳樹走觥巡兵鋒却後知神物年夀髙来況主人並賞昔聞思故友公嘗言陳太監方諫議及大卿並曾㑹賞分廿今喜奉慈親豈唯持祝公難老兼欲靈株比大椿謝阮評事有序伏蒙評事阮丈手授祕文輒以蕪音用投真賞手授新書荷至情何時仙訣得真精髙年轉覺面顔少細字全由眼力明藥力謾勞分上下丹爐終費候虧盈爭如一語醒然悟獨葆天光不外營和詩送茶寄孫之翰北苑靈芽天下精要須寒過入春生故人偏愛雲腴白佳句遥傳玉律清衰病萬緣皆絶慮甘香一味未忘情封題原是山家寳盡日虗堂試品程泉州安靜堂庭松永晝囀春禽天氣初晴又半隂惆悵此生多病惱正㸔行樂獨傷心泉州北藏院見初荷華初華纔過小荷身曉露霑紅㸃㸃勻莫為愁心偏倚望清江元有未歸人詔貢士星騎翩翩鶴詔來旋聞歡語沸春雷天閑未減真龍種滄海還空老蚌胎拂紙半毫含意勁摩雲雙翅待風開寄言商頴辟榮客好致吾君放首迴福州堂下小欄花卉多是手栽今巳繁盛因賞花有所感悼愛花盡日傍花臺㸃檢當年手自裁前事巳随朝暮變舊華空見淺深開山禽忽下還飛去溪雨纔收又復来只有春醪能遣恨無人欄畔共持杯登四徹亭偶爾尋幽上翠微逰人啼鳥似前期花間行印露霑紙山下放衙雲滿旗艷艷舞衣朝日處飄飄商櫓落潮時傳杯且與乗春醉身世悠然兩自遺登清風樓郭外清溪溪外山溪雲飛上破山顔晴明天氣琉璃色何處峰頭帶雨還榴花洞洞裏花開無定期落紅曽見逐泉飛仙人應向青山口管却春花不與歸寄南海李龍圖兊求素馨含笑花二草曽觀嶺外圖開時嘗與暑風俱使君巳自憐清分分得新條過海無寄題張景山大卿園池人仰公才世吏師更甘歸老舊林池門䦨清似當官處心力强於少壯時物理自㝠非寄酒兵謀猶在却因棋濠邊風月如招隠願拂塵裾從所之端明集巻六
