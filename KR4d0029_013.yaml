body:
  text: 端明集巻十三宋蔡襄撰制誥晉州霍邑縣令孫固可大理寺法直官制勑廷尉主大平天下法令而丞史之屬必擇常通無害者任之爾以文詞中科練知吏理騐試具獄甫更洊月丞于本寺用伸所能惟矜而明乃飭厥軄故東頭供奉官閤門秪候王從政妻郭氏可縣君制勑以爾夫向與兵戎追遏蠻寇横罹摛刺嘗已褒甄尚念丘嫂之孤乆纒晝哭之戚徹兹縣壤俾列封君存沒淪恩務恤良厚開封府左軍巡判官劉機可光祿寺丞制勑具官某京邑惟建左右獄以治萬衆之訟尸其官者蚤夜訊問審辦能無滯擊斯亦勞矣以爾向繇銓調擇司其職僅踰朞嵗終無回枉即遷京寺尚仍舊治悉心矜慎無或少怠前泰州泰興縣令充故隴西郡王宅教授陳之竒可太子中允致仕制勑具官某修飭行業有鄉黨之稱精明經術有訓導闕三字自銓筦勸教舊族齒髮未暮遽還官政進聫闕三字推朝渥闕其祇率服于休命大理評事知開封府扶溝縣張子瑾可大理寺丞制勑具官某等朕念勞而不録則材者懈過而均進則愿者弛三年一比擢升能効其亦㡬乎治矣爾等列于周行乆宣風力考閥遷級庸示甄奬爾其勉飭往荷褒渥都官員外郎吕公著可司封員外郎依前崇文院檢討制勑具官某生於相門不忸華習濳心道義飭勵誠節入遊文館彌見冲抱以三年大比之法而進爾資級勉修職業用永來譽大理寺丞梁彦回可特授殿中丞制勑具官某爾以文詞選於科等以材美服於王官積嵗最以居多竦風稱而甚逺序進通閨之籍參陪中省之聫茂業益修來譽彌邵故衛尉卿致仕張從革親孫嗣宗可試將作監主簿制勑故具官某孫惟乃祖乆服仕塗馴至卿列謝還政事休老家庭此間終命之期宜霈録孤之澤開榮工監朝渥其承西頭供奉官曹侁可内殿崇班制勑具官某世家忠勲列在盟府河洲徳美重冠坤儀屬誕節之祝延援典章而來請躐進爾秩序通于朝日陪軒陛之聫益顯紳裳之緒前絳州防禦推官監晉州折博礬務徐師旦可大理寺丞制勑具官某漢設六筦以籠天下之利後世因之極夫纎悉弛之則支計乏用屈之則侵牟患作惟於擇官濟務而不撓斯為得矣爾以保薦專於筦利較程資代宜有甄賞參丞理議厥惟茂澤汝其朂哉故追冊温成皇后弟姪授官制勑具官某朕以妃掖之貴奄爾薨逝追崇命號特進異禮眷其族姻之大咸有肺腑之近録親遷秩用慰存殁以爾等聫榮外戚列官京師或峻秩於奉常或參丞於省寺恩澤渥茂勿㤀欽承陜府西轉運使金部郎中李彦可司封充淮南等路發運使制勑具官某舊居闗中嵗輸山東之粟至貳百萬號為稱職國家據汴都之㑹觀方來之要挽運儲廩出于江淮以萬計者率嘗六百故其使任尤慎擇焉以爾志尚忠果材通世務屢更煩劇隨著風稱經營秦陜之重充牣邉障之實東南將漕僉惟汝能進列清曹總賦六路然周宣恩仁則邦計或屈一切辦事則民窮無聊勉思悉中毋重予念西京左藏庫使張從一復西上閤門副使制勑具官某省户之嚴使介之近自非端良其志尚詳練於典儀曾莫得瞻扆闥之光覲班朝之範以爾蚤登仕路祗服官勤貳職文闈紹休先世比緣旁累嘗與下遷逮禋事之甫成霈恩華之胥浹敘還曩秩往荷新榮内殿崇班謝禹珪可内殿承制東頭供奉宫閤門祗候王成一可内殿崇班依舊閤門祗候制察院劄子為汒口水勢調善奉聖㫖各轉一資勑某官汴建廟社夫衆所居支疏河流東入淮泗嵗漕南方凡六百萬贏縮之計實惟兹水爾等職在渠洫釃閉得宜克羡嵗儲時乃之力進遷資等疇叙勤績益邵來最以稱甄奬内侍省内東頭供奉官任修已可内殿崇班制勑具官某參職宫省祗事禁近更與器使寖積年歴嚮惟内府條上勤庸念其材敏之資濟以恪恭之志遷聫朝著益茂邦榮勉尚忠勞毋懈而守閤門承授文林郎守右金吾衛長史劉慶李日新王昭序可竝特授守中書省主事依前充職散官如故制勑具官某祗事宸闈寖延嵗筦朝廷之文而最為知練蚤夜之職而居尚勤廉迺者禋慶敷行恩華均被遷名禁省漸歴榮途益務勤修勿㤀恭謹東頭供奉官王官寧可内殿崇班制勑具官某服勤官次寖積年庸屬修最之來聞宜疏恩而下逮進列殿聫之近視榮朝寀之優祗受褒甄益尚清飭禮賔使英州刺史劉文潤可洛苑使制勑具官某事朕軒闥秉心恭肅服官邊圉馭下嚴整向繇隴外蔚有善稱遷使領之近聫總兵鈐於西道汝有學術必理要通知汝有材能必事機敏達守之以静濟之以和惟其忠勤無重訓辭特勒停人前奉直郎守大理寺丞陳佩可守衛尉寺丞制勑具官某士之以過罹于文者雖在斥棄既開其申辨之路以盡其情加之寛大之澤以修其用可謂至矣以爾頃治大邑旁觸私累已更郊霈漸復京司往省于中勉樹乃績追官人前承務郎守司天監主簿解文質可司天監靈臺郎制勑具官某被累免官歴更嵗律屬比禋祀之澤釋其錮斥之文降録舊資還齒仕籍益循檢押無蹈悔尤尚書刑部郎中天章閤待制張昷之可光禄卿致仕制勑朕於羣臣進退之際曷嘗不緬然思之方其强仕發智能以濟務則有官賞以楙其材逮其謝歸養志意以自扶則有恩渥以寵其行仕宦者豈不懽然得其所耶具官某立節清峻無緇磷之苟臨事明敏有批導之利恤民以惠屏姦以嚴循吏之風聞于當世自升禁近之列屢委宣藩之重服老耼之言而知止躡疏廣之跡而告老爾其還上官事秩以列卿休于而家尚體朕意皇姪故左監門衛將軍宗邈宗沔竝可贈防禦使追封侯制勑朕觀葛藟之詩得其親親之意王者必厚恩施以滋九族使之子孫繁茂盛大乃有凋落之戚曷勝予悲具官某生於豐有而禀信厚之行樂於為善而服義方之訓毎自飭勵力期修立降祥逺騐疾起鶺原宿夕之間弟兄繼䘮聞訃惻悼輟臨廟朝陞禦兵之榮名治通侯之書數塋識不泯尚承哀襚之典大理評事方蘋可衛尉寺丞制勑具官某吏治三載則效其勞最以進資等用廣恩惠爾所涖局厥貢惟荈而能厲精職業專於嚴奉督察欺弊寛於繇作序進其等時懋爾能前東上閤門使文州刺史李珣前西京左藏庫副使李琪李玘前禮賔副使李瑊前供備庫副使李琚李球可竝除舊官制勑具官某人子之於其親之䘮也哀念無窮惟聖人制順天時之安祥禫甫終起而從政國家署列武職者率繇金革之胄以爾生於舅訓族習禮文居廬三年日月逝矣還奉朝請再服官舊兼循忠孝勉自祗飭尚書工部侍郎知桂州充廣南西路都鈐轄經略安撫使余靖可依前尚書工部侍郎充集賢院學士依舊知桂州充廣南西路都鈐轄經略安撫使制勑麗正天子禮樂之司非近宻官不得為其副所以刋緝述撰則為邦典顧問應對則謀王體擇選之稱尤其難者具官某以文學歴詞禁以材智更使指向者嶠服醜類冒抵邦刑起汝於䘮廬授之以兵節自臨總制漸格小康遽逺攬於奏封願追行於祥禫眷惟武略方倚帥才特兼書府之名仍居經管之重勉懋忠力稱朕意焉追官勒停人屯田員外郎士建中特授太常博士制勑某官某爾以儒學名家自守師説嚮官河汴釃決失宜奪去郎曹退居田里今予近侍薦爾才行授以奉常之秩蒞夫征筦之局追服故法當有漸焉服闕人歐陽修可依舊龍圖閣直學士尚書吏部侍郎制勑人臣之大節曰忠與敬處之者或過不及故先王設禮以為之制䘮者不呼其門盡為子之志也服除而從政即為臣之道也具官某以文章直亮擇居近侍以才略器幹屢吏劇任自罹家難歸伏閭里今祥禫甫畢賁然斯來文昌清曹淵圖祕職皆爾舊秩往服新命惟是移孝資忠之一義爾其欽哉文思副使新差權環慶路駐泊兵馬鈐轄張揆可騏驥副使兼知環州制勑具官某武略沈雄智謀敦劭擢叅禁宻之列陪與使介之聫正班著於天閑録教條於州􅯆邉防重障朝論須材勉思撫鎮之方毋忝甄褒之舉軍都指揮使諸班都虞候可四廂都指揮使制勑予有忠毅之士班于殿巖列于扈衛者咸擇部帥之長以明軍師之法而於郊貺率有遷授以爾等材勇出衆義烈著稱擢自顔行董齊虎旅或馳聲邉障或累効天營逮此霈恩兼領諸校褒榮斯至益楙欽祗廣南轉運使孫抗男适可試祕書省校書郎制勑某以爾父乆司計漕逺處炎陬頗著夙夜之勤遽聞彫落之戚命録嗣子試僚祕丘益勉省脩克紹家世步軍副都指揮使宣州管内觀察使范恪可馬軍副都指揮使軍節度觀察留後殿前都虞候隴西防禦使王凱除步軍副都指揮使闕州觀察使制勑在易師爻之義必藉剛中之徳以居總正之位邦懷衆服乃獲亨吉惟我祖宗武定天下扈拱宸極分屬三帥制馭之法猶在耳目節其衣食故約而不匱均其役使雖勞而不怨掊率之弊息而奮勇之志決今于貔虎之士以百萬計擇任將領其可易乎具官恪智略明果而資之以沉毅凱識慮精通而濟之以忠貞咸更疆圉之任而風稱甚逺乆侍軒陛之近而恭畏無懈信委兹重迭遷其守以爾恪知兩使之務總萬騎之風以爾凱一作覬啟乘車之行專伍符之籍爾其承渥命之厚念賢將之業祗服辭訓以稱朕意龍神衛四廂都指揮果州團練使安俊除捧日天武四廂都指揮使内藏庫使賀州刺史郝質除闕州團練使龍神衛四廂都指揮使制勑國家兵師之權分建三帥而步騎之列咸率其屬以相軍政以伸國威苟非忠勇之材莫與其選具官安俊性資沈逺智謀周逹出臨障塞入承扈衛具官郝質精通武略善御士心屢職戎鈐乆著風稱㑹師員之缺次繇部校而迭遷分握虎篆上拱天極恩榮信倚莫是重焉尚書金部員外郎直祕閤范鎮可依前金部員外郎直祕閤充開封府推官制勑具官某爰初筮仕以儒飭身詞章右於衆人聲稱籍於天下擢之黌序而訓導尚於經術延之文館而譔述精於史體外勢利而自守入名教以為樂惟爾言行蓋有聞矣都㑹之府市獄之淵必資敏明乃濟繁浩往佐厥治用觀汝能服闕人辛若渝可依前少府監分司南京制勑通䘮之禮稱於人情惟天道之行日月已究起任生者之事是臣子之節兼得其中也具官某風力清粹器尚冲深乆踐仕途屢更任使向分留都之治中嬰素韠之艱禫纎既除朝著斯復悉還舊秩往服茂恩洛花使昭州刺史新就差充并代州管内闕步軍鈐轄馮行已可左藏庫使兼知代州皇城使新就差充定州路駐泊兵馬鈐轄充保州等處都巡檢劉凢可遥郡刺史兼知保州制凢一作几勅自兵民之判而為二其治兵民者有心其間不能均一豈不異哉故守邊郡者兼得治之唯材能智略之敏乃可以授以爾行已挺生相門卓犖有立乆居疆圉特著風稱以爾凢世家守儒復取科等不殊文武自期功名或増禁府之聫或領州符之重提封之大可以為政屯旅之衆可以訓戎夙夜精勤以稱予意楊注可試祕書省校書郎充春州軍事推官權知春州制勑具官某嶺服之遐風氣尤異雖方州號為出守繇鈐筦許其願行寵以賓幄之資委之郡章之重勉尚廉治庸稱褒恩醫人李守文可國子四門助教制勑某顓志方伎記迹侯家屬誕慶之辰推及下之澤與陞庠學脱去民編恩榮甚華勉自精飭西上閤門使新差高陽闗路鈐轄馬懷徳可雄州刺史仍舊西上閤門使兼知雄州引進副使新差充益州路鈐轄宋守約可西上閤門使制勑國家撫臨多方專尚文治而邉圉要重之處莫不分戍守遏防外虞唯其命帥鈐戎之二者必得材而後授之具官馬懷徳性尚沈毅智略通明移控朔陲進領州棨具官宋守約忠果著聞恩信及人遣䕶西兵之雄特拜右闈之重渥澤皆茂揣稱良難爾其悉力盡公修舉厥職以副謹擇之意殿中丞王綱可太常博士制勑某國家馭吏之法三年而遷用為故事以爾綱頃從南軍專持文要比還列賞裁减嵗遷監軍全彬以爾有勞形于薦引曲臺之命特為優寵勉楙誠節毋怠而志諫官韓絳轉官修起居注制勑具官某爾以高第為左右史之官而有端方直亮之節徹於予聞命居諫列甫朞嵗序規箴獻替動臻理要以疾移告懇祈外補朕念敢言竭力之人詎可以逺既以考績之法遷與郎署而又還記言之職日侍嚴近蹇蹇之論尚或相予爾其勉之入内都知武軍節度觀察留後王守忠弟守規制勑具官守規闕念昔儲坊唯守忠祗事左右攀附鱗翼漸于禁近總都内宰乆而益恭嬰疾捐世朕甚悼焉閔舊録親厥典惟舊爾以材敏叅列軒陛方重天倫之戚擢進使聫之重勉自修率勿懈而志王守忠男懷玉制勑守忠長男懷玉等朕在東朝惟守忠祗事左右攀附鱗翼漸于禁近總都内宰乆而益恭嬰疾捐世朕甚悼焉閔舊録親厥典惟舊遷丞殿㫖擢進使聫寵數之蕃實厚勤故爾宜修率勿懈而志王守忠諸婦制勑守忠男懷誼妻張氏念守忠事予恭勤不怠比聞淪謝特深愍悼恩寵其家逮夫諸婦脂田肇賜實啟大邑渥命優厚永惟欽承禮部員外郎兼侍御史知雜事張擇行等可依前官充天章閤待制知諫院制勑帝者之明莫若唐虞尚旌敢諫之士蓋以萬微之務必得端亮以修不逮肆予臨御注意諍臣而於授受之間特慎其選具官某資性敦厚行履清勁臺端繩糾卓然風采具官鱗贄敏識周通素尚方正箴規政治不回要路竝進雲章之職㕘居規地之宻勿替而守以稱朕意屯田員外郎充殿中侍御史裏行余希孟可殿中侍御史充言事臺官制勑具官憲臺之職彈治百官分決詔獄昔我真考特置言事御史顓持諍議所以甄録才美嚮爾陪列殿内知無不為序進官聫益推渥澤噫敢言非難中理惟難勉楙乃誠服我休命觀文殿大學士戸部尚書知許州宋庠男椿年可守將作監主簿制勑某誕慶之節中外臣辟抃呼稱夀㒺不和説朕嘉與舊徳共樂無疆恩于而家用為榮寵命爾京稱漸于官政力圖徳業毋懈夙夜衝替人前益州司法叅軍胡永錫可霸州録事叅軍監淄州鹽税制勑具官某郡督郵之任蓋所以紀綱政治糾司過忒惟强明幹敏者乃為之以汝嘗歴諸曹復更罷免具以都椽之目涖于征𣙜之局夙夜思慎毋空厥官劉元瑜奏醫人孫士龍試國子四門助教制勑某挾方伎之學遊近侍之門言達予聞命試爾秩脱迹民版足為光榮歸明人等詞勑某等鷙猛之材乆雄於種落忠順之志願圖於聲明特推朝渥之榮以示邊防之寵勉圖報効勿㤀欽承端明集巻十三
