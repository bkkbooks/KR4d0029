body:
  text: 端明集巻三十三宋蔡㐮撰雜著眀諫為諫之難非進諫之難難乎人主聽而用之之難也人主之於諫有甚惡而用之者有甚悦而怠之者上雖惡諫廹危亾者或用之也上雖悦諫恃治平者或怠之也非諫者之言工於危亡而失於治平蓋上意之所加者安危之勢異也是故為諫之患莫先於急然世之人不究其本而莫議其失斯亦惑之甚乎治平之世人主無大過舉聞諫必深悦之然諫者多稱前世危亾之事以為監其言非有今日之明騐上必謂其濶迂而無所考信佞者得以迹而進其説由御乆安之勢貴乎循故襲常無煩於更治也於是人主怠心愈加焉言入而無所是非真偽渾并雖外有納諫之名而無用之之實忠言日衰而下情滋蔽患莫先乎此也夫稱危亡者庶乎懼危亾而不至也恃其無有危亾之漸而至也雖有聖智不能為已前世論諫者曰直諫為下以其迂險誕妄陳指醜惡易激其怒不若詳善其言使易行也夫迂險誕妄賢者不由也深言以起怒非諫者之過其心豈欲取怒而自抳其所陳哉進諫不能必於用本乎直而巳矣不逆上之所用捨而枉其志也納諫不必皆用取乎是而巳矣不以其言之婉直而遺其實也然則賞諫賢乎曰與其怠也寧賞要之中則異耳使諫者言常忠也畫常善也所謂能盡其心而不苟者也豈志於賞乎而賞之所設思以輔忠氣而開讜論也然妄人隨之資言以速進甚者詭譎而紊政意苟得焉喑嘿以自固佞者乗而非之曰舉天下之好言者均取貴仕耳孰從而求信夫所謂忠讜者哉於是賢者以進為巳累而寡言則賞焉欲以勸而適以弭之也故曰納諫不必皆用辨是非則妄言息而忠言進矣終諫之説離怠戒賞明用觀天馬圗慠夫寄尚者也出古綃之畫駿馬一者尾鬛㣲赭而身首文駮馬與常馬甚不類特立閒逸骨自稜竦精神爽毅雖一鵰之横塞雲獨鶴之思崑嶺莫之為也於其旁標曰蒲梢云安愚子曰蒲梢馬漢武帝伐大宛於貳師城得之年祀逺甚宜無有是傳豈近世好事者工其畫而藉其目乎慠夫曰蓋嘗惑焉然武帝威稜憺乎鬼方教誥申乎絶域以國珍而叩塞者得矕龍虎之文私自語為僥倖大宛嘗有善馬獨恃介絶而愛不来於是連兵不至之徼殫饋悉臣之戸旂鉦之師戈胄之伍易乎膏介草莽魂傺沙漠重乎南目而視旋趼而歩然後宛王戮而昔之善馬惴不敢有故能宣懿金石告休神明武帝求卓異其心不亦至乎後之人迹想飛駻加諸繪事不亦美與安愚子曰地入民凋物格財匱豈御天下之計者耶且馬也冀野之北曷世無之駓驪驈皇驒騵駱駵動精月駟矯首雲螭或編之天棧和以鸞鑣懐風以足其食大路以馴其性居不鷙獌動不詭遇雖虎脊之華趼蹏之勁未之加也然瘠不能振瘏不見收嚮風悲嗚垂耳於駑駘之後豈少哉吾知漢固有是而武皇獨甘心於貳師豈所謂賤近而貴逺者耶後之人不加意於求真視而肖練遺骨豈所謂貴耳而賤目者耶何以言之嘗聞昔武皇得狗監誦子虚賦獨恨不得與此人同時及相如至以貲為郎官止使者又頗優畜之謂如相如未可與道則巳而又有甚於相如者也自秦滅漢興綴文績學德業彬然獨董仲舒而已觀其制䇿延訪將罝英網傑騰周躪虞稱古賢輔志勤義篤而仲舒官特於諸侯王相耳之二人也孰知其不嚮風悲鳴垂耳於駑駘之後者乎吾以是固知其賤近而貴逺也抑又聞之揚子雲者殫思深湛著符清浄塊處天閣絶與人事而有尚白之嘲覆瓿之誚後數百年其書出至於如今如何也蓋親見子雲禄位容貌不能動人故輕其書耳吾以是揣劘世態乃知吾子亦貴耳而賤目也吾子有輕綃方丈腌丹塵黒縢以巾箱副以箧竹一出乎人德於顔面儻有騰黄之骨絶利之足枯悴下皂子將掩袂而不視矣慠夫患其語之侵梗已也不待終决而翔云講春秋疏力行之謂學析要之謂講學之弗固講之弗明講之弗先學之維艱吾謂講學之相資也今夫乗堅䇿肥彷徨中逵明目巧智厥㒺施為人有麾之以擿授之以銜倘非覂輈絶鞅雖四荒之逺當安安而至是猶學必固而講必先也中古迄周邦國咸設學校禮義孝弟益開而張秦燔漢駮愈逺寖㣲侵牟漁奪其不去者無尺間耳雖真儒碩德時亦間出賁於其躬壅於其民嗚呼道方將行豈窒於古翔於今乎臨漳於天庭為遐僻最然而歲舉進士塲者僅十百人豈特學干禄而巳耶是必學聖人之道也學聖人之道其不在經籍乎經籍之奥其不在於釋諭乎誠曰舉吾州皆能遊聖人之道酣於經籍詳於釋諭有是焉者司馬子長所謂雖執鞭吾亦欣欣然慕焉若其未盡能也得無彷徨中逵冀夫麾之以擿授之以銜者乎彭城先軰至自温陵好古强學尤善髙論能通左氏春秋孔子之志其可不博聞乎僕嘉與士君子酣乎經籍也詳於釋諭也游於聖人之道也士君子以謂何如名説盧㡬字舉之㡬之義旁出諸書大備於易要言之止乎極而其應也不窮動乎變而其濟也不終天下芸芸莫窽其明萬殊汶汶莫揺其本㡬之義至矣夫顔子何與塗之人也陋居約守功不甚白以孔子之聖而亟稱之其朋三千又皆出其下到於如今聲名肖其師績業槩舜禹曷謂耶庶乎㡬而已矣㡬之義至矣夫君取以名巳必字曰舉之者思以止乎極而通乎變也凡云人者物之異云姓者人之異云名者姓之異云字者成人之異名字之始始於是其義有有取者有無取者其無取焉則巳猶有取焉舉之楙哉吾聞伸於已者待於天也策問問孟子拒楊墨荀子亦非墨子揚子又曰楊墨塞路以三子之言墨子果有悖於聖人之道而不可用也韓退之云孔子必用墨子墨子必用孔子不相用不足為孔墨觀其説墨子又若無悖於聖人之道而果可用也墨子之書頗見於時是堯舜而非桀紂聖人作焉决不可廢尚同兼愛右鬼尚賢推極其言亦有異於孔子之道乎其無有乎孔墨同三子唱言而深拒之何哉其道誠異退之又何取之而不畏後人也四子者皆聖人之徒然其所尚之異如是得無説哉深於道者為余言之問仁與智若聖人者固有之聖人無大於堯舜帝堯於是二者無一闕焉可也書稱堯曰咨四岳洪水方割蕩蕩懐山㐮陵浩浩淊天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族岳曰异哉試可乃已帝曰往欽哉九載績用弗成且堯知洪水之為害至大矣又知鯀之為徳至戾矣以至戾之德治至大之害可乎說者又曰堯知鯀之性狠戾未知其能乃試用之是亦不然聖人不期人於死然用必度其才而不失其任者焉鯀堯之臣熟其才之小大也固宜器使之鯀之能小有不勝其用者反屬以大事安在其為智乎以堯知鯀之不能重違衆言而用之庶㡬其成功然天下且溺乃暇倖一夫之効待九載而後黜之其可謂仁乎書也仲尼嘗究之可信而無疑也將有深意可法於後世也與不如是仁與智又非堯之所宜備孰能告予使無惑也問聖人之道行於世當時被其澤載於經後世承其教五經之不傳後人之無從而知道之所之也今之人知乎道之所之者以五經之存焉耳揚子雲曰五經不可使人易知天俄而可測其覆物也薄矣地俄而可度其載物也淺矣以子雲之説凡五經之言皆聖人之所以宻而不彰者也君子處心如是固當耶書君臣號令訓誥之言也詩下而上達抑不善而美有德也禮以閑邪春秋以正法易以盡萬物之情雖異其所指要其歸未始遺乎斯民是欲使人之易知也欲觀五經之學傳而不能解又疑子雲之言不然也從子雲之言前所云云者奈何問前世太守刺史至郡有延見耆耉賢徳之人詢究風俗發而為政故有摘姦擬之神明者有遺愛號為父母者皆能通接上下之情以至然爾今吾州總縣十二而編戸以萬計者二十而刺史明不能周内外之察材不能適事物之宜將如此何子大夫皆游心於道潜意於民刺史所宜問而子大夫所宜無隐若夫吾州徳業節行加上於人者何人㬥縱以為蠧者何族民所欲為而不得與所不欲為而强之者事有可行而未行可止而未止者幸詳言之齊精以聽問學者無不以利澤生人輔興治道為心然化民莫如善教修政莫如擇官威戎莫如理兵强國莫如豐財四者於今施設之何從而治何適而可夫泥古語而不中事機是之謂空言君子恥之唯財者為能稱時而處宜本末陳之於以觀子大夫之志問言聖人之道者必羞言霸者之事故孟子卑管仲而不與班焉然管子之相齊當周法之巳㣲而能連諸侯而尊王室天下灑然俯就約束而威公之志益大且圗封禪管仲以異方之物抳之又其書曰仁故不伐王求管仲之心蓋不以天下為利而正君臣之大義者也孟子曰以齊而王猶反手也使孟子持管仲之勢則挾齊而王矣如曰管仲之道不及仁政則可矣責之以不王齊蓋周存焉其可乎孟子之言前無譏者將有意乎無也諸生為我言之問五經之學有師弟子傳駕其説西漢尊用儒術稍得立學而易分為四書分為三詩有齊魯韓毛之説春秋有公羊榖梁鄒氏夾氏而左氏出於張蒼之家周官篇最晩得然學者自名其家由漢而下迄於隋唐釋者愈衆而師説或傳或廢今欲觀西漢以来五經授受之人廢興本末尤著明者幸悉條焉枕銘晝有白日而不惜兮安爾而醉夜有明燈而不擿兮安爾而寐為心果無求於善學兮曷若安爾之無累杖銘道之難阻兮爾實扶持爾非自効兮人爾求斯有用有捨兮抑爾之時用爾寧喜兮捨爾寧悲過箴往也莫追来也莫知往何弗恥来何弗思恥勿憚改思然後規日規月改雖過奚為怠箴雞鳴為善舜堯之徒善之不足德乃有餘根深則茂途逺而趨汝之克念其庶㡬乎擇交箴弗修何交弗擇何求既修既擇從是而由吾善不勸時爾之仇吾薄不掩時爾之休嗜箴靡曼之色實蠧而德哇淫之音實害而心蜉蝣之美衣敝何恥琅玕之羞簞食何憂謹箴舜善孜孜文心翼翼伊昔聖人靡念㒺克謹如之何曰攸好德若虞顛躋以守爾極歩箴有足兮動渉坦夷有心兮何由險巇足非有慮兮心役之為用心如足兮蠻貊行之毁傷議人之所以異於天物也者以其衷行卓爾者也衷行篤實本於至誠無用刻飾其唯孝乎事親以盡其恭事君以盡其忠以致其誠以正其命斯可謂孝之大節也與昔大舜不得於其父母然二十年以孝聞者區區然全其身也後世稱孝之大者曾參其人也參之奉身也傷足以有憂也其事親也徹饌則問其所欲故孔子因之談經首毁身之檢孟軻因以發論敷養志之美者以肖夫遺體不出於害志奉親能名無淪於匪則至夫加意甘享經神外物斯末也巳矣今之民人父母有病輙炙股肉以啗之兾夫有瘳噫甚乎蠧仁而禆教者耶厚親以食其養志乎毁已之膚其愛身乎是二者其果孝耶其非孝耶牢蓄之犬豕且死不相􅀢食其類况人者天性之貴乎况人之父子天性之厚者乎人有為是者里白於縣尹尹白於郡若府按著令施酒帛以哀勞之凡縣與郡府之官屬筦於民者又書於伐愚民不知大本謂孝正當如是耳家有是人焉曰吾家之孝子鄉有是人焉曰吾鄉之孝子郡縣之有是人焉曰吾郡縣之孝子推引陶習寖以成俗噫甚乎蠧仁而禆教者邪大舜孔子聖人也孟子曾參大賢人也彼聖與賢其所為若是為世之大教也為人子者服聖賢之教則正矣乃棄其言而不由甘心於殘忍曾牢蓄犬豕之不若也非以法禁卒不可遏謹議齊茀賛方地聚民賜履之大者廪粟萬鍾分禄之重者腹心股肱注寵之固者享人三者若是伉然立節臨事不奪忠則忠矣孰若未嘗享是三者而盡其誠慤兹又忠之難者也何哉當施之厚報訂其施宜也當施之薄報訂其施亦宜也乃有國治則享其厚利方有犬吠之聞慕妻孥為自引去矧其疏逺見危致命其為心豈不揭揭然爾若齊人茀將有是乎初齊㐮公田貝丘怪見公墜車誅屨於徒人茀血其背既而茀去遭變袒示其笞請得先發入匿公而出鬪死噫地之大禄之重茀徒人賤役無是也腹心股肱注寵之固茀嘗不名而戮又無是也而能以薄為厚以怨為寵可謂忠也或曰所謂忠者非獨損躬而得也謀不先事是無補豈趣人於害途耶曰茀支革判解且不顧善智與謀豈齊嗇哉斯亦盡而已矣委質於人智者盡能愚者盡力乃大忠道宜有膏其光燄者賛曰孱侯師心禍稔毒流人卒泮渙爾戈剡仇長河落闕投爾一杯烈燒横岡覆爾一抔在生則盡衷焉不回彼有羣啄甘實類闕美材一彈飛来雲翮風開茀嗚呼忠哉推進論班書引漢美曰推進如鄭當時者蓋以當時善推轂士故援舉而宣賛之爾然觀其挈置大位能自炳炳見於末世者特桑羊孔僅輩也當時居漢頗善駕名孟堅乂文雄者颺之載籍以是風流華問彌乆益著而事有可為世惑故辨白之夫推進仕人由来尚矣作民司命荷天大器者必博求儁輔紘張國維總覧羣䇿財成大化雖紹帝統而建王基曷嘗不由兹而治也然而夸毗躁進誖戾苟容者莫不畏人之聞出乎巳也莫不售已之榮加乎人也畏人之聞則長材蔽售巳之榮則要途阨舉賢援能之義熄而誹俊疑傑之道興是以先覺瘵立於草茅大猷翔集於巖穴作民司命開横瘁之漸荷天大器缺持維之具若夫盡悴天工相先人爵招顯側陋延攬英豪塗羣枉之耳目抑私溺之津岐懐峭直而辨政疵定謀謨而斷國論若是者足以表率紱冕煥映竹素百世而下指注稱道延於無窮記曰達觀於所舉董仲舒曰以觀大臣之能推進之道豈輕議哉而當時究一切之利提挽憸巧雖薦寵有加而德業亾狀漢初帝有天下百姓新離戰國之患閭巷雕落積庾單盡文景紹業深悉捄弊飭尚謹儉罷斥珍巧勞来休息民緣壟畝家給人足帑峙豐露可謂盛矣世宗賦英敏之資藉乆安之勢蔚興典禮務臻王略而末年甘心征戮俯首悠謬内則建無窮之宇修不名之祀外則連兵夷狄通道卭筰饋饟之煩甲兵之費歲常以鉅萬計府庫空虚海内耗矣於斯之時為善策者固宜建白於上汲援經術講去殊類抑止遐役不爾為者孰若不言之愈也庸可隮抗賈人擢處卿位俾桑羊輩詭譎機發窺伺主意越髙帝騎乗之科㒺賤夫龍斷之利封筦殱慘至有羣官列肆居貨蹛鬻而編戸之民始與國分為二途矣使後之人為國謀者必曰强我者又從而功賞楙之然則民之弱國惡在其强也孟子曰今之所謂良臣古之所謂民賊者其桑羊輩乎曰非桑羊輩之辜其所以發之者鄭當時也當時首惡智詐之毒湯湯激注而孟堅引其推進借史筆以夸大之其可乎謹論周公對或曰孰謂管叔蔡叔之於周公親而不賢不賢不宜封親不宜殺既封而又殺之於周公為有過哉周公相武王成天下建親分地以固其本使二叔前有凶德猶將擇賢輔而立之惟其無咎如何而不與封哉不封則周公失親親之道於仁累矣天下虐紂日乆變而為周無有不得其順者然二叔先惡自用不能循先王之法以保其地惟忠賢是䜛維紂子是從周公如何而不誅不誅則天下將復其故文武之業不克闕傳其害義亦甚矣管蔡之誅周公之義封與誅仁且義周公固無過也孟子謂管叔兄也周公弟也周公之過不亦宜乎吾謂過周公者孟子之過與曰不然君子之於兄弟終於仁而巳吾於是見周公不幸而有過也周公不享其利而孟子且過之身享其利而行周公之事吾乃知聖人之絶之也不遷怒不貳過解孔子稱顔淵曰不遷怒不貳過說者云不遷怒者凡人任情喜怒違理顔回任道怒不過分遷者移也怒當其理不移易也夫任情而喜怒無足譏道焉者怒不過分當其理而不移而吾信其喜怒未見可稱者顔淵之為道於孔子至焉而少間耳乃不離乎常人之所能而稱之理豈然哉人之為情者七而喜怒愛惡哀欲六者之感人其来也漸得以思而循其理焉惟怒之為情中人㬥甚自非安於至誠反巳而自省者未有不從而動焉故君子之重之也予謂不遷怒云者顔回安於至誠反已内省不為怒之所移耳又云不貳過者有不善未嘗復行也然孔子曰回也其心三月不違仁若顔淵之心不善無從而至焉余謂二者疑也過者適中之謂也不貳過云者顔淵處道至明發乎其心無有不得其中者欲不疑於失中之過也無怒以能遷無過以能二吾於是見顔淵所以為心也曰然則顔淵其聖者與曰至聖人矣其未至聖人之至者惟聖人能知之奔者不禁解周禮司徒媒氏之職曰仲春之月令㑹男女仲春隂陽交以成婚禮順天時也於是時也奔者不禁重天時權許之也若無故而不用令罰之無故謂無䘮禍之變也説者之意以為重天時故權許其奔而不禁也然禮之為言所以關束人情而事為之制而於男女夫婦之際尤切切謹嚴分别將以驅生民一蹈於法而不陷於亂耳孔子修春秋諱國惡至於夫人孫於齊㑹於禚之類皆直書以譏之宋火伯姬以傅母不至不行而火死春秋大之詩以關雎淑女之德冠於周南而潔正之行美於召南其於列國刺奔刺亂刺淫昏者凡二百餘篇所以見孔子之用心於是也愈勤矣豈不謂明人倫興教化治國家天下斯其大本與獨周官書乃權許之周官書雖不見正於孔子然其傳以為周公立一王之制以為後世法而使治國家天下者毎歲仲春輙縱奔者以之為治曾夷狄之不如何禮法之為哉余謂仲春之月令㑹男女於是時也奔者不禁若無故而不用令者罰之若者連及之詞謂民有奔者輙不禁止及無故而不嫁娶者媒氏皆得罰之也五經之説謬妄有之未有敗害禮教如是之甚者故予為之辭端明集巻三十三
