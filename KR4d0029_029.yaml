body:
  text: 端眀集巻二十九宋蔡襄撰序御書碑序皇祐五年秋陛下以真宗皇帝奉神述再刻之碑親謄篆額勑臣模寫終篇既成奏御䝉賜臣御書一軸臣輙刋頌章上述㫖義又辱奨詔明年春刋本上之特賜臣母仁夀郡太君盧氏冠帔臣歴考故事未有列官侍從而宸毫賜字不緣名品而象服及親獨臣恩榮前無比例伏惟陛下性資孝誠覆養萬物精通經誼㳺適藝文矜優髙年原本慈恵毎觀先帝睿文若臨宗廟志容必盡親勒題顔恭記一十九字念思勤勤以臣得與翰墨之間探春秋褒勸之法稽虞書謨謀之義神筆飛動妙入無迹敦尚老老推及臣親日月之光下燭幽昧蓋繇陛下根於仁厚而形於政事豈愚者之慮所能誦道哉竊念臣出入省闥向餘十年其間居言諍觸貴權所以獲全而器使之悉頼天聰今兹忝冒重疊莫知所為謹摹御書及録奨詔鐫著於石臣所獻詩幷亦附見傳之四外垂之萬世非特微臣之榮遇抑亦興朝之盛舉也至和元年六月二十四日朝奉郎起居舎人知制誥權同判吏部流内銓上騎都尉賜紫金魚袋臣蔡某謹序興化軍仙逰縣登第記序閩粤自唐歐陽詹始舉進士以文章與時聞人亢聲名為世所貴重後有慕詹者繼以仕進及五代亦世有人焉然文氣愈衰薄無能與詹比者宋興復以文辭官人四方學士緬然而起其以名聞南方者鄭成之其尤者也為道専一使詹且存或有所推以先之其餘為名進士厯顯官日益加衆興化軍属縣三仙逰纔為中縣然鄉閭右學後生不儒衣冠不得與良子弟齒嵗時即先生舊徳以指授經術其為詞章相與講導鍜成一律進取科第若逢蒙之射而陶朱之賈其失中而莫售者鮮矣每朝廷取士率登第言之舉天下郡縣無有絶過吾郡縣者甚乎其盛也哉然古之仕也取人後之人也求仕取人者宜而器之行與能前仕而可知也求仕者唯其才與科合則中焉行與能仕而後知也夫學者豈特属文辭苟仕宦哉是必先乎已立而後澤於人者也開封掾廖君悉記縣之登第者姓名等級若年月日距今而上斷某年以來碑刻諸石而植於孔子堂之西偏來者得以嗣而書焉予知後之升孔子堂而觀者必擿名交議曰某者之為人也徳與位宜焉或位雖屈而徳伸信乎其吉士也又曰某者之為人也其徳不有加而其位過之或膠戾著焉信乎其非吉士也苟非其親與仇善惡必眀是其來觀也既嚮其善者而病其不善者使之一日載名其上必能思而畏乎後人之指數吾名猶吾昔之指數前人也率以是而自勉與廖君潔志尚古又務勉人於善將記以某有鄉里之舊属之碑序其事某既道其所以非敢専警扵人亦將以自省云七石序雪山僧惟正渙然其居淨土之西軒有七石皆因物象而名之其曰麒麟俛趨而逰曰仙鳧渾礴自如曰孤鶴引吭開喙若戾而逺視曰蒼鷹竦翼將擊沉思而在曰飛泉碧玉瑩澈素練斜落曰屏風髙丈而半廣又半之曰四面其東當楹竅洞牙蘖西南北亦如之渙然極嗜而無厭予甞與寓觀焉渙然指而語予曰我為釋氏學洸洋無羈樂此居而留者今僅十年以事入旁郡中道思之輒罷歸石乎其亦累我耶然毎至其側叩之言不聲而默告之逰不從而止我亦默焉鄰而居焉忘彼之石忘已之我兩皆忘焉石乎亦何累於我哉予於是知渙然甚自適也乃臨石而問之曰天巧神知而寓爾形耶其亦槩陶均冶而脫然耶爾之淪顯將弗然耶其亦莾不知其所以然耶名爾以器以物爾其真器且物耶其亦不為器不為物耶盍為為礎乎以支眀堂太廟之楹使長而不危盍為砥乎以礪豪曹釬鉞之器而使妖囬沮屈薦之闕乎以序齊民之法寘之梁乎以利艱渉之病刳而研乎以修明乎舊則伐而磬乎以登合乎太和瑱而紞之以翳乎讒搆鏃而矢之以殄乎驕誖如是者皆能為之乎不然徒以窪突刓銳喜人之目何也頃之有為去聲石言者曰無何也始謾我以名又訹我以用名與用亦時遇爾我自守而貴者天質也異夫工者鐫磨鑱鑿之為之也天成之質可不貴乎渙然能詩善草書猶是石之貴乎天成也予甚愛其言舊聞華亭有畫工年七十餘而筆愈遒能致其人圖此見遺亦足為洛中燕居之一適也景祐三年十二月日序送王勝之西歸序志於道者其所以進之之心皆然而其所以為之或異者豈明有所蔽與夫意氣廣大者善遺俗而剛介者善仇世不視世俗屑屑走趨勢利作僕奴女子態狀羞不可近反髙伉脱去以矯之往往縱肆自亦離道或非之則曰不世人之非而吾非吾豈勢利汩哉雖然其所以自髙者乃甚下也前有人焉其心安於仁而其發邊於中宜力於其間以求至之與否廼暇與世之人準輕重而度逺近吾未見乎自處之重也今夫衣帶食飲羣於人者無異焉幸而是非好惡之眀有以過之有過之之明而不能急嵗時以修其性豈不暗扵愚者愚者無知莫强其力知者或隳何從而作也予之不明用是說以省予中者久矣於勝之之行輙進予之自規者因以告之謹序送馬承之通判儀州序唐末失御外方將帥臣闚釁輒發籍土地聚貨財招倈慓勇士務刺擊争鬭以為强甚者格弛天子法令専逐帥臣盗有其衆患日寖長梁朱氏卒乗此勢以取天下其後五十餘年易四姓大率由是廢興武人綰重兵收天下安危大柄在掌握間更世移祀若提持食飲器東西左右耳於是軍中氣凜然騰在人上躬儒者俛首隠舌不復奮起開説古先王治道而為之莭制勢久而變理固然也國家既平四方追鑒前失凡持邊議主兵要内宥密而外方鎮多以儒臣為之任武人剟去角牙磨治平聲壯戾妥帖處行伍間不敢亢然自校輕重然則今天下安危大計其倚重扵儒臣乎獨不知决然自當其所倚重建立經久之制者果誰哉承之以文稱於交逰嘉自樹立兹有西鄙之行思以竭材慮而後惬焉予觀承之之文之言未始離乎忠也使力足而勢大者咸以是而為心唯國之計而微躬之念事㒺不濟且使世之人知儒者果可以天下安危大柄倚重之也送張總之温州司理序提封千里民堵萬區加其上者獨太守耳守之責無已重乎曰不若理官之重然則使死者不怨刑者甘心遂理官之責可乎曰不奪則責之可也凡縣邑之民事不得其平者則平之於尹尹之不能平及事之大者咸得平之於守守視其事之小者立決之其大者下於理官理官得以考其情而弃之殺之故曰守之責不若理官之重然理官之責甚重而不得其専官有昏耄柔懦則事藂而下有偏怒竒憐則舉手左右有狭中矜敖則務乎簡厝日召而前頥指教勑迎合其意則喜違之則怒至有鍜錬遷就而為之使寃者不得吐其臆鞠者不得畢其慮故曰不奪則責之可也使能者為之期止於是不期於奪然每一事之下審獄具文諮於従事謀於監郡上於太守而又質之掌法者若文不比囚不直則移而讞之衆皆可焉班而署之然後乃得已矣若是積三嵗而罷歸其勤亦甚矣總之力學修文行之㢘厚復為理官使主郡者賢明不奪則其責愈重總之宜何如為心哉夫與鼓瑟者㳺而言操刀之事則言者之過也總之於行不敢指異事以規謹序送史炤赴邠州幙序陸生有言曰天下安注意相天下危注意將載之漢牒最為警語某竊謂陸生一時之辨非極論也夫將相者文武之事若手足之左右捨一不濟副二乃適豈待乎安危而注意哉必安而後相必危而後將譬諸横舟中流指山木以為檝曰不殆者豈謂智乎苟有不然借今以為喻國家奄宅大區文昭武震蕃酋繼好諸侯順命然而天子移慮生民蹷財者豈不與邊兵乎四方大本在扵邊精卒良械遍實隂墟方輸里賦徑及天下而四十年間卒老於屯伍械弛於戱樂司是者刲羊釃酒蓄以驩愛國舉異禮必先計兵開府庫委金帛而均施之乃至反脣相稽圜目相視較分銖薄厚曰我固當得也將恩而不威兵驕而不戢時之深恨近年已來北諸侯愈難其選或取文儒加武號而長之大抵尸之謀而正者則為長利推此而度之天下雖安將可忘乎將不可忘則陸生之談謬悠也果矣某嘗欲北逰以觀邊事勢不及往而中煇受邠諸侯之署今行矣當世之首務四方之大本可得而知也於是朝之文士咸作詩以寵其行莆陽蔡某文曰送史從事往邠州序送郭學士序自某來河南去家逺甚親戚之好無一在河南焉者舉河南日與之游者又未甞有交言之舊焉居常反慮自眀豈隘乎哉何其與已之少也盍求諸善容者以質乎某得足下聲名且久今乃見之足下服喪退居而老官重徳嵗時使使謝問交踵門下乗傳東西者止道問舎之所之暮夜必見郡之學者持文章以就衡尺得輕重長短乃去雖紛綸過前區而處等級髙下能盡得其心惟莅官於郡縣者以事諮焉反自閉不知愈牢終不開一言别是非隘者質焉其亦有志於善容乎且退居閒默非有加人之勢而能使人懽欣悚慕之如是使之乗加人之勢曷施而不濟哉於是行也某既序之巳又繫之以詩云以文自髙或病為吏以吏自喜或守一器君有文闕不鄙吏事驅馬在道愛樽其轡今天子明唯知人易必得其位而達其志送黄子思寺丞知咸陽序天子之尊下視民人逺絶不比去聲然出政化行徳澤使之速致而均被者蓋其所闗行有以始而終之者也惡乎始宰相以始之惡乎終縣令以終之輔相天子施政化徳澤自朝廷下四方而止於縣者承其上之所施然後周致於其民也近天子莫如相相必得賢故能輔其政化徳澤之施也近民莫如令令無良焉雖政教之美徳澤之厚而民莫由致之也相近天子而令近於民其勢固殊然其相與貫連以為本末是必動而相濟者也民知其所頼而相休養以樂其生唯令而已令之於民察其土風井閭而别其善惡强弱貧富勤惰寃隠疾苦以條辨而均治之使咸得其平焉令之負豈輕也哉今之取令率以嵗年不稱其能否是故天下之令有賢有不賢天下之民有幸有不幸必爾盡天下之令無有不賢則盡治天下之民亦無有不幸矣子思黄君業儒以才名於時前此為獄官涖囚必直其情而未嘗以色語威之今之為縣從可知矣故予序其行既属子思以為令之重而又慶咸陽之民之幸也送丘賢良序人有名之曰大匠而不能植棟宇名之曰醫師而不能處藥石名之曰冶人陶者而器輙不堅以窳世必斥之曰是不足為大匠醫師冶人陶者蓋冒其名而居之也國家設科以博取天下士其敢言直節者曰賢良方正學廣智明者曰才識兼茂特傑出倫類者曰茂才異等凡舉是科者必自視已之能足以充其名而無愧故第言入等則天下之美譽咸歸焉苟不塞其名之所謂安知夫世之人不斥其冒哉邱君仲謀學通經史且為文詞窮暮而休累數千言而豪肆之氣奮若未巳將挾是以與賢良士竝進固有以當其所取然仲謀誠深思讜議以塞其名之所謂則道義之歸有日矣正月日莆陽蔡某序林比部送行詩序故尚書比部員外林公祥符中自梓州郪縣罷還由大理寺遷與朝班通判蔡州事陛辭之日伏奏以父母垂老得他官不滿意願幸而補臣閩中一便地臣奮罷駑之氣奉法遵職蚤暮侍問恭養以盡子道非徒伸愚臣勤懇之志抑亦廣聖王孝治之體上嘉愍其誠詔改建安郡時著令自蜀還者必再為縣然後升監郡公以才能為衆所薦引故特升不與例比將行又以言詞動人主全其孝心於是朝之鉅賢咸作歌詩慶美其事初公入蜀居三年不茹葷飲酒日誦浮屠書祈幸安歸以慰其親愛慕之心豈不至哉公諱休復字某居官決治所向無留末年知漳州某適為從事間有闗白多所稱奨今年被吿還家道出於閩嗣子世矩袖所蔵詩來謁序述某嘗謂詩至南陔白華篇感其孝養之心求其詞以諷詠不可得已而得世之詩意謂之似者亦足觀矣以公之力行而作詩者咸樂於稱道其嗣子又能追揚先羙是皆可書也陳殿丞送行詩序康定元年殿中丞陳君鑄師囘通判福州且去京師朝之名卿繼作歌詩以重其行師囘至官之明年發槖中所得七十二篇幷走書属某序其篇首將刻之石而傳於人也夫送逺之作必稱其事而附為之辭師囘以文章中甲科間十六年而為監郡然所治距家纔百餘里奉母夫人官舎以申孝養之志古之人有以親故不擇祿而仕者而師囘之禄足以充其養今之仕者東西南北或千萬里士大夫得便其家者得相慶幸而師囘又以侍其親然則羣公詩之足以勸夫為人子者志乎侈大而逺於孝養者不為空言也若夫閩中之勝域中三山山之下海之潮汐至焉有魚蝦蠃蚌之饒黄雀丹荔之實竝山又有竹林泉石曠清雅絶之美可以宴喜而娱遊或雜言之亦詩人之博興也慶厯元年正月三日著作佐郎館閣校勘蔡某序聖恵方後序生者天地之徳成者聖人之業運化流物隨之不遺生之之理至矣推本興治安而有倫成之之道著矣是故作天下之美利者其聖人之事乎傳稱神農味百草黄帝録内經以除民疾其術能死者生而夭者夀以言乎功雖大禹之疏洚水驅龍虵湯武之用金革戡禍亂將救患於一時孰與無窮之頼乎故曰作天下之美利者皆聖人之事也宋當天命出九州之人於火鼎之中吹之濯之太宗皇帝一平宇内極所覆之廣又時其氣息而大蘇之乃設官賞金繒之科購集古今名方與藥石診視之法國醫詮次類分百巻號曰太平聖恵方詔頒州郡傳於吏民然州郡承之大率嚴管鑰謹曝涼而已吏民莫得與其利焉閩俗左醫右巫疾家依巫索祟而過醫之門十纔二三故醫之傳益少余治州之明年議録舊所賜書以示於衆郡人何希彭者通方伎之學凡聖恵方有異域瓌怪難致之物若食金石草木得不死之篇一皆置之酌其便於民用者得方六千九十六希彭謹慎自守為鄉閭所信因取其本謄載於版列牙門之左右所以導聖主無窮之澤倫究於下又曉人以依巫之謬使之歸經常之道亦刺史之闕職也慶厯六年十二月八日右正言直史館知事蔡某序姪至夫名字序先君嘗曰紹上同逺祖父名令改曰力字至夫恭念我祖考之修服善行孝淑諒直聞於鄉黨唯乃父亦克事親以孝事長以悌祗畏惇謹以睦於家清肅闕毅以濟厥官積學達詞將以有為福不及夀孤負闕業悲夫汝今亦成人矣其能乃父之思闕名汝曰力力乎善行字汝曰至至乎善道汝唯不闕是能有闕於前人送吕祕校序予嘗思古人力學為文莫不欲著見於後世然傳者少而磨滅者多非至工之詞至當之論不可以久也豈天嗇乎才何其工且當者鮮耶及觀後世之學者有文病三焉或喜自髙賢或過相稱譽或與時遷移有是三病故不至焉豈天嗇哉夫道至逺苟非聖智未有不由近而之者况自病乎喜自髙賢則闕已之朋不來斯陋矣過相稱譽則怠學者之志斯闕矣與時遷移蓋以利而動者斯下矣吕君足下闕二字而學博氣闕而内修孰不願進所有以相資矧求之勤乎若某闕宜資所未至不可為譸張名譽之説以予之闕二字乎身而修道雖逺斯至矣足下之文愈工而道愈至則其傳也必矣謹序端明集巻二十九
