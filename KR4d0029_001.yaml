body:
  text: 端明集卷一宋蔡襄撰古詩親祀南郊詩有序臣襄言伏覩皇帝陛下親執牲玉以饗上帝酌定大樂登侑三聖天地清霽神祗歆格陛下齊精至誠著見兩間臣叨從法駕躬覩禮文之盛職在詞掖不敢以虛陋自棄謹撰成親祀南郊四言古詩一章凡一百七十六句雖不足以道誦德業之光然略掇大要垂傳遐域亦愚臣惓惓之至其詩曰天畀元統赤運開祉聖祖神宗海域平砥思皇真考嶽封汾祀餌係邊陲包束戈矢丕顯靈德光被萬里民壽而康恩及蕭葦恭惟皇帝繼文之始兢兢日慎夙夜勤只哀憐困窮有如在已惟刑是恤弗繇怒喜躬服儉約黜棄浮侈罔有逸欲曰惟三紀大中則經興亡則史隂陽時序日緯躔軌樂律本原禮法根柢兵韜術數萬微精㫖該通變貫咸燭厥理嵗舍壬午盜發南鄙帝曰汝青治辦行李毋大誅割定患則已獵獵靈旗啓道徑指凶渠踣仆俘徒授耳嶺服既平勳賞周被封殁録孥門戶有巋粵兹明年農家豐美㕓廬積腐庾漕儲峙帝咨相臣匪台德爾穹昊眷賚祖考佑俾何施不報將祀郊畤號令四下若建瓴水荒服述職奔走輸委仲冬丙寅齊寢以俟先時霾晦飇籟號起真意益莊降鑒伊邇夜漏適中星露雲靡大輅既馭清陽出晷休光無垠令容有偉爰翊殊庭奠享仙機髙靈委蛇元氣旭卉隂施自逺大功續似擁格純禧益厚丕址入宿廟下月魄初朏龍章采藻瓚爵擎跪拜于禰宫慈顔僅咫至誠馨香甘薦滫瀡哀念劬勞譬瞻岵屺濯淚霑圭將逡復止京都之南崇丘迤邐飛螭躡塵法乘徐柅地環帟幄霄揭隅雉警角飄蕭彀騎連纍言降言陟實惟告已燭錯宵明璮圪空紫交佩陸離庶旄颯纚樂變神格列周甲癸三后咸在上蒼臨視皇皇富媼從執籩簋七精閃忽五鎮瑰瑋星官下翔濤祗騰跱等級卑髙食飲噓哆欣歆告言奏福來底更御步輦夾途軍壘鉦鼓驚轟跳呼牛鬼異域窮陬黃髮稚齒動蕩成波歡喧成市端闈停午玉色尚扆赦澤春行幽加蟄蟻廢滯振拔垢瑕刷洗寬貸賦取削減逋詭皇帝慈孝下民胥擬皇帝恩仁四國傾倚皇帝曰咨羣公卿士舜隆聯䕫商圯朋噽孰忠豫是孰讒豫匪入官多門孰豫窒弭蓄兵過制孰豫究揣百姓窘窮其患孰弛外夷狃驕其强孰箠驅人以法曽莫如恥化民成俗曽莫如禮百官勑業相豫表裏登任俊良剗斥姦宄天錫帝年萬有億秭天錫聖嗣詵詵衆子乾剛不息章明度揆無疆惟民惟帝其侍臣襄詠歌直道是履詔答勑蔡襄省所進親祀南郊古詩事具悉朕惟王者之禮莫重於郊謂怠於事天不可以訓是故憲章周式參講漢儀序惟仲冬始因陽氣之達卜以南至躬即圜丘之崇爰升燎以致誠乃推恩而均貺卿學窮雅奧詞摛藻絢慶元吉之祚美盛事之成啓發英辭鋪昭景鑠溫麗盡一時之妙遒逸得備善之長覽玩載周歎尚無已故兹奬諭卿宜悉知御筆賜字詩并序臣襄伏䝉皇帝陛下特降中使賜臣御書一軸其文曰御筆賜字君謨者臣孤賤逺人無大材藝陛下親灑宸翰推著經義俾臣佩誦以盡謨謀之道事髙前古恩出非常臣感懼以還謹撰成古詩一首以敘遭遇干冒聖慈臣無任荷戴兢營之至皇華使者臨清晨手開寶軸香煤新沿名與字發深㫖宸毫灑落奎鉤文精神髙遠照日月勢力雄健生風雲混然氣質不可寫乃知學到非天真緘藏自語價希代誰顧四壁嗟空貧臣聞帝舜優聖域臯陶大禹為其鄰吁俞敇戒成典要垂覆後世如穹旻陛下仁明如舜禹豪英進用司鴻鈞臣襄材智最駑下豈有志業通經綸獨是丹誠抱忠朴常欲贊奏上古珍又聞孔子春秋法片言褒貶賢愚分考經內省不自稱但思至理書諸紳乾坤大施入洪化將圖報效無緣因誓心願竭謨謀義庶禆萬一唐虞君詔答勑蔡襄省所進古詩一首為䝉特遣中使賜御書一軸其文曰御筆賜字君謨者事具悉朕常日罷朝閒燕多以經史書藝時用頥神因見唐髙宗賜戴郝李崔四臣之字㫖義皆有所誨諭卿詞令根于溫厚筆力極于深妙名以本其所贊字以申其所輔偶御毫而援翰俾中璫而特錫良以將厚意而表殊寵也敷陳謝懇發為詩文遵臯陶之言以懋其稽古述帝舜之事以思其底績宣明順美重增嘉歎故兹奬諭卿宜知悉四賢一不肖詩中朝鸞鶴何儀儀慷慨大體能者誰之人起家用儒業馳騁古今無所遺當年得從諫官列天庭一露胸中竒矢身受責甘如薺沃然華實相葳蕤漢文不見賈生久詔書曉落東南涯歸來俯首文石陛尹以京兆天子毗名都翼翼郡國首里區百萬多占辭豪宗貴幸矜意氣半言主者承其頥昻昻孤立中不倚傳經決訟無牽羈老姦黠吏束其手衆口和附歌且怡日朝黃幄邇天問帝前大畫當今宜文陳疏舉時密啓此語多祕世莫知傳者籍籍十得一一者已足為良醫一麾出守番君國惜此智慮無所施吾君睿明廣視聽四招邦俊隆邦基廷臣諌列復鉗口安得長喙號丹墀晝歌夕寢心如疚咄哉汝憂非汝為右范希文南方之强君子居卓然安道襟韻孤詞科判等屢得雋呀然鼓焰天地罏三年待詔處京邑斗粟不足榮妻孥耳聞心慮朝家事螭頭比奏帝曰都校書計課當序進麗賦集仙來顯塗誥墨未乾尋已奪不奪不為君子儒前日希文坐言事手提勑教東南趨希文鯁亮素少與失勢誰復能相扶嶄然安道生頭角氣虹萬丈橫天衢臣靖胸中有屈語舉嗌不避蕭斧誅使臣仲淹在庭列日獻陛下之嘉謨刺史榮官雖重寄奈何一郡卷不舒言非由位固當罪隨漕扁舟盡室俱炎陬此去數千里橐中狼籍惟蠧書髙冠長佩叢闕下千百其羣訶爾愚吾知萬世更萬世凛凛英風激懦夫右余安道君子道合久以成小人利合久以傾世道下衰交以利遂使周雅稱嚶鳴煌煌大都足軒冕綽有風采為名卿髙名重位蓋當世退朝歸舍賔已盈脅肩諂笑不知病指天報遇如要盟一朝勢奪德未改萬鈞已與毫釐輕畏威諛上亦隨毁矧復鼓舌加其評逶迤隂拱質氣厚兩豆塞耳心無營嗚呼古人不可見今人可見誰與明章章節義尹師魯飭躬佩道為華榮希文被罪激人怒君獨欣慕如平生抗書轂下自論劾惟善與惡宜彚征削官竄逐雖適楚一語不挂離騷經當年亦有大臣逐朋邪隱縮無主名希文果若事姦險何此吉士同其聲髙談本欲悟人主豈獨區區交友情右尹師魯先民至論推天常補袞扶世為儒方圜冠博帶不知本樗櫟安可施青黃帝圖日盛人世出今吾永叔誠有望處心學士貴適用異端莫得窺其墻子年五月范京兆服天子命臨鄱陽二賢拜疏贖其罪勢若止沸反揚湯勑令百執無越位諫垣何以敢封囊哀來激憤抑復奮强食不得下喉吭位卑無路自聞達目視雲闕髙蒼茫裁書數幅責司諫落筆騄驥騰康莊刃迎縷析解統要其間大意可得詳書曰希文有本末學通古今氣果剛始自理官來袐閣不五六嵗為天章上心倚若左右手日備顧問鄰清光苟爾希文實邪佞曷不開口論否臧隂觀被譴始醜詆摧枯拉腐奚為彊儻曰希文實賢士因言被責庸何傷漢殺王章與長倩當時豈曰誅賢良惟時諫官亦結舌不曰可諌曰罪當遂令百世覽前史往往心憤涕泗滂斯言感切固已至讀者不得令激昻豈圖反我為怨府袖書乞憐天子傍謫官一邑固分耳恨不剖腹呈琳琅我嗟時輩識君淺但推藻翰髙文場斯人滿腹有儒術使之得地能施張皇家太平幾百載正當鑑古修紀綱賢才進用忠言録祖述聖德垂無疆右歐陽永叔人禀天地中和生氣之正者為誠明誠明所鍾皆賢傑從容中道無欹傾嘉謀讜論范京兆激姦糾繆揚王庭積羽沈舟毁銷骨正人無徒姦者朋主知膠固未遐棄兩轓五馬猶專城歐陽袐閣官職卑欲雪忠良無路岐纍幅長書快幽憤一責司諌心無疑人謂髙君如撻市出見縉紳無面皮髙君攜書奏天子遊言容色仍怡怡反謂范文謀踈闊投彼南方誠為宜永叔忤意竄西蜀不免一中讒人機汲黯嘗糾公孫詐𢎞於上前多謝之上待公孫禮益厚當時史官猶刺譏司諫不能自引咎復將已過揚當時四公稱賢爾不肖讒言易入天難欺朝家若有觀風使此語請與風人詩右髙若訥和王勝之遊普明院昔賢履道第平時洛都選門外多風塵林端出臺殿名園迤邐清小徑縈紆轉修竹環數畝可愛清不變冰生流水靜葉盡危巢見晴日破雲來遊魚過池面君意髙如鴻孤超遺健羡茲遊恐難屢歷覽豈云倦放懷窮幽趣回首抱歸戀裁詩賦景物芬葩有餘絢呼童秣豫馬追閒性所便陪諸君㑹史館園名園霽宿雨春日正和柔花香泛草際竹影搖清流鳴禽自往還遊魚時沈浮出門市朝喧愛此林亭幽况陪君子宴飛斝更相酬亦有佳人㩦豔歌青眉愁佳人足娛適逺思何夷猶故鄉去千里野堂臨溪頭夢寐别四載南望無時休王粲昔從軍登樓以銷憂今豫豈不然每到終遲留過白樂天墳樂天本才士羽儀初頡頏脫身避禍機遂得林泉尚生愛香山遊死亦香山葬悠悠醉吟魂終古填幽壙小堂松檜間躋攀白雲上春日照伊流素波明演漾草樹豈有情一步一回望楊叔武北堂夜話嵗晏物景薄層隂向晚饒輕雲隱微月殘雪棲枯條夫君有髙適顧我慰寂寥瀟灑開北堂拂榻延良宵前几陳古書坐見千載遙間亦發新句幽思含九韶神明靜外照念慮醉中消揚雄戒丹轂顔子安一瓢良玉不火變翠柏寧霜雕此心固獨往聲利詎得招罏灰寒更劃燈灺落仍挑相看數漏板後㑹誡重要送胡武平出守吳興東南有佳士文髙志清苦翩然請郡章入居使君府霅水生春瀾瑩淨沙可數霽日明旌旗長風送鐃鼓煙帆十丈船湖山一抔土橘嫩宴亭秋茶香齊閣午神歡所適宜動默造幽覩應念懷鉛人垂頭證魚魯永叔示及聖俞酬答因奉和寄聖俞吾友多稱君思見寒附火氣溫玉開籍才敏鏃加笴嘗於師魯書言詞屢及我乖踈久益新慕合迎已可奈何縻組綬無路動車輠近乃得百篇能詩今信果清寒水石舂怪險蛟螭鎖逺念煙鴻去呈妍露葩娜古人雖已矣風流未應墮東來勿後期山桃綴紅顆送安思正之蜀臨字思正賤者易屈志少年多直情子獨修節行愛護如目精辛勤走銓省歷嵗才㸃名舍居在窮巷門戶面西城妻孥愁屢空獨爾心無營驅騾從僮僕間或造豫庭是時楊叔武相值極歡誠妙言發潛稸逺意倍幽萌羞諛刺俗子指急條邊兵過從豈云厭時節忽崢嶸叔武守嶽陽别去方行行子今復之蜀蜀道天險并槖中無一錢劒外幾百程春風卷地來凡草猶奮榮如何使之人憔悴氣與形內富在乎我外窮繫於生此事久已判努力敦誠明吾友黃君度實乃浮其聲子往從之遊切磨固相成瑊字君度寄襄城孫主簿昔子尚稚孩從親來此邑今子稽簿書職守仍前襲其父嘗為縣主簿嵗月曽未幾風流正相及新硎刃益銛舊署墨猶溼非徒吏氣奮固使家聲立征調事漸繁須材時所急何不一軒翔榮名亦可拾朂子乃自省滿顔抱羞澀送任山歸河東風俗憂思深在昔言汾絳之人隱其間白首甘陋巷畢力事詩書豈特專記誦編年作通記起周迄炎宋甲子二十五回環補遺空豫聞春秋法尊王正一統維持生民綱樹立大邦棟上賢若游夏鳥獸於麟鳯三傳自名家講解或失中區區休預徒奔馳困羈控排闢侵異端寖久成蠧蟲仲淹著元經劉蕡比奴從去聖日彌逺斯言誰折衷猶勝兒女曹煙雲費嘲弄君於春秋學勤勞務包綜向時恥飛箝畫策尚禽縱羌戎負恩德王師壓秦雍邊圉重瘡痍堪為賈生慟廟堂誅賊謀謂與天下共詔書入巖穴丏告嘉謀貢使者出河東輒以姓名送朅來遊京邑天門如可羾岧嶤雙浮雲下有千人䢇扳緣逐聲利激射苟祿俸蹭蹬不敢前撫心愈疑恐短翮無吹噓微芳少培擁客舍逼隆冬蕭條殘雪凍悠悠晉溪上水石挂清夢長謡復西歸孤懷不偶衆身窮見節義物曲何時用美田隨意耕寒魚倣經種夜堂素琴橫晚案青蔬供决然顧豫别蕪音强吟諷持歸傳里閈亦足侑罍甕姑胥行香涇無故流胥臺有餘基太伯以德啓後王結心師夫差昔好戰戈矛臨越陲天蟹須食稻未拯吳人饑于今十一貢貧甚吳王時全吳古都㑹腴田溉湖陂雨暘適小變數米不足炊吾知事本末本末何由知家戶徼福利坐輸黃衣兒平糴連拖漕入朵天兵頥囷窖不夕儲勢若偷生為長慮且後顧荀卿有良規泊吳江寄胡武平遙夜吳江瀕露坐鬚成葆天空不帶雲野逈正收潦徘徊波上月灔漾浮光好清風送炎歊翻覺秋氣早乃問苕溪路舟虞為豫道水行至州下樓臺壓煙島淨居譬如仙嘉産極富媼念君鎮雅俗適以資恬浩豈不欲一往歡誠寄鳧藻縱遊窮佳賞劇論寫幽抱嗟豫逺庭闈六年見春草終日諷陔蘭無路羞羊棗胡為久去家一慮心如搗今而賜告歸計課免讎討前之奉慈顔敢憚勤輿皂北來尚何時汀洲白蘋老儻得杯酒同為君一醉倒遷陽道中奉寄楊正臣同年并序襄頓首頃年同年祕校楊兄以疾去官退休于家洸洋自適無不如意每念不得一奉從遊之後以觀塵外之趣如何也前嵗復往邑中未始一通問訊懷恨無量今者賜告迎親嵗暮道逺歸心搖搖又不得一造門下顧塵容之人益可愧耳過遷陽路輒書一篇以導企念之思兼伸起居十二月二十八日襄頓首名第同一籍家園連七閩何為别眉宇於今十四春昔子補一尉扶病走風塵歸來解組紱宴處頥精神架書括遺逸甕酎涵清醇東阡與北陌候問通殷勤或言疾良愈呼盧氣益振或傳近詩句平淡與古鄰語之天下事塞耳不復聞寧當決引去道固有屈伸嗟豫仰尺祿對讎中祕文天子誤采拔指名填諍臣力微責任重百慮加一身列章乞便郡賜告迎慈親窮冬過梨嶺山蹊出幽榛俯深下坎井斗起攀蒼旻水石齧晚沙霜風變朝皴粲粲澗中花孤芳能自珍班班雲上鳥朝鳴亦求羣嵗晏時節動天遙客愁新去子無跬步笑語絶燕秦作此欲招隱翻愧林泉人碧峯亭虛亭城西隅開檻俯臨北青山正相向萬狀呈峭格落日涵紫翠深春變顔色雲石抱幽致猿鳥自娛適上窮林端寺下見海內國賢侯乘閒來四座揖佳客歌吹有杯酌筆研角文墨雄談連今古大笑一歡戚嗟物亦時遇曠久兹乃得從知閩州圖復記新名迹端明集卷一
