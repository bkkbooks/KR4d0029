body:
  text: 端明集卷三十一宋蔡襄撰啓賀兩府正啓伏以元者氣之始惟君體元而謹時正者天所微惟臣奉微而嚮福恭以某官自天精粹與聖㑹亨講明密勿之謀修潤太平之業燮順隂陽之著以輔乾坤道迎邦國之祥用安社稷闕靈所佑景貺如歸某限守侯藩阻趨材館賀王密學正伏以歲更其次起王道之端律生於陽為人事之紀伏惟某官纍德闕厚對時靖嘉坐宣方面之風積著斯時之惠踐迎首序翕受繁禧旦暮詔音光華柄用末繇慶謁徒切頌祈賀發運提轉正啓伏以人時謹法視太始以為元王政更端奉三微而建統伏惟某官周才應務逺識前民出按方維稔聞於最目入趨宸守闕奉於休恩踐履歲元膺受福嘏慶頌之切敷叙奚殫又伏以律生有元氣復其本與時偕長惟道所存伏惟某官業履清修才靈敏給居集按臨之效佇膺懋賞之書羣隂既消諸福如召良深祝頌安可究宣回知通賀正啓伏以損益相參消長云變斯見天陽之漸以為君道之元况德名之講聞固方榖之來助㑹馳介紹垂貺箋修載窺巨麗之詞過執謙虛之意良深感戢安既諭云賀昭文相公冬啓伏以斗柄建子叶萬寶之始萌緹管生陽慶一爻之來復恭惟某官代天理物輔世長民坐調元化之工力助聖時之祐履兹令序密擁繁禧某限守侯藩阻趨鈴閣云云賀集賢相公冬啓伏以推日於天起牛宿之一度驗氣以律生復卦之七分恭惟某官同秉國平密調物理助成神化之妙致協聖時之和踐兹令辰叢厥休祉某限居藩守阻造鈴齊云云賀歐陽侍郎冬啓伏以斗直於子律旋於宫隂已剝而羣佞消陽始復而君子長恭惟某官夙謨九德參理萬幾屬庶彚之將萌慶大賢之受祉履時長至與國同休某限守侯藩阻趨材館云云賀參政趙侍郎冬啓伏以日至極南晝移伊短乃天陽來復之始實君子履長之初恭惟某官職佐萬幾位參四輔助權造物之柄協贊代天之工適丁慶辰茂膺殊祉某限分侯屏阻詣鈴齊云云賀樞密侍郎冬啓伏以日躔牛斗氣正虛危仰觀運之迭移俯迎時之長至恭惟某官腹心社稷柱石廟廊雍容宥密之司提振樞機之務惟時格祐與國迓衡某適領侯符遙瞻鈴閣云云賀胡副樞冬啓伏以羲經復象一陽來子位之初太𤣥首辭萬物奮黃宮之下恭惟某官華國重器覺民真儒職參樞極之聨力奮經綸之效踐迎長日倍擁繁禧某假守海隅阻對台席云云賀吕副樞冬啓伏以一陽來復慶君子之道亨萬物潜萌協天元之序正恭惟某官本朝耆德當世巨賢發相門之長才贊樞府之要務順迎令序坐擁純禧某屬守侯封阻趨賓閣云云賀陳副樞冬啓伏以乾文仰察日居𤣥極之躔律管下旋候應黃鍾之氣恭惟某官才隆時棟忠結主心贊樞近之繁幾舒弼諧之素藴適丁長至翕受寵禧某限剖侯符阻遙台席回翰林學士攀違啓近由分虎之行嘗展登龍之别東門縱繂方悵隔於清班西掖演綸遽寵貽於珍翰重形離仳益動黯消感戀所深敷揚曷既回吉州李殿丞啓地處海壖路賖江表徒飫聽於善政曾曠問於飛郵何雅故之弗忘遽函封而垂錫繹披縟㫖恍接名談仍聞坐鎮之餘洽播袴襦之咏抗懷獨運嚮福闕二字庚伏尚留宴期尤阻逖惟舊好紛集榮懷回張學士啓言念契濶風期差池歲序適臨便郡俯接提封才安所治之居遽得及時之問眷存良厚感服自深伏以某官業履弸中才紹經逺外専利柄方司臺部之權上簡帝心行踐禁林之選願持主術庸副睿詞回謝提刑啓肅奉帝俞獲司藩政㑹即封之伊始於上記以未遑敢惟講好之勤首辱貽書之貺詞與意厚感將愧并恭以某官席美朝紳主平邦憲自奉光華之使益宣欽恤之刑行奏異能别都顯任未前披覿徒切瞻祈回潤州章郎中啓審奉朝綸榮紆郡紱領一都之㑹風望匪輕控大江之衝事權尤重疆場密接翰牘先詒䝉潤居多輔車有賴伏以某官性資兼敏材識淹通盤錯著能荐委於藩之寄都俞即協别疏不次之恩㑹見末由係瞻徒切回蔡運判啓近荷優除忝臨要地雲霄在望孤奉於明綸翰牘流徽逺詒於慶問恭惟二闕臺之優寄分部刺之劇權百城望風萬里迎刃竚寵函之訊召即禁省以升榮系咏感銘襟膺參萃回賀新提刑元郎中啓伏審就闕詔書移按獄事伏惟歡慶恭以某官懿文景行亮節冲規早膺郎選之華出布藩條之重休聲既著至簡於宸心中異有常遂専於使㫖方依臺部闕抃悃悰先枉箋修倍深感系與曹司封啓自逺規猷動更晦朔仰思確論鎮極勞懷屬春令之方中納天倪而見順恭以某官忘幾况略樂道飬恬都捐冠冕之榮深得烟霞之趣內量泛務企服髙風卜披㑹之未期但凝瞻而增劇回茂才投贄啓數日前伏䝉猥示長箋兼詒盛制文意髙古橫述作之宏規詞㫖冲謙隆進趨之妙矩再量膺闕詎測淵涯唯阻觀於英儀但永銘於珍藴其為感荷罔悉名言回兩浙運使學士啓近膺寵詔出布寬條夙戒舟虞已亂長江之阻前瞻臺部方依大府之嚴敢謂惇明未忘契分先垂尺牘之况逺置行郵之來窺繹藻詞倍增銘鏤即接承於髙論罔究述於鄙悰回睦州李虞部啓審涓剛辰榮諧美任古治中之職郡之紀綱半刺史之權事皆關决矧郎官之充選方士望之推髙行遲政成别膺登課猥承隆眷特貺珍題感篆欣詹敷染奚盡回發運張學士啓瞻轉漕之崇逺依屬部通信問之缺已期順風遽辱箋修之來特存禮好之厚兹用感服豈勝究宣切惟行方而純文巨且粹入奉禁籞不違清光對閲書筠率判欵緒别膺寵數更踐榮階回越州教授吳祕校啓一水相望長箋逺貺鳴玉鏘金而盡在布錦列綺以何多載窺巨麗之詞徒切置藏之厚矧唯學術該洽素有淵源行實清修頗知趣向祈克全於禮制將漸至於亨塗餘在詹凝安可云諭回新知越州章學士啓審被俞音出司藩政眷是㑹稽之重號為百粵之雄擊柝交聞方喜疆場之接飛郵遽及俄承竿牘之貽翹俟仙舟併親餘論感銘抃系參萃悃悰回提舉慈孝寺李左藏啓近荷優除忝司善郡奉親輿而至部方幸便安布寬詔以臨民敢辜付委猥承雅眷逺枉珍縢矧密侍於天光久著稱於材武願言加嗇庸副翹詹回髙崇班啓自逺堯庭遽臨吳㑹屬事為之倥偬憑郵置以濶稀俄辱圉函曲敦雅眷矧日趨於朝謁惟密侍於天光宜保祥經聿迎戩榖勉希將重别迓寵升回湖州知郡徐郎中得替啓伏審膺十行之札榮被代還奉三年之成旋登課最矧霅溪之雅俗擁吳㑹之故墟耳剽風聲頗光朝選辱珍題之見貺咏厚意之周勤披晤匪遙敷叙奚既回賀張皇城啓伏審被命出麾涓辰頒政伏惟歡慶恭惟某官起於將閥舉有賢才用金板之謀屢専武事奉牙璋之寄更重邊威帝念且深軍聲自樂逺煩箋翰能不置藏餘冀保綏以副言願回謝知通啓比膺俞㫖出領便藩屬總事之云勞愧馳書之未逮敢惟勤誼特枉誨封講好甚勤玩詞增感矧長才之濟務方美任以逢時宜航大和前對光寵回蔡郎中啓得郡海瀕望風天角髙才景行役懷想以徒深善政仁聲播傳聞而巳久行膺甄擢别對寵光逺辱珍縢過形厚意感藏無斁敷染奚周箋謝昭文張相公箋某幼而從學少長舉進士作詞章日益務竒新與時等輩爭聲名當時處之無所愧也數年以來専於聖人書更求其意少有得焉儲於心而力於躬其於為文不復奮肆夸麗通乎意則巳要之是莫敢有所至焉然勇於進而不能自視度其性之與力堪否貿然𡨕行而不知止既而翻然省其中昔之處而無愧者今也愧日益加矣以愧心之加然後能自信乎有意於古者也有意於古則莫能與今盡同也今之學文章者或屬聨簡編挾持以趨大人之門祈倡一言得名譽加衆人上取顯重於當世及臨政官民則曰吾業者文章吏事吾無與也謾不肯省視案牘以自為髙俗亦莫之怪而反指其人曰某文章士責以材用不為宜也嗚呼所謂文章者豈斯為速進之資耶又豈不與民政異耶是必不然是必為之皆偷者也然則其尤能於文章愈不宜為此况某之不能孰敢務取名而怠事者哉前居幕下踰一年矣苟非承命及因論列事則不敢以文詞妄取於左右與羣吏口語辨是非當否非其休未嘗執書自娛如是非故求異於人庶乎其中之愧者鮮矣伏䝉昭文相公不以某拙愚為棄而以某藝文操履言於上者聞命愧畏莫知止極伏惟相公有國元老天子所賴官師所則四方所瞻誠得天下之賢者布列朝廷條理制作大備太平之事某也材薄能細得與士大夫之後以觀其盛美而作為歌頌播於逺俗而傳於後世其心亦足樂矣豈敢以區區之身徼幸於宰相之門哉是其所樂者思與天下之人同其所樂也别紙曹待制某啓别後計君侯浮潁亂淮自冬瀕春道路之勞加以吳閩闕舟上下湍險復可怖恐是行良苦然既至則溪山城郭署居食飲丹荔夏熟雜花秋香雖天下佳處當不能過之矣士人有深明經術敦尚節行閒暇與語大醒人意始朝廷遣君有經制久逺之議度君至部或與遂成之則一方幸甚南地多熱君侯愛重三月二十二日不宣某頓首黃太傅久不作書無他蓋無事不須縷縷承示及已言之有南來人奉詢多言足下太寬而少嚴雖字人者當然其如鄉中詞訟若狡者不禁則無理者妄作故是是非非懲之恕之乃可為政若用寬仁事益繁而難精不可不察某頓首觀文侍郎某啓奉公書伏承慶侍外起居萬福知憂撓多端情悰不聊幸寬中人生最深者惟愛耳至於材處萬事不為物後賢知皆及之愛則未能逃之者蓋於是而生滅安可逃哉然知其無可奈何就日月漸遣之憂思傷人無形願省覽不宣某再拜歐陽永叔某再拜嘗已拜違伏蒙賜手牘展繹荷戢波流雖云未增載輕可行少候舟人辦治便即解去浩然之心壯年尚能持習今老矣復何繫哉無入而不自得唯恐智短而道逺求之行之沒世而後巳佳山水美魚稻我自有之而樂孰能禦哉承教固知有見慕之懷何可得也謹奉手啓上謝不一一某再拜元郎中君得武陽待次錢塘豫為郡守自寒食遊西湖入靈隱天竺榖雨賞花過吉祥龍華淨明及民間園館往往傳於篇咏誠可娛也君將之官豫亦被命南都雖未及符計非久留異時聚集非復有此臨書益自惆悵耳陳祕書某啓自外除後宿疾未痊心意不聊辱書并近文數十首枕上窮卷不知筋骸之攣苦子之文詞日益新道義亦隨而有加焉其有未至者當相見日評是非缺四字之論則今世未闕有定分某則不暇為此某答答戶曹葉君十一月十二日某頓首頓首比聞足下有閫中之憂方執喪在疚禮不得弔又以聞之過時不果修問為重闕今奉書以某撰次先文表志勤勤為謝某嘗以為文者當有典法言之於今而見者可信傳之於後而聞者無疑是曰文已自惟所作不逮前人故論述功德以稱當世之士大夫者莫敢當也足下以里中之舊頃以見命雖復編次事實第不能贊發賢者之光而充滿孝思之志用是為愧足下過懷謙抑為意惇厚殊非望也惶悚惶悚冬寒幸飲食自夀蔡某頓首提刑方郎中某啓蒙教精密見望殊深然某久處繁劇五年之間無一日不在思慮之內以是神明自耗不獨筋力之難勝也雖得錢塘而多事甚非自適之所豈暇作區區事耶目前遣了以免官責而已倘一日得自遂乃天幸也因風示誨不一一某上知郡陳駕部某啓輦轂之下號為勞勞况兹計省罔有暇日退休賓客續續無窮至或親知不暇交言而去朝車臨訪無緣從容今兹出守復爾暌濶瞻馳之素豈勝鬱邑謹奉手啓叙别不一一某頓首彥猷學士十一月十一日某再拜賢弟殿下君雖同年而未嘗接識至京又不往還但有見君子多或稱之前月十九當直後殿輒見其作為動搖山嶽雷霆之下挺然不動遂得春州之行斯大可嘆駭前史所載古人事豈復能過之耶惜其不幸所論不從而身竄窮荒愧恨何極近有勑㫖減於三州身丁米斯聖情哀憐逺民之深故有是舉今歲都下大寒非常近登陛首問貟小茗造作之因殊稱珍好恐知兩日前堂中下進奏取江西及福建赴治月日後逼節未有聞不知作何行當是别有命耳夜寒筆凍揮灑縱橫願君侯恕之蔡某再拜端明集卷三十一
