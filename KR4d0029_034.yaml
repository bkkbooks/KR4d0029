body:
  text: 端明集卷三十四宋蔡襄撰雜著里醫之言周熄秦潰漢維魏承歷代更主張紀綱建法度則方冊存焉論者謂聖人者言治心治身治國家天下舉曰仁義而巳漢魏而下曠世持久載籍可觀政具尤悉所謂治心治身治國家天下焉者孰不曰要之仁義之歸而巳矣率仁義之治而德教壅涸者有之生物橫悴者有之何聖人者之言施之於事如是之異耶某論之曰豫里中有醫工凡百骸之攣植六府之環回表裏相依精氣布流色迎聲諦指鈎心决刻日語人以生死期卒不夸妄醫之鄰有藴病者幾七日造其廬而請焉醫曰子之疾一之年子今亡矣夫疾豈謂筋弱氣衰暴於其外而謂疾哉雖百骸舉安氣有所抑萌於其中斯固疾巳故輔藥之道三曼膚愈神先藥自將上也疾萌於中圗剪其萌中也暴於其外一旦勤勤然者下也子之疾雖暴於其外然弭吾劑審如吾經禦其為仇害者後百日乃可瘳疾者往及期勿平而益加又造醫之廬曰如期勿平先生其紿乎醫復視之却立日子嘗某物食張仇害之勢焰倒鐵鉞而授柄未有見其勝也當如嚮者之言後百日尚可瘳疾者謹如其教如期而疾果大愈夫一身之疾藥非不工也物有害之弗平而益加天下之疾針以仁義而害於邪說欲其渥澤汪濊其可得乎自戰國陵夷經籍歇滅簡編詭制僵不可植於斯之時向利尋釁之徒咸以術進百家並建墨粉交繢以至倡發異端緣智巧飾鼓行乎天下世間俗習愈久而益恬故其治與三代差逺蓋政蔽而道厖非仁義罪也且聖人之言仁義也者性誠先覺篤實光大研神之變抗天之運致之於用然格善戰之諜塞任刑之兊尊心於至和之際措躬於無邪之適動有章程居有彛則周流而無迹經略而不遺端拱廊廟之上熏冒蒼垠之表豈非守之至簡約行之至廣密者與孔子曰文武之道未墜於地在其人舉之而巳舉之奈何曰如醫之言漼淵之魚溪谷之水激注滀洑彌崖缺合留為漼淵徹靚幽壑蓋鱗屬之宫隩也瀕溪之居者有畸叟在焉畸叟扄括淵中之利諭閭巷之間曰前有漼淵吾嘗封焉淵之魚自鯤而繩交首橫鬛春孳陽隒夏入氷垠乃今而往彼哉孰有且帛於吾驅粒於吾嗌兹焉是依無何聞之於里中惡少年者少年數十輩頭㑹相與謀曰漼淵之大鱗屬之息畸叟奚為而採置諸懷獨能斂手袂間而悚其教乎於是焉罟網罾笱掩擊顛倒敗其宫隩若取釡中及其已則淵魚且盡其存者濡沫而勞尾者矣之人也未始知之異日呼其子曰向之魚管於吾且久其洋洋于于者乎待其子而往注睛四視其出游者儻有焉叟意貢墳梁石以蔽投蕭以摻復諭其閭巷曰漼淵之上力用加苦設有攘吾利者吾弗徒巳也既而惡年少亦悛其宿圗久之又屬其子而往焉視其出游特大者跳躍去來而小者無幾叟益惑不知其出西澤有業漁者過畸叟曰子藏魚於淵舉識其類乎畸叟者曩不槩意曰吾觀江之鱀音忌大而有絶力其類之芒芒而勢不興或者皆為其所以并食之雖溪谷間亦不殊路子畏罟網之潰而不知其類之大而有絶力者并食之之為害也矣安愚子曰天王之大寓其漼淵也耶籍數編民其漼淵之魚也耶汙官刻吏惡少年罟網之具也耶巨室幸民害淵之大魚也耶國帑之賦登十而一汙官刻吏又强半之巨室幸民倍稱而盡取若是棲魚於淵畸叟之獲弗加錙毫豈特為惡少年害魚之利乎雖少年之已悛而害魚之未判吾不知淵中之芒芒者殘其性也耶樂其生也耶都盧之言粵絶都㑹莊嶽交通之道人有植修木幾百尺􅛢於四隅填填淵然鼓於其側舉都之人答鼓而至竦頥纍趺環立如堵是人也瓠解而噪呼喉中出絡下語緣木行空指之所膠踵之所掎岌然顛隕翩然振起梟鳶盤嬉猿狙肆捷曾未盈晷而變易電幻殆不若人有也巳之齯負丱童乃舉厥筐抵於環立者祈以金錢適有眊賈過焉憮然而語曰號物為萬人犯其一有聾盲蹇僂之苦者命有不幸矣有連兵轉餉之勞者時有不幸矣汝曹陶生聖世肖貌母缺曷不假田椊土稼而粒乎曷不搆廬分植䌟而帛乎曷不業工逞巧而亟售乎曷不殢財掩匱而集贏乎利生多岐孰攘孰圉奈何栖然婦從其姑母提其嬰暴露秦疆浮游宋野泝淮亂江躪吳蹙越輕遺體若紘綖而為資身之䇿豈其善耶竿者嫚之曰若能習吾所為乎眊賈愀然作色曰吾辨貴以親子反慠我乎竿者曰子之業則不遷矣吾固若子也且嘗語子乎吾之道始者篤場圃以跳梁俯堂涂而踊陌魄惴坎窪神兢礫磧如是者纍月矣既而阽倍尋之危批數仞之表搶榆枋而特上漸於桷而遐厲如是者積有年矣然後支體順投神氣宛守雖層崖絶壁雲鳥倦飛千出萬殊劔㦸紛揮於吾前未嘗易志而臱音綿視語曰內巧専而外滑消不膚撓而不目逃弗吾加矣投能且爾矧百尺之木哉以之角萬夫則有夸譽矣以之食力則無大責矣夫擲於砥道或離蹶踣之患又吾之所為乎倘有人焉雅不習為椊跋乎髙智外不可當乎十目之視內已深乎夏畦之疾其不縻軀殍族者天幸之萬一耳惡能名聞之章著乎吾所以宿其業置用在我奚纍之及乎安愚子聞之曰有道而寄者豈其人哉求之於世德業其大技能與名位其大修竿與荷人爵登臣陛內以獻道於君外以利澤於民必有久德大業然後享崇髙莫大之位外澤利於百姓內環省於胸中無所愧負故德業著而位不加有國之羞也爵位髙德業昧身之殃也我惡夫急日月連黨與進不由道險詖以取榮貴其詐不售則哀歌悲謡誹政譏世之為也不幸而當所欲外則驕蹇敗撓尋至其脫然者亦天幸之萬一耳豈仕人之知顧出游民之下不然矣不然矣竿者不省其氏族而其伎種於都盧為都盧之言以自警云福州五戒文觀今之俗為父母者視已之子猶有厚薄逮至娶婦多令異食貧者困於日給其勢不得不然富者亦何為之蓋父母之心不能均於諸子以至此不可不戒人之子孝本於養親以順其志死生不違於禮是孝誠之至也觀今之俗貧富之家多於父母異財兄弟分養乃至纎悉無有不校及其亡也破産賣宅以為酒肴設勞親知施與浮圗以求冥福原其為心不在於親將以誇勝於人是不知為孝之本也生則盡養死不妄費如此豈不善乎兄弟之愛出於天性少小相從其心歡欣豈有間哉逮因娶婦或至臨財憎惡一開即成怨隙至於興訴訟冒刑獄至死而不息者殊可哀也蓋由聽婦言貪財利絶同胞之恩友愛之情遂及於此婚娶何謂欲以傳嗣豈為財也觀今之俗娶其妻不顧門戶直求資財隨其貧富未有婚姻之家不為怨怒原其由蓋婚禮之夕廣縻費已而校奩槖朝索其一暮索其二姑辱其婦夫虐其妻求之不巳若不滿意至有割男女之愛輒相棄背習日久不以為怪此生民之大弊人行最要者也凡人情莫不欲富至於農人商賈百工之家莫不晝夜營度以求其利然農人兼并商賈欺謾大率刻剝貧民罔昧神理譬如百蟲聚居强者食啖曽不暫息求而得之廣為施與冀滅罪惡其愚甚矣今欲為福孰若減刻剝之心以寬貧民去欺謾之行以畏神理為子孫之計則亦久逺居鄉黨之間則為良善其議至明不可不志諭鄉老諸生文某備位刺史行春奠之禮於孔子廟郡之士人來相豫職爰及耆艾亦集庭下既延之坐謹問之曰唯爾諸老前觀刺史之政多矣吾州數萬族人情善惡亦唯萬殊刺史為治孰不欲興利去害宣流風化與古為比逮及三年民未之信則又去矣將良吏之難值耶抑治道之難至耶某德業不能過人智術不能濟衆夙夜悉心唯民實憂察禁邪猾扶善沮惡使强弱各安其分然未免於刑罰豈足為治哉至於孝慈友弟敦厚信讓之風將有望於諸老老者之言少者之法父詔其子兄命其弟相率以從教一家修之一國效之能以興禮讓而止獄訟亦諸老有助於刺史也州郡之有學所以勵賢才而進德業必有師友顓訓導之方為之治經術習文章講道義以稱厥職設非其人而冒居之學不用成民罔攸信某之治郡甫爾士人之修德行與經術文章者莫知其誰譬諸䝉霧罔識處所諸公各以至公之心而稱舉能者以備其闕孔子曰十室之邑必有忠信如丘者焉諸生條陳其人實密其封豫將擇焉杭州戒弄潮文斗牛之分吳越之中唯江濤之最雄乘秋風而益怒乃其俗習於以觀游厥有善泅之徒競作㺯潮之戲以父母所生之遺體投魚龍不測之深淵自為矜夸時或沈溺魂魄永淪於泉下妻孥望哭於水濱生也有涯盍終於天命死而不弔重棄於人倫推豫不忍之心伸爾無窮之戒所有今年觀潮並依常例其軍人百姓輒敢弄潮必行科罰雜說李靖稱苻堅之敗非謝𤣥之善秦諸軍皆潰敗唯慕容垂一軍獨全堅以千餘騎赴之垂之子寶勸垂殺堅不果此所以秦師之亂慕容垂獨全蓋堅為垂所陷明矣為人所陷而欲勝敵不亦難乎余觀秦伐江南唯垂曰晉武平吳唯張杜而已若昧羣臣豈能成功以此謂垂陷堅未盡矣垂知進討之為利不能料堅之材堪與不堪辦事此所以勸之也當謝𤣥隔肥水為陳夫兵半渡而擊之利以是堅許却軍也𤣥以八千之衆當百萬渡水而薄人兵家所忌豈不知此乎蓋料堅之陳大槩難整然後觀形勢也既而堅陳果動𤣥濟而戰堅衆遂潰使堅之陳難却而整𤣥必不濟矣此𤣥之料事合於機變若以垂軍獨為陷堅當其以千騎赴垂信子寶之言取堅如振替葉垂之不為足驗垂無陷堅之意夫善用兵者雖敗不亡垂一軍之全法制在焉垂不能知堅之材則可罪謂之陷堅誣矣王景略之亡唯勸堅勿伐江南景略盡知堅之材故云耳福唐水居船舉家棲於一舟寒暑食飲疾病婚姻未始去是微哉其為生也然觀其趣往來就水取直以自給朝暮飰蔬一柈不知鼎飪烹調之味也緼衣葛服不知錦紈粲粲之美也婦姑荆簮不知塗脂粉黛之飾也蓬雨席風不知大宇曲房之適也相羊窮年少而老生而死一事不入於中矣與夫隂懷賊險乘利求幸盛時翕翕其敗熄滅無種孰為勝負耶開元中霓裳羽衣盛行於時唐末兵戈浸以微滅今河中有舊譜而其字形與世之譜字觱栗笙皆不合無從而得唯法曲散序無拍謂霓裳之遺音未必然也守程精通音律悼其亡缺仿像法曲造之寄林鐘商華日新亦造望瀛懷仙二曲世人罕得其本也慶厯間豫在館閣嘗見九仙經㑹修崇文總目凡怪誕之說擯而不取故家無傳本及來泉山抱病數年顓讀醫方藥石之說漸入修生之要以精氣神為妙用故仙經丹訣亦歷覽焉然取其可以資身者若神仙云云吾不與也巳孫子書其文有三代風而其致㫖一切取勝蓋戰國事也至於精思明决數千年以來兵家成敗未始有出其畔域者信絶世之髙致乎豫愛其無智名無勇功之說故録之或曰鼂錯為景帝謀削諸侯以尊漢而陷於仇人身死都中事適未就而遭讒被禍其誠忠矣而揚子雲乃以為愚何哉愚錯而孰為忠耶曰錯誠忠矣然為漢謀諸侯則曰削亦反不削亦反非愚而何若主父偃賈生推恩以分地乃謀者之長䇿烏孫公主七十餘持擕男女還漢人生匹耦故有常理而楚主嫁異國配異人豈獨楚王之不才漢之醜無時可滅又啓後世和親外夷之端張騫之罪也漢通外國以弊羌氐斯其無䇿之甚夫撫安外國而威制之蓋慮為邉患耳豈致意於天馬氂牛異物詭說哉過猶不及也甚哉愛之蔽人也唐太宗指麾而定天下及夫拔佩刀議太子何其不明以至是乎甚哉利之移人也漢髙祖父妻男如此不顧則利能奪愛婦人於愛為最深而武后自殺其子以固權嗟乎孰可與論是耶夫人明慧禀於天資不可强而學士當盡心於其間金鐵之磨礪既錬其質又從而成器太阿龍淵資夫人力者故鍊而成器學者勉之士之習末也久矣今為詩賦者尚不知何等事為丈章况文章士之末耶欲人之興行如曾顔治民如龔黃者難矣豫自閒居日造吾門者道對偶事以為才不才嗟乎治道何從而興士亦罕有自立者其理然也古之人言命者亦云歸之於天蓋非人之所能測云爾異乎今之言命者有隂陽日月星辰歲時異端之術幸而時合則莫不推引以為驗也甚哉人之好怪也久矣古之人不語也卜筮最古春秋時有相骨日者後世尤盛唐初乃有論命之說今之三命星算分為二門而善七曜多本胡法此日者所以博濟耳豫少時治經書觀聖人於刑獄尤諄諄尚書所載最為詳密私心以為天下萬務若生民不得其平又豈専在刑獄乎及仕宦二十年歷事日久然後知生民之患莫大於獄失其情官巧文律嗚呼聖人之意深矣豫每讀易至於決獄用刑之說其卦多有離象而用在剛陽之爻蓋非明不燭非剛不決君子有是二者濟以仁恕斯可謂士矣樂自王朴之後無述作仁宗時李詔重造樂器廢朴鐘磬其後復用阮逸胡瑗更作新樂蜀人房庶又為異議迄今無定論林氏巽之學通易卦太陽太隂以定律管先儒所未言評書鍾王索靖法相近張芝又離為一法今書有規矩者王索其雄逸不常者皆本張也旭素盡出此流蓋其天資近者學之易得門戶學書之要唯取神氣為佳若模象體勢雖形似而無精神乃不知書者所為耳嘗觀石鼓文愛其古質物象形勢有遺思焉及得原叔鼎器銘又知古之篆文或多或省或移之左右上下唯其意之所欲然亦有工拙秦漢以來裁得一體故古文所見止此惜哉唐初二王筆迹猶多當時學者莫不依倣今所存者無幾然觀歐虞褚栁號為名書其結約字法皆出王家父子學大令者多放縱而羲之投筆處皆有神妙余嘗謂篆𨽻正書與草行通是一法吳道子善畫而張長史師其筆法豈有異哉然其精粗繫性之利鈍學之淺深古人有筆冢墨池之說當非虛也近世篆書好為竒特都無古意唐李監通於斯氣力渾厚可謂篆中之雄者學者宜如此說然後可與論篆矣張長史正書甚謹嚴至於草聖出入有無風雲飛動勢非筆力可到可謂雄俊不常者耶長史筆勢其妙入神豈俗物可近哉懷素處其側直有僕奴之態况他人所可擬議智永草書千文蓋七百本唐初尚有存者太宗取其最精者模寫勒石云律吕調陽是也顔魯公天資忠孝人也人多愛其書書豈公意耶閩中無佳石以堅木刊字往往有豫筆迹模刻多或失真自今年來眼昏求書者一切謝絶向時子弟輩多蓄豫字皆為人持去余有澄心紙百幅李庭圭墨數丸皆人間罕見者當作諸家體以傳子孫其餘非故人不能作手書子弟輩得余書者當自收之每落筆為飛草書但覺烟雲龍蛇隨手運轉奔騰上下殊可駭也靜而觀之神情歡欣可喜耳蘭亭模本祕閣一本蘇翁家一本粗有法度精神其餘不足觀也石本唯此書至佳淡墨稍肥字尤美健可愛或云出於河北李學究家今王公和所藏也瘞鶴文非逸少字東漢末多善書唯𨽻書最盛今八分晉魏之分南北差異鍾王楷書為世所尚元魏間盡習𨽻法自隋平陳中國多以楷𨽻相參今存者李德林碑禇書三龕碑是也瘞鶴文字有楷𨽻筆當隋代書世云逸少殊無倣佛也文房四說一作雜評新作無池研龍尾石羅紋金星如玉者佳筆諸葛髙許頔皆竒物紙澄心堂有存者殊絶品也墨有李庭圭承晏易水張遇亦為獨步四物文房推先好事者所宜留意散卓筆心長特佳耳硯端溪無星石龍尾水心緑紺如玉石二物入用餘不足道也墨李庭圭為第一庭寬承晏次之張遇易水次之陳朗又次之不獨造作有法松烟自異當辨是也紙李王澄心堂為第一其物出江南池歙二郡今世不復作精品蜀箋不堪久自餘皆非佳物也筆用毫為難近宣州諸葛髙造鼠鬚散卓及長心筆絶佳常州許頔所造二品亦不減之然其運動隨手無滯各是一家不可一體而論之也歙州績溪紙乃澄心堂遺物唯有新也鮮明過之今世紙多出南方如烏田古田由拳溫州惠州皆知名擬之績溪曾不得及其門牆耳婺源石硯有羅文金星蛾眉角浪松文豆斑之類其要在堅密溫潤天將隂雨水脉自生至可磨墨斯可寶者黃山松煤至精者造墨可比李庭圭然匠者多貧人於以求利故不逮也近有道人自能燒烟遣令就黃山取煤必得佳者歙州此三物竒絶唯好事以厚資可致之若臨以官勢莫能至也李隩下於績溪而優於由拳與烏田相埒循州藤紙微精細而差黃他處以竹筋不足道房用之筆果可用鋒齊徑健今世筆例皆鋒長難使比至鋒鋭少損已秃不中使矣余收歙州父子四世五人墨超自易水來江南為歙人超之子庭圭圭弟庭寬寬子承晏晏子文用用之後墨無傳焉有孫惟慶今為墨務官李氏墨超始知名圭或為邽與寬最精好承晏而下不能用家法無足取者世之好竒者多借庭圭姓名模仿形制以造之有至好者苟非素蓄之家不能辨之偹條數等傳諸雅尚之士或有未見他日續其後墨貴老久而膠盡也故以古為稱世以歙州李庭圭為第一易水張遇為第二圭復有二品龍之雙脊者為上一脊次之遇亦二品易水貢墨為上供堂次之近世兖州陳朗亦為精庭圭弟庭寬子承晏晏子文用皆能世業然差不逮也近輒絶無有也世有王君得墨易水張遇歙州李庭圭庭寬承晏文用又有柴珣朱君德小墨皆唐末五代以來知名者然人間少得之皆出上方或有得者是為家寶也李庭圭墨為天下第一品祥符治昭應用為染飾今人間所有皆其時餘物也其族庭寬寬之子文用亦造墨較之其祖莫能及也過睢陽倅車李侯言有庭寬墨遂得之李氏墨余得其三世者可謂富矣新安所作墨甚佳然其名印以庭為廷非是又肌理不細椎練不熟使墨工得一見之為語其未至必能少進其蓻南方蒸濕古墨尚覺有潤况其新者宜以漆匣密藏之入秋冬間可用耳欲求李庭圭墨終難得或庭寬承晏文用皆其家法易水張遇亦為精好然庭圭圎墨殊未覩矣近得歙烟令造墨便有李庭圭風采不為浮光乃知木性隨其地土所異豫嘗有辨信不誣矣昔年洛下為留守推官事宋公見遺李庭圭墨自爾書笥中稍或益之漸至知墨墨之說尤為精微唐彥猷殊通此理沈立之見示盤溪木瓶置水則碧色宜墨豫按廣韻樊摫木可以漬水蓋聲之誤也造墨多用秦皮亦此類今日微雨差涼盡出硯墨以觀之京居少暇被疾在告因及之唐彥猷作紅絲石硯自第為天下第一黜端巗而下之論者深愛端巗莫肯從其說豫嘗求其所以勝之理曰墨黑物也施於紫石則昧曖不明在黃紅自現其色一也研墨如漆石有脂脉助墨光二也硯必用水雖先飲之何研之差故為天下第一東州可謂多竒石紅絲黑角黃玉褐色凡四種皆可作硯而黑角尤精出於近日極有佳趣端巗龍尾不得獨步於當世其理然耶東州可謂多竒石自紅絲出其後有鵲金黑玉硯最為佳物新得黃玉硯正如蒸栗續又有紫金硯其餘紅斑黑斑不堪作硯造茶器亦大好其下州郡未見如此竒石也東州固多竒石始得紅絲硯後又得黑角硯黃玉硯今得褐石硯黑角石尤精好如紅斑黑斑可作茶器而不堪為硯如闕州豆斑青角不足道也向者但知有端巖龍尾求之不巳遂極品類僕之所好有異於人乎青州石末硯受墨而費筆龍尾石得墨遲而久不燥羅文石起墨過龍尾端溪龍窟巖紫石又次之古瓦類石未過此無足議也蜀箋惟白色而厚者為佳今上方有故時貢者實可愛也近歲利在薄而易售以是絶不佳此物乃可惜耳常州强武賢造粉箋殊精雖未為竒物然於當今好事亦難得耳雲母粉不利人目用者宜審之吾嘗禁所部不得輒用竹紙至於獄訟未決而案牘巳零落况可存之逺久哉硯記端州崔生之才居端嵓側家蓄石工百人歲入硯千數十年無可崔意者一旦工者於後嵓百丈坑剖石得紫龍卵其里人來觀者持羊酒賀造成硯長尺廣減十之四厚重寬平開匣粹潤若有德君子上下眼各四當中暈七里又有文表裏無有纎瑕微近手則潤澤可劘墨矣崔抱硯輒忘寢食者久之念竒寶不可私藏其誰當之不逺千里授使者以來遺豫齊戒發封諏吉日以澄心堂紙李庭圭墨諸葛髙鼠鬚筆為之記皇祐癸已十二月二十八日茶記王家白茶聞於天下其人名大詔白茶唯一株歲可作五七餅如五銖錢大方其盛時髙視茶山莫敢與之角一餅直錢一千非其親故不可得也終為園家以計枯其株豫過建安大詔垂涕為余言其事今年枯枿輒生一枝造成一餅小於五銖大詔越四千里特擕以來京師見余喜發顔面豫之好茶固深矣而大詔不逺數千里之役其勤如此意謂非豫莫之省也可憐哉乙已初月朔日書墨辨曾君視余墨一丸其面文曰新安上色香墨幕音闕漫曰歙州李庭圭肌理光膩與今之李庭圭墨形模不類也其名字不同邽圭不同形制復異謂之真圭墨其可乎然李超與其子庭圭唐末自易水度江至歙州地多美松因而留居遂以墨名家本姓奚江南賜姓李氏超墨世不復傳某嘗侍仁宗羣玉宴輒賜得之其面文新安香墨其幕歙州李超造與今所視形制切相類也豫謂超與圭始至新安各出姓名尚用圭字超死而圭業益精面有龍文而其名亦用邽者乃知名字不同形制有異者作之有先後也或曰何以決知之曰類其父超也蓄藏於中數十百年非僞效也豫既辨之而墨遂歸我家墨哉可無恨矣書其說以贈曾君或墨之思攬豫說可以少解嘉祐八年癸卯九月二十八日記芝草述福州連江縣寧善鄉崇德里保福院産芝一本四月八日癸未令朱定得之詣府質黑而堅葉如側荷其上又出一本離為六莖枝柯聳密中有連理末如燕尾而朱藏之髙可尺許世傳古篆芝字皆枝葉扶疏豈古人象形而作乎而漢齊房歌曰九莖蓮葉𤣥氣之精正謂𤣥芝而有九莖與葉蓮也芝之為物在處有之大較形類苖檽音軟近無是比倘或有焉而豫未之見也故特書之樞密直學士尚書禮部郎中知軍州事蔡某題端明集卷三十四
